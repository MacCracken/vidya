id = "iterators"
title = "Iterators"
topic = "DataTypes"
description = "Lazy sequences that produce values on demand — the foundation of functional-style data processing in every modern language."
tags = ["iterators", "lazy", "map", "filter", "fold", "generators", "functional"]

[[best_practices]]
title = "Prefer iterators over manual indexing"
explanation = "Iterator chains are bounds-checked once, communicate intent clearly, and let the compiler optimize better than hand-written loops."

[[best_practices]]
title = "Stay lazy as long as possible"
explanation = "Chain operations before collecting. Each .collect() materializes the entire sequence. Keep the pipeline lazy until you need concrete results."

[[best_practices]]
title = "Use fold/reduce for accumulation"
explanation = "fold() is more general than a mutable accumulator loop. It makes the combining operation explicit and works with any iterator."

[[best_practices]]
title = "Know your consumers: collect, for_each, sum, count"
explanation = "Different consumers have different performance characteristics. count() doesn't allocate; collect::<Vec<_>>() does. Choose the right terminal operation."

[[gotchas]]
title = "Iterators are lazy — nothing happens until consumed"
explanation = "Calling .map() or .filter() builds a pipeline but doesn't execute it. You must consume with collect(), for_each(), sum(), etc."
bad_example = "vec.iter().map(|x| println!(\"{x}\")); // prints nothing!"
good_example = "vec.iter().for_each(|x| println!(\"{x}\"));"
language = "Rust"

[[gotchas]]
title = "Consuming an iterator exhausts it"
explanation = "Once an iterator is consumed (collected, summed, etc.), it's gone. You can't iterate it again — create a new iterator from the source."
bad_example = "let iter = v.iter(); let sum: i32 = iter.sum(); let count = iter.count(); // iter already consumed!"
good_example = "let sum: i32 = v.iter().sum(); let count = v.iter().count();"
language = "Rust"

[[gotchas]]
title = "Generator exhaustion in Python"
explanation = "A generator can only be iterated once. Passing an exhausted generator to a function that expects an iterable silently produces no items."
bad_example = "gen = (x for x in range(10)); list(gen); list(gen)  # second call returns []"
good_example = "items = list(x for x in range(10)); # materialize once, reuse the list"
language = "Python"

[[gotchas]]
title = "collect() type annotation required"
explanation = "Rust's collect() is generic — you must tell it what type to produce, either via turbofish or type annotation on the binding."
bad_example = "let result = (0..10).collect(); // error: type annotations needed"
good_example = "let result: Vec<i32> = (0..10).collect();"
language = "Rust"

[[performance_notes]]
title = "Iterator chains compile to tight loops"
explanation = "Rust's iterator chains are zero-cost abstractions — the compiler fuses them into a single loop equivalent to hand-written code."
evidence = "Identical assembly output for .iter().map().filter().sum() vs manual loop (godbolt verified)"
language = "Rust"

[[performance_notes]]
title = "Avoid repeated allocation with extend"
explanation = "When building a collection incrementally, extend() is faster than repeated push() because it can pre-allocate based on size_hint()."
evidence = "extend() with known size: single allocation vs O(log n) reallocations"
language = "Rust"

[[performance_notes]]
title = "List comprehensions beat map+filter in Python"
explanation = "List comprehensions are optimized at the bytecode level and avoid function call overhead per element."
evidence = "~20-30% faster than equivalent map()+filter() chains"
language = "Python"
