id = "maze_generation"
title = "Maze Generation"
topic = "MazeGeneration"
description = "Procedural algorithms for generating random mazes on grids — recursive backtracker, Prim's, Kruskal's, and game-specific adaptations."
tags = ["maze", "procedural", "generation", "recursive-backtracker", "dfs", "prims", "grid", "walls", "connectivity", "games", "tanks"]
related_topics = ["algorithms", "grid_pathfinding", "game_ai_decisions"]

# TODO: fill in best_practices, gotchas, performance_notes
# Topics to cover:
# - Recursive backtracker (DFS): simple, produces long corridors, good for games
# - Grid representation: cells with wall bits (N/S/E/W), or edge list
# - Randomized Prim's: more branching, shorter dead-ends
# - Randomized Kruskal's: uniform spanning tree
# - Ensuring connectivity: every cell reachable (spanning tree = connected by definition)
# - Game-specific: widening corridors, adding loops for gameplay variety
# - Gotchas: directional bias, stack overflow on large grids, forgetting to mark both sides of a wall

[[languages.rust]]
source = "raasta"
note = "raasta doesn't generate mazes directly but consumes them: NavGrid with walkable/non-walkable cells. Maze is generated externally, then set_walkable(x, y, false) marks walls. Connected components detect unreachable regions."
pattern = "Generate maze as a grid of wall booleans, then feed to NavGrid for pathfinding."

[[languages.cyrius]]
source = "encom-hits"
note = "encom-hits tanks.cyr will use a recursive backtracker to generate procedural mazes. Grid stores wall bits (N/S/E/W) per cell. The shared grid.cyr module provides the data structure used by both tanks and gridbugs."
pattern = """
// Planned: recursive backtracker
// 1. Start at random cell, mark visited
// 2. Pick random unvisited neighbor
// 3. Remove wall between current and neighbor
// 4. Recurse from neighbor
// 5. Backtrack when no unvisited neighbors remain
// Result: perfect maze (exactly one path between any two cells)
"""
