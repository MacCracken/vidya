id = "tls_and_encryption"
title = "TLS and Encryption"
topic = "Networking"
description = "TLS 1.3 (RFC 8446) — the handshake state machine, certificate-chain verification, cipher-suite negotiation, and AEAD record protection. The handshake is a 1-RTT protocol (0-RTT for resumed sessions) that authenticates the server (and optionally the client), agrees on a shared symmetric key via ECDHE, and switches to authenticated encryption. Most application code touches only `connect/read/write` on a TLS-wrapped socket; the load-bearing complexity is in the library doing the handshake."
tags = ["tls", "tls-1.3", "ssl", "handshake", "ecdhe", "aead", "x509", "certificate", "cipher-suite", "rfc-8446", "post-quantum"]
related_topics = ["networking_fundamentals", "http_and_web_protocols", "security", "algorithms"]

[[best_practices]]
title = "TLS 1.3 only — disable everything below"
explanation = "RFC 8446 (2018) collapsed the handshake to 1-RTT, removed renegotiation, removed CBC-mode ciphers, and removed compression (CRIME). TLS 1.2 is supported only for legacy interop; TLS 1.0/1.1 are deprecated by RFC 8996. New deployments enable TLS 1.3 only — `min_protocol_version = TLSv1.3` in nginx, `tls_min_version: TLSv1_3` in OpenSSL apps."

[[best_practices]]
title = "Verify the certificate chain to a trusted root, not just signature validity"
explanation = "Each cert in the chain must be signed by the next; the topmost must be in the trust store. Skipping the trust-store check (just verifying signatures) lets any self-signed cert pass — a textbook MITM. Use the platform's trust store (mozilla-bundle on Linux, the system keychain elsewhere); don't ship a hardcoded list."

[[best_practices]]
title = "Pin the cipher suite list — don't accept whatever the peer offers"
explanation = "TLS 1.3 narrowed the suite list dramatically (5 suites total, all AEAD), but a permissive client that takes the peer's first offer is still a downgrade target. Configure an explicit allowlist: `TLS_AES_128_GCM_SHA256`, `TLS_AES_256_GCM_SHA384`, `TLS_CHACHA20_POLY1305_SHA256`. Reject anything else, including the legacy 1.2 suites."

[[best_practices]]
title = "Use AEAD ciphers exclusively (the whole TLS 1.3 suite list is AEAD)"
explanation = "AEAD (Authenticated Encryption with Associated Data) gives you encryption AND integrity in one primitive. AES-GCM and ChaCha20-Poly1305 are the two algorithms in production use. Don't compose your own with separate encrypt-then-MAC; the timing channels and key-reuse pitfalls are well-documented (CRIME, BEAST, Lucky 13)."

[[gotchas]]
title = "Cert validation is not signature verification — it's trust-anchor reachability"
explanation = "A self-signed cert has a valid signature (the cert signs itself). Validation requires a *chain* up to a root the client trusts. Apps that only call `verify_signature(cert)` accept anything; the bug is silent because the connection succeeds. Always call the full `verify_chain(cert, trusted_roots)`."
bad_example = "if (cert_signature_valid(cert)) { proceed(); }  // accepts self-signed"
good_example = "if (verify_chain(cert, trusted_roots) == OK) { proceed(); }  // requires trust anchor"

[[gotchas]]
title = "Certificate hostname check is separate from chain validation"
explanation = "A valid chain proves the cert was issued by a trusted CA; it doesn't prove the cert was issued for THIS hostname. You must additionally check that the cert's Subject Alternative Name (or, for legacy, Common Name) matches the hostname you connected to. Libraries that don't do this by default (older Java, some C libraries) are footguns."
bad_example = "// Validate chain only — accepts a cert for evil.com when connecting to good.com"
good_example = "// validate_chain(cert) AND cert_matches_hostname(cert, requested_hostname)"

[[gotchas]]
title = "Nonce reuse in AEAD is catastrophic — encrypt(K, N, P1) then encrypt(K, N, P2) leaks P1 XOR P2"
explanation = "AES-GCM and ChaCha20-Poly1305 are both nonce-misuse-fragile. Reusing a nonce with the same key recovers the keystream and breaks confidentiality of all messages encrypted with that (key, nonce) pair. TLS 1.3's record nonces are derived from a sequence counter, which is fine — but if you use AEAD outside TLS, get the nonce derivation right."
bad_example = "encrypt(key, fixed_nonce, msg);  // nonce never changes between calls"
good_example = "encrypt(key, sequence_counter++, msg);  // nonce never repeats per key"

[[performance_notes]]
title = "1-RTT handshake adds 1 round trip; 0-RTT adds none for resumed sessions"
explanation = "TLS 1.3 1-RTT: ClientHello + ServerHello+EncryptedExtensions+Finished + ClientFinished. App data flows after the second flight. 0-RTT (resumed): app data piggybacks on ClientHello. Keep-alive amortizes both — for HTTP/2 over TLS, the handshake is once per ~1000 requests."
evidence = "Loopback: TLS 1.3 1-RTT handshake ~150-300µs (ECDHE compute dominates). Cross-region: handshake = baseline RTT. Resumed 0-RTT: 0 added round trips."

[[performance_notes]]
title = "ECDHE is the dominant CPU cost in the handshake — ~10µs per side on modern x86"
explanation = "RSA-2048 signature verification was the bottleneck pre-2018; ECDHE (P-256 or X25519) replaced both DH and signing in TLS 1.3 and runs in ~10-50µs per side. Symmetric crypto (AES-NI, ChaCha) runs at memory speed (>10 GB/s) and is essentially free relative to the handshake."
evidence = "OpenSSL benchmarks (3.x): X25519 keygen ~30µs, sign ~80µs. AES-128-GCM ~5 GB/s with AES-NI. ChaCha20-Poly1305 ~3 GB/s without hardware accel."
