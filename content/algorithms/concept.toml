[[best_practices]]
title = "Know your problem's complexity class before coding"
explanation = "An O(n^2) algorithm on 10M items will take hours. A quick complexity estimate tells you whether your approach is viable before you write a line of code."

[[best_practices]]
title = "Prefer standard library sort over hand-rolled"
explanation = "Standard library sorts are heavily optimized (introsort, timsort, pdqsort). Hand-rolling is error-prone and rarely faster. Only go custom for specialized data (nearly-sorted, small fixed-size)."

[[best_practices]]
title = "Use hash maps for O(1) lookup, not linear scan"
explanation = "Searching an unsorted array is O(n). A hash map gives O(1) average lookup. If you're scanning a list repeatedly, build a map first."

[[best_practices]]
title = "Use BFS for shortest path, DFS for exhaustive search"
explanation = "BFS guarantees shortest path in unweighted graphs. DFS uses less memory and naturally handles backtracking. Pick the right traversal for the problem."

[[best_practices]]
title = "Identify overlapping subproblems before recursing"
explanation = "Naive recursion recomputes the same subproblems exponentially. Dynamic programming (memoization or tabulation) stores results, turning exponential into polynomial."

[[gotchas]]
title = "Off-by-one in binary search"
explanation = "Binary search is notoriously tricky to get right. The most common bug: wrong mid calculation, wrong boundary update, or wrong termination condition."
bad_example = "while lo < hi { mid = (lo + hi) / 2; if arr[mid] < target { lo = mid } }"
good_example = "while lo < hi { mid = lo + (hi - lo) / 2; if arr[mid] < target { lo = mid + 1 } else { hi = mid } }"

[[gotchas]]
title = "Integer overflow in midpoint calculation"
explanation = "(lo + hi) overflows if both are large. Use lo + (hi - lo) / 2 instead. This is the classic bug in binary search implementations."
bad_example = "mid = (lo + hi) / 2  // overflows if lo + hi > INT_MAX"
good_example = "mid = lo + (hi - lo) / 2  // safe, no overflow"

[[gotchas]]
title = "Sorting a list to find the minimum"
explanation = "Sorting to find min/max is O(n log n) when a single pass is O(n). Don't use a sledgehammer when a scalpel works."
bad_example = "arr.sort(); return arr[0];  // O(n log n)"
good_example = "return arr.iter().min();    // O(n)"

[[gotchas]]
title = "Forgetting base cases in recursion"
explanation = "Missing or wrong base cases cause infinite recursion and stack overflow. Every recursive function needs at least one base case that doesn't recurse."
bad_example = "fn fib(n: u64) -> u64 { fib(n-1) + fib(n-2) }  // no base case!"
good_example = "fn fib(n: u64) -> u64 { if n <= 1 { return n; } fib(n-1) + fib(n-2) }"

[[gotchas]]
title = "Using DFS when BFS is needed for shortest path"
explanation = "DFS finds A path but not necessarily the shortest. For shortest path in an unweighted graph, use BFS. For weighted graphs, use Dijkstra's."
bad_example = "DFS from A to B — finds path of length 5"
good_example = "BFS from A to B — guarantees shortest path of length 2"

[[performance_notes]]
title = "Binary search vs linear search"
explanation = "Binary search on sorted data is O(log n) vs O(n) linear scan. For 1M items: ~20 comparisons vs 1M."
evidence = "1M items: linear ~500us, binary search ~0.3us — 1600x faster"

[[performance_notes]]
title = "Hash map lookup vs sorted array binary search"
explanation = "Hash maps are O(1) average but have overhead (hashing, cache misses). For small N (<100), binary search on a sorted array can be faster."
evidence = "N=10: sorted array ~5ns, hash map ~25ns. N=10000: sorted array ~120ns, hash map ~30ns"

[[performance_notes]]
title = "Dynamic programming: exponential to polynomial"
explanation = "Fibonacci without memoization is O(2^n). With memoization it's O(n). For n=40: naive takes seconds, DP takes microseconds."
evidence = "fib(40): naive recursive ~1.2s, memoized ~0.001ms — million-fold speedup"

[[performance_notes]]
title = "Quicksort vs mergesort: cache locality matters"
explanation = "Quicksort's in-place partitioning has better cache locality than mergesort's out-of-place merging. In practice, quicksort is ~2x faster despite same O(n log n) complexity."
evidence = "1M random u64: quicksort ~60ms, mergesort ~100ms — cache effects dominate"
