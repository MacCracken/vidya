id = "elf_and_executable_formats"
title = "ELF and Executable Formats"
topic = "ElfAndExecutableFormats"
description = "Deep dive into ELF (Executable and Linkable Format) — the binary format used by Linux, BSDs, and most Unix-like systems. Beyond the basics of headers and segments: section types, symbol tables, string tables, DWARF debug info, relocatable objects, dynamic linking structures, and the difference between what the linker sees (sections) and what the loader sees (segments). Extends binary_formats with the detail needed to write a linker or debugger."
tags = ["ELF", "section", "segment", "DWARF", "symbol-table", "string-table", "relocation", "dynamic", "SHT", "PT", "note", "eh-frame", "debug-info", "objdump", "readelf"]
related_topics = ["binary_formats", "linking_and_loading", "boot_and_startup"]

[[best_practices]]
title = "Understand the section vs segment duality"
explanation = "Sections (.text, .data, .bss) are the linker's view — they organize code and data by type for combining and relocating. Segments (PT_LOAD) are the loader's view — they describe memory mappings with permissions. The section-to-segment mapping table (in the program header) tells the loader which sections go into which segments. A stripped binary has no section headers — only segments matter for execution."

[[best_practices]]
title = "Read the section header string table first"
explanation = "Section headers contain name offsets, not names. The names are in the .shstrtab section (pointed to by e_shstrndx). To find any section by name, first locate .shstrtab, then search section headers by resolving their name strings. This is the first thing readelf does."

[[best_practices]]
title = "Use .note sections for build metadata"
explanation = "ELF .note sections carry structured metadata: build-id (a hash identifying the binary), ABI version, GNU properties (feature flags like IBT/SHSTK for CET). Tools like debuginfod use the build-id to find debug symbols. Add notes with ld --build-id."

[[best_practices]]
title = "Keep .eh_frame for stack unwinding"
explanation = ".eh_frame contains DWARF CFI (Call Frame Information) — instructions for unwinding the stack at any point. This enables exceptions, panic=unwind, and debugger backtraces. Without .eh_frame, stack traces show only the current frame. It's read-only and typically 2-5% of binary size."

[[best_practices]]
title = "Use relocatable objects (.o) as the compilation unit"
explanation = "A .o file is an ELF with section headers, symbol table, and relocations, but no program headers (it's not executable). The linker combines multiple .o files: merges same-named sections, resolves symbols, applies relocations, and emits an executable. Understanding .o files is essential for writing a linker."

[[gotchas]]
title = "Section headers are optional for execution"
explanation = "The kernel's ELF loader only reads the ELF header and program headers. Section headers are used by the linker and tools (readelf, objdump, GDB) but are not needed to run the binary. strip -s removes section headers entirely. This means a stripped binary is harder to analyze but runs identically."
bad_example = "Relying on section headers to find .text in a stripped binary — they're gone"
good_example = "Use program headers (PT_LOAD) to find executable segments in stripped binaries"

[[gotchas]]
title = "Multiple PT_LOAD segments with different permissions"
explanation = "A typical executable has two PT_LOAD segments: one R+X (code) and one R+W (data). The gap between them may be mapped but inaccessible (guard page). Assuming all loaded memory is contiguous or has the same permissions causes incorrect memory analysis."
bad_example = "Treating all PT_LOAD memory as one continuous block"
good_example = "Parse each PT_LOAD separately: check p_flags for R/W/X permissions per segment"

[[gotchas]]
title = ".bss has zero file size but non-zero memory size"
explanation = "The .bss section (uninitialized data) takes no space in the file (SHT_NOBITS). The corresponding PT_LOAD segment has p_memsz > p_filesz — the kernel zero-fills the difference. If your tool reads p_filesz bytes and stops, it misses the entire BSS."
bad_example = "Reading p_filesz bytes from the data segment and assuming that's all the data"
good_example = "After reading p_filesz bytes, zero-fill p_memsz - p_filesz bytes for BSS"

[[gotchas]]
title = "DWARF debug info is in sections, not segments"
explanation = "Debug info (.debug_info, .debug_line, .debug_abbrev, etc.) lives in sections that are NOT part of any PT_LOAD segment. They're not loaded into memory at runtime — tools read them directly from the file. Stripping removes these sections. Using debug info requires reading the file, not memory."
bad_example = "Trying to find debug info in the process's memory — it's not mapped"
good_example = "Open the ELF file on disk, read .debug_* sections directly"

[[gotchas]]
title = "Dynamic section pointers are virtual addresses, not file offsets"
explanation = "The .dynamic section contains entries like DT_STRTAB (string table address). These are virtual addresses, not file offsets. To read them from the file, convert virtual address to file offset using the PT_LOAD segment mapping. At runtime, the dynamic linker reads these directly from memory."
bad_example = "Using DT_STRTAB value as a file offset — reading from the wrong location"
good_example = "For each PT_LOAD: if vaddr <= target < vaddr + memsz, file_offset = target - vaddr + p_offset"

[[gotchas]]
title = "e_entry is a virtual address, not a file offset"
explanation = "The ELF entry point (e_entry) is the virtual address where execution starts. It's NOT an offset into the file. To find the entry point's code in the file, use the same vaddr-to-file-offset conversion via PT_LOAD segments. For position-independent executables (PIE), e_entry is relative to the load base."
bad_example = "Seeking to e_entry in the file to read the first instruction"
good_example = "Convert e_entry to file offset: find PT_LOAD containing e_entry, compute offset"

[[performance_notes]]
title = "Stripping saves 10-30% of binary size"
explanation = "Section headers, symbol tables (.symtab), string tables (.strtab), and debug info (.debug_*) can account for 10-70% of the binary depending on debug level. strip -s removes everything the loader doesn't need. For deployment, always strip."
evidence = "Typical Rust binary: 5MB debug, 1.5MB release, 800KB stripped. C binary with -g: 200KB, stripped: 20KB. Debug info alone: often 50-80% of total file size."

[[performance_notes]]
title = "split-debuginfo puts DWARF in a separate file"
explanation = "Instead of stripping debug info entirely, split it into a .dwp or .dSYM file. The main binary stays small (deployed), and the debug file is available for debuggers. GDB finds the debug file via build-id or .gnu_debuglink section."
evidence = "Firefox: 300MB with debug info, 80MB stripped + 250MB debug file. Deployment saves 220MB. gdb uses build-id to automatically find the debug file."

[[performance_notes]]
title = "Huge page alignment increases binary size for speed"
explanation = "Aligning PT_LOAD segments to huge page boundaries (2MB instead of 4KB) allows the kernel to use huge pages for text segments. This reduces TLB misses for large binaries. The cost: up to 2MB of padding between segments. ld -z max-page-size=0x200000 enables this."
evidence = "Large binary (100MB text): 4KB alignment, 15% TLB miss rate in hot loop. 2MB alignment, huge pages: 2% TLB miss rate. Binary size increase: ~2MB padding. Net: 10-20% throughput improvement for TLB-bound workloads."

[[best_practices]]
title = "x86-64 PIC is nearly free thanks to RIP-relative addressing"
explanation = "On x86-64, position-independent code does not require the x86-32 'get_pc_thunk' dance — RIP-relative addressing handles local data directly. For local-symbol data: replace `mov rax, [abs64]` with `lea rax, [rip+disp32]` (ModR/M byte 0x05, 7 bytes). For external data: `mov rax, [rip+sym@GOTPCREL]` loads from the GOT. For external functions: `call sym@PLT`. Three relocations cover 95% of PIC codegen: R_X86_64_PC32 (local branch/data), R_X86_64_PLT32 (extern call), R_X86_64_GOTPCREL (extern data). Total codegen diff from fixed-address ELF: ~400 lines in the x86 emitter."
evidence = "Eli Bendersky, 'PIC in shared libraries on x64': 'On x64, RIP-relative addressing makes PIC nearly free — most mov reg, [addr] become mov reg, [rip+disp32] with no extra instructions.'"

[[best_practices]]
title = "PLT and GOT layout — 16-byte stubs + 8-byte slots"
explanation = "PLT entries are 16 bytes each: `jmp qword [got+n]; push n; jmp plt0` where plt0 is the shared lazy-resolve stub that calls _dl_runtime_resolve. GOT entries are 8 bytes each (one per external symbol). First call to an extern goes via PLT through GOT (initially pointing back to PLT+push); _dl_runtime_resolve patches the GOT entry to point at the real symbol. Subsequent calls jump directly via GOT. The first three GOT slots are reserved (link_map, _dl_runtime_resolve, module_id)."
evidence = "Eli Bendersky, Ian Lance Taylor 'Linkers' series part 8. Standard System V AMD64 layout — glibc ld.so, musl, and mold all conform."

[[best_practices]]
title = "Mach-O is PIC by default — no opt-in needed"
explanation = "Every Mach-O executable is PIE by default. MH_PIE flag is set; the image has a preferred vmaddr (0x100000000 for 64-bit) but the kernel slides it. No GOT/PLT by name — Mach-O uses `__DATA,__got` (non-lazy pointers, equivalent to GOT), `__TEXT,__stubs` (6-byte `jmp qword [rip+disp32]` per external call, equivalent to PLT), and `__TEXT,__stub_helper` (lazy resolver trampolines). Modern macOS (Big Sur+) uses LC_DYLD_CHAINED_FIXUPS — relocations encoded as a compact bytecode stream instead of reloc tables."
evidence = "Apple Mach-O Runtime Architecture; Mike Ash 'Let's Build dyld'. Mach-O stubs are 6 bytes vs ELF's 16 — smaller because Mach-O doesn't inline the lazy-resolve push+jmp into the stub."

[[best_practices]]
title = "PE imports via IAT — loader patches at load time, no lazy binding"
explanation = "PE/COFF does not use RIP-relative for imports the way ELF does. Imports go through the IAT (Import Address Table) — a table of 8-byte function pointer slots in `.idata`. Calls to imported functions compile to `call qword [rip+iat_slot]` (6 bytes, indirect). The loader patches IAT entries at load time — there's no lazy binding. For ASLR: set IMAGE_DLL_CHARACTERISTICS_DYNAMIC_BASE (0x0040) + HIGH_ENTROPY_VA (0x0020), and emit a `.reloc` section listing every absolute address that needs fixup. RIP-relative code produces an empty `.reloc` section — a free win."
evidence = "Microsoft PE Format spec, 'A Tour of the Windows Linker'. 'IAT is the moral equivalent of GOT+PLT combined: `call [rip+iat_entry]` is both the PLT stub and the GOT dereference in one indirect call.'"

[[best_practices]]
title = "Unified mental model: every extern reference is an indirect load"
explanation = "ELF, Mach-O, and PE are three dialects of the same sentence. In all three: absolute addressing is replaced with RIP-relative; external references go through a fixup table slot (GOT, __got, IAT). Format-specific differences are just the container for the table description — ELF uses reloc records, Mach-O uses opcode streams (LC_DYLD_INFO or chained fixups), PE uses the import directory. For a multi-platform compiler, pay the RIP-relative codegen cost ONCE. Then add per-format table emitters. Total: ~200 lines per format for the container, on top of the one-time ~400-line codegen change."
evidence = "Ian Lance Taylor, 'Linkers' part 8. 'The compiler's job for PIC is a one-line rule: any address not known at link time goes through a pointer slot.'"

[[gotchas]]
title = "GOTPCREL vs PLT32 relocations target different symbol classes"
explanation = "R_X86_64_GOTPCREL is for DATA references to external symbols — the relocation tells the linker to put the GOT entry's address in the instruction. R_X86_64_PLT32 is for CALL/JMP to external functions — the linker resolves to the PLT stub (or direct if statically linked). Confusing them: a data-reference reloc applied to a CALL instruction makes the linker emit an incorrect PLT stub, OR a call-reloc applied to a data reference goes through PLT lazy-resolve code for something that isn't a function. Symptom: segfault or infinite recursion on first access."
bad_example = "emit `lea rax, [rip+sym]` with R_X86_64_PLT32 because sym is extern — linker tries to resolve a data symbol through PLT"
good_example = "extern DATA → GOTPCREL; extern CALL/JMP → PLT32; local DATA/CALL → PC32"

[[gotchas]]
title = "ET_DYN is the ONLY form that also produces shared libraries"
explanation = "ELF has three image types: ET_EXEC (fixed-address executable), ET_DYN (position-independent; both PIE executable and .so shared library), ET_REL (object file, .o). A PIE executable and a shared library have identical ELF shape — the difference is just whether a PT_INTERP program header + entry point are present. If you build a proper ET_DYN emitter, you can produce both binaries and .so files from the same codegen path. Most of the complexity is the DT_DYNAMIC table and symbol export — the codegen itself is identical."
bad_example = "Build separate emitters for ET_EXEC and ET_DYN — duplicates most of the work, diverges over time"
good_example = "One ET_DYN emitter with a flag: PIE adds PT_INTERP + entry_point; shared lib adds DT_SONAME. Everything else shared."

[[gotchas]]
title = "PE needs explicit .reloc even if code is RIP-relative"
explanation = "ELF PIE with only RIP-relative code needs zero relocations — the image is self-contained. PE with only RIP-relative code STILL needs a `.reloc` section if DYNAMICBASE is set, because the loader checks the section exists before permitting ASLR. The section can be empty-of-reloc-entries but MUST be present as a section header. Omitting it: the image loads only at its preferred ImageBase, defeating ASLR; or on some Windows versions, fails to load entirely."
bad_example = "Emit PIE-clean RIP-relative PE, skip .reloc section, ship — Windows 10+ may refuse to load it under ASLR"
good_example = "Always emit a `.reloc` section header. If no entries, emit a 0-byte directory; the header's presence satisfies the loader."

[[performance_notes]]
title = "Mach-O stubs save 10 bytes per extern call vs ELF PLT"
explanation = "Mach-O stubs are 6 bytes each (`jmp qword [rip+disp32]`). ELF PLT entries are 16 bytes (`jmp [got+n]; push n; jmp plt0`). For a binary with 500 extern calls: Mach-O stub section = 3000 bytes; ELF PLT = 8000 bytes. The difference comes from Mach-O keeping the lazy-resolve trampoline in a separate `__stub_helper` section, while ELF inlines the push+jmp into every PLT entry. Neither approach affects call latency on modern CPUs — both are one indirect jump."
evidence = "Apple Mach-O reference; objdump -d on native macOS/Linux binaries. Stub size ratio has been constant since original Mach-O (1989) and ELF PLT (1995)."
