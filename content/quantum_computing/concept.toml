id = "quantum_computing"
title = "Quantum Computing"
topic = "QuantumComputing"
description = "Quantum algorithms and concepts — superposition, entanglement, Grover's search, Shor's factoring, VQE variational optimization, and noise models. The computational paradigm built on quantum mechanics."
tags = ["quantum", "qubit", "superposition", "entanglement", "grover", "shor", "vqe", "noise", "decoherence", "gate", "hadamard", "cnot", "measurement", "amplitude", "phase"]
related_topics = ["algorithms", "performance", "security"]

[[best_practices]]
title = "Think in amplitudes, not probabilities"
explanation = "Quantum states are complex amplitudes that interfere. Probabilities (|amplitude|^2) only appear at measurement. Algorithms work by arranging constructive interference on correct answers and destructive on wrong ones."

[[best_practices]]
title = "Minimize circuit depth for NISQ hardware"
explanation = "Current quantum hardware is noisy — each gate has ~0.1-1% error rate. Fewer gates means less accumulated error. Optimize gate count ruthlessly on real hardware."

[[best_practices]]
title = "Use entanglement as a computational resource"
explanation = "Entanglement creates correlations impossible in classical computing. Bell pairs, GHZ states, and cluster states are resources consumed by quantum algorithms, not just curiosities."

[[best_practices]]
title = "Verify with classical simulation first"
explanation = "Simulate small instances (≤20 qubits) classically before running on hardware. A bug in a quantum circuit produces wrong probabilities silently — there's no debugger."

[[best_practices]]
title = "Design oracles reversibly"
explanation = "Quantum gates are unitary (reversible). Any classical function used in a quantum algorithm must be made reversible, typically by adding ancilla qubits and using Toffoli gates."

[[gotchas]]
title = "Measurement destroys superposition"
explanation = "Measuring a qubit collapses it to |0⟩ or |1⟩ — the superposition is gone. You can't 'peek' at a quantum state. Design algorithms to extract information through interference, not inspection."
bad_example = "Measure qubit to check if Grover's found the answer mid-algorithm"
good_example = "Run full Grover's iterations, then measure once at the end"

[[gotchas]]
title = "No-cloning theorem prevents copying qubits"
explanation = "You cannot copy an unknown quantum state. CNOT doesn't clone — it entangles. This is fundamental: it enables quantum cryptography but forbids classical debugging patterns."
bad_example = "CNOT to 'backup' a qubit state before a risky operation"
good_example = "Use quantum error correction codes for fault tolerance"

[[gotchas]]
title = "Global phase is unobservable"
explanation = "Multiplying the entire state by e^(iθ) changes nothing measurable. But RELATIVE phase between components matters enormously — it's what makes interference work."
bad_example = "Worrying that a Z gate 'changed' the |0⟩ state (it didn't — only added global phase)"
good_example = "Z gate on |+⟩ = |−⟩: relative phase flipped, measurably different in X basis"

[[gotchas]]
title = "Wrong number of Grover iterations overshoots"
explanation = "Grover's amplitude amplification is periodic. Too many iterations rotate past the answer, reducing success probability. Optimal iterations ≈ π/4 × √(N/M) for M solutions in N items."
bad_example = "Running 100 Grover iterations on 4-item search (optimal is 1)"
good_example = "Calculate optimal iterations: floor(π/4 × √(N/M))"

[[gotchas]]
title = "Ignoring decoherence time"
explanation = "Real qubits lose coherence in microseconds (superconducting) to seconds (trapped ions). If your circuit takes longer than T2, the computation is garbage."
bad_example = "Design 10,000-gate circuit for a 50μs coherence time qubit"
good_example = "Profile circuit depth against hardware T1/T2 times"

[[performance_notes]]
title = "Grover's gives quadratic speedup for unstructured search"
explanation = "Classical unstructured search: O(N). Grover's: O(√N). For N=10^6: 1000 quantum queries vs 1M classical. Quadratic, not exponential — still significant."
evidence = "N=2^20 (1M items): classical 10^6 queries, Grover's ~1000 queries — 1000x fewer"

[[performance_notes]]
title = "Shor's gives exponential speedup for factoring"
explanation = "Classical factoring (number field sieve): sub-exponential ~exp(n^(1/3)). Shor's: O(n^3) polynomial. For 2048-bit RSA, classical takes cosmic time; Shor's takes hours."
evidence = "2048-bit factoring: classical ~10^30 years, Shor's (fault-tolerant) ~hours. Requires ~4000 logical qubits."

[[performance_notes]]
title = "Quantum simulation of molecules scales exponentially better"
explanation = "Simulating an N-electron molecule classically needs 2^N memory. VQE and QPE use N qubits. This is quantum computing's killer app for chemistry and materials science."
evidence = "50-electron molecule: classical needs 2^50 ≈ 10^15 amplitudes. Quantum: 50 qubits."

[[performance_notes]]
title = "NISQ noise limits practical circuit depth to ~100-1000 gates"
explanation = "At 0.1% error per gate, 1000 gates gives ~63% chance of at least one error. Error correction requires 1000+ physical qubits per logical qubit. Current devices: 50-1000 noisy qubits."
evidence = "Gate error 0.1%, 1000 gates: (1-0.001)^1000 ≈ 0.37 success probability"
