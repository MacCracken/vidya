id = "type_systems"
title = "Type Systems"
topic = "TypeSystems"
description = "How languages classify values and enforce constraints at compile time — the foundation of correctness without runtime checks."
tags = ["types", "generics", "traits", "interfaces", "type-inference", "polymorphism"]

[[best_practices]]
title = "Make illegal states unrepresentable"
explanation = "Use enums and newtypes to encode constraints in the type system. If a function can't receive invalid input, it can't produce invalid output."

[[best_practices]]
title = "Use generics for code reuse, traits for abstraction"
explanation = "Generics generate specialized code per type (zero-cost). Traits define shared behavior. Together they replace inheritance hierarchies."

[[best_practices]]
title = "Prefer impl Trait in argument position for simplicity"
explanation = "fn process(items: impl Iterator<Item = i32>) is clearer than full generic bounds when you don't need to name the type parameter."

[[best_practices]]
title = "Use newtypes to distinguish semantically different values"
explanation = "Wrapping primitives in structs prevents mixing up Meters and Seconds, even though both are f64 underneath."

[[gotchas]]
title = "Trait objects have dynamic dispatch overhead"
explanation = "dyn Trait uses vtable dispatch — a pointer indirection per call. Use generics (impl Trait) for performance-sensitive code."
bad_example = "fn process(items: &[Box<dyn Processor>]) // vtable dispatch per item"
good_example = "fn process<P: Processor>(items: &[P]) // monomorphized, inlined"
language = "Rust"

[[gotchas]]
title = "Orphan rule prevents implementing external traits on external types"
explanation = "You can't impl Display for Vec<T> — either the trait or the type must be local. Use a newtype wrapper."
bad_example = "impl fmt::Display for Vec<i32> { ... } // error: orphan rule"
good_example = "struct MyVec(Vec<i32>); impl fmt::Display for MyVec { ... }"
language = "Rust"

[[gotchas]]
title = "Type inference can't always determine collect type"
explanation = "Rust infers types aggressively, but some contexts are ambiguous. collect() and parse() often need explicit type annotations."
bad_example = "let v = items.collect(); // error: type annotations needed"
good_example = "let v: Vec<_> = items.collect(); // explicit collection type"
language = "Rust"

[[gotchas]]
title = "Generic type parameters are resolved at compile time"
explanation = "Generics are monomorphized — a separate copy exists for each concrete type. This can increase binary size for types used with many different parameters."
bad_example = "Using generic functions with 50+ different types → large binary"
good_example = "Factor out non-generic inner functions that do the real work"
language = "Rust"

[[performance_notes]]
title = "Monomorphization: zero-cost generics"
explanation = "Rust compiles generic functions into specialized versions for each concrete type. No runtime dispatch, full inlining potential."
evidence = "Generic sort<T>() is as fast as a hand-written sort for that specific T"
language = "Rust"

[[performance_notes]]
title = "Newtypes are zero-cost"
explanation = "A newtype struct like struct Meters(f64) has identical runtime representation to f64. The type safety is compile-time only."
evidence = "Zero bytes overhead, identical assembly output"
language = "Rust"

[[performance_notes]]
title = "Trait object call overhead"
explanation = "Each method call on dyn Trait requires a vtable lookup (pointer indirection). This prevents inlining and adds ~2-5ns per call."
evidence = "dyn Trait method call: ~2-5ns overhead vs direct/inlined call"
language = "Rust"
