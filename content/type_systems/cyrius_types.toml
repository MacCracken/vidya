# Cyrius Type System Implementation Patterns
# How to add type enforcement, enums, switch, function pointers,
# block scoping, and heap allocation to a self-hosting compiler
# that currently treats everything as i64.
#
# Grounded in TCC, Plan 9 C, Oberon, Zig, and Crafting Interpreters.
# Every pattern targets a single-pass compiler with fixup tables.

[[entries]]
name = "type_id_encoding"
description = "Represent all types as integer IDs in a single i64 field"
category = "type_systems"
content = '''
TCC stores types in a single int with bitfields: low 4 bits = base type,
upper bits = qualifiers/modifiers. Cyrius can use the same approach.

ENCODING (fits in var_types[] which already exists at 0x8DE30):
  0          = untyped / i64 (default, backward compatible)
  1          = i8
  2          = i16
  4          = i32
  8          = i64 (explicit)
  16         = bool
  32..63     = struct IDs (struct_id + 32)
  64..95     = enum IDs (enum_id + 64)
  negative   = typed pointer (already used: -scale)

WHY THIS WORKS: var_types[] already holds struct IDs (>0) and pointer
scales (<0). Adding enum IDs in the 64-95 range and primitive type IDs
in 1-16 fills the gaps without changing existing codegen.

TYPE LOOKUP: When the compiler sees `var x: i32 = 42;`, it parses the
type annotation, maps "i32" to type_id=4, stores in var_types[vcnt].
The type_id is metadata — it does NOT change how the value is stored
(still 8 bytes on stack). It enables the compiler to:
  1. Warn on assignment between incompatible types
  2. Scale pointer arithmetic correctly
  3. Emit correct-width loads/stores (movzx for i8/i16, mov for i64)

TCC REFERENCE: VT_INT=0, VT_BYTE=1, VT_SHORT=2, VT_VOID=3, VT_PTR=5,
VT_FUNC=6, VT_STRUCT=7, VT_FLOAT=8, VT_DOUBLE=9. Stored in CType.t
with bitwise OR for qualifiers (VT_UNSIGNED, VT_CONST, etc).
'''

[[entries]]
name = "type_check_single_pass"
description = "Type checking during parsing without a separate pass or inference engine"
category = "type_systems"
content = '''
C compilers and TCC enforce types during parsing, not in a separate pass.
The key insight: every expression leaves a "result type" on a type stack
that parallels the value stack.

IMPLEMENTATION FOR CYRIUS:
  State: expr_type (i64 at a heap offset) — type of current expression

  PARSE_FACTOR sets expr_type:
    - Integer literal   → expr_type = 8 (i64)
    - Variable load     → expr_type = var_types[var_index]
    - Function call     → expr_type = fn_ret_types[fn_index] (new array)
    - String literal    → expr_type = -1 (pointer to i8)
    - Struct field      → expr_type = field_type_id

  PARSE_EXPR checks expr_type at operators:
    - Arithmetic (+,-,*,/): both sides must be numeric (0-16) or pointer
    - Comparison (==,!=,<,>): both sides must be compatible
    - Assignment: LHS type must match RHS type (or RHS is untyped)

  ON MISMATCH: emit warning to stderr, continue compilation.
  Progressive typing means warnings, not errors. Removing all type
  annotations must not change output — types are assertions.

TCC APPROACH: gen_op() checks vtop->type and vtop[-1]->type before
emitting code. Type promotions (i8 → i32 → i64) happen implicitly.
is_compatible_types() does the check; gen_cast() inserts conversions.

COST: One extra i64 of state (expr_type). One comparison per operator.
No new data structures, no type inference, no unification.
'''

[[entries]]
name = "enum_as_named_constants"
description = "Implement enums as compile-time integer constants with a type ID"
category = "type_systems"
content = '''
TCC treats enums as integer constants: each enumerator becomes a symbol
with VT_INT type and a constant value. Cyrius can do the same.

DATA STRUCTURES (new heap arrays):
  enum_names[32]      — 32 enum type name offsets (8 bytes each = 256)
  enum_vcounts[32]    — variant count per enum (256)
  enum_vnames[32*16]  — variant name offsets (4096)
  enum_vvalues[32*16] — variant integer values (4096)
  enum_count          — current enum count (8)
  Total: ~8.5KB new heap

PARSING: enum Color { Red, Green, Blue }
  1. Register enum name, get enum_id
  2. For each variant: store name, assign value (auto-increment from 0)
  3. Variants with explicit value: enum Flags { Read = 1, Write = 2 }

USAGE: var c: Color = Color.Red;
  1. Parser sees "Color.Red" → lookup enum by name → lookup variant
  2. Emit: mov rax, <variant_value>  (just an integer)
  3. Set var_types[vcnt] = enum_id + 64

TYPE SAFETY: When assigning to a Color variable, check that RHS is
either a Color variant or untyped. Warn on `var c: Color = 42;`

WHY NOT TAGGED UNIONS YET: Plain enums (no payload) are sufficient for
switch/match, error codes, state machines. Tagged unions (enum + data)
require knowing the payload size per variant — add in a later phase.

ZIG COMPARISON: Zig enums are also integers underneath. Tagged unions
add a payload but the tag is still an integer discriminant stored
before the payload data. Same approach scales up.
'''

[[entries]]
name = "switch_chained_comparisons"
description = "Implement switch as chained cmp/je — no jump table needed for small cases"
category = "type_systems"
content = '''
For a bootstrap compiler, switch is just syntactic sugar over if/else.
Jump tables are an optimization; chained comparisons work first.

CODEGEN FOR: switch(x) { case 1: ...; case 2: ...; default: ...; }

  1. Evaluate x into rax, push to stack
  2. For each case:
     - pop rcx (copy of x, re-push after)
     - mov rax, <case_value>
     - cmp rcx, rax
     - je case_N_label
  3. After all cases: jmp default_label (or end_label if no default)
  4. Emit case bodies with break → jmp end_label
  5. Patch all labels

PARSER STRUCTURE:
  switch_value_offset  — stack slot of the switch expression
  case_patches[64]     — jump targets for each case (like break_patch)
  case_count           — number of cases seen
  default_patch        — jump target for default

IMPLEMENTATION STEPS:
  1. Parse "switch" "(" expr ")" "{"
  2. Save expr result (push rax)
  3. Parse case labels, emit comparisons
  4. Parse case bodies, emit code
  5. Handle break as jmp to end
  6. Handle fallthrough as absence of break (natural flow)
  7. Patch all forward jumps at "}"

WHY CHAINED COMPARISONS FIRST:
  - Works for any case values (sparse, negative, large)
  - No data section needed (jump tables need .rodata)
  - O(n) comparisons is fine for <20 cases
  - Jump tables can be added later for dense ranges

TCC APPROACH: TCC tracks cases in a switch_t structure with value-target
pairs. For dense cases it builds a jump table; for sparse it emits
chained conditional jumps. Start with the second approach.

x86_64 PATTERN (per case):
  mov rax, [rbp-switch_offset]   # reload switch value
  cmp rax, CASE_VALUE
  je .case_N
'''

[[entries]]
name = "switch_jump_table"
description = "Upgrade path: jump table for dense switch cases"
category = "type_systems"
content = '''
When case values are dense (e.g., 0-15 with few gaps), a jump table
replaces O(n) comparisons with O(1) indexed jump.

x86_64 CODEGEN:
  # Bounds check
  mov rax, [rbp-switch_offset]     # load switch value
  sub rax, MIN_CASE                # normalize to 0-based index
  cmp rax, (MAX_CASE - MIN_CASE)   # range check
  ja .default                      # unsigned compare catches negatives

  # Indirect jump through table
  lea rcx, [rip + .jump_table]     # table base (RIP-relative)
  mov rax, [rcx + rax*8]           # load target address
  jmp rax                          # indirect jump

  # Table in .rodata or embedded after function
  .jump_table:
    .quad .case_0
    .quad .case_1
    .quad .default    # gap → default
    .quad .case_3

WHEN TO USE: if (max_case - min_case) < 2 * case_count, use jump table.
Otherwise use chained comparisons. TCC and GCC both use this heuristic.

CYRIUS CONSIDERATION: The compiler currently emits code into codebuf
linearly. Jump table data can go into str_data (string literal area)
or a new data section. The table addresses must be absolute (base_addr
+ code_offset) since the ELF loader places code at a fixed address.
'''

[[entries]]
name = "function_pointers"
description = "Add function pointers using existing fixup infrastructure + indirect call"
category = "type_systems"
content = '''
Cyrius already has fixup_tbl for forward function references. Function
pointers extend this: store a function's code address in a variable,
call through it with an indirect call instruction.

STORING A FUNCTION ADDRESS:
  var handler: fn = my_function;

  Parser sees "my_function" in expression context (not followed by "("):
    1. Lookup function index in fn_names[]
    2. If function already compiled: emit mov rax, <absolute_addr>
       where absolute_addr = base_addr + fn_offsets[fn_index]
    3. If not yet compiled: emit mov rax, 0; add fixup entry
       (same mechanism as forward call references)
    4. Set var_types[vcnt] to a fn_ptr type ID

CALLING THROUGH A POINTER:
  handler(arg1, arg2);

  Parser sees variable name followed by "(":
    1. Check var_types — if fn_ptr type, emit indirect call
    2. Push arguments to registers (rdi, rsi, rdx per SysV ABI)
    3. Load pointer: mov rax, [rbp - var_offset]
    4. Emit: call rax (opcode FF D0)
       Encoding: 0xFF 0xD0 (call r/m64 with ModRM for rax)

TYPE SIGNATURE (future): Store parameter count and return type per
fn_ptr type. For now, just store "is function pointer" flag.
Parameter count can be checked against call-site argument count.

TCC APPROACH: VT_FUNC | VT_PTR type combination. The ref field points
to a Sym chain describing the signature. Cyrius can defer full
signatures and just track param_count for now.

NEW OPCODE: call rax = FF D0 (2 bytes). Already supported by asm.cyr
if it handles the FF opcode group.
'''

[[entries]]
name = "block_scoping"
description = "Implement block scoping with a scope depth counter and local cleanup"
category = "type_systems"
content = '''
Crafting Interpreters approach, adapted for Cyrius:

STATE (3 new heap variables):
  scope_depth    — current nesting level (0 = function top)
  local_depths[] — scope depth at which each local was declared
                   (parallel to fn_local_names[], 64 entries = 512 bytes)

ENTER SCOPE: when parser sees "{" after if/while/bare block:
  scope_depth = scope_depth + 1;

EXIT SCOPE: when parser sees matching "}":
  scope_depth = scope_depth - 1;
  Walk fn_local_names backward: for each local where
  local_depths[i] > scope_depth, decrement fn_local_cnt.
  (No runtime code needed — locals are stack slots, function
  epilogue reclaims all of them at once.)

VARIABLE RESOLUTION: resolveLocal() already scans fn_local_names
backward. Block scoping means a variable in an inner scope shadows
an outer one — backward scan naturally finds the inner one first.

REDECLARATION: Two vars with the same name at the SAME scope_depth
in the same block is an error. Different depths = shadowing (OK).

WHY NO RUNTIME COST: All locals share the function's stack frame.
Block scoping only affects name resolution at compile time. The
stack pointer doesn't move at block boundaries — it moves at
function entry/exit. This is how C compilers work.

PLAN 9 C: Even simpler — variables must be declared at function top.
No block-scoped declarations. Cyrius can start here and add block
scoping when programs need it.
'''

[[entries]]
name = "heap_allocator_brk"
description = "Implement malloc/free from Linux brk syscall with free-list"
category = "type_systems"
content = '''
The compiler itself uses a fixed heap map. Programs need dynamic
allocation. Simplest viable allocator using brk (syscall 12).

BLOCK HEADER (16 bytes, 8-byte aligned):
  offset 0: size (i64)    — payload size in bytes (not including header)
  offset 8: flags (i64)   — bit 0: 1=allocated, 0=free
                             bits 1-63: reserved
  Total header: 16 bytes. Payload follows immediately.

GLOBAL STATE:
  heap_start  — first block address (set on first alloc)
  heap_end    — current brk value

MALLOC(size):
  1. Round size up to multiple of 8: size = (size + 7) & ~7
  2. Walk free list from heap_start:
     for each block: if (!flags.allocated && block.size >= size) → found
  3. If found: set flags.allocated = 1, return block + 16
  4. If not found:
     a. new_brk = heap_end + 16 + size
     b. syscall brk(new_brk)  → mov rax, 12; mov rdi, new_brk; syscall
     c. If brk returns new_brk: success
     d. Write header at heap_end: size, flags=1
     e. heap_end = new_brk
     f. Return old_heap_end + 16

FREE(ptr):
  1. header = ptr - 16
  2. header.flags = 0  (mark as free)
  3. Optional: coalesce with adjacent free blocks
     - Check next block: if (header + 16 + header.size).flags == 0,
       merge by adding sizes + 16
     - Check prev block: requires scanning from heap_start (no prev ptr)

COALESCING: For first implementation, skip it. Fragmentation is
acceptable for short-lived programs. Add coalescing when allocation
patterns demand it.

SYSCALL DETAIL: brk(0) returns current break. brk(addr) sets new break.
Linux brk returns the new break on success (not 0 like the man page
suggests for the C wrapper). Check: if returned value == requested value.
'''

[[entries]]
name = "width_loads_stores"
description = "Emit correct-width memory access based on type ID"
category = "type_systems"
content = '''
Currently Cyrius loads/stores everything as 8 bytes (mov rax, [addr]).
Type-aware codegen emits different instructions per width.

LOAD BY TYPE:
  i8:  movzx rax, byte [addr]   — 0F B6 with ModRM
  i16: movzx rax, word [addr]   — 0F B7 with ModRM
  i32: mov eax, [addr]          — 8B with ModRM (implicit zero-extend)
  i64: mov rax, [addr]          — 48 8B with ModRM (current behavior)

STORE BY TYPE:
  i8:  mov byte [addr], al      — 88 with ModRM
  i16: mov word [addr], ax      — 66 89 with ModRM
  i32: mov dword [addr], eax    — 89 with ModRM
  i64: mov qword [addr], rax    — 48 89 with ModRM (current behavior)

IMPLEMENTATION: Add ELOAD_WIDTH(S, width) and ESTORE_WIDTH(S, width)
helper functions. When loading a variable, check var_types[]:
  type_id = var_types[var_index]
  if type_id == 1: width = 1
  if type_id == 2: width = 2
  if type_id == 4: width = 4
  else: width = 8  (default, backward compatible)

WHY MOVZX NOT MOVSX: Zero-extension is safer default. Sign-extension
(movsx) is needed for signed i8/i16 values used in arithmetic. Can
add a signed flag later (type_id | 0x80 = signed).

STRUCT FIELDS: Field width comes from struct_ftypes[]. When a field
is typed as i8, its size is still 8 in the struct layout (alignment).
The width only affects the load/store instruction, not the offset.
For packed structs, field size = field width (add later).
'''

[[entries]]
name = "tagged_union_layout"
description = "Implement tagged unions as enum discriminant + max-sized payload"
category = "type_systems"
content = '''
A tagged union is an enum tag (i64) followed by a payload whose size
is the maximum of all variant payloads. This is how Zig and Rust
lay them out.

LAYOUT: union Result { Ok: i64, Err: *i8 }
  offset 0: tag (i64)     — 0 for Ok, 1 for Err
  offset 8: payload (i64) — max(sizeof(i64), sizeof(*i8)) = 8
  Total size: 16 bytes

LAYOUT: union Token { Int: i64, Str: { ptr: *i8, len: i64 } }
  offset 0: tag (i64)       — 0 for Int, 1 for Str
  offset 8: payload (16 bytes) — max(8, 16) = 16
  Total size: 24 bytes

CREATING: var r: Result = Result.Ok(42);
  1. Allocate 16 bytes on stack (or heap)
  2. Store tag: mov qword [addr], 0
  3. Store payload: mov qword [addr+8], 42

MATCHING: switch(r) { case Ok(val): ...; case Err(msg): ...; }
  1. Load tag: mov rax, [addr]
  2. Compare tag to each variant
  3. In case body, bind payload: val = *(addr + 8)

DATA STRUCTURES (extend enum tables):
  enum_payload_sizes[32*16] — payload size per variant (0 = no payload)
  enum_total_sizes[32]      — tag + max(payload sizes)

IMPLEMENTATION ORDER:
  1. Plain enums first (no payload) — just integer constants
  2. Tagged unions second — add payload tracking
  3. Pattern matching third — destructure in switch cases

ZIG DETAIL: Zig union(enum) ties the union to an enum, so the tag
field is the enum. The compiler checks exhaustiveness: every variant
must appear in a switch. Cyrius can add this check once enums work.
'''

[[entries]]
name = "oberon_type_descriptors"
description = "Oberon's approach: type descriptors as runtime metadata for records"
category = "type_systems"
content = '''
Oberon stores a "type descriptor" per record (struct) type. The type
descriptor contains: procedure table (vtable), pointer offsets for GC,
and the type's size. The address of the descriptor IS the type tag,
stored in a hidden field before each heap-allocated record.

WHAT CYRIUS CAN BORROW:
  1. Type tag as first field — for tagged unions and runtime type checks.
     Store the enum/struct type ID as the first 8 bytes of any
     heap-allocated value. Cost: 8 bytes per allocation.

  2. Size in type descriptor — struct_sizes[] array (already computable
     from field counts). Used by malloc: `var p = new(Point)` →
     malloc(struct_sizes[struct_id]).

  3. NO vtable needed yet — Cyrius has no method dispatch. If added
     later, the type descriptor approach scales: store function
     pointers in a per-type table indexed by method ID.

WHAT TO SKIP:
  - GC pointer maps (no garbage collector planned)
  - Dynamic type guards (Oberon's IS operator — add if needed)
  - Reflection (reading type descriptors at runtime)

PLAN 9 C COMPARISON: Plan 9 C has no type descriptors at runtime.
Types are purely compile-time. This is simpler and sufficient for
Cyrius until dynamic dispatch or tagged unions need runtime tags.
The tag-in-first-field approach bridges both: compile-time types
for static checking, runtime tag for tagged unions only.
'''

[[entries]]
name = "progressive_type_enforcement"
description = "Roll out type checking in stages without breaking self-hosting"
category = "type_systems"
content = '''
The compiler must self-host at every step. Type enforcement cannot
break existing untyped code. Rollout order:

STAGE 1: Parse and store types (DONE — var_types[] exists)
  - Type annotations parsed: var x: i64 = 42;
  - Type stored in var_types[] but not checked
  - No behavioral change, no breakage

STAGE 2: Track expression types
  - Add expr_type state variable
  - Set it in PARSE_FACTOR based on var_types lookup
  - Propagate through PARSE_EXPR (result type of a + b)
  - Still no enforcement — just tracking

STAGE 3: Warn on mismatches
  - In assignment: if LHS type != 0 and RHS type != 0 and LHS != RHS,
    emit warning to stderr (write syscall to fd 2)
  - Compilation continues — warning only
  - Self-hosting code has no annotations → no warnings → no breakage

STAGE 4: Width-correct codegen
  - Use type to select load/store width (ELOAD_WIDTH)
  - Only for explicitly-typed variables
  - Untyped variables still use 8-byte default

STAGE 5: Enum types
  - Add enum definitions and variant constants
  - Enum variables get type checking (stage 3 style)

STAGE 6: Function return types
  - fn foo(): i32 { ... }
  - Track in fn_ret_types[], propagate to call expressions

STAGE 7: Error on mismatch (optional)
  - Flip warnings to errors for annotated code
  - Must verify all self-hosting code compiles clean first

KEY INVARIANT: At every stage, removing all type annotations produces
identical binary output. Types are additive metadata.
'''

[[entries]]
name = "tcc_architecture"
description = "TCC internals: how a real minimal C compiler does everything in one pass"
category = "type_systems"
content = '''
TCC (Tiny C Compiler) by Fabrice Bellard. ~30K lines of C. Compiles
C99 directly to machine code in a single pass. Key lessons:

TYPE REPRESENTATION: CType struct = { int t; Sym *ref; }
  t: bitfield with VT_BTYPE (low 4 bits) for base type, flags above.
  ref: points to Sym for structs/functions (linked list of fields/params).
  ALL type info fits in 12 bytes (8 on 32-bit).

SYMBOL TABLE: Linked-list stacks per scope level.
  global_stack → all file-scope symbols
  local_stack  → all block-scope locals (pushed/popped at { and })
  table_ident[] → hash table mapping token IDs to TokenSym
  TokenSym → chain of Sym entries (most recent = current scope)

EXPRESSION EVALUATION: Value stack (SValue).
  Each stack entry: { CType type; int r; int c; }
  r = register holding value, c = constant offset
  After each operator, top of stack has result type.
  gen_op() checks types and emits code in one step.

ENUM HANDLING: enum → VT_INT constants in symbol table.
  No separate enum representation. Each enumerator is a Sym with
  type=VT_INT and c=integer_value. Lookup is identical to variables.

SWITCH: switch_t struct with case list + default label.
  Dense cases → jump table. Sparse → chained cmp+je.
  Heuristic: if range < 2*count, use table.

FUNCTION POINTERS: VT_FUNC|VT_PTR combo. ref→Sym chain for params.
  Call through pointer: load into register, emit CALL r/m.

FORWARD REFERENCES: Patching via gjmp/gsym.
  gjmp(t) emits a jump, returns patch address.
  gsym(t) walks a linked list of patches, fills them all in.
  Same concept as Cyrius fixup_tbl but using the code buffer itself
  as the linked list (each unresolved jump points to the previous one).
'''

[[entries]]
name = "scope_chain_vs_depth"
description = "Two approaches to scoping: scope chains (TCC) vs depth counter (clox)"
category = "type_systems"
content = '''
SCOPE CHAINS (TCC, GCC):
  Each scope is a node in a linked list. Entering a scope pushes a new
  node; leaving pops it. Symbols point to their scope node. Lookup
  walks the chain from current → enclosing → ... → global.

  Pros: Clean separation, easy to dump scope contents.
  Cons: Needs dynamic allocation for scope nodes, pointer chasing.

DEPTH COUNTER (Crafting Interpreters, recommended for Cyrius):
  Single integer scope_depth. Each local stores the depth where it
  was declared. Entering scope: depth++. Leaving: depth--, discard
  locals with depth > current.

  Pros: Zero allocation, fits Cyrius fixed-array model perfectly.
  Cons: Can not enumerate "all variables in scope X" without scanning.

FOR CYRIUS:
  fn_local_names[64] already exists. Add fn_local_depths[64] (512 bytes).
  scope_depth at a heap offset (8 bytes).

  Enter block:  scope_depth += 1
  Declare var:  fn_local_depths[fn_local_cnt] = scope_depth
  Exit block:   while fn_local_depths[fn_local_cnt-1] > scope_depth:
                  fn_local_cnt -= 1
                scope_depth -= 1

  Resolve var:  scan fn_local_names backward (already done), first
                match wins — inner scope shadows outer naturally.

  Total new heap: 520 bytes. No allocation. No linked lists.
'''

[[entries]]
name = "fixup_indirect_calls"
description = "Extend fixup tables for indirect calls and function pointer resolution"
category = "type_systems"
content = '''
Cyrius fixup_tbl (0x8A000) stores forward references: when a function
is called before it is defined, the call instruction gets a placeholder
offset, and a fixup entry records (call_site, function_name). After all
functions are compiled, fixups are resolved.

EXTENDING FOR FUNCTION POINTERS:
  Function pointers need the function's absolute address, not a relative
  call offset. Two cases:

  1. Function already defined: address = base_addr + fn_offsets[fn_index]
     Emit: mov rax, <absolute_address>  (10 bytes: 48 B8 + 8-byte imm)

  2. Function not yet defined: emit mov rax, 0; add fixup entry with
     a new fixup type flag indicating "absolute address" vs "relative call".

  FIXUP ENTRY EXTENSION (currently 16 bytes per entry):
    offset 0: code_position (i64) — where to patch
    offset 8: function_id (i64)   — which function

    Add a type flag in the high bit of function_id:
      bit 63 = 0: relative call fixup (existing behavior)
      bit 63 = 1: absolute address fixup (new, for fn ptrs)

    Resolution for absolute: write base_addr + fn_offsets[fn_id]
    Resolution for relative: write fn_offsets[fn_id] - (patch_site + 4)

  INDIRECT CALL CODEGEN:
    # Load function pointer from variable
    mov rax, [rbp - var_offset]    # 48 8B 45 xx
    # Call through pointer
    call rax                        # FF D0

  NOTE: call rax is 2 bytes (FF D0), not 5 bytes like call rel32.
  The calling convention is identical — arguments in rdi, rsi, rdx,
  rcx, r8, r9 per SysV ABI. Return value in rax.
'''

[[entries]]
name = "enum_switch_pattern"
description = "Combined pattern: define enum, switch on it, exhaustiveness check"
category = "type_systems"
content = '''
The most common use of enums is switching on them. Design both together.

DEFINITION:
  enum TokenType { Ident, Number, String, LParen, RParen, EOF }

STORAGE:
  enum_names[0] = "TokenType" offset
  enum_vcounts[0] = 6
  enum_vnames[0..5] = name offsets for each variant
  enum_vvalues[0..5] = 0, 1, 2, 3, 4, 5

SWITCH CODEGEN:
  switch(tok_type) {
    case TokenType.Ident:  ... ;
    case TokenType.Number: ... ;
    default: ... ;
  }

  Compiles to:
    mov rax, [rbp - tok_type_offset]
    cmp rax, 0          # Ident
    je .case_ident
    cmp rax, 1          # Number
    je .case_number
    jmp .case_default

EXHAUSTIVENESS CHECK (compile-time):
  After parsing all cases, compare case_count against enum_vcounts[enum_id].
  If case_count < variant_count AND no default branch:
    emit warning: "switch on TokenType missing variants: String, LParen, ..."

  Implementation: bitmap of seen variants (i64 supports up to 64 variants).
    seen = 0
    For each case: seen = seen | (1 << variant_value)
    expected = (1 << variant_count) - 1
    if (seen & expected) != expected AND no_default: warn

  This catches missing cases at compile time with ONE integer comparison.

ZIG PARALLEL: Zig requires exhaustive switches on enums (must handle
all variants or have else branch). Same safety, same compile-time cost.
'''

[[entries]]
name = "c_type_checking_mechanics"
description = "How C enforces types without inference: declaration-driven, promotion rules"
category = "type_systems"
content = '''
C has NO type inference (until C23 auto). Every variable, parameter,
and return type is explicitly declared. The compiler:

1. STORES type in symbol table at declaration point
2. LOOKS UP type when variable is used in expression
3. PROMOTES smaller types in expressions (integer promotion rules)
4. CHECKS assignment compatibility
5. INSERTS implicit conversions (casts) in codegen

INTEGER PROMOTION (relevant for Cyrius multi-width):
  - i8, i16 promote to i32 in any arithmetic expression
  - If either operand is i64, the other promotes to i64
  - Result type = wider of the two operands

  Implementation: after loading a value, if type is i8/i16, emit
  movzx to widen to i64. All arithmetic happens in i64 registers.
  Only narrow on store.

ASSIGNMENT CHECKING:
  - Same type: OK
  - Narrowing (i64 → i8): OK but warn (truncation)
  - Pointer to int: warn
  - Struct to struct: must be same struct type
  - Enum to int: OK (enums are integers)
  - Int to enum: warn (might be invalid variant)

WHY THIS IS ENOUGH: C has powered operating systems for 50 years
with this level of type checking. No generics, no inference, no
algebraic types. Declaration-driven + promotion rules + warnings
catches most bugs without complexity.

FOR CYRIUS: Start with C's model. Add warnings for mismatched types.
Add integer promotions when multi-width codegen is done. Skip
implicit conversions initially — require explicit casts.
'''
