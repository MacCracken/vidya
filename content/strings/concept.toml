id = "strings"
title = "Strings"
topic = "DataTypes"
description = "Text representation and manipulation — the most common data type in every language, and the one with the most hidden complexity."
tags = ["text", "utf-8", "unicode", "encoding", "interpolation"]
related_topics = ["memory_management", "input_output", "type_systems"]

[[best_practices]]
title = "Know your encoding"
explanation = "UTF-8 is the standard. If you're not sure, you're probably in UTF-8."

[[best_practices]]
title = "Borrow when you can"
explanation = "Pass &str (Rust), const char* (C), string (Go) instead of owned strings to avoid unnecessary allocation."

[[best_practices]]
title = "Never index by byte position into multi-byte strings"
explanation = "'café'[4] is not 'é' in UTF-8. Use character iterators or grapheme clusters."

[[best_practices]]
title = "Pre-allocate when you know the size"
explanation = "String::with_capacity(n) (Rust), strings.Builder (Go), StringBuilder (Java/C#) avoid repeated reallocations."

[[best_practices]]
title = "Prefer interpolation over concatenation"
explanation = "More readable and often more efficient. format!() in Rust, f-strings in Python, template literals in TypeScript."

[[gotchas]]
title = "String vs &str ownership confusion"
explanation = "String is heap-allocated and owned; &str is a borrowed slice. You can't return &str from a function that creates the string."
bad_example = "fn make() -> &str { &String::from(\"hello\") }"
good_example = "fn make() -> String { String::from(\"hello\") }"
language = "Rust"

[[gotchas]]
title = "Byte indexing into UTF-8 strings"
explanation = "Indexing a String by [n] doesn't compile in Rust — use .chars().nth(n) or byte slicing with care."
bad_example = "let c = s[4];"
good_example = "let c = s.chars().nth(4);"
language = "Rust"

[[gotchas]]
title = "C strings are just pointers"
explanation = "No built-in string type — char* is a pointer to bytes, null-terminated. Buffer overflows are your problem."
bad_example = "char buf[4]; strcpy(buf, \"hello world\");"
good_example = "char buf[32]; strncpy(buf, \"hello world\", sizeof(buf) - 1);"
language = "C"

[[gotchas]]
title = "Python string concatenation in loops"
explanation = "Strings are immutable. += creates a new string every time — use ''.join() for loops."
bad_example = "s = ''; for x in items: s += str(x)"
good_example = "s = ''.join(str(x) for x in items)"
language = "Python"

[[performance_notes]]
title = "write! over format! on hot paths"
explanation = "write!(&mut buf, ...) appends to an existing buffer, avoiding the allocation that format!(...) always makes."
evidence = "~40% fewer allocations in benchmarks"
language = "Rust"

[[performance_notes]]
title = "Cow<str> for conditional ownership"
explanation = "Cow<'_, str> avoids cloning when you might or might not need to modify a string. Zero-cost when borrowing."
evidence = "Zero allocation on the borrow path vs always-clone"
language = "Rust"

[[performance_notes]]
title = "strings.Builder with Grow pre-allocation"
explanation = "Pre-allocating the builder avoids repeated resizing during concatenation."
evidence = "~3x faster than naive concatenation in Go benchmarks"
language = "Go"

[[performance_notes]]
title = "join() over += for string building"
explanation = "''.join(list) is O(n), while += in a loop is O(n²) due to repeated copying."
evidence = "O(n) vs O(n²) complexity"
language = "Python"
