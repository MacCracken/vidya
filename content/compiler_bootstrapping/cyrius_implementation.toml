[[entries]]
name = "pattern_matching"
description = "How match expressions work: syntax, codegen, scoped arms"
category = "compiler_bootstrapping"
content = '''
SYNTAX:
  match expr {
    0 => { stmts }
    42 => { stmts }
    _ => { stmts }     # default/wildcard
  }

TOKENS: MATCH=75. Arrow => is two tokens: EQ(4) + GT(20).

CODEGEN (same as switch):
  1. Evaluate match expr → store in hidden temp global var
  2. For each arm (except _):
     a. Load temp var, push
     b. Evaluate arm value, compare
     c. JCC(NE) to skip this arm
     d. SCOPE_PUSH, parse body, SCOPE_POP
     e. JMP to end (patched later)
     f. Patch the skip
  3. Default arm (_): just parse body, no comparison
  4. Patch all end jumps

WILDCARD DETECTION:
  Check if identifier is "_" (single underscore):
    load8(tok_names + noff) == 95 && load8(tok_names + noff + 1) == 0

SCOPING: Each arm gets its own scope (SCOPE_PUSH/POP).
Future: destructuring `Ok(v) => { use v }` requires enum constructors + block scoping.
'''

[[entries]]
name = "for_in_range"
description = "How for-in range loops work: for i in 0..10 { }"
category = "compiler_bootstrapping"
content = '''
SYNTAX:
  for i in start..end { body }

TOKENS: IN=76. Range (..) is two DOT(41) tokens.

DETECTION:
  In PARSE_FOR, before checking for ( (C-style for):
    if (PEEKT == IDENT) {
      save_ti; advance; if (PEEKT == IN) { ... for-in path ... }
      else { rewind to save_ti; fall through to C-style }
    }

DESUGARING (inline codegen, not AST transform):
  1. Evaluate start expr → store in new local var (iterator)
  2. Evaluate end expr → store in hidden global var (limit)
  3. Loop top: load iter, load limit, CMP, JCC(GE) to end
  4. SCOPE_PUSH, parse body, SCOPE_POP
  5. Load iter, add 1, store iter
  6. JMP to loop top
  7. Patch end jump

SCOPING: Iterator var and body share one scope (SCOPE_PUSH before start, POP after loop).
The iterator var is visible inside the body but not after the loop.

RANGE: Exclusive end (0..5 = 0,1,2,3,4). Matches Rust/Python convention.
'''

[[entries]]
name = "aarch64_syscall_portability"
description = "How portable syscall numbers work across x86 and aarch64"
category = "compiler_bootstrapping"
content = '''
PROBLEM:
  x86_64 and aarch64 have COMPLETELY DIFFERENT syscall numbers:
    read:  x86=0,  aarch64=63
    write: x86=1,  aarch64=64
    open:  x86=2,  aarch64=56
    close: x86=3,  aarch64=57
    brk:   x86=12, aarch64=214
    exit:  x86=60, aarch64=93

  Shared source files (src/cc/*.cyr) use raw syscall numbers.
  Cross-compiler runs on x86 but generates aarch64 code.

SOLUTION: SYS_* enum constants defined per-architecture.

  compiler.cyr (x86):
    enum Sys { SYS_READ=0; SYS_WRITE=1; SYS_OPEN=2; SYS_CLOSE=3; SYS_BRK=12; SYS_EXIT=60; }

  compiler_aarch64.cyr (cross-compiler, runs on x86):
    enum Sys { SYS_READ=0; SYS_WRITE=1; ... }  # x86 numbers (runs on x86!)

  For native aarch64 self-hosting (patched on ARM machine):
    enum Sys { SYS_READ=63; SYS_WRITE=64; SYS_BRK=214; SYS_EXIT=93; }

CROSS-COMPILER GOTCHA:
  The cross-compiler is an x86 binary. Its SYS_* values must be x86 numbers
  because THAT binary runs on x86. The code it GENERATES for aarch64 uses
  the raw numbers from the source being compiled.

  When self-hosting on aarch64, the SOURCE must have aarch64 numbers because
  the compiled binary runs on aarch64.

SYSCALL TRANSLATION LAYER (in aarch64 emitter):
  ESYSXLAT: chain of CMP X8,#N / B.NE +8 / MOVZ X8,#M
  Translates common x86 numbers to aarch64 at codegen time.
  Used by ESCPOPS for user-written syscall() calls.

ENCODING GOTCHA:
  MOVZ X8, #63 = 0xD28007E8 (not 0xD2800FE8!)
  Formula: 0xD2800000 | (imm16 << 5) | Rd
  63 << 5 = 0x7E0, NOT 0xFE0. Getting this wrong silently maps to wrong syscall.
'''

[[entries]]
name = "aarch64_escpops_fix"
description = "How the aarch64 syscall arg popping was fixed (pop-through-x0 approach)"
category = "compiler_bootstrapping"
content = '''
THE BUG:
  Original ESCPOPS popped args directly into target registers:
    EPOPRDI → x0 (arg1)
    EPOPRSI → x1 (arg2)
    ...
    EPOPR → x0 (syscall num, OVERWRITES arg1!)
  Then: mov x8, x0; shift x0←x1, x1←x2, etc. Lossy register shuffle.

THE FIX — pop-through-x0:
  Pop ALL values into x0, then MOV to target register:
    if (n >= 4) { EPOPR(S); EW(S, mov_x2_x0); }  # pop → x0, mov x2, x0
    if (n >= 3) { EPOPR(S); EW(S, mov_x1_x0); }  # pop → x0, mov x1, x0
    if (n >= 2) {
      EPOPR(S); EW(S, mov_x9_x0);  # pop arg1 → x0, save to x9
      EPOPR(S); EW(S, mov_x8_x0);  # pop syscall → x0, save to x8
      EW(S, mov_x0_x9);             # restore arg1 from x9
    }

WHY POP-THROUGH-x0 WORKS:
  - Only one register (x0) is used for all pops → no ordering ambiguity
  - Each pop immediately moves to the final target register
  - The syscall num/arg1 swap at the end uses x9 as a temporary
  - No shift chain, no lost values

LIFO ORDER:
  Push order: syscall_num, arg1, arg2, ..., argN
  Stack: [argN_top, ..., arg1, syscall_num_bottom]
  Pop order: argN first (top), syscall_num last (bottom)
  So the n>=N conditions fire from highest to lowest.

ARM64 ABI:
  Syscall: x8=number, x0-x5=args. svc #0.
  This matches the final register state after our pop sequence.
'''

[[entries]]
name = "module_system"
description = "How mod/use/pub work: namespace mangling, use aliases"
category = "compiler_bootstrapping"
content = '''
SYNTAX:
  mod math;                    # set current module to "math"
  pub fn add(a, b) { ... }    # public function in math module
  fn helper(x) { ... }        # private (no pub)

  mod main;                    # switch to main module
  use math.add;                # alias: add → math_add

IMPLEMENTATION:
  mod name; → sets GMOD(S) to the name offset in tok_names.
  When PARSE_FN_DEF sees GMOD != 0:
    Builds mangled name "module_function" in tok_names (at NPOS, permanent).
    Registers function under the mangled name.

  use modname.funcname; → builds "modname_funcname" in tok_names (at NPOS).
    Stores alias: use_from[uc] = funcname_offset, use_to[uc] = mangled_offset.

  FINDFN: After checking fn_names, checks use_aliases.
    If short name matches use_from[i], recursively calls FINDFN with use_to[i].

HEAP:
  current_module at 0x8FEC8 (8 bytes)
  pub_flags[256] at 0x8FED0 (256 bytes)
  use_from[64] at 0x8FFD0 (512 bytes)
  use_to[64] at 0x901D0 (512 bytes)
  use_count at 0x903D0 (8 bytes)

MANGLED NAME STORAGE GOTCHA:
  The mangled name must be stored PERMANENTLY in tok_names (at NPOS).
  Using a scratch area (offset 30000) causes names to be overwritten
  when multiple functions are defined — only the last one survives.
  Fix: append to tok_names at NPOS, same as the lexer does.

CROSS-MODULE CALLS:
  mod math; fn add(a, b) { ... }
  mod main; use math.add; var r = add(1, 2);
  → FINDFN("add") fails → checks aliases → finds "math_add" → calls it.
'''

[[entries]]
name = "operator_overloading"
description = "How operator overloading dispatches +,-,*,/ to Type_add/sub/mul/div"
category = "compiler_bootstrapping"
content = '''
DESIGN:
  When PARSE_EXPR sees + and the left operand has a struct type (GESTYPE > 0),
  dispatch to Type_add(lhs, rhs) instead of integer addition.

TRACKING:
  expr_stype (at S+0x903D8) — set in PARSE_FACTOR when loading a struct-typed var.
  Cleared to 0 for all other expressions (literals, function calls, etc.).
  Set from GVTYPE for globals, GLTYPE for locals (negative = struct ID).

DISPATCH (EMIT_OP_DISPATCH):
  1. Push lhs (already in rax from PARSE_TERM)
  2. Call PARSE_TERM to parse rhs, push result
  3. BUILD_OP_NAME: construct "TypeName_add" in tok_names (permanent, at NPOS)
  4. ECALLPOPS(2) + ECALLTO/ECALLFIX + ECALLCLEAN(2)
  5. Clear expr_stype to 0

BUILD_OP_NAME GOTCHA:
  Must use inline byte copy, NOT memcpy — the compiler source does not include
  lib/string.cyr. Using memcpy crashes the compiler during compilation.
  Fix: while loop with load8/store8.

TYPE ANNOTATION:
  var x: Str = str_from("hello");  → sets GLTYPE to Str struct ID (negative)
  Enables: x.len(), x + y (operator dispatch), x.contains("abc")
  Works for both global (GVTYPE/SVTYPE) and local (GLTYPE/SLTYPE) vars.
'''

[[entries]]
name = "block_body_closures"
description = "How block body closures work (and the global scope limitation)"
category = "compiler_bootstrapping"
content = '''
SYNTAX:
  var f = |x| { var y = x * 2; return y; };    # block body
  var g = |x| x * 2;                            # expression body (simpler)

BLOCK BODY:
  Parsed via PARSE_PROG inside the closure function.
  return statements emit JMP patches → patched to EFNEPI.
  Single EFNEPI at end handles both return paths and fall-through.

WORKS: Inside functions.
  fn make() {
    var f = |x| { if (x > 10) { return 42; } return 0; };
    return fncall1(f, 20);  // 42
  }

LIMITATION: Block body closures at GLOBAL scope produce wrong results.
  The closure compiles correctly but the interaction between the global
  context and the closure epilogue causes double-return issues.
  Fix: always use closures inside functions. This matches Rust convention.

IMPLEMENTATION:
  |params| { body } detected in PARSE_FACTOR when PEEKT == 13 (LBRACE).
  Same anonymous function generation as expression closures.
  PARSE_PROG parses body. Return patches collected via GRPC/SRPC.
  All patches resolved to single EFNEPI after body.
'''
