# Cyrius Language Reference for Vidya
# This is the canonical reference for the Cyrius programming language.
# Any agent reading this should be able to write Cyrius programs,
# modify the compiler, build kernels, and port to new architectures.

[[entries]]
name = "cyrius_overview"
description = "Cyrius is a sovereign self-hosting systems language. Assembly up."
category = "compiler_bootstrapping"
content = '''
Cyrius is a self-hosting compiler that bootstraps from a 29KB binary seed.
No Rust, no LLVM, no Python. Just sh + Linux x86_64.

Everything is a 64-bit integer. No floats, no separate types.
Type annotations (var x: i64 = 42) are documentation only — no enforcement.

The compiler (cc2) is 136KB, ~250 functions, 7 modules. It compiles itself
byte-identical in ~11ms. The AGNOS kernel is written entirely in Cyrius.

Build: sh bootstrap/bootstrap.sh (40ms)
Compile: echo 'var x = 42;' | ./build/cc2 > prog && chmod +x prog
Test: sh tests/compiler.sh   (212 compiler + 51 program tests)

Source: src/compiler.cyr (entry) + src/cc/*.cyr (modules)
Version: 1.6.1 — 263 tests, 0 failures, self-hosting byte-identical
'''

[[entries]]
name = "cyrius_syntax"
description = "Complete Cyrius language syntax reference"
category = "compiler_bootstrapping"
content = '''
VARIABLES:
    var x = 42;            # scalar (8 bytes)
    var x: i64 = 42;       # with type annotation (no enforcement)
    var buf[256];           # array (256 BYTES, not elements)
    x = x + 1;             # reassignment

FUNCTIONS:
    fn add(a, b) { return a + b; }
    var r = add(20, 22);
    # Up to 6 register params, 7+ on stack
    # Forward calls work (call functions defined later)

CONTROL FLOW:
    if (x == 1) { ... } elif (x == 2) { ... } else { ... }
    while (cond) { ... }
    for (var i = 0; i < 10; i = i + 1) { ... }
    break;    # exit loop
    continue; # skip to next iteration

OPERATORS:
    + - * / %              # arithmetic
    == != < > <= >=        # comparison
    & | ^ ~ << >>          # bitwise
    && ||                  # logical (short-circuit, chainable)

MEMORY:
    store8(&buf, 65);  load8(&buf);     # byte
    store16/32/64      load16/32/64     # 16/32/64-bit

POINTERS:
    var p = &x;        # address-of
    var v = *p;        # dereference
    *p = 99;           # write through pointer
    var p: *i64 = &buf; *(p + 1);  # typed (scales by element size)

STRUCTS:
    struct Point { x; y; }
    var p = Point { 10, 20 };
    p.x = 42;
    struct Rect { tl: Point; br: Point; }  # nested
    var r = Rect { 0, 0, 10, 5 };
    r.br.x;  # chained dot access

STRINGS:
    "hello\n"  # null-terminated, escapes: \n \t \0 \\ \"
    syscall(1, 1, "hello", 5);

SYSCALLS:
    syscall(1, 1, buf, len);   # write
    syscall(0, 0, buf, len);   # read
    syscall(60, code);         # exit

INCLUDES:
    include "lib/string.cyr"   # textual inclusion (relative to cwd)

INLINE ASM:
    asm { 0x90; }              # raw bytes
    asm { cli; sti; hlt; }     # mnemonics
    asm { mov cr3, rax; }      # privileged
    asm { lgdt [rax]; }        # descriptor tables

KERNEL MODE:
    kernel;                    # emit bare-metal multiboot1 ELF
'''

[[entries]]
name = "cyrius_compiler_architecture"
description = "How the cc2 compiler is structured: modules, passes, heap layout"
category = "compiler_bootstrapping"
content = '''
MODULES (included by cc2.cyr):
    util.cyr   — state accessors (GCP, GTI, GVCNT...), helpers (PRNUM, ERR)
    emit.cyr   — x86_64 instruction emission (EB, EMOVI, EPUSHR, EADDR...)
    jump.cyr   — conditional/unconditional jumps (EJCC, EJMP, EPATCH)
    lex.cyr    — tokenizer (ADDTOK, LEXNUM, LEXID, LEX, PREPROCESS)
    parse.cyr  — parser + codegen (PARSE_EXPR, PARSE_STMT, PARSE_FN_DEF...)
    fixup.cyr  — address fixup + ELF emission (FIXUP, EMITELF)

COMPILATION FLOW:
    1. Read stdin into input buffer (131072 bytes at S+0)
    2. PREPROCESS: expand include directives
    3. LEX: tokenize into tok_types/tok_values arrays (32768 slots)
    4. Pass 1: scan struct/fn/var declarations (register names, skip fn bodies)
    5. Pass 2: parse fn bodies (all globals already registered)
    6. Emit jmp over fn bodies → parse fn defs → patch jmp
    7. EMIT_GVAR_INITS: replay deferred global var initializations
    8. PARSE_PROG: parse main code statements
    9. FIXUP: patch variable/string/function addresses
    10. EMITELF: write ELF binary to stdout

HEAP LAYOUT (S = brk base, v1.6):
    0x00000  input_buf [131072]
    0x20000  codebuf   [196608]
    0x50000  tok_names [65536]
    0x59000  struct_ftypes [4096]    (32*16 field type IDs)
    0x60000  var_noffs [4096]        (512 entries, expanded from 256 in v1.5.2)
    0x60800  var_sizes [4096]        (512 entries, expanded from 256 in v1.5.2)
    0x62000  str_data  [30720]       (relocated from 0x61000 in v1.5.2)
    0x69800  str_pos, data_size
    0x6A000  output_buf [131072]
    0x8C100  compiler state (BL, CP, VCNT, TI, NPOS, cur_line...)
    0x8DA00  fn_count, in_function, locals, ret_patches
    0x8DE30  struct tables (names, fcounts, fnames)
    0x8F830  loop/condition/scope state
    0x90000  preprocessor scratch
    0xA2000  tok_types [524288]      (65536 slots)
    0x122000 tok_values [524288]
    0x1A2000 tok_lines [524288]      (line numbers per token)
    0x222000 preprocess_out [262144]
    0x262000 fixup_tbl [32768]       (2048 entries, relocated from 0x8A000)
    0x26A000 fn_names [4096]         (512 entries, relocated from 0x8C200 in v1.6.0)
    0x26B000 fn_offsets [4096]       (512 entries, relocated from 0x8CA00 in v1.6.0)
    0x26C000 fn_params [4096]        (512 entries, relocated from 0x8D200 in v1.6.0)
    brk: 0x26D000

CODEGEN MODEL:
    - Stack-based expression evaluation: push lhs, eval rhs, pop lhs, operate
    - rax = result register, rcx = scratch
    - Variables at fixed addresses in data section (EVLOAD/EVSTORE + fixup)
    - Function calls via rel32 fixup (type 2)
    - String addresses via abs64 fixup (type 1)
'''

[[entries]]
name = "cyrius_development_loop"
description = "The proven development process for adding features to Cyrius"
category = "compiler_bootstrapping"
content = '''
1. RESEARCH  — Check vidya for existing patterns. If covered, skip to 3.
2. VIDYA     — Document patterns, gotchas, codegen BEFORE coding.
3. BUILD     — ONE change at a time. Before compiling, check:
               - Duplicate var scan (no var x in two branches of same fn)
               - Brace balance
               - Bridge compiler supports syntax used in source
               - Heap offset map (no collisions)
4. TEST      — After EACH change:
               - Basic: echo 'var x = 42;' | ./build/cc2 > t && chmod +x t && ./t
               - Feature-specific test
               - Self-hosting: cc2==cc3 byte-identical
               - Full suite only after basic passes
5. IF BROKEN — Revert to last known good. Apply ONE change. Test. Repeat.
               If 3 attempts fail: defer, document root cause, move on.
6. AUDIT     — Full chain: bootstrap, all suites, self-hosting.
7. VIDYA+DOCS — Document findings. Update changelog, roadmap, benchmarks.
8. ALIGN     — After major events: sync ALL docs to current state.
               README, CLAUDE.md, roadmap, cyrius.md, benchmarks, CHANGELOG.

KEY LESSONS:
- Programs are the best compiler fuzzers — build real things early
- Bridge compiler (build/cc) determines what syntax source files can use
- Test after EVERY change, not after the feature is "done"
- build/cc2 MUST be committed to git (not gitignored)
- Capacity expansions (codebuf, tokens, input) must be separate commits
'''

[[entries]]
name = "cyrius_known_limitations"
description = "Current limitations and gotchas when writing Cyrius code (updated v1.1)"
category = "compiler_bootstrapping"
content = '''
FIXED (no longer limitations):
  - Block scoping: FIXED in v0.9.5. Variables in if/while/for blocks are scoped.
  - Var in loop: FIXED in v0.9.5. Same var name can be used in different scopes.
  - Comparisons in args: FIXED in v0.9.0. f(x == 1) works.

CURRENT LIMITATIONS:
1. NO MIXED &&/||: Cannot write (a && b || c). Use nested ifs instead.

2. FOR LOOP STEP: Must be simple assignment (i = i + 1), not complex expr.

3. EXIT CODE TRUNCATION: Linux exit codes wrap at 256. Use print_num for
   values > 255.

4. STRING LITERAL COMPARISON: streq("abc", "xyz") works via null-terminated
   comparison. strlen works on all string literals.

5. NO NEGATIVE LITERALS: Use (0 - N) instead of -N.

6. INLINE ASM REGISTER STATE: asm blocks operate on the register state
   at that point. The compiler may have values in rax/rcx. Use push/pop
   to save state if needed.

9. COMPARISONS IN FUNCTION ARGS: FIXED (v0.9.0). f(x == 1) now works via
   PARSE_CMP_EXPR + ESETCC codegen. Produces 0/1 via x86 setCC + movzx.

10. GLOBAL VAR INIT LIMIT: Max ~64 global vars with initializers (gvar_toks
    table at 0x8FA98 has 64 slots). Use enums for large constant groups.
    Enums have separate init path and don't consume gvar_toks slots.

16. VARIABLE TABLE LIMIT: Max 512 variables (VCNT never resets between
    functions — arrays inside functions are globals). Exceeding 512 silently
    corrupts string data. Was 256, expanded to 512 in v1.5.2.

17. FUNCTION TABLE LIMIT: Max 512 functions. Exceeding 512 corrupts jump
    targets → runtime segfault. Was 256, expanded to 512 in v1.6.0.

18. var buf[N] IS BYTES: var buf[N] allocates N BYTES, not N i64 elements.
    var buf[8] = 8 bytes (1 i64). var buf[120] = 120 bytes (15 i64s).
    Writing past the allocated size silently corrupts adjacent data.

19. INCLUDE IN KERNEL MODE: Not supported. kernel; mode blocks require
    single-file source or external concatenation. Main blocker for AGNOS
    multi-arch kernel split.

11. ENUM INIT ORDERING: Enum init runs before gvar init in cc2.cyr.
    If you modify the compiler, do NOT reorder these — functions called
    during gvar init depend on enum values being set.

12. FUNCTION POINTERS: &fn_name IS supported (fixup type 3). Use fncall0/1/2
    from fnptr.cyr for indirect calls. The earlier limitation was removed.

GOTCHAS (expected behavior, not bugs):
13. DYNAMIC LOOP BOUNDS: for (var i = 0; i < GLOBAL; i = i + 1) re-evaluates
    GLOBAL each iteration. If the loop body modifies GLOBAL (directly or via
    function call), the loop count changes dynamically.
    FIX: var limit = GLOBAL; for (var i = 0; i < limit; i = i + 1) { ... }
    EXAMPLE: pmm_alloc() decrements free_count inside a loop bounded by
    free_count → loop runs half the expected iterations.

14. BLOCK CLOSURES AT GLOBAL SCOPE: |x| { return x; } works inside functions
    but produces wrong results at global scope. Always use closures inside fns.

15. OPERATOR OVERLOADING + ALLOC: Type_add(a, b) works for value types.
    For pointer-based types (Str), the function receives the pointer value.
    For stack-allocated structs (Point), it receives the first field value.
'''

[[entries]]
name = "cyrius_porting_guide"
description = "How to port Cyrius to a new architecture (aarch64 example)"
category = "compiler_bootstrapping"
content = '''
The compiler is factored into arch-independent frontend and arch-specific backend.

FRONTEND (shared, no changes needed):
    util.cyr  — state accessors
    lex.cyr   — tokenizer
    parse.cyr — parser (calls emit/jump functions by name)
    cc2.cyr   — main loop

BACKEND (per-architecture):
    emit.cyr  — instruction emission (~50 functions)
    jump.cyr  — branch/patch (~4 functions)
    fixup.cyr — address patching + ELF emission (~4 functions)

TO PORT:
1. Create src/arch/ARCH/emit.cyr with same function signatures as x86_64
2. Create src/arch/ARCH/jump.cyr — branch encoding differs per arch
3. Create src/arch/ARCH/fixup.cyr — ELF header + address patching
4. Create src/compiler_ARCH.cyr that includes ARCH backend instead of x86_64
5. Build cross-compiler: cat src/compiler_ARCH.cyr | ./build/cc2 > build/cc2_ARCH

KEY MAPPINGS (x86_64 → aarch64 example):
    EMOVI(imm64)  → MOVZ/MOVK sequence (up to 4 instructions)
    EPUSHR/EPOPR  → STR/LDR with SP pre/post-index
    EADDR/ESUBR   → ADD/SUB register-register
    EIMUL/EIDIV   → MUL/SDIV
    ELODC/ESTOC   → LDR/STR [x1]
    ESYSCALL      → SVC #0 (x8=syscall number, x0-x5=args)
    EJCC(cc)      → B.cond (map x86 cc to ARM condition codes)
    EJMP/EJMP0    → B imm26
    FIXUP var     → patch MOVZ/MOVK immediate fields
    FIXUP fn call → patch BL offset

TESTING:
    qemu-system-aarch64 for kernel, qemu-aarch64 for userspace (Linux)
'''

[[entries]]
name = "cyrius_stdlib"
description = "Cyrius standard library: 8 core + 15 ecosystem libraries, 150+ functions"
category = "compiler_bootstrapping"
content = '''
CORE LIBRARIES (lib/):

string.cyr   — strlen, streq, memeq, memcpy, memset, memchr, strchr, print_num, println
alloc.cyr    — alloc_init, alloc, alloc_reset, alloc_used (bump allocator from brk)
str.cyr      — Str struct (data+len): str_from, str_len, str_eq, str_cat, str_sub, str_contains, str_split, str_trim
vec.cyr      — Dynamic array: vec_new, vec_push, vec_pop, vec_get, vec_set, vec_len, vec_find, vec_remove
io.cyr       — File I/O: file_open, file_read, file_write, file_close, file_read_all, file_write_all, file_exists
fmt.cyr      — Formatting: fmt_int, fmt_hex, fmt_hex0x, fmt_bool, fmt_byte, fmt_pad, fmt_int_buf, sprintf
args.cyr     — CLI args: args_init, argc, argv (reads /proc/self/cmdline)
fnptr.cyr    — Function pointers: fncall0, fncall1, fncall2 (indirect call via inline asm)
tagged.cyr   — Tagged unions: packed Result (Ok/Err via bit 63), heap-based Option (Some/None)
hashmap.cyr  — String→i64 map: map_new, map_set, map_get, map_has, map_delete, map_keys
fs.cyr       — Filesystem: is_dir, dir_list, sys_mkdir, sys_unlink, sys_chmod
process.cyr  — Subprocess: run, run_capture, spawn, exec_vec, exec_env, exec_capture
syscalls.cyr — 50+ syscall numbers, wrappers (fork, waitpid, pipe, dup2, epoll, timerfd)
net.cyr      — Socket wrappers
json.cyr     — Minimal JSON: json_parse, json_get, json_get_int, json_build
trait.cyr    — Manual vtable dispatch: display_vtable, trait_obj_new
regex.cyr    — Pattern matching
assert.cyr   — Test assertions: assert_eq, assert_ne, assert_true
bench.cyr    — Benchmarking: bench_start, bench_end, bench_report
bounds.cyr   — Array bounds checking
callback.cyr — Callback patterns: fork_with_pre_exec

Total: 21 library modules, 200+ functions.

USAGE PATTERN:
    include "lib/alloc.cyr"
    include "lib/vec.cyr"
    alloc_init();
    var v = vec_new();
    vec_push(v, 42);

INCLUDE ORDER FOR FULL STACK:
    include "lib/string.cyr"
    include "lib/fmt.cyr"
    include "lib/alloc.cyr"
    include "lib/vec.cyr"
    include "lib/str.cyr"
    include "lib/tagged.cyr"
    include "lib/syscalls.cyr"
    include "lib/io.cyr"
    include "lib/hashmap.cyr"
    include "lib/process.cyr"
    include "lib/fs.cyr"

IMPORTANT — var buf[N] allocates N BYTES, not N elements:
    var buf[120];     # 120 bytes (enough for sysinfo struct)
    var uts[392];     # 392 bytes (enough for utsname struct: 6 × 65 + padding)
    store64(&buf, 42);          # write 8 bytes at offset 0
    store64(&buf + 8, 43);      # write 8 bytes at offset 8
'''

[[entries]]
name = "cyrius_new_features"
description = "Features added in Phase 8: enums, switch, function pointers, type warnings"
category = "compiler_bootstrapping"
content = '''
ENUMS:
    enum Color { RED; GREEN; BLUE; }        # AUTO: RED=0, GREEN=1, BLUE=2
    enum Error { OK = 0; FAIL = 44; }      # EXPLICIT values
    var c = BLUE;                           # c = 2
    # Enums are compile-time integer constants. No type safety (yet).

SWITCH/MATCH:
    switch (expr) {
        case 1: stmts;
        case 2: stmts;
        default: stmts;
    }
    # Case values must be integer literals. No fallthrough.
    # Compiles to chained comparisons (cmp + jne per case).
    # Switch value stored in hidden global variable (not register).

FUNCTION POINTERS:
    fn add(a, b) { return a + b; }
    var fp = &add;                  # Get absolute function address
    # Compiler emits fixup type 3 (absolute addr) for &fn_name.
    # Call via fncall2(fp, 20, 22) from fnptr.cyr library.
    # Direct call rax (FF D0) via inline asm.

TYPE WARNINGS:
    fn f() {
        var p: *i64 = 42;          # WARNING: assigning non-pointer to typed pointer
    }
    # Warnings emitted to stderr, compilation continues.
    # Only checked for pointer/scalar mismatch in function scope.
'''

[[entries]]
name = "cyrius_v098_features"
description = "Features added in v0.9.5–v0.9.8: scoping, modules, match, for-in, feature flags"
category = "compiler_bootstrapping"
content = '''
BLOCK SCOPING (v0.9.5):
    fn f() {
        var x = 10;
        if (1 == 1) { var x = 42; }   # inner x shadows outer
        return x;                       # returns 10 (outer preserved)
    }
    # Variables in if/while/for blocks don't leak.
    # for loop iterator is scoped to the loop.

MODULES (v0.9.7):
    mod math;
    pub fn add(a, b) { return a + b; }

    mod main;
    use math.add;
    var r = add(1, 2);   # calls math_add

    # mod name; — sets namespace prefix for subsequent definitions
    # pub fn — marks function as exported (visible outside module)
    # use mod.fn; — creates alias so fn resolves to mod_fn
    # Private functions (no pub) are module-internal

PATTERN MATCHING (v0.9.8):
    match expr {
        0 => { return 0; }
        42 => { return 42; }
        _ => { return 99; }
    }
    # Cleaner than switch. Each arm gets its own scope.
    # _ is the wildcard/default arm.
    # Arrow => is = followed by >.

FOR-IN RANGE (v0.9.8):
    for i in 0..5 {        # i = 0, 1, 2, 3, 4
        sum = sum + i;
    }
    # Exclusive end (like Rust/Python).
    # Iterator variable scoped to loop body.
    # .. is two DOT tokens.

FEATURE FLAGS (v0.9.6):
    #define DEBUG
    #ifdef DEBUG
    var verbose = 1;
    #endif
    # Preprocessor directives. Nested ifdef supported.
    # Flags defined in source or included files.

ENUM CONSTRUCTORS (v0.9.6):
    enum Result { Ok(val) = 0; Err(code) = 1; }
    # Payload syntax accepted by parser.
    # Constructors are currently hand-written in tagged.cyr:
    #   fn Ok(val) { return tagged_new(0, val); }

FLOAT OPERATIONS (v0.9.2):
    var a = f64_from(10);
    var b = 3.14;               # float literal
    var c = f64_mul(a, b);
    var r = f64_to(c);          # truncate to int
    var eq = f64_eq(a, b);      # comparison → 0 or 1

METHODS ON STRUCTS (v0.9.2):
    struct Point { x; y; }
    fn Point_scale(self, factor) {
        store64(self, load64(self) * factor);
        store64(self + 8, load64(self + 8) * factor);
        return 0;
    }
    var p = Point { 3, 4 };
    p.scale(2);                 # calls Point_scale(&p, 2)

ERROR MESSAGES (v0.9.2):
    error:3: unexpected token (type=5)
    warning:15: assigning non-pointer to typed pointer
    # Line numbers instead of token indices.
'''

[[entries]]
name = "cyrius_v0910_features"
description = "Features added in v0.9.9–v0.9.12: traits, closures, strings, operators, subprocess"
category = "compiler_bootstrapping"
content = '''
TRAIT IMPL BLOCKS (v0.9.9):
    struct Point { x; y; }

    impl Math for Point {
        fn sum(self) { return load64(self) + load64(self + 8); }
        fn scale(self, n) {
            store64(self, load64(self) * n);
            store64(self + 8, load64(self + 8) * n);
            return 0;
        }
    }

    var p = Point { 10, 20 };
    p.scale(2);            # calls Point_scale(&p, 2)
    var r = p.sum();       # calls Point_sum(&p)

    # Methods mangled to TypeName_method (same as convention dispatch).
    # Multiple impl blocks for same type allowed.
    # Trait name is documentation-only for now.

CLOSURES / LAMBDAS (v0.9.10):
    include "lib/fnptr.cyr"

    var double = |x| x * 2;
    var add = |a, b| a + b;
    var always42 = |_| 42;

    var r1 = fncall1(double, 21);     # 42
    var r2 = fncall2(add, 20, 22);    # 42
    var r3 = fncall1(always42, 0);    # 42

    # Expression body only (no block body yet).
    # Generates anonymous __clN functions, returns function pointer.
    # Zero-param closures use |_| (since || is the OR operator).
    # Call via fncall0/fncall1/fncall2 from fnptr.cyr.

STRING TYPE WITH METHODS (v0.9.10):
    include "lib/str.cyr"

    var s: Str = str_from("hello world");
    var len = s.len();                # 11
    var has = s.contains("world");    # 1
    var sub = s.starts_with("hello"); # 1
    var idx = s.index_of("world");    # 6

    var a: Str = str_from("foo");
    var b: Str = str_from("bar");
    var c: Str = a.cat(b);            # "foobar"

    # Type annotation `: Str` enables dot-call method dispatch.
    # Works for any struct type: var v: Vec = vec_new(); v.push(42);
    # 16 Str methods: len, data, print, println, eq, cat, sub, clone,
    #   contains, starts_with, ends_with, index_of, from_int, to_int,
    #   trim, split

OPERATOR OVERLOADING (v0.9.11):
    struct Vec2 { x; y; }

    fn Vec2_add(a, b) { return a + b; }
    fn Vec2_sub(a, b) { return a - b; }
    fn Vec2_mul(a, b) { return a * b; }

    var a: Vec2 = 10;
    var b: Vec2 = 32;
    var c = a + b;   # calls Vec2_add(10, 32) = 42

    # Dispatches + - * / to TypeName_add/sub/mul/div when left operand
    # has a struct type (via type annotation or struct literal init).
    # Operator functions receive VALUES, not addresses.
    # Works for pointer-based types (Str, Vec) and value types.

SUBPROCESS BRIDGE (v0.9.12):
    include "lib/process.cyr"

    # Variable args via vec
    var args = vec_new();
    vec_push(args, "/usr/bin/nvidia-smi");
    vec_push(args, "--query-gpu=name");
    var rc = exec_vec(args);

    # Capture stdout
    var buf = alloc(4096);
    var len = exec_capture(args, buf, 4096);

    # Custom environment
    var env = vec_new();
    vec_push(env, "PATH=/usr/bin");
    exec_env(args, env);

    # One-liner
    exec_cmd("/usr/bin/ls -la /tmp");

    # Enables calling any external tool: python3, node, cargo,
    # nvidia-smi, kubectl, docker, etc.
    # Bridge strategy: Cyrius core logic + subprocess for external deps.
'''

[[entries]]
name = "cyrius_v1x_features"
description = "Features added in v1.0–v1.5: for-in collections, enum constructors, shared libs, address-based ops, cyrb binary"
category = "compiler_bootstrapping"
content = '''
FOR-IN COLLECTIONS (v1.1.0):
    include "lib/vec.cyr"

    var v = vec_new();
    vec_push(v, 10);
    vec_push(v, 20);
    vec_push(v, 12);

    var total = 0;
    for item in v {
        total = total + item;
    }
    # total = 42

    # Desugars to: var __len = vec_len(v); var __i = 0;
    #   while (__i < __len) { var item = vec_get(v, __i); body; __i = __i + 1; }
    # Item variable is scoped to loop body.
    # Works alongside range for-in: for i in 0..10 { }

ENUM CONSTRUCTORS (v1.1.0):
    enum Result { Ok(val) = 0; Err(code) = 1; }

    var r = Ok(42);              # auto-generated constructor
