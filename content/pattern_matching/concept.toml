id = "pattern_matching"
title = "Pattern Matching"
topic = "Patterns"
description = "Destructuring data by shape — a more powerful alternative to if/else chains that the compiler can verify is exhaustive."
tags = ["pattern-matching", "match", "destructuring", "enums", "guards"]
related_topics = ["type_systems", "design_patterns", "error_handling"]

[[best_practices]]
title = "Use match over if-else chains for enums"
explanation = "match is exhaustive — the compiler ensures you handle every variant. if-else chains silently miss new variants when the enum grows."

[[best_practices]]
title = "Destructure to extract data in one step"
explanation = "Instead of matching then accessing fields, bind variables directly in the pattern. Less code, clearer intent."

[[best_practices]]
title = "Use if-let for single-variant checks"
explanation = "When you only care about one variant, if let is cleaner than a full match with a catch-all arm."

[[best_practices]]
title = "Avoid catch-all arms early in development"
explanation = "A _ => ... arm suppresses exhaustiveness checking. Use explicit variants while the code is evolving, then add catch-all only for stability."

[[gotchas]]
title = "Match arms are checked in order"
explanation = "The first matching arm wins. A catch-all pattern before a specific one makes the specific arm unreachable."
bad_example = "match x { _ => default(), 42 => special() }"
good_example = "match x { 42 => special(), _ => default() }"
language = "Rust"

[[gotchas]]
title = "Binding vs constant in patterns"
explanation = "A bare identifier in a pattern creates a binding, not a comparison. Use CONSTANTS or literal values for comparison."
bad_example = "let expected = 42; match x { expected => ... } // always matches! 'expected' is a new binding"
good_example = "const EXPECTED: i32 = 42; match x { EXPECTED => ... } // compares against the constant"
language = "Rust"

[[gotchas]]
title = "Forgetting to handle new enum variants"
explanation = "Adding a variant to an enum with catch-all matches won't produce compile errors. Use #[non_exhaustive] or avoid _ for internal enums."
bad_example = "match color { Red => ..., Blue => ..., _ => ... } // silently catches new Green variant"
good_example = "match color { Red => ..., Blue => ..., Green => ... } // explicit — compiler errors on new variants"
language = "Rust"

[[performance_notes]]
title = "match compiles to jump tables or decision trees"
explanation = "The compiler optimizes match into efficient branching — often a single indexed jump for contiguous integer ranges."
evidence = "Integer match with 10 arms: single jump table instruction vs cascading branches"
language = "Rust"

[[performance_notes]]
title = "Pattern matching on references avoids copying"
explanation = "Matching on &value or ref binding borrows the data instead of moving it. Critical for large types."
evidence = "Zero-copy: matching &String borrows vs matching String moves (and potentially clones)"
language = "Rust"
