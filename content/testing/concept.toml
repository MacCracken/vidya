id = "testing"
title = "Testing"
topic = "Testing"
description = "Verifying that code works correctly and continues to work — unit tests, integration tests, property testing, and the discipline of writing testable code."
tags = ["testing", "unit-tests", "integration-tests", "property-testing", "tdd", "mocking"]

[[best_practices]]
title = "Test behavior, not implementation"
explanation = "Tests should verify what a function does, not how it does it. Implementation-coupled tests break on every refactor without catching real bugs."

[[best_practices]]
title = "One assertion per logical concept"
explanation = "Each test should verify one thing. Multiple unrelated assertions make failures hard to diagnose. Related assertions (e.g., checking a struct's fields) are fine."

[[best_practices]]
title = "Use descriptive test names that read as requirements"
explanation = "Test names should describe the expected behavior: 'parse_returns_error_on_empty_input' not 'test_parse_3'. The test name IS the documentation."

[[best_practices]]
title = "Keep test setup minimal and close to the assertion"
explanation = "If a test needs 50 lines of setup, the code under test has too many dependencies. Refactor for testability, or use builder helpers."

[[gotchas]]
title = "#[should_panic] tests can pass for the wrong panic"
explanation = "A should_panic test passes if ANY panic occurs — even from a different code path than intended. Use #[should_panic(expected = \"...\")] to match the message."
bad_example = "#[should_panic] fn test() { function_that_panics(); }"
good_example = "#[should_panic(expected = \"division by zero\")] fn test() { divide(1, 0); }"
language = "Rust"

[[gotchas]]
title = "Tests share process state"
explanation = "Rust tests run in parallel in the same process. Tests that modify global state (env vars, static muts, files) can interfere with each other."
bad_example = "std::env::set_var(\"MODE\", \"test\"); // races with other tests"
good_example = "Use a struct with the config value, pass it explicitly"
language = "Rust"

[[gotchas]]
title = "Integration tests can't access private items"
explanation = "Files in tests/ are separate crates — they only see the public API. If you need to test internals, use #[cfg(test)] mod tests inside the module."
bad_example = "// tests/test.rs: use mycrate::internal_fn; // error: private"
good_example = "// src/lib.rs: #[cfg(test)] mod tests { use super::*; } // can access privates"
language = "Rust"

[[gotchas]]
title = "Flaky tests from timing or ordering"
explanation = "Tests that depend on execution speed, sleep durations, or specific ordering will fail intermittently. Use deterministic synchronization instead."
bad_example = "thread::sleep(Duration::from_millis(100)); assert!(done.load(Ordering::SeqCst));"
good_example = "done_signal.recv().expect(\"timed out\");"

[[performance_notes]]
title = "Cargo test runs tests in parallel by default"
explanation = "Each test function runs on its own thread. This is fast but means tests must be independent. Use --test-threads=1 for sequential execution."
evidence = "Parallel: N tests complete in ~max(test_times). Sequential: sum(test_times)"
language = "Rust"

[[performance_notes]]
title = "Compilation is the bottleneck for Rust tests"
explanation = "Test execution is usually fast; compilation dominates. Keep test dependencies minimal and use cargo test --no-run to check compilation separately."
evidence = "Typical: 10s compile, 0.1s run. cargo test --no-run catches errors faster"
language = "Rust"

[[performance_notes]]
title = "Property tests are slower but find more bugs"
explanation = "Property testing generates hundreds of random inputs, so it's slower per-test. But it explores edge cases no human would think to write."
evidence = "proptest/quickcheck: ~100-1000 cases per test vs 1 for unit tests"
language = "Rust"
