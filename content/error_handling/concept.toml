id = "error_handling"
title = "Error Handling"
topic = "ErrorHandling"
description = "How programs detect, propagate, and recover from errors — the most important design decision after data modeling."
tags = ["errors", "exceptions", "result", "option", "panic", "try-catch"]
related_topics = ["testing", "design_patterns", "security"]

[[best_practices]]
title = "Use the type system to make errors unignorable"
explanation = "Result<T, E> in Rust, returning error in Go — force callers to handle the error case. Unchecked exceptions hide failure paths."

[[best_practices]]
title = "Distinguish recoverable from unrecoverable errors"
explanation = "Use Result for expected failures (file not found, parse error). Use panic/abort for bugs and invariant violations that indicate programmer error."

[[best_practices]]
title = "Provide context when propagating errors"
explanation = "Wrap errors with context about what operation failed. 'failed to parse config' is more useful than 'unexpected token at line 3'."

[[best_practices]]
title = "Define domain-specific error types"
explanation = "A single Error enum per module/crate lets callers match on specific failure modes instead of parsing error strings."

[[gotchas]]
title = "Unwrap in library code"
explanation = "Using .unwrap() in library code converts recoverable errors into panics, crashing the caller's program. Always propagate with ?."
bad_example = "let file = File::open(path).unwrap();"
good_example = "let file = File::open(path)?;"
language = "Rust"

[[gotchas]]
title = "Ignoring errors with _"
explanation = "Silently discarding Result with let _ = ... hides failures. If you intentionally ignore an error, document why."
bad_example = "let _ = write!(f, \"data\");"
good_example = "write!(f, \"data\").expect(\"writing to String never fails\");"
language = "Rust"

[[gotchas]]
title = "Catching too broadly"
explanation = "except Exception in Python or catch (Exception e) in Java catches everything including bugs you want to see. Catch specific types."
bad_example = "try: ... except Exception: pass"
good_example = "try: ... except (ValueError, KeyError) as e: handle(e)"
language = "Python"

[[gotchas]]
title = "Error strings instead of error values"
explanation = "Returning error strings loses type information. Callers can't match on specific error kinds without string parsing."
bad_example = "if err != nil { return fmt.Errorf(\"failed\") }"
good_example = "if err != nil { return fmt.Errorf(\"reading config: %w\", err) }"
language = "Go"

[[performance_notes]]
title = "Result<T, E> is zero-cost when Ok"
explanation = "Rust's Result has no runtime overhead on the success path — it's a tagged union, not an exception table. The ? operator compiles to a branch."
evidence = "Zero heap allocation, single branch instruction on the happy path"
language = "Rust"

[[performance_notes]]
title = "Exception handling has hidden costs"
explanation = "Throwing exceptions in Python/Java involves stack unwinding and is 10-100x slower than returning error values. Never use exceptions for control flow."
evidence = "Python: raising an exception is ~100x slower than returning None"

[[performance_notes]]
title = "Box<dyn Error> trades specificity for convenience"
explanation = "Trait object errors require heap allocation. For hot paths, use concrete enum errors. For application code, Box<dyn Error> is fine."
evidence = "One heap allocation per error vs zero for enum errors"
language = "Rust"
