id = "performance"
title = "Performance"
topic = "Performance"
description = "Making code faster — profiling before optimizing, understanding hardware, and knowing which micro-optimizations actually matter."
tags = ["performance", "benchmarks", "profiling", "optimization", "cache", "allocation", "simd"]

[[best_practices]]
title = "Profile before optimizing"
explanation = "Intuition about bottlenecks is usually wrong. Measure first with profiling tools (perf, flamegraph, instruments), then optimize the actual hot path."

[[best_practices]]
title = "Optimize allocations before algorithms"
explanation = "For most real-world code, allocation and cache misses dominate. Reducing allocations often yields bigger wins than algorithmic improvements."

[[best_practices]]
title = "Benchmark with realistic data"
explanation = "Micro-benchmarks with toy data mislead. Use production-scale inputs, warm up caches, and measure the metric that matters (latency, throughput, p99)."

[[best_practices]]
title = "Keep hot paths allocation-free"
explanation = "Pre-allocate buffers, reuse collections, use stack allocation. Every heap allocation on a hot path is a performance tax."

[[gotchas]]
title = "Benchmarking optimized-away code"
explanation = "The compiler may eliminate code with no observable side effects. Use black_box() to prevent dead code elimination in benchmarks."
bad_example = "b.iter(|| { let v: Vec<i32> = (0..1000).collect(); }) // may be optimized away"
good_example = "b.iter(|| { std::hint::black_box((0..1000).collect::<Vec<i32>>()) })"
language = "Rust"

[[gotchas]]
title = "Criterion warm-up hides cold-start costs"
explanation = "Criterion warms up before measuring. If your real workload hits cold caches or cold JITs, benchmark results won't reflect reality."
bad_example = "Trusting warm benchmark numbers for cold-start latency"
good_example = "Measure cold start separately: first-iteration timing, not steady-state"
language = "Rust"

[[gotchas]]
title = "Branch prediction effects"
explanation = "Sorted vs unsorted data can cause 5x performance differences due to branch prediction. Profile with realistic data distributions."
bad_example = "Benchmarking only with sorted input when production data is random"
good_example = "Benchmark with both sorted and random data, report both"

[[gotchas]]
title = "Debug vs Release performance"
explanation = "Rust debug builds are 10-100x slower than release. Always benchmark with --release. Never draw conclusions from debug-mode timing."
bad_example = "cargo test && echo 'fast enough'"
good_example = "cargo bench (always uses release profile)"
language = "Rust"

[[performance_notes]]
title = "Cache locality dominates for large data"
explanation = "Sequential memory access (Vec) is dramatically faster than pointer-chasing (LinkedList, HashMap with many collisions) due to CPU cache behavior."
evidence = "Sequential Vec iteration: ~0.25ns/element. LinkedList: ~4-10ns/element (cache misses)"

[[performance_notes]]
title = "Vec vs HashMap for small collections"
explanation = "For collections under ~50 elements, linear search in a Vec is faster than HashMap lookup due to cache locality and hash overhead."
evidence = "Vec linear search < HashMap lookup for N < ~50 (platform dependent)"

[[performance_notes]]
title = "String formatting allocation"
explanation = "format!() always allocates a new String. write!() to a reusable buffer avoids this. On hot paths, the difference is significant."
evidence = "format!: ~50ns + allocation. write! to existing buffer: ~15ns, no allocation"
language = "Rust"

[[performance_notes]]
title = "Clone vs reference in iterators"
explanation = "Cloning inside .map() on large types allocates per element. Borrow where possible; clone only when ownership is truly needed."
evidence = "iter().cloned() on 1000 Strings: ~1000 allocations. iter() with references: zero"
language = "Rust"
