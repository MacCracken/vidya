id = "input_output"
title = "Input/Output"
topic = "InputOutput"
description = "Reading and writing data — files, streams, network sockets, and the abstractions that make them composable."
tags = ["io", "files", "streams", "network", "stdin", "stdout", "buffering", "sockets"]

[[best_practices]]
title = "Buffer I/O operations"
explanation = "Unbuffered I/O makes a syscall per byte. Buffered I/O batches into larger chunks — often 100x faster for small writes."

[[best_practices]]
title = "Close resources explicitly"
explanation = "File descriptors are limited. Leaking them causes 'too many open files' errors. Use RAII, defer, or context managers."

[[best_practices]]
title = "Handle partial reads and writes"
explanation = "read() and write() may transfer fewer bytes than requested. Always check the return value and loop until complete."

[[best_practices]]
title = "Use streaming for large data"
explanation = "Don't load a 10GB file into memory. Process line-by-line or chunk-by-chunk. Streaming keeps memory usage constant."

[[gotchas]]
title = "Forgetting to flush buffered output"
explanation = "Buffered writers don't send data until the buffer is full or explicitly flushed. Program crashes can lose buffered data."
bad_example = "write(data); // still in buffer — crash loses it"
good_example = "write(data); flush(); // data is on disk"

[[gotchas]]
title = "Blocking I/O stalls the thread"
explanation = "A read() on a socket blocks until data arrives. Use non-blocking I/O, async, or threads to avoid freezing the program."
bad_example = "let data = socket.read(); // blocks forever if no data"
good_example = "Use async, select/poll/epoll, or set timeouts"

[[gotchas]]
title = "Text encoding assumptions"
explanation = "Not all files are UTF-8. Reading binary data as text corrupts it. Always know your encoding or treat as bytes."
bad_example = "String content = readFile(path); // assumes UTF-8"
good_example = "byte[] raw = readFileBytes(path); // handle encoding explicitly"

[[gotchas]]
title = "Path handling across platforms"
explanation = "/ vs \\ separators, case sensitivity, max path length — all differ by OS. Use the language's path abstraction."
bad_example = "open(\"data\\\\file.txt\") // Windows-only"
good_example = "open(Path::join(\"data\", \"file.txt\")) // portable"
language = "Rust"

[[performance_notes]]
title = "Buffered I/O: 4KB-64KB buffers are optimal"
explanation = "Match the OS page size (4KB) or filesystem block size. Larger buffers have diminishing returns."
evidence = "BufWriter with 8KB buffer: ~50x faster than unbuffered for small writes"

[[performance_notes]]
title = "mmap for random access of large files"
explanation = "Memory-mapped files let the OS handle paging. Faster than seek+read for random access patterns."
evidence = "mmap random reads: ~2x faster than seek+read for large files"

[[performance_notes]]
title = "writev/readv: scatter-gather I/O"
explanation = "Write multiple non-contiguous buffers in a single syscall. Avoids copying into a contiguous buffer first."
evidence = "writev with 10 segments: 1 syscall vs 10 separate write() calls"

[[performance_notes]]
title = "stdout is line-buffered to terminals, fully buffered to pipes"
explanation = "Programs behave differently in pipes vs interactive use. Explicitly flush when you need immediate output."
evidence = "Unflushed stdout in a pipe: output appears only at program exit or buffer full (~4KB)"
