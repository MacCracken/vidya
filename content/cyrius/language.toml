[[entries]]
name = "enum_namespacing"
description = "Enum.VARIANT syntax — qualified enum access in all expression contexts (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    enum Color { RED; GREEN; BLUE; }
    var c = Color.RED;
    if (c == Color.BLUE) { ... }
    fn paint(color) { return color == Color.GREEN; }

SEMANTICS:
    Enum.VARIANT works everywhere an expression is valid: assignments,
    comparisons, function arguments, return values, array indices.

    The parser resolves Enum.VARIANT by checking if the identifier after
    the dot is a global variable (which enum variants are compiled as).
    If it is, the dot expression is treated as an enum variant access.
    If not, it falls back to struct field access.

IMPLEMENTATION:
    No enum metadata table needed. Enum variants are already compiled as
    global variables (e.g., Color_RED). The parser just needs to recognize
    the Enum.VARIANT pattern and map it to the global variable name.

    This is intentionally simple — no type checking, no enum-specific
    lookup tables. The existing global variable mechanism does all the work.

KEY LESSON:
    When the existing infrastructure (global vars) already handles the
    underlying mechanism, the language feature is just syntactic sugar
    in the parser. No new tables, no new passes, no new complexity.
'''

[[entries]]
name = "relaxed_fn_ordering"
description = "fn definitions can appear after top-level statements (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    var x = 42;
    print_i64(x);      # top-level statement
    fn helper(a) {     # fn defined AFTER top-level code
        return a * 2;
    }

SEMANTICS:
    Prior to v1.10.0, all fn definitions had to appear before any top-level
    statements. Now fn definitions can be freely interleaved with top-level
    code. Forward calls already worked (two-pass compilation), so this only
    affected fn definitions appearing physically after executed statements.

IMPLEMENTATION:
    PARSE_PROG handles `fn` tokens by:
    1. Emitting a jmp instruction to jump over the function body
    2. Compiling the function body normally (same as before)
    3. Patching the jmp to land after the function body

    This is the same jmp-over pattern used for if/else blocks. The function
    body is compiled in place but execution skips over it via the jump.

KEY LESSON:
    Non-invasive change. The jmp-over-body pattern is already well-tested
    in the compiler for other constructs. Reusing it for fn ordering means
    no new mechanisms and no risk to existing code generation.
'''

[[entries]]
name = "ret2_rethi"
description = "Return two values via rax:rdx register pair (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    fn divmod(a, b) {
        var q = a / b;
        var r = a % b;
        ret2(q, r);        # return two values: rax=q, rdx=r
    }
    var result = divmod(17, 5);   # rax = 3 (quotient)
    var remainder = rethi();      # rdx = 2 (remainder)

SEMANTICS:
    ret2(a, b) packs two values into the rax:rdx register pair and returns.
    The first argument goes to rax (normal return), the second to rdx.
    rethi() retrieves the second return value from rdx (mov rax, rdx).

    This follows the System V AMD64 ABI convention where functions can
    return two 64-bit values in rax and rdx.

IMPLEMENTATION:
    Tokens: ret2 = 97, rethi = 98
    Handled in PARSE_SIMD_EXT (the extended keyword handler).

    ret2(a, b):
      1. Evaluate b → rax
      2. mov rdx, rax    # second value in rdx
      3. Evaluate a → rax  # first value in rax
      4. Emit function return (epilogue + ret)

    rethi():
      1. mov rax, rdx    # move second return value to rax

KEY LESSON:
    Simple two-register return is sufficient for many cases (divmod,
    pointer+length, success+value). No need for struct returns or
    output parameters for the common two-value case.
'''

[[entries]]
name = "ref_directive"
description = "#ref directive — compile-time TOML loading (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    #ref "config.toml"
    # If config.toml contains:
    #   width = 800
    #   height = 600
    # Then after preprocessing, the source contains:
    #   var width = 800;
    #   var height = 600;

SEMANTICS:
    #ref "file.toml" loads a TOML file at compile time and emits
    var declarations for each key-value pair. Skips comments (#),
    section headers ([section]), and blank lines. String values
    become string literals, numeric values become integer literals.

IMPLEMENTATION:
    PP_REF_PASS runs as a separate preprocessing pass BEFORE PP_PASS.
    This ordering is critical — #ref must expand before #ifdef and
    other preprocessor directives see the generated var declarations.

    ISREF() detects the #ref directive in the source.
    The pass reads the TOML file, parses key = value lines,
    and emits `var key = value;` for each valid entry.

KEY LESSON:
    PP_PASS was already too large to add new inline code. Attempting to
    add #ref handling inside PP_PASS hit code generation size limits.
    The solution was a separate pre-pass (PP_REF_PASS) that runs first.
    This is the same pattern used for PP_IFDEF_PASS and PP_DERIVE passes:
    when a pass gets too big, split into a new pass that runs at a
    different stage in the pipeline.
'''

[[entries]]
name = "f64_atan_and_math_lib"
description = "f64_atan builtin and lib/math.cyr transcendental library (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    var angle = f64_atan(slope);        # builtin: arctangent
    var s = sinh(x);                     # lib/math.cyr
    var c = cosh(x);                     # lib/math.cyr
    var t = tanh(x);                     # lib/math.cyr
    var p = pow(base, exp);             # lib/math.cyr
    var v = clamp(x, lo, hi);          # lib/math.cyr
    var m = min(a, b);                  # lib/math.cyr
    var M = max(a, b);                  # lib/math.cyr

IMPLEMENTATION:
    f64_atan is token 99, handled in PARSE_SIMD_EXT.
    Uses x87 FPU instructions: fld1 + fpatan.
    This computes atan(ST(1)/ST(0)) which gives atan(x/1) = atan(x).

    lib/math.cyr provides higher-level math functions composed from
    existing builtins:
      sinh(x) = (f64_exp(x) - f64_exp(f64_neg(x))) / 2
      cosh(x) = (f64_exp(x) + f64_exp(f64_neg(x))) / 2
      tanh(x) = sinh(x) / cosh(x)
      pow(b,e) = f64_exp(f64_mul(e, f64_log(b)))
      clamp/min/max = straightforward comparisons

KEY LESSON:
    The x87 FPU transcendentals (fpatan, fsin, fcos, fsqrt) are the most
    compact way to implement these — single instructions vs. Taylor series
    or lookup tables. The lib/math.cyr functions then compose from builtins,
    keeping the compiler small while providing a rich math library.
'''

[[entries]]
name = "continue_in_for_loops"
description = "continue statement with forward-patch mechanism for for-loops (v1.11.0)"
category = "cyrius"
content = '''
SYNTAX:
    for (var i = 0; i < 10; i = i + 1) {
        if (i == 5) { continue; }
        print_i64(i);
    }

SEMANTICS:
    continue skips the rest of the loop body and jumps to the step
    expression (i = i + 1) in for-loops, or to the condition check
    in while-loops.

IMPLEMENTATION:
    Forward-patch mechanism at S+0x8F850 (continue target address).
    Array of up to 8 continue patches stored at S+0x8F858.

    For-loop compilation:
    1. Compile init (var i = 0)
    2. Emit condition check (i < 10)
    3. Compile body — any `continue` emits a jmp with placeholder
       and records the patch location in the array
    4. After body, record current position as the step expression start
    5. Compile step (i = i + 1)
    6. Patch all continue jmps to point to step expression

CRITICAL BUG (v1.11.0 — fixed v1.11.4):
    The continue patch counter was at S+0x8F850, and the continue patch
    array at S+0x8F858. But the &&/|| extra_patches array starts at
    S+0x8F848 and grows upward (8 entries × 8 bytes = 64 bytes, to 0x8F888).

    With `a && b` (1 chained &&), ADDXP writes to 0x8F848+0*8=0x8F848 — safe.
    With `a && b && c` (2 chained &&), ADDXP writes to 0x8F848+1*8=0x8F850 —
    OVERWRITES the continue counter with a code buffer offset.

    When the for-loop closes, it reads L64(0x8F850)-1 as the continue count.
    The corrupted value (~36000 for large programs) causes iteration through
    unmapped memory in EPATCH → SIGSEGV. Small programs survive because the
    corrupted count stays within mapped heap.

    Fix (v1.11.4): Relocated continue data from 0x8F850/0x8F858 to
    0x8F8A0/0x8F8A8 — after the extra_patches region.

    v1.11.5 added overflow guards: ADDXP now checks c >= 8, continue
    patches check ci >= 8. Both error cleanly instead of silent overflow.

KEY LESSON:
    The compiler uses a flat heap region for state variables. There is no
    allocation tracking — offsets are chosen manually. When adding new
    state, you MUST check what already lives at nearby addresses. A map
    of heap offset usage would prevent these silent collisions.

    Bug #14 was a 16-byte overlap that went undetected across 4 releases
    because the crash only manifested when: (1) triple && was used inside
    a for-loop, AND (2) the program was large enough that the corrupted
    counter caused reads past the brk boundary. Both conditions were
    required — isolated tests passed.
'''

[[entries]]
name = "multi_width_types"
description = "v2.0: Multi-width types (i8, i16, i32) with width-correct codegen"
category = "cyrius"
content = '''
SYNTAX:
    var x: i8 = 42;       # 1-byte variable
    var y: i16 = 30000;   # 2-byte variable
    var z: i32 = 100000;  # 4-byte variable
    var w: i64 = 0;       # explicit 8-byte (same as untyped)
    var u: u128 = 0;      # 16-byte (storage only, arithmetic TBD)

SEMANTICS:
    Type annotations control BOTH storage size AND load/store width.
    var x: i8 = 256; → stores 0 (truncated to 1 byte).
    Reading x back gives 0 (movzx zero-extends to rax).

    Globals: var_sizes[idx] = 1/2/4/8/16 (actual byte allocation in data section).
    Locals: 8-byte stack slots, but loads/stores use correct width within the slot.

CODEGEN:
    EVLOAD_W(S, idx, width) / EVSTORE_W(S, idx, width) for globals.
    EFLLOAD_W(S, idx, width) / EFLSTORE_W(S, idx, width) for locals.
    Width 1: movzx rax, byte [addr] / mov byte [addr], al
    Width 2: movzx eax, word [addr] / mov word [addr], ax
    Width 4: mov eax, [addr]        / mov dword [addr], eax
    Width 8: mov rax, [addr]        / mov qword [addr], rax (default)

DISAMBIGUATION:
    Type IDs 1-8 overlap with struct IDs (also start at 1). Resolved via
    var_sizes: if var_sizes[idx] < 8, it is a scalar type. Structs always
    have var_sizes >= 8 (minimum 1 field × 8 bytes).

BACKWARD COMPATIBLE:
    Untyped variables remain i64. The compiler source uses no type annotations.
    Self-hosting produces identical output. Two-step bootstrap required after
    codegen changes (width-correct load/store functions are new code).
'''

[[entries]]
name = "sizeof_operator"
description = "v2.0: sizeof(Type) compile-time constant"
category = "cyrius"
content = '''
SYNTAX:
    var n = sizeof(i8);      # 1
    var n = sizeof(i16);     # 2
    var n = sizeof(i32);     # 4
    var n = sizeof(i64);     # 8
    var n = sizeof(u128);    # 16
    var n = sizeof(Point);   # recursive struct size

IMPLEMENTATION:
    Detected in PARSE_FACTOR as an identifier matching "sizeof" (6-byte packed
    comparison on L64 of tok_names). NOT a lexer keyword — the klen=6 lexer
    keyword block had a code size issue that silently dropped sizeof recognition.
    Identifier-based detection in the parser is more robust.

    Parses: sizeof ( TypeName ) → EMOVI(S, size)
    For scalars: direct byte width.
    For structs: calls STRUCTSZ(S, sid-1) which recursively sums field widths.
    For u128: token 105 handled as special case.
'''

[[entries]]
name = "unions"
description = "v2.0: union keyword — all fields at offset 0, size = max field"
category = "cyrius"
content = '''
SYNTAX:
    union Value {
        as_int;
        as_ptr;
    }

SEMANTICS:
    All fields share offset 0. sizeof(Value) = max(sizeof(field)).
    Field access: v.as_int and v.as_ptr read from the same memory.
    Init: var v = Value { 42, 42 }; (all fields, like struct init).

IMPLEMENTATION:
    Token 101 (UNION). Parsed by PARSE_UNION_DEF — same as PARSE_STRUCT_DEF
    but sets high bit (bit 63) of struct_fcounts as union flag.
    ISUNION(S, si) checks bit 63. FIELDOFF returns 0 for all union fields.
    STRUCTSZ returns max field size instead of sum.
    Struct tables (fnames, ftypes) are shared — unions are structs internally.
'''

[[entries]]
name = "bitfield_builtins"
description = "v2.0: bitget/bitset/bitclr — inline bit manipulation"
category = "cyrius"
content = '''
SYNTAX:
    var pte = 0x1007;
    var present = bitget(pte, 0, 1);    # extract 1 bit at offset 0
    pte = bitset(pte, 12, 40, 0x2);     # set 40 bits at offset 12
    pte = bitclr(pte, 0, 3);            # clear 3 bits at offset 0

SEMANTICS:
    bitget(val, offset, width) → (val >> offset) & ((1 << width) - 1)
    bitset(val, offset, width, new) → (val & ~(mask << offset)) | ((new & mask) << offset)
    bitclr(val, offset, width) → val & ~(((1 << width) - 1) << offset)

IMPLEMENTATION:
    Tokens 102-104. Handled in PARSE_SIMD_EXT.
    bitget: inline shift/mask using ESPILL/EUNSPILL (works at top level).
    bitset/bitclr: use EFLSTORE/EFLLOAD for temp slots (MUST be inside a function).
    Calling bitset/bitclr at top level emits: "must be called inside a function".

REPLACES:
    Manual patterns like: var present = (pte >> 0) & 1;
    var addr = (pte >> 12) & 0xFFFFF;
    Used in AGNOS kernel for PTE, GDT, IDT descriptor manipulation.
'''

[[entries]]
name = "struct_field_widths"
description = "v2.0: Struct fields with typed widths for packed layouts"
category = "cyrius"
content = '''
SYNTAX:
    struct Packet {
        tag: i8;       # 1 byte
        len: i16;      # 2 bytes
        data: i32;     # 4 bytes
        payload;       # 8 bytes (default, untyped)
    }
    # sizeof(Packet) = 1 + 2 + 4 + 8 = 15

IMPLEMENTATION:
    Field type stored in struct_ftypes as negative width:
      0  = untyped scalar (8 bytes)
      >0 = nested struct ID
      -1 = i8, -2 = i16, -4 = i32, -8 = explicit i64

    FIELDSZ(S, ft): returns byte size from type encoding.
    STRUCTSZ and FIELDOFF use FIELDSZ for each field.
    Field loads: width-correct (movzx for i8/i16, mov for i32/i64).
    Field stores: width-correct in PARSE_FIELD_STORE.
    Struct init (EMIT_STRUCT_FIELD): still uses 8-byte stores (TODO: width-correct).
'''

[[entries]]
name = "expression_type_propagation"
description = "v2.0: Track expression width, warn on narrowing assignments"
category = "cyrius"
content = '''
MECHANISM:
    GEXW(S) / SEXW(S, v) at heap offset 0x903F0.
    PARSE_FACTOR sets expr_width when loading a typed variable.
    Assignment checks: if target width < expr_width, emit warning:
      "warning:N: narrowing assignment (value may truncate)"

EXAMPLE:
    var big: i32 = 1000;
    var small: i8 = 0;
    small = big;          # warning: narrowing assignment

    The assignment still succeeds (truncates to i8), but the warning
    alerts the developer to potential data loss.

SCOPE:
    Warnings only on reassignment (PARSE_STMT assignment path), not on
    initialization (PARSE_VAR). Initialization is an explicit choice.
    Works for both locals (GLTYPE check) and globals (var_sizes check).
'''

[[entries]]
name = "tcyr_bcyr_test_format"
description = "v2.0: .tcyr/.bcyr test and bench file format with auto-discovery"
category = "cyrius"
content = '''
TEST FILES (.tcyr):
    Regular .cyr files with assert.cyr conventions.
    `cyrb test` auto-discovers in tests/, tests/tcyr/, src/.
    Metadata comments:
      # skip: reason      — skip this test
      # expect: N         — expected exit code (default 0)
    assert_summary() output is parsed for pass/fail counts.
    test_group("name") prints section headers.

BENCH FILES (.bcyr):
    Regular .cyr files with bench.cyr conventions.
    `cyrb bench` auto-discovers in benches/, tests/bcyr/.

RUNNER FLAGS:
    cyrb test --verbose   — show full test output
    cyrb test --filter X  — run only matching files

BUILD OUTPUT:
    cyrb build src.cyr out  — shows: src -> out  N bytes  Nms  [arch]
    cyrb build -v ...       — also shows individual warnings

AUDIT:
    cyrb audit / sh scripts/check.sh
    5 stages: self-hosting, heap map, .tcyr suite, format, lint.

REPLACED: compiler.sh (216 tests), programs.sh (51 tests), assembler.sh.
Clean break for v2.0.
'''

[[entries]]
name = "findvar_last_match"
description = "v2.1: FINDVAR returns last match — fixes var buf[N] sharing across functions"
category = "cyrius"
content = '''
BUG: Functions with same-named array (var buf[N]) shared the same global.
ROOT CAUSE: FINDVAR scanned variable table forward, returning first match.
  When two functions both declared `var buf[256]`, the second function's
  `buf` resolved to the first function's allocation.

FIX: FINDVAR now scans in reverse (last match wins). Each function's array
  shadows previous declarations of the same name.
  Also fixed: PARSE_ARRAY name mangling for FINDVAR compatibility.

IMPACT: Fixed 4+ downstream bugs:
  - Bug #16: var buf[N] shared across functions
  - Bug #22: fmt_int / sakshi garbled output
  - stdlib crashes (math, matrix, regex) — all resolved
  - Any program using var buf[N] in multiple functions

VERIFICATION: Two-step self-hosting. All .tcyr tests pass.
'''

[[entries]]
name = "include_path_fallback"
description = "v2.1: Include path fallback to ~/.cyrius/lib/ via /proc/self/environ"
category = "cyrius"
content = '''
BUG: Projects with local lib/ directory shadowed Cyrius stdlib.
  `include "lib/string.cyr"` found the project's lib/ not the stdlib.

FIX: Compiler reads HOME from /proc/self/environ, falls back to
  $HOME/.cyrius/lib/ when local path fails. Function: _init_cyrius_lib.

PORTABILITY: Linux-only (/proc/self/environ). AGNOS kernel has no proc.
  Kernel mode skips fallback (kernel programs bundle all includes).
'''

[[entries]]
name = "gt6_args_fix"
description = "v2.2: >6 function arguments fixed on x86_64 and aarch64"
category = "cyrius"
content = '''
X86_64 (v2.2.0):
  Left-to-right push + top-6 pop reversed arg mapping for >6 args.
  Fix: ECALLPOPS saves extras to r11-r14, pops 6 regs, pushes extras back.
  ESTORESTACKPARM loads from [rbp+16+n*8].

AARCH64 (v2.6.2):
  ECALLPOPS was capping at 6 args and ignoring extras.
  ESTOREPARM checked pidx<8 (never hitting stack path) — fixed to pidx<6.
  Fix: ECALLPOPS saves extras to x9-x12, pops 6 register args, pushes back.
  ESTORESTACKPARM loads from [x29+16+n*16].
  ECALLCLEAN adjusts sp after call.

NOTE: `return fn7(...)` returns wrong value on x86. Workaround:
  `var r = fn7(...); return r;`
LIMIT: Max 10 args (4 extras in r11-r14/x9-x12).
'''

[[entries]]
name = "fcyr_fuzz_format"
description = "v2.3: .fcyr fuzz file format with auto-discovery"
category = "cyrius"
content = '''
New file extension for fuzz harnesses. `cyrius fuzz` auto-discovers fuzz/*.fcyr.
Each harness is a regular .cyr file that exercises a module with stress patterns.
Exit 0 = pass, non-zero = fail, 139 = crash.

Ships with: hashmap.fcyr, vec.fcyr, string.fcyr, freelist.fcyr.

`cyrius fuzz --compiler [N]` still available for mutation fuzzing the compiler.
`cyrius fuzz` runs project-level harnesses.
'''

