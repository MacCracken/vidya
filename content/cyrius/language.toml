  cyrius soak 10 "repo1 repo2"  # custom repo list

For v3.0 release: require `cyrius soak 1000` with 0 failures.
Catches: non-determinism, memory leaks, state corruption, codegen drift.
'''

[[entries]]
name = "object_directive"
description = "v2.6: object; directive for ELF .o relocatable output (multi-file Phase 1)"
category = "cyrius"
content = '''
`object;` at the top of a .cyr file triggers ELF .o relocatable output.
Sets kernel_mode=3. The compiler emits proper ELF with sections:
  .text (code), .data (variables), .rodata (strings),
  .symtab (symbols), .strtab (symbol names), .rela.text (relocations)

Functions become STT_FUNC/STB_GLOBAL symbols. Fixup entries converted:
  type 0 (var addr)   → R_X86_64_64 against .data
  type 1 (string addr) → R_X86_64_64 against .rodata
  type 2 (fn call)    → R_X86_64_PC32 against function symbol
  type 3 (fn pointer) → R_X86_64_64 against function symbol

Internal fixup resolution skipped — addresses left unresolved for linker.
Verified with readelf. Phase 2 (minimal linker) planned for v3.0.
'''

[[entries]]
name = "str_data_expansion"
description = "v2.6-2.7: String data buffer expanded 8KB→16KB→32KB"
category = "cyrius"
content = '''
The compiler's string literal buffer (at 0x68000 in the heap) was too small
for large programs with many string literals.

HISTORY:
  v2.6.4: 8KB→16KB (str_pos relocated 0x69800→0x6C000). Fixed agnostik
    test suite (198 tests, >8KB of assertion strings).
  v2.7.1: 16KB→32KB (str_pos relocated 0x6C000→0x70000). Fixed libro
    test suite (193 tests with streaming module added).

DETECTION: v2.7.0 added bounds check in lexer:
  if (spos >= 32768) { ERR("string data buffer full (32KB limit)"); }

SYMPTOMS of overflow: garbled string output, wrong assertion messages,
silent test failures that pass in isolation but fail in full suite.

KEY LESSON: Buffer sizes that are "enough for now" become time bombs.
The 8KB limit was set when the largest program had <50 string literals.
agnostik had 500+, libro had 700+.
'''

