[[entries]]
name = "atoi_stdlib"
description = "v2.7: atoi() added to string.cyr — parse decimal string to integer"
category = "cyrius"
content = '''
fn atoi(s) — parse null-terminated decimal string to integer.
Handles negative numbers (leading -). Returns 0 for invalid input.
Stops at first non-digit character.

Usage: var n = atoi("42");   # returns 42
       var n = atoi("-7");   # returns -7
       var n = atoi("12abc"); # returns 12
       var n = atoi("abc");  # returns 0

Added to lib/string.cyr. Previously every project that needed CLI arg
parsing had to implement its own integer parser.
'''

[[entries]]
name = "tail_call_gt6_fix"
description = "v2.7: return fn(>6 args) tail call fix — stack args preserved"
category = "cyrius"
content = '''
BUG: `return f7(1,2,3,4,5,6,7)` returned wrong value (22 instead of 28).
The tail call optimization (ETAILJMP) destroyed the stack frame before
jumping, clobbering the 7th argument which was on the stack.

FIX: For >6 args, the parser now emits a normal call+return instead of
tail call. ECALLPOPS moves args to registers, ECALLFIX calls the function,
ECALLCLEAN adjusts sp, then a return-patch jump goes to the epilogue.

Tail call still used for ≤6 args where all args fit in registers.
The `var r = fn7(...); return r;` workaround is no longer needed.
'''

[[entries]]
name = "soak_test_command"
