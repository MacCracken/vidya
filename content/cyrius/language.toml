# Cyrius Language Reference
# This is the canonical reference for the Cyrius programming language.
# Any agent reading this should be able to write Cyrius programs,
# modify the compiler, build kernels, and port to new architectures.

[[entries]]
name = "overview"
description = "Cyrius is a sovereign self-hosting systems language. Assembly up."
category = "cyrius"
content = '''
Cyrius is a self-hosting compiler that bootstraps from a 29KB binary seed.
No Rust, no LLVM, no Python. Just sh + Linux x86_64.

Default type is i64. Multi-width types: var x: i8 = 42; var y: i16 = 1000;
var z: i32 = 0; — width-correct loads (movzx) and stores. sizeof(Type) operator.
Type annotations enable width-correct codegen; untyped variables remain i64.
f64 supported as bit patterns via 20+ f64_* builtins (SSE2/SSE4.1/x87).

The compiler binary is `cc5` (renamed from cc3 at v5.0.0). 488,864 B x86_64, 10 modules
(frontend/lex + frontend/parse + backend/x86/* + backend/aarch64/* + backend/cx +
backend/macho + backend/pe + common/ir + cc compatibility layer). Self-hosts
byte-identical (two-step + three-step verify). Cross-compiles to aarch64 via
`src/main_aarch64.cyr` (488KB → ~347KB aarch64 native cross). Apple Silicon
Mach-O self-hosts byte-identically (v5.3.13); compiler-driven libSystem imports
landed v5.5.12 (`__DATA_CONST` + `__got` + LC_DYLD_INFO_ONLY). Windows PE32+
self-hosts natively byte-identical (v5.5.10 — `cc5_win.exe` on Windows 11
produces output matching Linux cross-build byte-for-byte).

Build: sh bootstrap/bootstrap.sh (40ms)
Compile: cyrius build src/main.cyr build/myapp   (auto-resolves deps from cyrius.cyml)
Test: cyrius test src/test.cyr
Audit: sh scripts/check.sh (self-host + heap + 73 .tcyr + fmt + lint; 14 gates, v5.5.27)
Version: cc5 --version → "cc5 5.5.27\n" (x86_64 Linux default).
        cc5_aarch64 (Linux aarch64 cross). cc5_win 5.5.27 (Windows x86_64 PE;
        native self-host v5.5.10+).
Strict: cc5 --strict (v5.4.19; undefined-fn warnings become hard errors)

IMPORTANT: Never use raw `cat file | cc5` for projects. Always use `cyrius build`
which resolves deps from cyrius.cyml and auto-prepends includes. Raw cc5 misses
namespaced deps (lib/{depname}_{basename}) and produces undefined variable errors.
Raw cc5 is only for: compiler self-hosting, one-liner tests, bootstrap chain.

Source: src/main.cyr (entry) + src/frontend/*.cyr + src/backend/*.cyr + src/common/*.cyr
Version: 5.5.27 — 73 .tcyr test files, 5 fuzz harnesses, 16 benchmarks, heap audit,
self-hosting byte-identical. 59+ stdlib modules including the v5.5.26/v5.5.27 NSS
identity quartet (lib/pwd.cyr + lib/grp.cyr + lib/shadow.cyr + lib/pam.cyr — pure-
cyrius musl-pattern readers that bypass glibc NSS for getpwuid/getgrouplist/pam
semantics; unix_chkpwd fork for non-root auth) + 6 deps (sakshi, patra at 1.5.5 via
cyrius distlib, sigil 2.9.x with HKDF/SHAKE/SHA-512, yukti, mabda, sankoch). Compiler:
488,864 B x86_64 (cc5 5.5.27), ~347KB aarch64 cross, ~554KB cc5_win (Windows PE
cross; native self-host on Win11 v5.5.10+).
Frontend/backend/common architecture.
Compound assignment (+=, -=, *=, %=), negative literals, undefined function
diagnostic (escalatable via --strict). Multi-width types (i8/i16/i32/i64),
sizeof, unions, bitfield builtins, defer (all exit paths, per-flag). Struct
field widths, expression type propagation, narrowing warnings. Struct
initializer syntax, native multi-return, short-circuit && / ||, expression-
position comparisons.
#regalloc directive (per-fn opt-in: routes hot local to rbx via post-emit peephole
with width-aware safety abort, ~12% on nested accumulators).
#ifplat PLAT / #endplat (v5.4.19; sugar for #ifdef CYRIUS_ARCH_<UPPER> — supports
x86 and aarch64 today, falls closed on unknown plat). Coexists with existing #ifdef.
#pe_import("kernel32.dll", "Symbol") (v5.4.6; PE IAT symbol registration).
#derive(accessors/Serialize) with single-pass JSON deserializer.
secret var (v5.3.5; constant-time comparison helper for sigil PQC).
u128 hardware fast-path (b_hi==0 → two asm divs, ~12× on Miller-Rabin).
Keccak-f[1600] + SHAKE-128/256 in lib/keccak.cyr (v5.4.15; NIST-verified; 262µs 4KB).
fncall0..fncall8 in lib/fnptr.cyr (v5.4.13 lifted ceiling 6→8). C FFI via shims
for struct-by-value / float / variadic / aarch64 7-8 arg — see docs/ffi/.

1MB codebuf, 128KB tok_names, 4096 functions, 8192 variables, 262K tokens,
512KB input, 256KB str_data, 16384 fixups, 64 structs. Capacity meter
(CYRIUS_STATS=1, default 85% warnings, cyrius capacity subcommand).
Heap map: brk 0x150B000 (21MB), aarch64 synced. Integrity: tests/heapmap.sh
(43 regions, 0 overlaps, 0 warnings).
Dependencies via cyrius.cyml [deps] — git fetch + symlink into lib/. yukti-style
single-file dist bundle is the stdlib-dep convention (dist/<name>.cyr).
[release] table in cyrius.cyml (v5.4.18) — single source of truth for toolchain
bins/scripts consumed by release.yml + install.sh + pulsar.cyr.
Constant folding, tail call opt, DCE (bitmap O(T+N)), jump tables (dense
switches), dead-store elimination. Return-by-value small structs (ret2/rethi).
IR layer (v5.0.0): 40 opcodes, CFG, LASE, DBE. Per-arch asm dispatch via
#ifdef CYRIUS_ARCH_{X86,AARCH64} (v5.3.16); new consumers should prefer
#ifplat syntax (v5.4.19).
Inline small fns (2 params, 16 tokens via token replay).
PIC codegen for object; mode (LEA + R_X86_64_PC32, no DT_TEXTREL — glibc 2.38+
dlopen-safe). _cyrius_init export wraps top-level code as a callable function
in object; mode; STB_GLOBAL binding (v5.4.9 fix).
Overflow guards on 6 arrays. argonaut (6257 lines, 424 tests) + libro (240
tests) + kybernet (140 tests) + hadara (329 tests) + ai-hwaccel (491 tests) compile.
Dynamic library loading: lib/dynlib.cyr (pure Cyrius ELF .so loader via mmap).
Threading: lib/thread.cyr (v5.4.10 x86 + v5.4.11 aarch64 post-clone trampoline).
Hashmap: lib/hashmap.cyr with map_new() (cstr keys, legacy) + map_new_str()
(Str keys, v5.4.14; content-hashed via hash_str_v, fixes ~3% entry-loss bug).
'''

[[entries]]
name = "syntax"
description = "Complete Cyrius language syntax reference"
category = "cyrius"
content = '''
VARIABLES:
    var x = 42;            # scalar (8 bytes)
    var x: i64 = 42;       # with type annotation (no enforcement)
    var buf[256];           # array (256 BYTES, not elements)
    x = x + 1;             # reassignment

FUNCTIONS:
    fn add(a, b) { return a + b; }
    var r = add(20, 22);
    # Up to 6 register params, 7+ on stack
    # Forward calls work (call functions defined later)

CONTROL FLOW:
    if (x == 1) { ... } elif (x == 2) { ... } else { ... }
    while (cond) { ... }
    for (var i = 0; i < 10; i = i + 1) { ... }
    break;    # exit loop
    continue; # skip to next iteration

OPERATORS:
    + - * / %              # arithmetic
    == != < > <= >=        # comparison
    & | ^ ~ << >>          # bitwise
    && ||                  # logical (short-circuit, chainable)

MEMORY:
    store8(&buf, 65);  load8(&buf);     # byte
    store16/32/64      load16/32/64     # 16/32/64-bit

POINTERS:
    var p = &x;        # address-of
    var v = *p;        # dereference
    *p = 99;           # write through pointer
    var p: *i64 = &buf; *(p + 1);  # typed (scales by element size)

STRUCTS:
    struct Point { x; y; }
    var p = Point { 10, 20 };
    p.x = 42;
    struct Rect { tl: Point; br: Point; }  # nested
    var r = Rect { 0, 0, 10, 5 };
    r.br.x;  # chained dot access

STRINGS:
    "hello\n"  # null-terminated, escapes: \n \t \0 \\ \"
    syscall(1, 1, "hello", 5);

SYSCALLS:
    syscall(1, 1, buf, len);   # write
    syscall(0, 0, buf, len);   # read
    syscall(60, code);         # exit

INCLUDES:
    include "lib/string.cyr"   # textual inclusion (relative to cwd)

INLINE ASM:
    asm { 0x90; }              # raw bytes
    asm { cli; sti; hlt; }     # mnemonics
    asm { mov cr3, rax; }      # privileged
    asm { lgdt [rax]; }        # descriptor tables

KERNEL MODE:
    kernel;                    # emit bare-metal multiboot1 ELF
'''

[[entries]]
name = "compiler_architecture"
description = "How the cc2 compiler is structured: modules, passes, heap layout"
category = "cyrius"
content = '''
MODULES (included by cc2.cyr):
    util.cyr   — state accessors (GCP, GTI, GVCNT...), helpers (PRNUM, ERR)
    emit.cyr   — x86_64 instruction emission (EB, EMOVI, ESPILL, EUNSPILL, EADDR...)
    jump.cyr   — conditional/unconditional jumps (EJCC, EJMP, EPATCH)
    lex.cyr    — tokenizer (ADDTOK, LEXNUM, LEXID, LEXKW_EXT, LEX, PREPROCESS)
    parse.cyr  — parser + codegen (PARSE_EXPR, PARSE_STMT, PARSE_FN_DEF, PARSE_SIMD_EXT...)
    fixup.cyr  — address fixup + ELF emission (FIXUP, EMITELF)

COMPILATION FLOW:
    1. Read stdin into input buffer (131072 bytes at S+0)
    2. PREPROCESS: expand include directives
    3. LEX: tokenize into tok_types/tok_values arrays (32768 slots)
    4. Pass 1: scan struct/fn/var declarations (register names, skip fn bodies)
    5. Pass 2: parse fn bodies (all globals already registered)
    6. Emit jmp over fn bodies → parse fn defs → patch jmp
    7. EMIT_GVAR_INITS: replay deferred global var initializations
    8. PARSE_PROG: parse main code statements
    9. FIXUP: patch variable/string/function addresses
    10. EMITELF: write ELF binary to stdout

HEAP LAYOUT (S = brk base, v1.8.0):
    0x00000  input_buf [131072]
    0x20000  codebuf   [262144]
    0x60000  tok_names [65536]       (identifiers, dedup since v1.7.8, ~50% savings)
    0x60000  var_noffs [16384]       (2048 entries)
    0x64000  var_sizes [16384]       (2048 entries)
    0x68000  str_data  [8192]
    0x69800  str_pos, data_size
    0x6A000  output_buf [131072]
    0x8A000  struct_ftypes [4096]    (32*16 field type IDs)
    0x8C100  compiler state (BL, CP, VCNT, TI, NPOS, cur_line...)
    0x8DA00  fn_count, in_function, locals, ret_patches
    0x8DE30  struct tables (names, fcounts, fnames)
    0x8F830  loop/condition/scope state
    0x90000  preprocessor scratch
    0x97000  derive state [1288]     (#derive struct sizes/names for nested offset calc)
    0x97F00  include-once count [8]  (number of tracked filenames)
    0x98000  include-once table [8192] (64 filenames × 128 bytes)
    0xA2000  tok_types [524288]      (65536 slots)
    0x122000 tok_values [524288]
    0x1A2000 tok_lines [524288]      (line numbers per token)
    0x222000 preprocess_out [262144]
    0x262000 fixup_tbl [32768]       (2048 entries, relocated from 0x8A000)
    0x26A000 fn_names [8192]         (1024 entries, expanded from 512 in v1.6.7)
    0x26C000 fn_offsets [8192]       (1024 entries, expanded from 512 in v1.6.7)
    0x26E000 fn_params [8192]        (1024 entries, expanded from 512 in v1.6.7)
    0x2C8000 fn_body_start [8192]   inline metadata: body start per fn
    0x2CA000 fn_body_end [8192]    inline metadata: body end per fn
    0x2CC000 fn_inline [8192]      inline metadata: inline flag per fn
    0x2CE000 fn_pnames [8192]      inline metadata: param name offsets per fn
    brk: 0x2D2000

CODEGEN MODEL:
    - Expression evaluation: first nesting uses R12 spill, deeper levels push/pop
    - rax = result register, rcx = scratch, r12 = first spill register
    - Prologue: push rbx; push r12; push rbp; mov rbp, rsp (stack params at +32)
    - Epilogue: leave; pop r12; pop rbx; ret
    - Variables at fixed addresses in data section (EVLOAD/EVSTORE + fixup)
    - Function calls via rel32 fixup (type 2)
    - String addresses via abs64 fixup (type 1)
'''

[[entries]]
name = "development_loop"
description = "The proven development process for adding features to Cyrius"
category = "cyrius"
content = '''
1. RESEARCH  — Check vidya for existing patterns. If covered, skip to 3.
2. VIDYA     — Document patterns, gotchas, codegen BEFORE coding.
3. BUILD     — ONE change at a time. Before compiling, check:
               - Duplicate var scan (no var x in two branches of same fn)
               - Brace balance
               - Bridge compiler supports syntax used in source
               - Heap offset map (no collisions)
4. TEST      — After EACH change:
               - Basic: echo 'var x = 42;' | ./build/cc2 > t && chmod +x t && ./t
               - Feature-specific test
               - Self-hosting: cc2==cc3 byte-identical
               - Full suite only after basic passes
5. IF BROKEN — Revert to last known good. Apply ONE change. Test. Repeat.
               If 3 attempts fail: defer, document root cause, move on.
6. AUDIT     — Full chain: bootstrap, all suites, self-hosting.
7. VIDYA+DOCS — Document findings. Update changelog, roadmap, benchmarks.
8. ALIGN     — After major events: sync ALL docs to current state.
               README, CLAUDE.md, roadmap, cyrius.md, benchmarks, CHANGELOG.

KEY LESSONS:
- Programs are the best compiler fuzzers — build real things early
- Bridge compiler (build/cc) determines what syntax source files can use
- Test after EVERY change, not after the feature is "done"
- build/cc2 MUST be committed to git (not gitignored)
- Capacity expansions (codebuf, tokens, input) must be separate commits
'''

[[entries]]
name = "known_limitations"
description = "Current limitations and gotchas when writing Cyrius code (updated v4.8.5)"
category = "cyrius"
content = '''
FIXED (no longer limitations — do NOT work around these):
  - Block scoping: FIXED in v0.9.5.
  - Var in loop: FIXED in v0.9.5.
  - Comparisons in args: FIXED in v0.9.0, plus v3.4.10 fixed `_cfo` leak across
    comparison operators inside function call arguments (`assert(ps != 0, "msg")`
    now generates correct code).
  - Mixed &&/||: FIXED for parenthesized forms. `if (a > 0 && (b > 0 || c > 0))`
    works since v1.0-era parenthesized-comparison support. The only remaining
    limitation is precedence-based disambiguation — explicit parens required.
  - Global var init limit: EXPANDED to 1024.
  - Variable table: EXPANDED to 8192.
  - Function table: EXPANDED to 4096 in v4.7.1 (was 2048 pre-4.7.1, 256
    historically).
  - Identifier buffer (tok_names): EXPANDED to 128 KB in v4.6.2 (was 64 KB).
  - Multi-break in nested loops: FIXED in v3.3.15 via linked-list through codebuf
    rel32 fields. Multiple `break` statements per loop all patch correctly.
  - Nested while + load8 (Gotcha #6): RESOLVED in v3.4.6-3.4.9.
  - Hex literal buffer bug (Bug #33): FIXED in v3.3.17.
  - Large multi-lib SIGSEGV (Bug #35): FIXED in v3.4.7.
  - Comparisons in fn args (Bug #36): FIXED in v3.4.10.
  - `#derive(Serialize)` duplicate variable (Bug #34): FIXED in v3.4.4.
  - Compound assignment operators: FIXED in v3.10.3. `+=`, `-=`, `*=`, `/=`,
    `%=`, `&=`, `|=`, `^=`, `<<=`, `>>=` all parse and emit the expected
    read-modify-write. Earlier versions required `x = x + y`.
  - Negative literals: FIXED in v3.10.3. Write `-1`, `-x`, `-(expr)` directly.
    Earlier workaround `0 - N` still parses but is no longer needed.
  - Numeric literal underscores: FIXED in v4.8.0-alpha2. `0xDEAD_BEEF` and
    `1_000_000` both parse correctly. Pre-4.8.0 `cyrc` didn't support `_`.
  - Nested includes past depth 1: FIXED in v4.8.3 (PP_IFDEF_PASS fixpoint
    loop) + v4.8.4 retag (directive detection reads from mmap'd tmp buffer
    so the 256 KB S+0 cap no longer blinds the scan on ≥ 512 KB compile
    units). bote 2.5.0 was the reporter.
  - Fn-table overflow → misleading parser error (Bug #36-successor):
    v4.8.4-alpha2 added include-once cap 64 → 256 + env override for
    sibling-directory parent includes. v4.8.3 added ERR_EXPECT capacity
    dump so near-cap errors self-report instead of looking like parse bugs.

CURRENT LIMITATIONS:
1. MIXED &&/|| REQUIRES EXPLICIT PARENS: `a > 0 && b > 0 || c > 0` fails to
   parse — no precedence-based disambiguation. Write `a > 0 && (b > 0 || c > 0)`
   or `(a > 0 && b > 0) || c > 0` instead. All parenthesized forms work.

2. NO `i++` / `++i`: Increment/decrement operators aren't in the grammar.
   Use `i += 1` (shipped v3.10.3) or `i = i + 1`. FOR-loop step accepts any
   assignment expression, including compound ones: `for (var i = 0; i < n; i += 1)`.

3. EXIT CODE TRUNCATION: Linux exit codes wrap at 256. Use print_num for
   values > 255.

4. INLINE ASM REGISTER STATE: asm blocks operate on the register state at
   that point. The compiler may have values in rax/rcx. Use push/pop to
   save state if needed. CAUTION: `[rbp-N]` offsets depend on param count
   and local index — count carefully and match against PARSE_FN_DEF's
   (idx+1)*8 formula. `#regalloc` fns shift locals by an extra -8 to
   reserve [rbp-8] for the saved rbx; asm blocks inside them must
   compensate or disable routing.

5. NO CLOSURES CAPTURING VARIABLES: Pure fn pointers only — &fn_name works
   (fncall0-6 from fnptr.cyr), but lexical capture does not. Use named
   functions + globals for shared state.

6. LARGE var buf[N] EXHAUSTS OUTPUT BUFFER: Anything over ~4KB in binary data
   should be alloc()'d at runtime, not declared as `var buf[N]` (which writes
   N zeros into the ELF). Use `var buf = 0; fn init() { buf = alloc(N); }`.

7. ENUM INIT ORDERING: Enum init runs BEFORE gvar init in main.cyr. If you
   modify the compiler, do NOT reorder these — gvar init may call functions
   that reference enum values.

8. var buf[N] IS BYTES: var buf[N] allocates N BYTES, not N i64 elements.
   var buf[8] = 8 bytes (1 i64). var buf[120] = 120 bytes (15 i64s).

9. var x: u128 AT FN SCOPE: `var x: u128 = 0;` at fn scope only allocates
   an 8-byte slot — type-annotated locals carry their size on globals but
   not on locals. Workaround: `var buf[16];` gives a 16-byte slot you can
   pass as a u128 pointer (pattern used by `lib/u128.cyr::u64_mulmod`).

10. INCLUDE IN KERNEL MODE: Not supported. kernel; mode blocks require
    single-file source or external concatenation.

11. PREPROCESSOR OUTPUT CAP: Expanded source hard-capped at 1 MB via
    `PP_IFDEF_PASS` size guard (added in the 4.8.4 retag). Programs whose
    transitive include graph expands past 1 MB error out with a clear
    message — split the unit or prune includes. Bote 2.5.0 sits at ~525 KB
    post-expansion, well within headroom.

12. CYRIUS `/` AND `%` ARE SIGNED: The `/` operator lowers to `idiv`,
    not `div`. For u64 operations where the top bit is meaningful
    (cryptographic mulmod, hashing, high-entropy counters), prefer the
    stdlib's `u64_mulmod` / `u64_powmod` / `u128_divmod` — they handle
    unsigned semantics internally.

GOTCHAS (expected behavior, not bugs):
11. DYNAMIC LOOP BOUNDS: `for (var i = 0; i < GLOBAL; i = i + 1)` re-evaluates
    GLOBAL each iteration. If the loop body modifies GLOBAL, the loop count
    changes dynamically. FIX: snapshot to a local first.

12. OPERATOR OVERLOADING + ALLOC: Type_add(a, b) works for value types.
    For pointer-based types (Str), the function receives the pointer value.
    For stack-allocated structs (Point), it receives the first field value.

13. SUB-µs BENCHMARKS: bench_start/end has ~120ns clock_gettime overhead + 6ns
    fncall dispatch. For operations under 1µs, use `bench_batch_start` /
    `bench_batch_stop` with `batch_size >= 1000`. The cyrius-doom "2x
    regression" in 3.3.12 turned out to be 2× clock_gettime overhead, not a
    codegen issue — documented in v3.3.13-14 bench.cyr notes.

14. OBJECT-MODE GLOBALS: In `object;` mode, top-level code (enum values,
    global var inits) is wrapped in a callable `_cyrius_init()` function.
    C launchers MUST call `_cyrius_init()` before `alloc_init()` before any
    application function, or enum-value globals will be zero. (v3.4.14 fix.)
'''

[[entries]]
name = "porting_guide"
description = "How to port Cyrius to a new architecture (aarch64 example)"
category = "cyrius"
content = '''
The compiler is factored into arch-independent frontend and arch-specific backend.

FRONTEND (shared, no changes needed):
    util.cyr  — state accessors
    lex.cyr   — tokenizer
    parse.cyr — parser (calls emit/jump functions by name)
    cc2.cyr   — main loop

BACKEND (per-architecture):
    emit.cyr  — instruction emission (~50 functions)
    jump.cyr  — branch/patch (~4 functions)
    fixup.cyr — address patching + ELF emission (~4 functions)

TO PORT:
1. Create src/arch/ARCH/emit.cyr with same function signatures as x86_64
2. Create src/arch/ARCH/jump.cyr — branch encoding differs per arch
3. Create src/arch/ARCH/fixup.cyr — ELF header + address patching
4. Create src/compiler_ARCH.cyr that includes ARCH backend instead of x86_64
5. Build cross-compiler: cat src/compiler_ARCH.cyr | ./build/cc2 > build/cc2_ARCH

KEY MAPPINGS (x86_64 → aarch64 example):
    EMOVI(imm64)  → MOVZ/MOVK sequence (up to 4 instructions)
    EPUSHR/EPOPR  → STR/LDR with SP pre/post-index
    EADDR/ESUBR   → ADD/SUB register-register
    EIMUL/EIDIV   → MUL/SDIV
    ELODC/ESTOC   → LDR/STR [x1]
    ESYSCALL      → SVC #0 (x8=syscall number, x0-x5=args)
    EJCC(cc)      → B.cond (map x86 cc to ARM condition codes)
    EJMP/EJMP0    → B imm26
    FIXUP var     → patch MOVZ/MOVK immediate fields
    FIXUP fn call → patch BL offset

TESTING:
    qemu-system-aarch64 for kernel, qemu-aarch64 for userspace (Linux)
'''

[[entries]]
name = "stdlib"
description = "Cyrius standard library: 59 modules + 6 deps, 300+ functions (v5.5.27)"
category = "cyrius"
content = '''
CORE LIBRARIES (lib/) — 59 stdlib modules + per-arch/OS variants + 6 deps:

string.cyr      — strlen, streq, memeq, memcpy, memset, memchr, strchr, strstr, print_num, println
alloc.cyr       — alloc_init, alloc, alloc_reset, alloc_used (bump from brk; routes to alloc_macos.cyr mmap on macOS, alloc_windows.cyr VirtualAlloc on Windows)
str.cyr         — Str struct (data+len): str_from, str_len, str_eq, str_cat, str_sub, str_contains, str_split, str_trim
vec.cyr         — Dynamic array: vec_new, vec_push, vec_pop, vec_get, vec_set, vec_len, vec_find, vec_remove
io.cyr          — File I/O: file_open, file_read, file_write, file_close, file_read_all, file_write_all, file_exists
fmt.cyr         — Formatting: fmt_int, fmt_hex, fmt_hex0x, fmt_bool, fmt_byte, fmt_pad, fmt_int_buf, sprintf
args.cyr        — CLI args: args_init, argc, argv (Linux: /proc/self/cmdline). args_macos.cyr reads x28 entry-prologue frame (v5.5.17)
fnptr.cyr       — Function pointers: fncall0–fncall8 (v5.4.13 lifted ceiling 6→8; v5.5.6 Win64 asm blocks; v5.5.7 strict shadow-space compliance)
tagged.cyr      — Tagged unions: packed Result (Ok/Err via bit 63), heap Option (Some/None)
hashmap.cyr     — map_new (cstr keys) + map_new_str (Str keys, v5.4.14 content-hashed) + map_u64_new (u64 keys, v5.5.20 SplitMix64, zero-alloc hot path)
hashmap_fast.cyr— SIMD-attempted hashmap (API parity with hashmap.cyr; scalar is faster for small maps)
fs.cyr          — Filesystem: is_dir, dir_list, sys_mkdir, sys_unlink, sys_chmod
process.cyr     — Subprocess: run, run_capture, spawn, exec_vec, exec_env, exec_capture
