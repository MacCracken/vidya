PER-ARCH / PER-OS VARIANTS (auto-selected via _TARGET_* predefines):
syscalls_x86_64_linux.cyr / syscalls_aarch64_linux.cyr / syscalls_macos.cyr / syscalls_windows.cyr
alloc_macos.cyr (mmap) / alloc_windows.cyr (VirtualAlloc, v5.5.8)
args_macos.cyr (x28 entry-prologue argc/argv reader, v5.5.17)

DEP BUNDLES (fetched via `cyrius deps` from cyrius.cyml — git + namespaced symlink):
sakshi  (2.0.0) — Tracing/logging (slim + full profiles)
patra   (1.5.5) — SQL database (B-tree, WAL, transactions; bundle via `cyrius distlib` from v5.5.26)
