# Cyrius Language Reference
# This is the canonical reference for the Cyrius programming language.
# Any agent reading this should be able to write Cyrius programs,
# modify the compiler, build kernels, and port to new architectures.

[[entries]]
name = "overview"
description = "Cyrius is a sovereign self-hosting systems language. Assembly up."
category = "cyrius"
content = '''
Cyrius is a self-hosting compiler that bootstraps from a 29KB binary seed.
No Rust, no LLVM, no Python. Just sh + Linux x86_64.

Default type is i64. Multi-width types: var x: i8 = 42; var y: i16 = 1000;
var z: i32 = 0; — width-correct loads (movzx) and stores. sizeof(Type) operator.
Type annotations enable width-correct codegen; untyped variables remain i64.
f64 supported as bit patterns via 20+ f64_* builtins (SSE2/SSE4.1/x87).

The compiler (cc2) is 202KB, ~280 functions, 8 modules. It compiles itself
byte-identical in ~11ms. The AGNOS kernel is written entirely in Cyrius.

Build: sh bootstrap/bootstrap.sh (40ms)
Compile: echo 'var x = 42;' | ./build/cc2 > prog && chmod +x prog
Test: sh scripts/check.sh (self-host + heap audit + 9 .tcyr files, 107 assertions)

Source: src/main.cyr (entry) + src/frontend/*.cyr + src/backend/*.cyr + src/common/*.cyr
Version: 2.0.0 — 9 .tcyr test files (107 assertions), heap audit, self-hosting byte-identical.
Compiler: 202KB x86_64. Frontend/backend/common architecture.
Multi-width types (i8/i16/i32/i64/u128), sizeof, unions, bitfield builtins.
Struct field widths, expression type propagation, narrowing warnings.
Constant folding, tail call optimization, DCE (bitmap O(T+N)), jump tables.
Return-by-value small structs (ret2/rethi). 7 SIMD packed f64 ops.
Overflow guards on 6 arrays. Heap map audit tool.
Argonaut (6257 lines, 424 tests) compiles and runs.
#derive(Serialize), include-once semantics, identifier dedup, #ref directive. Fixup table: 4096 entries.
'''

[[entries]]
name = "syntax"
description = "Complete Cyrius language syntax reference"
category = "cyrius"
content = '''
VARIABLES:
    var x = 42;            # scalar (8 bytes)
    var x: i64 = 42;       # with type annotation (no enforcement)
    var buf[256];           # array (256 BYTES, not elements)
    x = x + 1;             # reassignment

FUNCTIONS:
    fn add(a, b) { return a + b; }
    var r = add(20, 22);
    # Up to 6 register params, 7+ on stack
    # Forward calls work (call functions defined later)

CONTROL FLOW:
    if (x == 1) { ... } elif (x == 2) { ... } else { ... }
    while (cond) { ... }
    for (var i = 0; i < 10; i = i + 1) { ... }
    break;    # exit loop
    continue; # skip to next iteration

OPERATORS:
    + - * / %              # arithmetic
    == != < > <= >=        # comparison
    & | ^ ~ << >>          # bitwise
    && ||                  # logical (short-circuit, chainable)

MEMORY:
    store8(&buf, 65);  load8(&buf);     # byte
    store16/32/64      load16/32/64     # 16/32/64-bit

POINTERS:
    var p = &x;        # address-of
    var v = *p;        # dereference
    *p = 99;           # write through pointer
    var p: *i64 = &buf; *(p + 1);  # typed (scales by element size)

STRUCTS:
    struct Point { x; y; }
    var p = Point { 10, 20 };
    p.x = 42;
    struct Rect { tl: Point; br: Point; }  # nested
    var r = Rect { 0, 0, 10, 5 };
    r.br.x;  # chained dot access

STRINGS:
    "hello\n"  # null-terminated, escapes: \n \t \0 \\ \"
    syscall(1, 1, "hello", 5);

SYSCALLS:
    syscall(1, 1, buf, len);   # write
    syscall(0, 0, buf, len);   # read
    syscall(60, code);         # exit

INCLUDES:
    include "lib/string.cyr"   # textual inclusion (relative to cwd)

INLINE ASM:
    asm { 0x90; }              # raw bytes
    asm { cli; sti; hlt; }     # mnemonics
    asm { mov cr3, rax; }      # privileged
    asm { lgdt [rax]; }        # descriptor tables

KERNEL MODE:
    kernel;                    # emit bare-metal multiboot1 ELF
'''

[[entries]]
name = "compiler_architecture"
description = "How the cc2 compiler is structured: modules, passes, heap layout"
category = "cyrius"
content = '''
MODULES (included by cc2.cyr):
    util.cyr   — state accessors (GCP, GTI, GVCNT...), helpers (PRNUM, ERR)
    emit.cyr   — x86_64 instruction emission (EB, EMOVI, ESPILL, EUNSPILL, EADDR...)
    jump.cyr   — conditional/unconditional jumps (EJCC, EJMP, EPATCH)
    lex.cyr    — tokenizer (ADDTOK, LEXNUM, LEXID, LEXKW_EXT, LEX, PREPROCESS)
    parse.cyr  — parser + codegen (PARSE_EXPR, PARSE_STMT, PARSE_FN_DEF, PARSE_SIMD_EXT...)
    fixup.cyr  — address fixup + ELF emission (FIXUP, EMITELF)

COMPILATION FLOW:
    1. Read stdin into input buffer (131072 bytes at S+0)
    2. PREPROCESS: expand include directives
    3. LEX: tokenize into tok_types/tok_values arrays (32768 slots)
    4. Pass 1: scan struct/fn/var declarations (register names, skip fn bodies)
    5. Pass 2: parse fn bodies (all globals already registered)
    6. Emit jmp over fn bodies → parse fn defs → patch jmp
    7. EMIT_GVAR_INITS: replay deferred global var initializations
    8. PARSE_PROG: parse main code statements
    9. FIXUP: patch variable/string/function addresses
    10. EMITELF: write ELF binary to stdout

HEAP LAYOUT (S = brk base, v1.8.0):
    0x00000  input_buf [131072]
    0x20000  codebuf   [262144]
    0x60000  tok_names [65536]       (identifiers, dedup since v1.7.8, ~50% savings)
    0x60000  var_noffs [16384]       (2048 entries)
    0x64000  var_sizes [16384]       (2048 entries)
    0x68000  str_data  [8192]
    0x69800  str_pos, data_size
    0x6A000  output_buf [131072]
    0x8A000  struct_ftypes [4096]    (32*16 field type IDs)
    0x8C100  compiler state (BL, CP, VCNT, TI, NPOS, cur_line...)
    0x8DA00  fn_count, in_function, locals, ret_patches
    0x8DE30  struct tables (names, fcounts, fnames)
    0x8F830  loop/condition/scope state
    0x90000  preprocessor scratch
    0x97000  derive state [1288]     (#derive struct sizes/names for nested offset calc)
    0x97F00  include-once count [8]  (number of tracked filenames)
    0x98000  include-once table [8192] (64 filenames × 128 bytes)
    0xA2000  tok_types [524288]      (65536 slots)
    0x122000 tok_values [524288]
    0x1A2000 tok_lines [524288]      (line numbers per token)
    0x222000 preprocess_out [262144]
    0x262000 fixup_tbl [32768]       (2048 entries, relocated from 0x8A000)
    0x26A000 fn_names [8192]         (1024 entries, expanded from 512 in v1.6.7)
    0x26C000 fn_offsets [8192]       (1024 entries, expanded from 512 in v1.6.7)
    0x26E000 fn_params [8192]        (1024 entries, expanded from 512 in v1.6.7)
    0x2C8000 fn_body_start [8192]   inline metadata: body start per fn
    0x2CA000 fn_body_end [8192]    inline metadata: body end per fn
    0x2CC000 fn_inline [8192]      inline metadata: inline flag per fn
    0x2CE000 fn_pnames [8192]      inline metadata: param name offsets per fn
    brk: 0x2D2000

CODEGEN MODEL:
    - Expression evaluation: first nesting uses R12 spill, deeper levels push/pop
    - rax = result register, rcx = scratch, r12 = first spill register
    - Prologue: push rbx; push r12; push rbp; mov rbp, rsp (stack params at +32)
    - Epilogue: leave; pop r12; pop rbx; ret
    - Variables at fixed addresses in data section (EVLOAD/EVSTORE + fixup)
    - Function calls via rel32 fixup (type 2)
    - String addresses via abs64 fixup (type 1)
'''

[[entries]]
name = "development_loop"
description = "The proven development process for adding features to Cyrius"
category = "cyrius"
content = '''
1. RESEARCH  — Check vidya for existing patterns. If covered, skip to 3.
2. VIDYA     — Document patterns, gotchas, codegen BEFORE coding.
3. BUILD     — ONE change at a time. Before compiling, check:
               - Duplicate var scan (no var x in two branches of same fn)
               - Brace balance
               - Bridge compiler supports syntax used in source
               - Heap offset map (no collisions)
4. TEST      — After EACH change:
               - Basic: echo 'var x = 42;' | ./build/cc2 > t && chmod +x t && ./t
               - Feature-specific test
               - Self-hosting: cc2==cc3 byte-identical
               - Full suite only after basic passes
5. IF BROKEN — Revert to last known good. Apply ONE change. Test. Repeat.
               If 3 attempts fail: defer, document root cause, move on.
6. AUDIT     — Full chain: bootstrap, all suites, self-hosting.
7. VIDYA+DOCS — Document findings. Update changelog, roadmap, benchmarks.
8. ALIGN     — After major events: sync ALL docs to current state.
               README, CLAUDE.md, roadmap, cyrius.md, benchmarks, CHANGELOG.

KEY LESSONS:
- Programs are the best compiler fuzzers — build real things early
- Bridge compiler (build/cc) determines what syntax source files can use
- Test after EVERY change, not after the feature is "done"
- build/cc2 MUST be committed to git (not gitignored)
- Capacity expansions (codebuf, tokens, input) must be separate commits
'''

[[entries]]
name = "known_limitations"
description = "Current limitations and gotchas when writing Cyrius code (updated v1.1)"
category = "cyrius"
content = '''
FIXED (no longer limitations):
  - Block scoping: FIXED in v0.9.5. Variables in if/while/for blocks are scoped.
  - Var in loop: FIXED in v0.9.5. Same var name can be used in different scopes.
  - Comparisons in args: FIXED in v0.9.0. f(x == 1) works.

CURRENT LIMITATIONS:
1. NO MIXED &&/||: Cannot write (a && b || c). Use nested ifs instead.

2. FOR LOOP STEP: Must be simple assignment (i = i + 1), not complex expr.

3. EXIT CODE TRUNCATION: Linux exit codes wrap at 256. Use print_num for
   values > 255.

4. STRING LITERAL COMPARISON: streq("abc", "xyz") works via null-terminated
   comparison. strlen works on all string literals.

5. NO NEGATIVE LITERALS: Use (0 - N) instead of -N.

6. INLINE ASM REGISTER STATE: asm blocks operate on the register state
   at that point. The compiler may have values in rax/rcx. Use push/pop
   to save state if needed.

9. COMPARISONS IN FUNCTION ARGS: FIXED (v0.9.0). f(x == 1) now works via
   PARSE_CMP_EXPR + ESETCC codegen. Produces 0/1 via x86 setCC + movzx.

10. GLOBAL VAR INIT LIMIT: Max ~64 global vars with initializers (gvar_toks
    table at 0x8FA98 has 64 slots). Use enums for large constant groups.
    Enums have separate init path and don't consume gvar_toks slots.

16. VARIABLE TABLE LIMIT: Max 4096 variables (VCNT never resets between
    functions — arrays inside functions are globals). Was 256→512→2048.
    Fixed overlap bug between var_noffs and var_sizes in v1.7.0.

17. FUNCTION TABLE LIMIT: Max 1024 functions. Clear error at limit:
    "error: function table full (1024/1024)". Was 256→512→1024.

18. var buf[N] IS BYTES: var buf[N] allocates N BYTES, not N i64 elements.
    var buf[8] = 8 bytes (1 i64). var buf[120] = 120 bytes (15 i64s).
    Writing past the allocated size silently corrupts adjacent data.

19. INCLUDE IN KERNEL MODE: Not supported. kernel; mode blocks require
    single-file source or external concatenation. Main blocker for AGNOS
    multi-arch kernel split.

11. ENUM INIT ORDERING: Enum init runs before gvar init in cc2.cyr.
    If you modify the compiler, do NOT reorder these — functions called
    during gvar init depend on enum values being set.

12. FUNCTION POINTERS: &fn_name IS supported (fixup type 3). Use fncall0/1/2
    from fnptr.cyr for indirect calls. The earlier limitation was removed.

GOTCHAS (expected behavior, not bugs):
13. DYNAMIC LOOP BOUNDS: for (var i = 0; i < GLOBAL; i = i + 1) re-evaluates
    GLOBAL each iteration. If the loop body modifies GLOBAL (directly or via
    function call), the loop count changes dynamically.
    FIX: var limit = GLOBAL; for (var i = 0; i < limit; i = i + 1) { ... }
    EXAMPLE: pmm_alloc() decrements free_count inside a loop bounded by
    free_count → loop runs half the expected iterations.

14. BLOCK CLOSURES AT GLOBAL SCOPE: |x| { return x; } works inside functions
    but produces wrong results at global scope. Always use closures inside fns.

15. OPERATOR OVERLOADING + ALLOC: Type_add(a, b) works for value types.
    For pointer-based types (Str), the function receives the pointer value.
    For stack-allocated structs (Point), it receives the first field value.
'''

[[entries]]
name = "porting_guide"
description = "How to port Cyrius to a new architecture (aarch64 example)"
category = "cyrius"
content = '''
The compiler is factored into arch-independent frontend and arch-specific backend.

FRONTEND (shared, no changes needed):
    util.cyr  — state accessors
    lex.cyr   — tokenizer
    parse.cyr — parser (calls emit/jump functions by name)
    cc2.cyr   — main loop

BACKEND (per-architecture):
    emit.cyr  — instruction emission (~50 functions)
    jump.cyr  — branch/patch (~4 functions)
    fixup.cyr — address patching + ELF emission (~4 functions)

TO PORT:
1. Create src/arch/ARCH/emit.cyr with same function signatures as x86_64
2. Create src/arch/ARCH/jump.cyr — branch encoding differs per arch
3. Create src/arch/ARCH/fixup.cyr — ELF header + address patching
4. Create src/compiler_ARCH.cyr that includes ARCH backend instead of x86_64
5. Build cross-compiler: cat src/compiler_ARCH.cyr | ./build/cc2 > build/cc2_ARCH

KEY MAPPINGS (x86_64 → aarch64 example):
    EMOVI(imm64)  → MOVZ/MOVK sequence (up to 4 instructions)
    EPUSHR/EPOPR  → STR/LDR with SP pre/post-index
    EADDR/ESUBR   → ADD/SUB register-register
    EIMUL/EIDIV   → MUL/SDIV
    ELODC/ESTOC   → LDR/STR [x1]
    ESYSCALL      → SVC #0 (x8=syscall number, x0-x5=args)
    EJCC(cc)      → B.cond (map x86 cc to ARM condition codes)
    EJMP/EJMP0    → B imm26
    FIXUP var     → patch MOVZ/MOVK immediate fields
    FIXUP fn call → patch BL offset

TESTING:
    qemu-system-aarch64 for kernel, qemu-aarch64 for userspace (Linux)
'''

[[entries]]
name = "stdlib"
description = "Cyrius standard library: 8 core + 15 ecosystem libraries, 150+ functions"
category = "cyrius"
content = '''
CORE LIBRARIES (lib/):

string.cyr   — strlen, streq, memeq, memcpy, memset, memchr, strchr, print_num, println
alloc.cyr    — alloc_init, alloc, alloc_reset, alloc_used (bump allocator from brk)
str.cyr      — Str struct (data+len): str_from, str_len, str_eq, str_cat, str_sub, str_contains, str_split, str_trim
vec.cyr      — Dynamic array: vec_new, vec_push, vec_pop, vec_get, vec_set, vec_len, vec_find, vec_remove
io.cyr       — File I/O: file_open, file_read, file_write, file_close, file_read_all, file_write_all, file_exists
fmt.cyr      — Formatting: fmt_int, fmt_hex, fmt_hex0x, fmt_bool, fmt_byte, fmt_pad, fmt_int_buf, sprintf
args.cyr     — CLI args: args_init, argc, argv (reads /proc/self/cmdline)
fnptr.cyr    — Function pointers: fncall0, fncall1, fncall2 (indirect call via inline asm)
tagged.cyr   — Tagged unions: packed Result (Ok/Err via bit 63), heap-based Option (Some/None)
hashmap.cyr  — String→i64 map: map_new, map_set, map_get, map_has, map_delete, map_keys
fs.cyr       — Filesystem: is_dir, dir_list, sys_mkdir, sys_unlink, sys_chmod
process.cyr  — Subprocess: run, run_capture, spawn, exec_vec, exec_env, exec_capture
syscalls.cyr — 50+ syscall numbers, wrappers (fork, waitpid, pipe, dup2, epoll, timerfd)
net.cyr      — Socket wrappers
json.cyr     — Minimal JSON: json_parse, json_get, json_get_int, json_build
trait.cyr    — Manual vtable dispatch: display_vtable, trait_obj_new
regex.cyr    — Pattern matching
assert.cyr   — Test assertions: assert_eq, assert_ne, assert_true
bench.cyr    — Benchmarking: bench_start, bench_end, bench_report
bounds.cyr   — Array bounds checking
callback.cyr — Callback patterns: fork_with_pre_exec

Total: 21 library modules, 200+ functions.

USAGE PATTERN:
    include "lib/alloc.cyr"
    include "lib/vec.cyr"
    alloc_init();
    var v = vec_new();
    vec_push(v, 42);

INCLUDE ORDER FOR FULL STACK:
    include "lib/string.cyr"
    include "lib/fmt.cyr"
    include "lib/alloc.cyr"
    include "lib/vec.cyr"
    include "lib/str.cyr"
    include "lib/tagged.cyr"
    include "lib/syscalls.cyr"
    include "lib/io.cyr"
    include "lib/hashmap.cyr"
    include "lib/process.cyr"
    include "lib/fs.cyr"

IMPORTANT — var buf[N] allocates N BYTES, not N elements:
    var buf[120];     # 120 bytes (enough for sysinfo struct)
    var uts[392];     # 392 bytes (enough for utsname struct: 6 × 65 + padding)
    store64(&buf, 42);          # write 8 bytes at offset 0
    store64(&buf + 8, 43);      # write 8 bytes at offset 8
'''

[[entries]]
name = "new_features"
description = "Features added in Phase 8: enums, switch, function pointers, type warnings"
category = "cyrius"
content = '''
ENUMS:
    enum Color { RED; GREEN; BLUE; }        # AUTO: RED=0, GREEN=1, BLUE=2
    enum Error { OK = 0; FAIL = 44; }      # EXPLICIT values
    var c = BLUE;                           # c = 2
    # Enums are compile-time integer constants. No type safety (yet).

SWITCH/MATCH:
    switch (expr) {
        case 1: stmts;
        case 2: stmts;
        default: stmts;
    }
    # Case values must be integer literals. No fallthrough.
    # Compiles to chained comparisons (cmp + jne per case).
    # Switch value stored in hidden global variable (not register).

FUNCTION POINTERS:
    fn add(a, b) { return a + b; }
    var fp = &add;                  # Get absolute function address
    # Compiler emits fixup type 3 (absolute addr) for &fn_name.
    # Call via fncall2(fp, 20, 22) from fnptr.cyr library.
    # Direct call rax (FF D0) via inline asm.

TYPE WARNINGS:
    fn f() {
        var p: *i64 = 42;          # WARNING: assigning non-pointer to typed pointer
    }
    # Warnings emitted to stderr, compilation continues.
    # Only checked for pointer/scalar mismatch in function scope.
'''

[[entries]]
name = "v098_features"
description = "Features added in v0.9.5–v0.9.8: scoping, modules, match, for-in, feature flags"
category = "cyrius"
content = '''
BLOCK SCOPING (v0.9.5):
    fn f() {
        var x = 10;
        if (1 == 1) { var x = 42; }   # inner x shadows outer
        return x;                       # returns 10 (outer preserved)
    }
    # Variables in if/while/for blocks don't leak.
    # for loop iterator is scoped to the loop.

MODULES (v0.9.7):
    mod math;
    pub fn add(a, b) { return a + b; }

    mod main;
    use math.add;
    var r = add(1, 2);   # calls math_add

    # mod name; — sets namespace prefix for subsequent definitions
    # pub fn — marks function as exported (visible outside module)
    # use mod.fn; — creates alias so fn resolves to mod_fn
    # Private functions (no pub) are module-internal

PATTERN MATCHING (v0.9.8):
    match expr {
        0 => { return 0; }
        42 => { return 42; }
        _ => { return 99; }
    }
    # Cleaner than switch. Each arm gets its own scope.
    # _ is the wildcard/default arm.
    # Arrow => is = followed by >.

FOR-IN RANGE (v0.9.8):
    for i in 0..5 {        # i = 0, 1, 2, 3, 4
        sum = sum + i;
    }
    # Exclusive end (like Rust/Python).
    # Iterator variable scoped to loop body.
    # .. is two DOT tokens.

FEATURE FLAGS (v0.9.6):
    #define DEBUG
    #ifdef DEBUG
    var verbose = 1;
    #endif
    # Preprocessor directives. Nested ifdef supported.
    # Flags defined in source or included files.

ENUM CONSTRUCTORS (v0.9.6):
    enum Result { Ok(val) = 0; Err(code) = 1; }
    # Payload syntax accepted by parser.
    # Constructors are currently hand-written in tagged.cyr:
    #   fn Ok(val) { return tagged_new(0, val); }

FLOAT OPERATIONS (v0.9.2):
    var a = f64_from(10);
    var b = 3.14;               # float literal
    var c = f64_mul(a, b);
    var r = f64_to(c);          # truncate to int
    var eq = f64_eq(a, b);      # comparison → 0 or 1

METHODS ON STRUCTS (v0.9.2):
    struct Point { x; y; }
    fn Point_scale(self, factor) {
        store64(self, load64(self) * factor);
        store64(self + 8, load64(self + 8) * factor);
        return 0;
    }
    var p = Point { 3, 4 };
    p.scale(2);                 # calls Point_scale(&p, 2)

ERROR MESSAGES (v0.9.2):
    error:3: unexpected token (type=5)
    warning:15: assigning non-pointer to typed pointer
    # Line numbers instead of token indices.
'''

[[entries]]
name = "v0910_features"
description = "Features added in v0.9.9–v0.9.12: traits, closures, strings, operators, subprocess"
category = "cyrius"
content = '''
TRAIT IMPL BLOCKS (v0.9.9):
    struct Point { x; y; }

    impl Math for Point {
        fn sum(self) { return load64(self) + load64(self + 8); }
        fn scale(self, n) {
            store64(self, load64(self) * n);
            store64(self + 8, load64(self + 8) * n);
            return 0;
        }
    }

    var p = Point { 10, 20 };
    p.scale(2);            # calls Point_scale(&p, 2)
    var r = p.sum();       # calls Point_sum(&p)

    # Methods mangled to TypeName_method (same as convention dispatch).
    # Multiple impl blocks for same type allowed.
    # Trait name is documentation-only for now.

CLOSURES / LAMBDAS (v0.9.10):
    include "lib/fnptr.cyr"

    var double = |x| x * 2;
    var add = |a, b| a + b;
    var always42 = |_| 42;

    var r1 = fncall1(double, 21);     # 42
    var r2 = fncall2(add, 20, 22);    # 42
    var r3 = fncall1(always42, 0);    # 42

    # Expression body only (no block body yet).
    # Generates anonymous __clN functions, returns function pointer.
    # Zero-param closures use |_| (since || is the OR operator).
    # Call via fncall0/fncall1/fncall2 from fnptr.cyr.

STRING TYPE WITH METHODS (v0.9.10):
    include "lib/str.cyr"

    var s: Str = str_from("hello world");
    var len = s.len();                # 11
    var has = s.contains("world");    # 1
    var sub = s.starts_with("hello"); # 1
    var idx = s.index_of("world");    # 6

    var a: Str = str_from("foo");
    var b: Str = str_from("bar");
    var c: Str = a.cat(b);            # "foobar"

    # Type annotation `: Str` enables dot-call method dispatch.
    # Works for any struct type: var v: Vec = vec_new(); v.push(42);
    # 16 Str methods: len, data, print, println, eq, cat, sub, clone,
    #   contains, starts_with, ends_with, index_of, from_int, to_int,
    #   trim, split

OPERATOR OVERLOADING (v0.9.11):
    struct Vec2 { x; y; }

    fn Vec2_add(a, b) { return a + b; }
    fn Vec2_sub(a, b) { return a - b; }
    fn Vec2_mul(a, b) { return a * b; }

    var a: Vec2 = 10;
    var b: Vec2 = 32;
    var c = a + b;   # calls Vec2_add(10, 32) = 42

    # Dispatches + - * / to TypeName_add/sub/mul/div when left operand
    # has a struct type (via type annotation or struct literal init).
    # Operator functions receive VALUES, not addresses.
    # Works for pointer-based types (Str, Vec) and value types.

SUBPROCESS BRIDGE (v0.9.12):
    include "lib/process.cyr"

    # Variable args via vec
    var args = vec_new();
    vec_push(args, "/usr/bin/nvidia-smi");
    vec_push(args, "--query-gpu=name");
    var rc = exec_vec(args);

    # Capture stdout
    var buf = alloc(4096);
    var len = exec_capture(args, buf, 4096);

    # Custom environment
    var env = vec_new();
    vec_push(env, "PATH=/usr/bin");
    exec_env(args, env);

    # One-liner
    exec_cmd("/usr/bin/ls -la /tmp");

    # Enables calling any external tool: python3, node, cargo,
    # nvidia-smi, kubectl, docker, etc.
    # Bridge strategy: Cyrius core logic + subprocess for external deps.
'''

[[entries]]
name = "v1x_features"
description = "Features added in v1.0–v1.5: for-in collections, enum constructors, shared libs, address-based ops, cyrb binary"
category = "cyrius"
content = '''
FOR-IN COLLECTIONS (v1.1.0):
    include "lib/vec.cyr"

    var v = vec_new();
    vec_push(v, 10);
    vec_push(v, 20);
    vec_push(v, 12);

    var total = 0;
    for item in v {
        total = total + item;
    }
    # total = 42

    # Desugars to: var __len = vec_len(v); var __i = 0;
    #   while (__i < __len) { var item = vec_get(v, __i); body; __i = __i + 1; }
    # Item variable is scoped to loop body.
    # Works alongside range for-in: for i in 0..10 { }

ENUM CONSTRUCTORS (v1.1.0):
    enum Result { Ok(val) = 0; Err(code) = 1; }

    var r = Ok(42);              # auto-generated constructor
    var tag = load64(r);         # 0
    var payload = load64(r + 8); # 42

    # Constructor auto-generated in pass 2 function section:
    #   fn Ok(val) { var p = alloc(16); store64(p, 0); store64(p+8, val); return p; }
    # Registered in pass 1, body emitted when emit_code == 2.
    # Uses alloc(16) to heap-allocate {tag, payload}.

ADDRESS-BASED OPERATOR OVERLOADING (v1.2.0):
    struct Vec3 { x; y; z; }

    fn Vec3_add(a, b) {
        store64(a, load64(a) + load64(b));
        store64(a + 8, load64(a + 8) + load64(b + 8));
        store64(a + 16, load64(a + 16) + load64(b + 16));
        return a;
    }

    var a = Vec3 { 1, 2, 3 };
    var b = Vec3 { 10, 20, 30 };
    var c = a + b;  # Vec3_add(&a, &b) — addresses, not values

    # Multi-field structs (size > 8 bytes) pass addresses to operators.
    # Single-field structs and scalars pass values (backward compatible).
    # Dispatch checks var_sizes[idx]: >8 = LEA, ==8 = MOV.

SHARED LIBRARY OUTPUT (v1.1.0):
    shared;
    pub fn add(a, b) { return a + b; }
    # Compile: cat mylib.cyr | cc2 > mylib.so
    # Produces ET_DYN ELF (recognized by `file` as shared object).
    # No PIC/PLT/GOT yet — proof-of-concept for future dlopen support.

CYRB BINARY (v1.4.0):
    # cyrb.cyr — full Cyrius replacement for shell dispatcher (58KB)
    # 25+ subcommands matching the shell version:
    #   build, run, test, bench, check, self, clean
    #   init, package, port, header
    #   fmt, lint, doc, vet, deny, audit
    #   coverage, doctest, repl
    #   version, which, help
    #
    # Tool discovery: finds cc2 via ~/.cyrius/bin/ or ./build/
    # Delegates to companion tools (cyrfmt, cyrlint, cyrdoc, cyrc)
    # and shell scripts for init/port/audit.
    #
    # Required compiler fixes to compile cyrb.cyr:
    #   - str_data buffer: 2KB → 32KB (0x69000 → 0x61000)
    #   - preprocessor output: wired to 0x222000 (was 0x91000)
    #   - fixup table: 528 → 2048 entries (0x8A000 → 0x262000)

COMPILER TABLE EXPANSIONS (v1.5.2–v1.6.0):
    # Variable tables expanded: 256 → 512 entries
    #   var_noffs/var_sizes relocated from 0x60000/0x60800 (2048 bytes each)
    #   str_data relocated from 0x61000 → 0x62000
    #   Root cause: VCNT never resets between functions, large programs
    #   with many local vars silently corrupted string data.
    #
    # Function tables expanded: 256 → 512 → 1024 entries (v1.6.0, v1.6.7)
    #   fn_names/fn_offsets/fn_params at 0x26A000/0x26C000/0x26E000
    #   8192 bytes each (1024 entries). Error at limit.
    #   brk: 0x270000

PACKED RESULT TYPE (v1.5.3 — agnosys optimization):
    # Ok/Err encoded in single i64 using bit 63 as discriminant.
    # Ok(value): returns value directly (bit 63 = 0 for all valid pointers/ints)
    # Err(ptr):  returns ptr | 0x8000000000000000 (bit 63 = 1)
    # is_ok(r):  r >= 0 (signed comparison)
    # payload(r): r & 0x7FFFFFFFFFFFFFFF
    #
    # Zero heap allocations on Ok path (was 2 allocs via tagged_new).
    # Benchmarked: Ok(42) dropped from 15ns to 2ns (7.5x faster).
    # err_from_errno dropped from 38ns to 21ns (packed kind<<16|errno).

CALLER-PROVIDED BUFFERS (v1.5.3 — agnosys optimization):
    # query_sysinfo(out) — caller passes stack buffer, no heap copy
    # agnosys_uname(out) — single syscall, read fields via offsets
    # Benchmarked: query_sysinfo 1110ns → 664ns (40% faster)

CYRB FIXES (v1.5.1–v1.6.5):
    # v1.5.1: load_environ() passes parent env to child processes
    #         (shell scripts failed without PATH/HOME)
    #         install.sh now copies all cyrb-*.sh companion scripts
    # v1.5.2: cyrb clean preserves itself; fixed UTF-8 byte count in output
    # v1.6.1: --aarch64 searches ./build/ as fallback for cc2_aarch64
    #         tests/compiler.sh default fixed: ./build/cc → ./build/cc2
    # v1.6.2: cyrb build -D NAME — preprocessor defines from command line
    #         cyrb check — modules without includes check via src/main.cyr
    #         Fixed "include " literal in cmd_check triggering cyrc vet false positive
    #         (build needle at runtime with store8 to avoid preprocessor detection)

AARCH64 KERNEL MODE (v1.6.2–v1.6.5):
    # cc2_aarch64 now supports kernel; mode:
    #   - ELF64 at base 0x40000000, entry 0x40000078
    #   - SP preamble: 4 instructions (16 bytes) set stack pointer at entry
    #     MOVZ x9, #lo; MOVK x9, #mid, LSL#16; MOVK x9, #hi, LSL#32; MOV SP, x9
    #   - Stack at top of memsz (base + filesz + 64KB)
    #   - String/variable fixup addresses account for preamble offset
    #   - Boot: qemu-system-aarch64 -M virt -cpu cortex-a57 -kernel build/agnos_aarch64
    #
    # Previously: EMITELF_KERNEL was a stub that called EMITELF → infinite recursion
    # → stack overflow → segfault. Fixed entry point (was 0x100060 x86, now 0x40000078).

ARCH-SPECIFIC ASM MNEMONICS (v1.6.5):
    # ASM_MNEMONIC moved from shared parse.cyr to arch-specific emit files.
    # x86_64 emit.cyr: cli, sti, hlt, nop, iretq, wrmsr, rdmsr, cpuid,
    #   pushfq, popfq, lgdt, lidt, mov cr, invlpg, int, in, out, ltr
    # aarch64 emit.cyr: svc, wfi, wfe, dmb, dsb, isb, nop, ret
    # Unknown mnemonics produce: error:N: unknown aarch64 asm mnemonic
    # Raw bytes (asm { 0x90; }) work on both architectures.
    #
    # Previously: aarch64 compiled x86 mnemonics silently (emitted invalid bytes).

CONDITIONAL KERNEL BUILDS (v1.6.2):
    # cyrb build -D ARCH_X86_64 kernel/agnos.cyr build/agnos
    # cyrb build --aarch64 -D ARCH_AARCH64 kernel/agnos.cyr build/agnos_aarch64
    #
    # In kernel source:
    #   kernel;
    #   include "kernel/common.cyr"
    #   #ifdef ARCH_X86_64
    #   include "kernel/arch/x86_64/boot.cyr"
    #   #endif
    #   #ifdef ARCH_AARCH64
    #   include "kernel/arch/aarch64/boot.cyr"
    #   #endif
    #
    # -D flag prepends #define to a temp file before compilation.
    # include and #ifdef both work in kernel; mode (always have).

IDENTIFIER BUFFER ERROR (v1.6.5):
    # Improved error message when identifier buffer (65536 bytes at 0x50000) is full:
    #   error: identifier buffer full (N/65536 bytes) — reduce included modules or split
    # Previously just said "error: identifier buffer full" with no guidance.

MULTI-PASS PREPROCESSOR (v1.6.5):
    # Preprocessor now runs up to 16 passes until no more includes are found.
    # Each pass expands includes and evaluates #ifdef/#define.
    # Fixes: include inside #ifdef in included files (was broken — included file
    # content went straight to output without being preprocessed).
    #
    # This enables library-level platform dispatchers:
    #   # lib/platform.cyr
    #   #ifdef ARCH_X86_64
    #   include "lib/platform_x86.cyr"
    #   #endif
    #   #ifdef ARCH_AARCH64
    #   include "lib/platform_arm.cyr"
    #   #endif
    #
    # Consumer just does: include "lib/platform.cyr"
    # Previously: consumer had to do the #ifdef in their own entry point.

CYRB UPDATE (v1.6.5):
    # cyrb update — syncs lib/ from installed Cyrius stdlib
    #   Finds: ~/.cyrius/versions/<current>/lib/ or ../cyrius/lib/
    #   Copies all .cyr files to project's lib/
    #   cyrb init now generates cyrb.toml with [deps] section
    #   cyrb init vendors ALL stdlib modules (was hardcoded list of 13)

CYRC VET FALSE POSITIVE FIX (v1.6.5):
    # cyrb check's "include " string literal triggered cyrc vet false positive.
    # Fix: build needle at runtime with store8 bytes to avoid preprocessor detection.
    # Known pattern: any string containing "include " in source code will be seen by
    # cyrc vet as a dependency. Workaround: construct such strings at runtime.

HUMAN-READABLE ERROR MESSAGES (v1.6.6):
    # error:5: unexpected token (type=17) → error:5: expected ';', got identifier 'foo'
    # Token types replaced with names: ';', ')', '{', identifier, number, fn, return, etc.
    # Identifier values and numeric values shown in context.
    # 142 parse errors upgraded to ERR_EXPECT with expected/got format.
    # Added: TOKNAME(), PRSTR(), ERR_EXPECT(), ERR_MSG() to util.cyr.

PREPROCESSOR MACROS WITH ARGS (v1.6.7):
    # #define NAME(p1, p2) body
    # Expands NAME(arg1, arg2) by substituting p1→arg1, p2→arg2 in body.
    # Up to 16 macros. Macro names must start uppercase.
    # Storage inlined in PP_PASS, expansion in separate PP_MACRO_PASS.
    #
    # Example:
    #   #define GETTER(name, offset) fn name(p) { return load64(p + offset); }
    #   GETTER(get_x, 0)
    #   GETTER(get_y, 8)

EMOVI OPTIMIZATION (v1.6.7):
    # mov rax, 0     → xor eax, eax (10 bytes → 2 bytes)
    # mov rax, <31b> → mov eax, imm32 (10 bytes → 5 bytes)
    # Large/negative values unchanged (10-byte movabs).
    # Compiler: 136KB → 131KB. All generated binaries shrink proportionally.

FUNCTION TABLE EXPANSION (v1.6.7):
    # fn_names/fn_offsets/fn_params: 512 → 1024 entries.
    # Clear error at limit: "error: function table full (1024/1024)"

RETURN COMPARISONS (v1.7.0):
    # return expr == expr; now works.
    # PARSE_RETURN calls PARSE_CMP_EXPR instead of PARSE_EXPR.
    # Previously: return a == b; failed with "expected ';', got '=='"

INPUT BUFFER EXPANSION (v1.7.0):
    # Expanded source up to 256KB supported (was 131KB).
    # Preprocessor output safely overflows into codebuf area at S+0.
    # Lexer consumes source into token arrays BEFORE codegen overwrites codebuf.
    # Clear error at 256KB limit.

CODEBUF OVERFLOW CHECK (v1.7.0):
    # EB() checks cp >= 262144 and errors cleanly:
    # "error: codebuf overflow (N/262144 bytes) — program too large"

DEAD CODE ELIMINATION (v1.7.0):
    # Unreachable functions get 3-byte stub (xor eax,eax; ret) instead of full body.
    # Scan: after pass 1, check every IDENT token (not preceded by FN keyword)
    # against function names via STREQ string comparison.
    # Skips: module-scoped functions and names containing underscore (mangled).
    # Stubs give fixup entries valid targets — no segfaults.
    # Savings: ~1.5KB on hello-world with 8 stdlib includes.

VCNT EXPANSION (v1.7.0):
    # Variable table expanded from 512 to 2048 entries.
    # Fixed overlap bug: var_noffs at 0x60000 and var_sizes at 0x60800 overlapped
    # when VCNT > 256 (var_noffs[256+] wrote into var_sizes[0+]).
    # Relocated: var_sizes to 0x64000, str_data to 0x68000.
    # 500 enum variants + 1500 variables now fit comfortably.

TWO-PASS IFDEF (v1.7.0):
    # PP_IFDEF_PASS: evaluates #ifdef/#define/#endif in already-included content
    # without re-expanding includes. Fixes: #ifdef inside included files that was
    # previously passed through as raw text.
    # Pass 1: PP_PASS (includes + top-level ifdef)
    # Pass 2: PP_IFDEF_PASS (ifdef + include in included content)
    # Pass 3: PP_MACRO_PASS (macro expansion)

PP_IFDEF_PASS WITH INCLUDES (v1.7.1):
    # PP_IFDEF_PASS now handles include directives (not just ifdef/define/endif).
    # This fixes: #ifdef LINUX include "syscalls_linux.cyr" #endif inside included files.
    # Previously: PP_IFDEF_PASS only evaluated conditionals, passing include lines through
    # as raw text → lexer couldn't parse them → "unexpected" errors.
    # Fix: added same include expansion code as PP_PASS to PP_IFDEF_PASS.
    #
    # Three-pass preprocessor:
    #   Pass 1 (PP_PASS): expand top-level includes, evaluate top-level ifdef/define
    #   Pass 2 (PP_IFDEF_PASS): evaluate ifdef/define AND expand includes in included content
    #   Pass 3 (PP_MACRO_PASS): expand #define NAME(params) macros
    #
    # Verified on:
    #   AGNOS kernel: 97KB, 25 syscalls, 3562 lines, 30+ includes with nested ifdef
    #   agnostik: 84KB, 12 modules, 815 functions, 58 tests passing
    #   agnosys: 62KB, 14 modules, 20 ported from 29K lines of Rust

TAIL CALL OPTIMIZATION (v1.7.2):
    # return fn(args); → epilogue + jmp fn (instead of call + ret)
    # Detects pattern: RETURN IDENT LPAREN ... RPAREN SEMI
    # Verifies closing ) is followed by ; (not + expr — catches return a() + b)
    # Epilogue: mov rsp, rbp; pop rbp; jmp rel32 (with fixup)
    # 1 million recursive calls without stack overflow.
    # Does NOT apply to: return a() + b; or return expr == expr;

INPUT BUFFER EXPANSION (v1.7.2):
    # Preprocessor output buffer enlarged from 256KB to 512KB (0x222000).
    # Lexer reads directly from preprocess buffer — no copy-back to S+0.
    # Three-pass double-buffer: PP_PASS → 0x222000, PP_IFDEF_PASS → S+0, PP_MACRO_PASS → 0x222000.
    # Fixup/fn tables relocated: 0x262000→0x2A2000, 0x26A000→0x2AA000, etc.
    # brk: 0x270000 → 0x2B0000.
    # Unblocks adding more compiler features (was at 162KB of 256KB limit).

CONSTANT FOLDING (v1.7.3):
    # Codegen-level fold: NUM OP NUM → single EMOVI at parse time.
    # Operators: * / << >> (high precedence in PARSE_TERM).
    # Safety constraint: both operands AND result must be small positive
    # (0 < v < 0x80000000) to guarantee same 5-byte EMOVI size.
    # Larger constants (like 1 << 56) are correctly skipped.
    #
    # Mechanism: PARSE_FACTOR sets _cfp = GCP (codebuf position before EMOVI).
    # When PARSE_TERM sees NUM OP NUM, it rewinds SCP to _cfp and emits
    # EMOVI(folded_result) — replacing the left operand's 5-byte EMOVI in-place.
    #
    # Critical bug fix: _cfo flag must be cleared after parenthesized expressions.
    # Without this, (n - 6) * 8 would fold 6 * 8 = 48 instead of (n-6) * 8.
    # The 6 inside parens set _cfo=1 which leaked to the outer * operator.
    #
    # Self-hosting verified: cc3 == cc4 == cc5 == cc6 (all identical, 140KB).

AARCH64 FIXUP BUG (v1.7.2):
    # aarch64/emit.cyr had 3 stale references to old fixup table offset (0x262000).
    # RECFIX, ESADDR, ECALLFIX wrote fixup entries to dead memory.
    # Variable addresses were never patched → ldr x0, [x1=0] → segfault.
    # All 26 CI aarch64 tests were failing. Fixed by updating to 0x2A2000.

256 LOCALS PER FUNCTION (v1.7.4):
    # fn_local_names relocated from 0x8DC30 to 0x91000 with 256 entries (was 64).
    # 65th local previously overflowed into var_types. Also tightened constant
    # folding range to 0x10000 for aarch64 EMOVI size safety.

AARCH64 TAIL CALLS (v1.7.5):
    # ETAILJMP added to aarch64/emit.cyr: mov sp, x29; ldp x29, x30, [sp], #16;
    # B rel26 with fixup type 4 (B not BL — no link register update).

TOK_NAMES/STRUCT_FTYPES OVERLAP FIX (v1.7.5):
    # struct_ftypes was at 0x59000 INSIDE tok_names buffer (0x50000-0x60000).
    # When programs had >36864 bytes of identifier data, identifiers stored in
    # struct_ftypes space were zeroed by struct operations. FINDVAR failed silently.
    # Fix: relocated struct_ftypes to 0x8A000 (free space after output_buf).
    #
    # Also expanded fixup table 2048→4096 entries. Added overflow checks to
    # ESADDR, ECALLFIX, ETAILJMP, &fn handler (previously only RECFIX checked).
    # fn_names/offsets/params relocated to 0x2B2000/0x2B4000/0x2B6000. brk 0x2B8000.

CONSTANT FOLDING + - & | ^ (v1.7.7):
    # Extended constant folding from * / << >> to all arithmetic operators.
    # Precedence-safe: checks right operand isn't followed by higher-precedence op.
    # Fixed _cfo leak from function call arguments and non-folding PARSE_TERM operations.

JUMP TABLES FOR DENSE SWITCHES (v1.7.7):
    # Pre-scans case values. If >=4 cases and range <= 2*count: O(1) indirect jump.
    # lea rcx,[rip+table]; movsxd rax,[rcx+rax*4]; add rax,rcx; jmp rax
    # Table entries are 4-byte signed offsets from table base, patched per case body.
    # Unmatched entries jump to default/end. Sparse switches still use compare chain.

DERIVE SERIALIZE (v1.7.7):
    # #derive(Serialize) before a struct auto-generates Name_to_json(ptr, sb).
    # Preprocessor-level text expansion — generated function goes through normal parsing.
    # Supports nested structs (inner #derive must come first for offset calculation).
    # Output: {"field1":val,"field2":val} via str_builder_add_cstr/str_builder_add_int.

F64 BUILTINS (v1.7.7 + v1.7.8):
    # v1.7.7: f64_sqrt (SSE2 sqrtsd), f64_abs (integer AND 0x7FFF...),
    #         f64_floor/f64_ceil (SSE4.1 roundsd mode 1/2)
    # v1.7.8: f64_sin/f64_cos (x87 fsin/fcos), f64_ln (fldln2; fyl2x),
    #         f64_log2 (fld1; fyl2x), f64_exp (fldl2e; fmulp; f2xm1; fscale),
    #         f64_exp2 (f2xm1; fscale)
    # x87 bridge: rax→sub rsp,16; mov [rsp],rax; fld [rsp] → compute → fstp [rsp]; mov rax,[rsp]
    # Total f64 builtins: 20 (add/sub/mul/div/neg/from/to/eq/lt/gt + sqrt/abs/floor/ceil + sin/cos/exp/ln/log2/exp2)

IDENTIFIER DEDUPLICATION (v1.7.8):
    # LEXID scans tok_names for existing identical string before storing new one.
    # Reduces tok_names usage ~50% (compiler source: 65500→~30000 bytes).
    # Reuses LEXID locals (bl, go, c) — zero new unique identifiers in the source.
    # Required two-step bootstrap: rename PARSE_CMP_EXPR→PCMPE to fit under old limit.
    # Bug found: variable 'c' declared inside while scope was invisible to dedup code.
    # Bug found: reusing 'p' (return value) as loop counter reset lexer to position 0.

COMPILER RESTRUCTURE (v1.8.0):
    # src/cc/ → src/frontend/ + src/backend/x86/ + src/common/
    # src/arch/aarch64/ → src/backend/aarch64/
    # compiler.cyr → main.cyr, compiler_aarch64.cyr → main_aarch64.cyr, cc_bridge.cyr → bridge.cyr
    # Float ops extracted from emit.cyr into backend/x86/float.cyr
    # Include order: common/util → backend/emit → backend/float → backend/jump → frontend/lex → frontend/parse → backend/fixup

INCLUDE-ONCE SEMANTICS (v1.8.0):
    # Preprocessor tracks up to 64 included filenames in a table at S+0x98000.
    # PP_ALREADY_INCLUDED(S, fname) scans table; PP_MARK_INCLUDED(S, fname) adds entry.
    # Duplicate include "file.cyr" directives silently skipped in both PP_PASS and PP_IFDEF_PASS.
    # Prevents: duplicate enum errors, wasted tokens/identifiers, confused downstream projects.

SIMD BATCH OPS (v1.9.0, expanded v1.10.0):
    # f64v_add(dst, a, b, n) — SSE2 packed f64, processes 2 elements per iteration
    # f64v_sub(dst, a, b, n) — same for subtraction
    # f64v_mul(dst, a, b, n) — same for multiplication
    # f64v_div(dst, a, b, n) — divpd, packed f64 division (v1.10.0)
    # f64v_sqrt(dst, src, n) — sqrtpd, packed f64 square root (v1.10.0)
    # f64v_abs(dst, src, n)  — andpd+mask, packed f64 absolute value (v1.10.0)
    # f64v_fmadd(dst, a, b, c, n) — mulpd+addpd, fused multiply-add (v1.10.0)
    # Emit: loop with movupd + op + movupd. 2x throughput vs scalar.
    # EMIT_F64V_UNARY for sqrt/abs, EMIT_F64V_FMADD for fused multiply-add.
    # Total: 7 SIMD ops (was 3 in v1.9.0).

STACK STR_BUILDER (v1.9.0):
    # str_builder_new() allocates 24-byte header + 64-byte inline buffer.
    # add_cstr/add_int write directly via memcpy — no per-segment alloc.
    # _sb_grow() doubles buffer when full (single alloc, not per-segment).
    # str_builder_build() copies to permanent alloc. Total: 1 alloc vs N.

DEPENDENCY MANAGEMENT (v1.9.1):
    # cyrb.toml [deps] section: stdlib, path, git dependencies.
    # cyrb build auto-resolves includes from deps before compilation.
    # modules = ["lib/x.cyr"] filter (v1.9.2) for selective includes.
    # git deps cloned to ~/.cyrius/deps/<name>/<tag>/, pinned by tag.

CYRB PULSAR (v1.9.0):
    # cyrb pulsar: full toolchain rebuild from source in ~410ms.
    # Builds cc2 + cc2_aarch64 (cross) + cc2-native-aarch64 (ARM native).
    # Installs to ~/.cyrius, purges old versions, verifies.
    # Auto two-step bootstrap for heap layout changes.

DEP MODULE FILTER (v1.9.2):
    # [deps.agnosys] path = "../agnosys" modules = ["lib/syscalls.cyr"]
    # Selective includes: only pull listed files from a dependency.
    # Without modules=, all lib/*.cyr + src/*.cyr are included.
    # Prevents pulling 20+ unused modules from large dependencies.

SIMD FRAME FIX (v1.9.3):
    # f64v_add/sub/mul stored args at hardcoded frame slots 0,1,2.
    # Clobbered caller's local variables — heap buffers produced zeros.
    # Fix: use GFLC() for fresh slots, pass vbase to EMIT_F64V_LOOP.

F64_ROUND (v1.9.4):
    # SSE4.1 roundsd mode 0 (round to nearest, banker's rounding).
    # Token 92. Completes floor/ceil/round set.
    # f64_round(3.5) → 4, f64_round(2.5) → 2.

FMT_FLOAT (v1.9.4):
    # fmt_float(val, decimals) — format f64 as "integer.fraction".
    # fmt_float_buf(val, buf, decimals) — write to buffer, return length.
    # Handles negatives, zero-pads fractional part.
    # fmt_float(pi, 6) → "3.141593", fmt_float(-1/3, 4) → "-0.3333"

GETENV (v1.9.4):
    # getenv(name) — read environment variable from /proc/self/environ.
    # Returns heap-allocated C string or 0 if not found.
    # Required for PATH lookup in hardware detection (ai-hwaccel).

DERIVE IN INCLUDES (v1.9.4):
    # #derive(Serialize) now works inside included files.
    # Added derive handling to PP_IFDEF_PASS (second preprocessor pass).
    # Previously only worked in the main source file.
    # Enables library modules to define serializable structs.

F64 BUILTINS COMPLETE (v1.10.0 — 28 total):
    # SSE2:  add sub mul div neg from to eq lt gt (10)
    # SSE4.1: sqrt floor ceil round (4)
    # Integer: abs (1)
    # x87 FPU: sin cos exp ln log2 exp2 (6)
    # SIMD: f64v_add f64v_sub f64v_mul f64v_div f64v_sqrt f64v_abs f64v_fmadd (7, SSE2 packed, 2 elements/iter)
    # Total: 21 scalar + 7 batch = 28 f64 operations

INLINE SMALL FUNCTIONS (v1.10.0):
    # Token replay inlining for 1-param functions with <= 6 body tokens.
    # Metadata tables at 0x2C8000-0x2D2000 (fn_body_start, fn_body_end,
    # fn_inline, fn_pnames). Called from PARSE_FNCALL when GFINL(fi)==1.
    # Body tokens replayed in caller context with param name mapping.
    # Max inline depth 3. Tail call disabled inside inline replay via GIDEP counter.

RETURN-BY-VALUE SMALL STRUCTS (v1.10.0):
    # ret2(a, b)  — return two values in rax:rdx (token 97)
    # rethi()     — read rdx from last call (mov rax, rdx) (token 98)
    # Handled in PARSE_SIMD_EXT and PARSE_STMT range 62-98.
    # Enables returning small structs (2 fields) without heap allocation.

REGISTER ALLOCATION R12 SPILL (v1.10.0):
    # ESPILL/EUNSPILL replace EPUSHR/EPOPR in expression evaluation.
    # First nesting level uses callee-saved R12 (mov r12,rax / mov rax,r12).
    # Deeper levels fall back to push/pop. Counter-based _rsl tracks nesting.
    # Prologue: push rbx; push r12; push rbp; mov rbp, rsp.
    # Epilogue: leave; pop r12; pop rbx; ret.
    # ETAILJMP updated to match. Stack param offset changed from +16 to +32.
    # aarch64 has ESPILL/EUNSPILL stubs (stack-only fallback).

REF DIRECTIVE (v1.10.0):
    # #ref "file.toml" — preprocessor directive loads TOML at compile time.
    # PP_REF_PASS runs before PP_PASS. Reads TOML file, emits var key = value;
    # for each key-value line. Skips comments (#), sections ([]), blank lines.
    # ISREF() detects the directive.

HASHMAP SIMPLIFIED (v1.10.0):
    # Removed enum constants (use literal 0/1/2 for empty/occupied/tombstone).
    # Extracted _map_lookup() helper for shared probe logic.
    # Used elif in probe loop. Reduced code duplication.

DEAD CODE REMOVAL (v1.10.0):
    # 11 stale files removed: src/cc/ (5 files), src/cc_bridge.cyr,
    # src/compiler.cyr, src/compiler_aarch64.cyr, src/arch/aarch64/ (3 files).
    # All superseded by modular src/frontend/ + src/backend/ structure.
'''

[[entries]]
name = "enum_namespacing"
description = "Enum.VARIANT syntax — qualified enum access in all expression contexts (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    enum Color { RED; GREEN; BLUE; }
    var c = Color.RED;
    if (c == Color.BLUE) { ... }
    fn paint(color) { return color == Color.GREEN; }

SEMANTICS:
    Enum.VARIANT works everywhere an expression is valid: assignments,
    comparisons, function arguments, return values, array indices.

    The parser resolves Enum.VARIANT by checking if the identifier after
    the dot is a global variable (which enum variants are compiled as).
    If it is, the dot expression is treated as an enum variant access.
    If not, it falls back to struct field access.

IMPLEMENTATION:
    No enum metadata table needed. Enum variants are already compiled as
    global variables (e.g., Color_RED). The parser just needs to recognize
    the Enum.VARIANT pattern and map it to the global variable name.

    This is intentionally simple — no type checking, no enum-specific
    lookup tables. The existing global variable mechanism does all the work.

KEY LESSON:
    When the existing infrastructure (global vars) already handles the
    underlying mechanism, the language feature is just syntactic sugar
    in the parser. No new tables, no new passes, no new complexity.
'''

[[entries]]
name = "relaxed_fn_ordering"
description = "fn definitions can appear after top-level statements (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    var x = 42;
    print_i64(x);      # top-level statement
    fn helper(a) {     # fn defined AFTER top-level code
        return a * 2;
    }

SEMANTICS:
    Prior to v1.10.0, all fn definitions had to appear before any top-level
    statements. Now fn definitions can be freely interleaved with top-level
    code. Forward calls already worked (two-pass compilation), so this only
    affected fn definitions appearing physically after executed statements.

IMPLEMENTATION:
    PARSE_PROG handles `fn` tokens by:
    1. Emitting a jmp instruction to jump over the function body
    2. Compiling the function body normally (same as before)
    3. Patching the jmp to land after the function body

    This is the same jmp-over pattern used for if/else blocks. The function
    body is compiled in place but execution skips over it via the jump.

KEY LESSON:
    Non-invasive change. The jmp-over-body pattern is already well-tested
    in the compiler for other constructs. Reusing it for fn ordering means
    no new mechanisms and no risk to existing code generation.
'''

[[entries]]
name = "ret2_rethi"
description = "Return two values via rax:rdx register pair (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    fn divmod(a, b) {
        var q = a / b;
        var r = a % b;
        ret2(q, r);        # return two values: rax=q, rdx=r
    }
    var result = divmod(17, 5);   # rax = 3 (quotient)
    var remainder = rethi();      # rdx = 2 (remainder)

SEMANTICS:
    ret2(a, b) packs two values into the rax:rdx register pair and returns.
    The first argument goes to rax (normal return), the second to rdx.
    rethi() retrieves the second return value from rdx (mov rax, rdx).

    This follows the System V AMD64 ABI convention where functions can
    return two 64-bit values in rax and rdx.

IMPLEMENTATION:
    Tokens: ret2 = 97, rethi = 98
    Handled in PARSE_SIMD_EXT (the extended keyword handler).

    ret2(a, b):
      1. Evaluate b → rax
      2. mov rdx, rax    # second value in rdx
      3. Evaluate a → rax  # first value in rax
      4. Emit function return (epilogue + ret)

    rethi():
      1. mov rax, rdx    # move second return value to rax

KEY LESSON:
    Simple two-register return is sufficient for many cases (divmod,
    pointer+length, success+value). No need for struct returns or
    output parameters for the common two-value case.
'''

[[entries]]
name = "ref_directive"
description = "#ref directive — compile-time TOML loading (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    #ref "config.toml"
    # If config.toml contains:
    #   width = 800
    #   height = 600
    # Then after preprocessing, the source contains:
    #   var width = 800;
    #   var height = 600;

SEMANTICS:
    #ref "file.toml" loads a TOML file at compile time and emits
    var declarations for each key-value pair. Skips comments (#),
    section headers ([section]), and blank lines. String values
    become string literals, numeric values become integer literals.

IMPLEMENTATION:
    PP_REF_PASS runs as a separate preprocessing pass BEFORE PP_PASS.
    This ordering is critical — #ref must expand before #ifdef and
    other preprocessor directives see the generated var declarations.

    ISREF() detects the #ref directive in the source.
    The pass reads the TOML file, parses key = value lines,
    and emits `var key = value;` for each valid entry.

KEY LESSON:
    PP_PASS was already too large to add new inline code. Attempting to
    add #ref handling inside PP_PASS hit code generation size limits.
    The solution was a separate pre-pass (PP_REF_PASS) that runs first.
    This is the same pattern used for PP_IFDEF_PASS and PP_DERIVE passes:
    when a pass gets too big, split into a new pass that runs at a
    different stage in the pipeline.
'''

[[entries]]
name = "f64_atan_and_math_lib"
description = "f64_atan builtin and lib/math.cyr transcendental library (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
    var angle = f64_atan(slope);        # builtin: arctangent
    var s = sinh(x);                     # lib/math.cyr
    var c = cosh(x);                     # lib/math.cyr
    var t = tanh(x);                     # lib/math.cyr
    var p = pow(base, exp);             # lib/math.cyr
    var v = clamp(x, lo, hi);          # lib/math.cyr
    var m = min(a, b);                  # lib/math.cyr
    var M = max(a, b);                  # lib/math.cyr

IMPLEMENTATION:
    f64_atan is token 99, handled in PARSE_SIMD_EXT.
    Uses x87 FPU instructions: fld1 + fpatan.
    This computes atan(ST(1)/ST(0)) which gives atan(x/1) = atan(x).

    lib/math.cyr provides higher-level math functions composed from
    existing builtins:
      sinh(x) = (f64_exp(x) - f64_exp(f64_neg(x))) / 2
      cosh(x) = (f64_exp(x) + f64_exp(f64_neg(x))) / 2
      tanh(x) = sinh(x) / cosh(x)
      pow(b,e) = f64_exp(f64_mul(e, f64_log(b)))
      clamp/min/max = straightforward comparisons

KEY LESSON:
    The x87 FPU transcendentals (fpatan, fsin, fcos, fsqrt) are the most
    compact way to implement these — single instructions vs. Taylor series
    or lookup tables. The lib/math.cyr functions then compose from builtins,
    keeping the compiler small while providing a rich math library.
'''

[[entries]]
name = "continue_in_for_loops"
description = "continue statement with forward-patch mechanism for for-loops (v1.11.0)"
category = "cyrius"
content = '''
SYNTAX:
    for (var i = 0; i < 10; i = i + 1) {
        if (i == 5) { continue; }
        print_i64(i);
    }

SEMANTICS:
    continue skips the rest of the loop body and jumps to the step
    expression (i = i + 1) in for-loops, or to the condition check
    in while-loops.

IMPLEMENTATION:
    Forward-patch mechanism at S+0x8F850 (continue target address).
    Array of up to 8 continue patches stored at S+0x8F858.

    For-loop compilation:
    1. Compile init (var i = 0)
    2. Emit condition check (i < 10)
    3. Compile body — any `continue` emits a jmp with placeholder
       and records the patch location in the array
    4. After body, record current position as the step expression start
    5. Compile step (i = i + 1)
    6. Patch all continue jmps to point to step expression

CRITICAL BUG (v1.11.0 — fixed v1.11.4):
    The continue patch counter was at S+0x8F850, and the continue patch
    array at S+0x8F858. But the &&/|| extra_patches array starts at
    S+0x8F848 and grows upward (8 entries × 8 bytes = 64 bytes, to 0x8F888).

    With `a && b` (1 chained &&), ADDXP writes to 0x8F848+0*8=0x8F848 — safe.
    With `a && b && c` (2 chained &&), ADDXP writes to 0x8F848+1*8=0x8F850 —
    OVERWRITES the continue counter with a code buffer offset.

    When the for-loop closes, it reads L64(0x8F850)-1 as the continue count.
    The corrupted value (~36000 for large programs) causes iteration through
    unmapped memory in EPATCH → SIGSEGV. Small programs survive because the
    corrupted count stays within mapped heap.

    Fix (v1.11.4): Relocated continue data from 0x8F850/0x8F858 to
    0x8F8A0/0x8F8A8 — after the extra_patches region.

    v1.11.5 added overflow guards: ADDXP now checks c >= 8, continue
    patches check ci >= 8. Both error cleanly instead of silent overflow.

KEY LESSON:
    The compiler uses a flat heap region for state variables. There is no
    allocation tracking — offsets are chosen manually. When adding new
    state, you MUST check what already lives at nearby addresses. A map
    of heap offset usage would prevent these silent collisions.

    Bug #14 was a 16-byte overlap that went undetected across 4 releases
    because the crash only manifested when: (1) triple && was used inside
    a for-loop, AND (2) the program was large enough that the corrupted
    counter caused reads past the brk boundary. Both conditions were
    required — isolated tests passed.
'''

[[entries]]
name = "multi_width_types"
description = "v2.0: Multi-width types (i8, i16, i32) with width-correct codegen"
category = "cyrius"
content = '''
SYNTAX:
    var x: i8 = 42;       # 1-byte variable
    var y: i16 = 30000;   # 2-byte variable
    var z: i32 = 100000;  # 4-byte variable
    var w: i64 = 0;       # explicit 8-byte (same as untyped)
    var u: u128 = 0;      # 16-byte (storage only, arithmetic TBD)

SEMANTICS:
    Type annotations control BOTH storage size AND load/store width.
    var x: i8 = 256; → stores 0 (truncated to 1 byte).
    Reading x back gives 0 (movzx zero-extends to rax).

    Globals: var_sizes[idx] = 1/2/4/8/16 (actual byte allocation in data section).
    Locals: 8-byte stack slots, but loads/stores use correct width within the slot.

CODEGEN:
    EVLOAD_W(S, idx, width) / EVSTORE_W(S, idx, width) for globals.
    EFLLOAD_W(S, idx, width) / EFLSTORE_W(S, idx, width) for locals.
    Width 1: movzx rax, byte [addr] / mov byte [addr], al
    Width 2: movzx eax, word [addr] / mov word [addr], ax
    Width 4: mov eax, [addr]        / mov dword [addr], eax
    Width 8: mov rax, [addr]        / mov qword [addr], rax (default)

DISAMBIGUATION:
    Type IDs 1-8 overlap with struct IDs (also start at 1). Resolved via
    var_sizes: if var_sizes[idx] < 8, it is a scalar type. Structs always
    have var_sizes >= 8 (minimum 1 field × 8 bytes).

BACKWARD COMPATIBLE:
    Untyped variables remain i64. The compiler source uses no type annotations.
    Self-hosting produces identical output. Two-step bootstrap required after
    codegen changes (width-correct load/store functions are new code).
'''

[[entries]]
name = "sizeof_operator"
description = "v2.0: sizeof(Type) compile-time constant"
category = "cyrius"
content = '''
SYNTAX:
    var n = sizeof(i8);      # 1
    var n = sizeof(i16);     # 2
    var n = sizeof(i32);     # 4
    var n = sizeof(i64);     # 8
    var n = sizeof(u128);    # 16
    var n = sizeof(Point);   # recursive struct size

IMPLEMENTATION:
    Detected in PARSE_FACTOR as an identifier matching "sizeof" (6-byte packed
    comparison on L64 of tok_names). NOT a lexer keyword — the klen=6 lexer
    keyword block had a code size issue that silently dropped sizeof recognition.
    Identifier-based detection in the parser is more robust.

    Parses: sizeof ( TypeName ) → EMOVI(S, size)
    For scalars: direct byte width.
    For structs: calls STRUCTSZ(S, sid-1) which recursively sums field widths.
    For u128: token 105 handled as special case.
'''

[[entries]]
name = "unions"
description = "v2.0: union keyword — all fields at offset 0, size = max field"
category = "cyrius"
content = '''
SYNTAX:
    union Value {
        as_int;
        as_ptr;
    }

SEMANTICS:
    All fields share offset 0. sizeof(Value) = max(sizeof(field)).
    Field access: v.as_int and v.as_ptr read from the same memory.
    Init: var v = Value { 42, 42 }; (all fields, like struct init).

IMPLEMENTATION:
    Token 101 (UNION). Parsed by PARSE_UNION_DEF — same as PARSE_STRUCT_DEF
    but sets high bit (bit 63) of struct_fcounts as union flag.
    ISUNION(S, si) checks bit 63. FIELDOFF returns 0 for all union fields.
    STRUCTSZ returns max field size instead of sum.
    Struct tables (fnames, ftypes) are shared — unions are structs internally.
'''

[[entries]]
name = "bitfield_builtins"
description = "v2.0: bitget/bitset/bitclr — inline bit manipulation"
category = "cyrius"
content = '''
SYNTAX:
    var pte = 0x1007;
    var present = bitget(pte, 0, 1);    # extract 1 bit at offset 0
    pte = bitset(pte, 12, 40, 0x2);     # set 40 bits at offset 12
    pte = bitclr(pte, 0, 3);            # clear 3 bits at offset 0

SEMANTICS:
    bitget(val, offset, width) → (val >> offset) & ((1 << width) - 1)
    bitset(val, offset, width, new) → (val & ~(mask << offset)) | ((new & mask) << offset)
    bitclr(val, offset, width) → val & ~(((1 << width) - 1) << offset)

IMPLEMENTATION:
    Tokens 102-104. Handled in PARSE_SIMD_EXT.
    bitget: inline shift/mask using ESPILL/EUNSPILL (works at top level).
    bitset/bitclr: use EFLSTORE/EFLLOAD for temp slots (MUST be inside a function).
    Calling bitset/bitclr at top level emits: "must be called inside a function".

REPLACES:
    Manual patterns like: var present = (pte >> 0) & 1;
    var addr = (pte >> 12) & 0xFFFFF;
    Used in AGNOS kernel for PTE, GDT, IDT descriptor manipulation.
'''

[[entries]]
name = "struct_field_widths"
description = "v2.0: Struct fields with typed widths for packed layouts"
category = "cyrius"
content = '''
SYNTAX:
    struct Packet {
        tag: i8;       # 1 byte
        len: i16;      # 2 bytes
        data: i32;     # 4 bytes
        payload;       # 8 bytes (default, untyped)
    }
    # sizeof(Packet) = 1 + 2 + 4 + 8 = 15

IMPLEMENTATION:
    Field type stored in struct_ftypes as negative width:
      0  = untyped scalar (8 bytes)
      >0 = nested struct ID
      -1 = i8, -2 = i16, -4 = i32, -8 = explicit i64

    FIELDSZ(S, ft): returns byte size from type encoding.
    STRUCTSZ and FIELDOFF use FIELDSZ for each field.
    Field loads: width-correct (movzx for i8/i16, mov for i32/i64).
    Field stores: width-correct in PARSE_FIELD_STORE.
    Struct init (EMIT_STRUCT_FIELD): still uses 8-byte stores (TODO: width-correct).
'''

[[entries]]
name = "expression_type_propagation"
description = "v2.0: Track expression width, warn on narrowing assignments"
category = "cyrius"
content = '''
MECHANISM:
    GEXW(S) / SEXW(S, v) at heap offset 0x903F0.
    PARSE_FACTOR sets expr_width when loading a typed variable.
    Assignment checks: if target width < expr_width, emit warning:
      "warning:N: narrowing assignment (value may truncate)"

EXAMPLE:
    var big: i32 = 1000;
    var small: i8 = 0;
    small = big;          # warning: narrowing assignment

    The assignment still succeeds (truncates to i8), but the warning
    alerts the developer to potential data loss.

SCOPE:
    Warnings only on reassignment (PARSE_STMT assignment path), not on
    initialization (PARSE_VAR). Initialization is an explicit choice.
    Works for both locals (GLTYPE check) and globals (var_sizes check).
'''

[[entries]]
name = "tcyr_bcyr_test_format"
description = "v2.0: .tcyr/.bcyr test and bench file format with auto-discovery"
category = "cyrius"
content = '''
TEST FILES (.tcyr):
    Regular .cyr files with assert.cyr conventions.
    `cyrb test` auto-discovers in tests/, tests/tcyr/, src/.
    Metadata comments:
      # skip: reason      — skip this test
      # expect: N         — expected exit code (default 0)
    assert_summary() output is parsed for pass/fail counts.
    test_group("name") prints section headers.

BENCH FILES (.bcyr):
    Regular .cyr files with bench.cyr conventions.
    `cyrb bench` auto-discovers in benches/, tests/bcyr/.

RUNNER FLAGS:
    cyrb test --verbose   — show full test output
    cyrb test --filter X  — run only matching files

BUILD OUTPUT:
    cyrb build src.cyr out  — shows: src -> out  N bytes  Nms  [arch]
    cyrb build -v ...       — also shows individual warnings

AUDIT:
    cyrb audit / sh scripts/check.sh
    5 stages: self-hosting, heap map, .tcyr suite, format, lint.

REPLACED: compiler.sh (216 tests), programs.sh (51 tests), assembler.sh.
Clean break for v2.0.
'''
