SQL: CREATE TABLE, INSERT, SELECT (WHERE, ORDER BY, LIMIT), UPDATE, DELETE
Storage: B-tree indexed pages in .patra files, flock concurrency
Types: INT (i64) and STR (fixed-size, null-terminated)

API:
  patra_init()
  patra_open(path) → db handle
  patra_exec(db, sql) → status code
  patra_query(db, sql) → result set
  patra_result_count/get_int/get_str/col_name/col_type
  patra_close(db)

Same distribution pattern as sakshi: patra repo is source of truth,
lib/patra.cyr is a stdlib snapshot. 212 assertions in patra repo.
Module #36.
'''

[[entries]]
name = "strstr_function"
description = "v3.2: strstr() in string.cyr — substring search using memeq"
category = "cyrius"
content = '''
fn strstr(haystack, needle) — find substring, returns index or -1.
Both args are null-terminated C strings. Uses memeq internally.

Added as workaround for the nested while loop codegen bug:
manual byte-by-byte comparison in inner while loops produces wrong
results due to expression register clobbering. Using memeq (a single
function call) avoids the nested loop pattern entirely.

Also available: strchr (single byte), memchr (byte in buffer).
'''

[[entries]]
name = "derive_str_fields"
description = "v3.2: #derive(Serialize) supports Str field type annotations"
category = "cyrius"
content = '''
Fields annotated `: Str` in structs with #derive(Serialize) now serialize
as quoted JSON strings instead of raw pointer addresses.

BEFORE (v3.2.1):
  struct Agent { id; name: Str; }
  Agent_to_json(&a) → {"id":42,"name":140234567890}  # pointer!

AFTER (v3.2.3):
  Agent_to_json(&a) → {"id":42,"name":"alice"}  # correct

_from_json also handles Str fields: stores via str_from(v).
Integer fields (no type annotation) serialize as bare numbers.

Detection: preprocessor checks if field type bytes match "Str\0"
(83, 116, 114, 0). Simple byte comparison, no string table lookup.
'''

[[entries]]
name = "function_table_2048"
description = "v3.2: Function table expanded 1024→2048"
category = "cyrius"
content = '''
Six function tables (names, offsets, params, body_start, body_end, inline)
each doubled from 8192 to 16384 bytes. All downstream heap regions relocated:
  struct_fnames: 0xCC000 → 0xD8000
  output_buf:    0xCE000 → 0xDA000
  var_noffs:     0x10E000 → 0x11A000
  var_sizes:     0x11E000 → 0x12A000
  var_types:     0x12E000 → 0x13A000
  tok_types:     0x13E000 → 0x14A000
  tok_values:    0x23E000 → 0x24A000
  tok_lines:     0x33E000 → 0x34A000
  preprocess:    0x43E000 → 0x44A000
  brk:           0x4BE000 → 0x4CA000

Required by agnostik (852 src functions + 84 test + stdlib).
Two-step bootstrap verified after all offset changes.
'''

[[entries]]
name = "nested_while_codegen_bug"
description = "v3.2: Known gotcha #6 — load8 comparisons fail in nested while loops"
category = "cyrius"
content = '''
BUG: Byte-by-byte comparisons using load8 inside inner while loops
produce wrong results. The expression register (rax) gets clobbered
by the loop condition evaluation.

EXAMPLE (fails):
  while (k < nlen) {
      if (load8(hay + i + k) != load8(needle + k)) { match = 0; break; }
      k = k + 1;
  }

WORKAROUNDS (all correct):
  1. memeq(hay + i, needle, nlen)  — single function call
  2. strchr(s, byte)               — single byte search
  3. strstr(haystack, needle)      — substring search
  4. Break-free pattern: use flag variable + k=nlen instead of break

ROOT CAUSE: Expression evaluation in nested loop bodies interferes
with the outer loop's condition registers. Not yet fixed — workarounds
are efficient and recommended regardless.

Affects: substring search, JSON parsing, protocol parsing.
Documented as Known Gotcha #6 in roadmap.
'''

[[entries]]
name = "derive_integers_fix"
description = "v3.2: #derive(Serialize) emits bare integers (42 not \"42\")"
category = "cyrius"
content = '''
BEFORE (v3.2.1): All scalar fields wrapped in quotes: {"x":"42"}
AFTER (v3.2.2): Scalar fields as bare JSON numbers: {"x":42}

Root cause: PP_DERIVE_SERIALIZE codegen emitted quote-wrapping:
  str_builder_add_cstr(sb, "\"");
  str_builder_add_int(sb, ...);
  str_builder_add_cstr(sb, "\"");

Fix: removed quote-wrapping for scalar fields. Just:
  str_builder_add_int(sb, load64(ptr + offset));

Combined with v3.2.3 Str field support, derive now generates
correct JSON for all field types.
'''

[[entries]]
name = "platform_stubs"
description = "v3.1: Mach-O and PE/COFF emitter stubs scaffolded"
category = "cyrius"
content = '''
src/backend/macho/emit.cyr — macOS x86_64 + aarch64 output stub
src/backend/pe/emit.cyr    — Windows x86_64 output stub

Both contain: format documentation, difference from ELF, 3-phase
implementation plan, stub functions that error with clear message.

Mach-O phases: .o → executable → macOS syscall shim (or libSystem)
PE phases: .obj → executable → kernel32 imports

Scaffolded for v3.1+. No functional code yet — call either stub
and get: "error: Mach-O/PE output not yet implemented"
'''

[[entries]]
name = "doc_serve"
description = "v3.2: cyrius doc --serve — local HTTP server for generated docs"
category = "cyrius"
content = '''
`cyrius doc --serve [port]` generates HTML docs for all .cyr files
and serves locally via Python http.server.

Creates build/docs/ with index.html linking to per-module HTML.
Default port 8080. Ctrl+C to stop.

Requires python3 on the host. Future: replace with Cyrius HTTP
server (lib/http_server.cyr, added in 4.5.0) for zero-dep doc serving —
vidya 2.x already moved its `vidya serve` JSON API onto that stdlib.
'''

[[entries]]
name = "cc3_rename"
description = "v3.2.5: Compiler binary renamed cc2→cc3 for the 3.x generation"
category = "cyrius"
content = '''
cc2 → cc3. cc2_aarch64 → cc3_aarch64. cc2cx → cc3cx.
cc2-native-aarch64 → cc3-native-aarch64.

Bootstrap chain: asm (29KB) → stage1f (now cyrc) → bridge → cc3 (233KB)

Naming convention: cc = cyrius compiler, N = generation.
  cc1 = never existed (stage1f → cyrc was the first, renamed v3.9.5)
  cc2 = second gen (modular, 8 includes)
  cc3 = third gen (3.x era, defer, 2048 fns, 36 stdlib modules)

Backward compat: ~/.cyrius/bin/cc2 symlinks to cc3.
.gitignore updated: !/build/cc3 (was !/build/cc2).
162+ references updated in cyrius repo, 10 downstream workflow files.
Same propagation pattern as cyrb→cyrius rename.
'''

[[entries]]
name = "patra_stdlib_module"
description = "v3.2.5: lib/patra.cyr v0.11.1 — sovereign SQL database in stdlib"
category = "cyrius"
content = '''
Patra: structured storage, SQL queries, transactions. Zero dependencies.
Single-file distribution (3197 lines) of Patra v0.11.1.

v0.11 FEATURES (over v0.8):
  - SHA-256 hash (FIPS 180-4 verified)
  - Write-ahead logging (WAL) with crash recovery
  - Transaction API: patra_begin/commit/rollback
  - fdatasync on commit for durability
  - 243 test assertions (up from 212)

SQL: CREATE TABLE, INSERT, SELECT (WHERE, ORDER BY, LIMIT), UPDATE, DELETE
Storage: B-tree indexed 4KB pages in .patra file
Concurrency: flock (advisory file locking)
Types: INT (i64) and STR (fixed-size)

Same distribution pattern as sakshi: patra repo develops, cyrius
stdlib gets a snapshot. `include "lib/patra.cyr"` and go.

Module #36. Unblocks libro SQL backend.
'''

[[entries]]
name = "minimum_version_concept"
description = "v3.2.5: First true minimum version — cc3, 2048 fns, defer, Str derive"
category = "cyrius"
content = '''
v3.2.5 is the first release designated as a TRUE MINIMUM VERSION.
Every downstream project should pin to >= 3.2.5 because:

BREAKING CHANGES FROM OLDER VERSIONS:
  - cc3 binary name (cc2 no longer in tarball)
  - Function table 2048 (agnostik needs >1024)
  - #derive(Serialize) integers (42 not "42")
  - #derive(Serialize) Str fields ("alice" not pointer)
  - defer statement (new keyword, token 106)
  - String data 32KB (libro/agnostik need >16KB)
  - strstr() in string.cyr
  - lib/patra.cyr, lib/csv.cyr, lib/http.cyr, lib/base64.cyr, lib/chrono.cyr

For 3.3.0: `cyrius.toml` will support:
  cyrius = "3.2.5"    # minimum compiler version
  `cyrius build` checks and errors early.

PATTERN: Like Rust's rust-version in Cargo.toml, Go's go directive
in go.mod, Zig's minimum_zig_version in build.zig.zon.
'''

[[entries]]
name = "nested_while_codegen_documented"
description = "v3.2.4: Known Gotcha #6 — load8 in nested while loops, workarounds provided"
category = "cyrius"
content = '''
BUG: load8 comparisons inside inner while loops produce wrong results.
Expression register clobbered by loop condition evaluation.

STDLIB WORKAROUNDS:
  strstr(hay, needle)  — substring search via memeq
  strchr(s, byte)      — single byte search
  memeq(a, b, n)       — byte comparison

DOWNSTREAM IMPACT:
  agnostik: wrote break-free JSON extractors (_json_int, _json_str)
  version_from_str: used strchr instead of manual byte loop
  All documented in Known Gotchas section of roadmap.

STATUS: RESOLVED in v3.4.6-3.4.9. The underlying cause was single-slot break
patching corrupting codegen for large nested-loop programs. Multi-break
linked-list fix in v3.3.15 removed the corruption, and the nested-while
pattern works again. See "v3_3_v3_4_release_arc" below.
'''

[[entries]]
name = "v3_3_v3_4_release_arc"
description = "The 3.3–3.4 arc: compiler stabilization, dep system, stdlib growth, cleanup (v3.2.5 → v3.6.3)"
category = "cyrius"
content = '''
20 patch releases from v3.2.6 to v3.6.3 (inclusive) — a stabilization and
stdlib-growth arc, not a language expansion. This entry captures the
through-line so you don't have to read every CHANGELOG.md block.

=== MAJOR THEMES ===

1. DEP SYSTEM MATURED (v3.3.6)
   - `cyrius deps` resolves git deps: fetches repos, symlinks dist bundles into lib/.
   - `cyrius.toml` [deps.<name>] entries with { git, tag, modules }.
   - Single-file dist/<name>.cyr convention (yukti, patra, sigil, sakshi, mabda).
   - Vendored lib/ copies replaced by symlinks; projects track the toolchain stdlib.
   - Dep fetches fail gracefully — missing tags warn, don't crash.

2. STDLIB GREW from 34 → 40 modules + 5 deps
   Added: csv, base64, http, chrono, bigint, audio (ALSA direct ioctl),
          log (structured via sakshi), ws (WebSocket RFC 6455),
          tls (TLS 1.3 scaffold — X25519 pending), mmap, dynlib (pure Cyrius
          ELF .so loader), matrix, vidya
   Deps:  sakshi, patra, sigil, yukti, mabda (activated v3.6.3)

3. COMPILER STABILIZATION
   - Multi-break in nested loops (v3.3.15): linked-list break patching via codebuf
     rel32 fields. Each `break` chains the previous break's patch offset into its
     jmp placeholder; loop exit walks the chain. Zero extra heap. Fixed the oldest
     open compiler bug from v3.2.6.
   - tok_names 32→64KB (v3.3.17): moved str_data from 0x68000 (nested) to 0x40000,
     reclaiming the full 64KB. Unblocked shravan (~35KB names for audio codec).
   - Hex literal buffer fix (v3.3.17 Bug #33): LEXHEX was reading from raw input
     buffer instead of preprocessed buffer — masked for years because cc3's own
     source was small enough to overlap.
   - 7+ arg stack offset (v3.3.11 Bug #32): push r12 added to prologue had shifted
     stack frame; ESTORESTACKPARM still read [rbp+16] instead of [rbp+24].
   - r12 loop var cache REVERTED (v3.3.12): 2x perf regression in doom benchmarks
     from push/pop r12 on every function call — cost of the opt vastly exceeded
     the savings from caching one loop counter. Filed as lesson: test perf, not
     just correctness.
   - Large multi-lib SIGSEGV (v3.4.7 Bug #35): ifdef copy-back overwrote
     str_pos/data_size. Re-init after preprocessing fixed it.
   - _cfo leak in fn call args (v3.4.10 Bug #36): constant folding optimization
     flag leaked across comparison operators inside arguments. Fixed `assert(ps
     != 0, "msg")` pattern that crashed in large binaries.
   - #derive(Serialize) duplicate vars (v3.4.4 Bug #34): multi-field structs
     generated `var _iv`/`var _vs` inside each branch → duplicate on second
     field. Moved declarations to function top.
   - PIC codegen for `object;` mode (v3.4.12): LEA [rip+disp32] + R_X86_64_PC32
     relocs instead of MOV imm64 + R_X86_64_64. Eliminates DT_TEXTREL — glibc
     2.38+ refuses dlopen of TEXTREL binaries. Unblocked mabda GPU port.
   - `_cyrius_init` export in object mode (v3.4.14): top-level code (enum
     values, global var inits) wrapped in a callable function C launchers can
     invoke before any application function.

4. OPTIMIZATIONS SHIPPED
   - Dead Store Elimination (v3.3.2): post-emit pass scans codebuf for
     consecutive stores to same [rbp-N]; first store NOPped.
   - Constant folding expanded (v3.3.1): 16-bit result limit removed; any
     non-negative fold accepted. `50 * 1000 = 50000` folds at compile time.
     `x - 0` identity added.
   - Inlining expanded (v3.3.5): 2-param fns + 16-token bodies (was 1-param /
     6-token). `u256_limb(a, i)` now inlines.
   - DCE via name bitmap (pre-existing, validated): O(T+N) unreferenced-fn
     removal.

5. CLEANUP (v3.4.15-3.6.3)
   - Doc sweep: 233KB → 250KB canonical binary size across README, benchmarks,
     ADRs, architecture docs. Test counts aligned to 32 suites / 442 assertions.
     Stdlib counts aligned to 40 + 5 deps.
   - scripts/check.sh + cyrius audit dispatcher deduplicated: extracted shared
     fmt/lint walkers into scripts/lib/audit-walk.sh, both paths source it.
   - cyriusup → cyriusly rename ("Language Yare"): version manager renamed
     from rustup-style `-up` to the nautical sense of "quick, agile, responsive —
     the ship answers the helm."
   - Dead code removal (v3.4.16): GLVR/SLVR (reverted r12 cache), GFBE, GPUB/SPUB
     (scaffolded pub check never wired up), TWIDTH (inlined at call sites).
     -16 bytes off the compiler binary.
   - Heap gap closure (v3.4.16): 8-byte gap at 0x8F898 eliminated by moving
     continue_count/continue_patches down. Heap audit: 48 regions/1 warning →
     47 regions/0 warnings.
   - Stale --version bug (v3.4.16): cc3 --version reported "3.4.10" for five
     releases (3.4.11 through 3.4.15) because `scripts/version-bump.sh` used an
     exact-match sed that silently failed on drift. Fixed the version string to
     the current release and hardened the sed to a permissive regex with
     auto-computed syscall-write length.
   - mabda stdlib inclusion landed in v3.6.3 (single release absorbing
     three rounds of in-flight work — internal tags 3.4.17 and 3.4.18
     never shipped publicly). Mabda is the GPU foundation layer; backend
     is transitional (C shim over wgpu-native), public API is the
     stability contract that survives the eventual swap to pure Cyrius.
     The release arc on the mabda side:
       v2.0.0 — Rust → Cyrius port
       v2.1.0 — feature-complete against Rust v1.0 (290 assertions, full
                FFI path for texture + render pipeline + surface)
       v2.1.1 — stdlib-inclusion release (dist/mabda.cyr bundle,
                [lib] manifest, # @public / # @internal surface marking)
       v2.1.2 — repo hygiene (rust-old reference tree removed)
     Cyrius 3.6.3 activates `[deps.mabda] = 2.1.2` in cyrius.toml.
   - input_buf expanded 128KB → 256KB + explicit truncation error (v3.6.3):
     the blocking cc3 change that enabled mabda inclusion. The 141KB
     dist/mabda.cyr bundle could not fit the old 128KB stdin buffer; the
     read loop silently stopped at 131072 bytes, producing confusing parse
     errors far from the actual truncation point. The expansion fills the
     adjacent reclaimable slot at 0x20000 (free since v3.3.7) without
     shifting any downstream offsets. New read loop probes for a trailing
     byte after the buffer fills and errors out explicitly — silent
     truncation is never an acceptable failure mode. Binary grew +232
     bytes for the probe + error message. Heap audit still 47 regions /
     0 warnings.

=== RECOMMENDED MINIMUM ===

Projects should pin to >= 3.4.0 for:
  - 512KB codebuf (needed for large binaries — libro+patra, shravan)
  - 64KB tok_names (enough for ~6500+ identifiers)
  - Multi-break linked-list (nested break correctness)
  - Hex parser fix

Projects needing mabda GPU integration should pin >= 3.6.3:
  - PIC codegen for object mode (v3.4.12)
  - _cyrius_init export (v3.4.14)
  - input_buf 256KB + truncation error (v3.6.3)
  - [deps.mabda] activation (v3.6.3)
'''

[[entries]]
name = "v3_5_v3_6_release_arc"
description = "The 3.5–3.6 arc: expression power, string unification, scale limits raised (v3.5.0 → v3.6.3)"
category = "cyrius"
content = '''
14 patch/minor releases from v3.5.0 to v3.6.3 — a language-feature and
scale-expansion arc. Every item shipped with regression tests.

=== EXPRESSION POWER (v3.5.0) ===

1. EXPRESSION-POSITION COMPARISONS
   ==, !=, <, >, <=, >= now return 0/1 as values in ANY expression position:
   var init, function call arguments, store values, return, &&/|| chains.
   Before: var r = 0; if (a == b) { r = 1; }
   After:  var r = (a == b);
   81 PEXPR→PCMPE call sites upgraded in parse.cyr.

2. #ASSERT COMPILE-TIME CHECK
   #assert sizeof(Point) == 16, "Point layout changed"
   Evaluates constant expression at parse time, aborts with line + message.
   Token 107, _EVAL_CONST_ATOM evaluator.

3. SYSCALL ARITY WARNINGS
   40-entry lookup table of Linux x86_64 syscall number → expected args.
   Warns at compile time: syscall(1, 1) → "syscall arity mismatch".

4. AARCH64 ESETCC FIX
   GT, LE, GE condition codes were wrong in the cset instruction encoding.
   Pre-existing since the aarch64 backend was written, exposed by PCMPE-
   everywhere routing all comparisons through ESETCC.

=== STRING UNIFICATION (v3.6.0-3.6.1) ===

5. STR/CSTR AUTO-COERCION (v3.6.0)
   Functions with : Str parameter annotations auto-wrap string literal
   arguments in str_from() at call sites. fn_param_str_mask table at
   0xDC000 (2048 entries). lib/str.cyr annotated: str_eq, str_cat,
   str_contains, str_starts_with, str_ends_with, str_split, str_join,
   str_builder_add. 748 str_from("literal") wrappers now eliminable
   across argonaut (382), libro (291), stdlib (75).

6. COMPILE-TIME STRING INTERNING (v3.6.1)
   Identical string literals share the same address. "hello" == "hello"
   is true. Always-on dedup in the lexer. Pointer comparison is 30%
   faster than streq, 44% faster than str_eq. Classification chains
   (if cmd == "get" ... elif cmd == "set" ...) now use 1-cycle pointer
   comparison instead of memcmp.

7. LIB/CFFI.CYR (v3.6.3)
   C struct layout helpers: cffi_struct_new, cffi_field, cffi_offset,
   cffi_sizeof. Computes field offsets with C alignment/padding rules.
   18 functions, 23 test assertions. Module #41. Needed for tarang
   codec ports and mabda wgpu descriptor builders.

=== SCALE LIMITS RAISED (v3.5.1-3.6.2) ===

  - READFILE include-read cap: 512KB → 1MB (v3.5.1)
  - Codebuf: 512KB → 1MB, output_buf shifted (v3.5.2)
  - Token limit: 131,072 → 262,144, arrays relocated past brk (v3.6.2)
  - Preprocess_out cap: 512KB → 1MB (v3.4.20, stale check fixed)
  - Input_buf: 128KB → 256KB (v3.4.19, with truncation error)
  - Brk: 7.3MB → 13.3MB (token array relocation)

=== KNOWN ISSUES (at v3.6.3, some since fixed) ===

  - Ifdef copy-back >256KB — fixed in v3.6.5 with mmap temp buffer.
  - Libro PatraStore stack corruption in >300KB binaries — gated in
    libro 1.0.3. Root cause suspected: codegen/stack frame issue.
    May surface during v3.10.0 register allocation work.

=== STATS AT v3.6.3 ===

  cc3: 290KB (290,040 bytes), self-hosting byte-identical
  41 stdlib modules + 5 deps
  33 test suites, 491 assertions
  5 fuzz harnesses, 10 benchmarks
  Token limit: 262,144
  Heap: 13.3MB (brk at 0xD4A000)
'''

[[entries]]
name = "v3_7_v4_0_release_arc"
description = "The 3.7-4.0 arc: features, safety, tooling, ecosystem (v3.7.0 → v4.0.0)"
category = "cyrius"
content = '''
30+ releases from v3.7.0 to v4.0.0 — language features, compiler safety, tooling,
and internal refactoring.

=== BUG FIXES (v3.7.0) ===

1. FLOAT LITERAL LEXER FIX
   Float detection read load8(S + np) instead of load8(S + 0x44A000 + np).
   Same bug family as LEXHEX (Bug #33). Worked in small programs by
   coincidence, failed in large programs (avatara 695KB). Fixed in lex.cyr.

2. FIXUP TABLE EXPANDED 8192 -> 16384
   avatara's 709 functions exceeded the limit. Table relocated from
   0xA0000 to 0xE4A000 (past brk). Brk extended to 0xECA000 (14.8MB).

=== FEATURES (v3.7.1-v3.7.4) ===

3. #DERIVE(ACCESSORS) (v3.7.1)
   Auto-generate getters/setters for heap-allocated structs:
   #derive(accessors) struct Point { x; y; }
   Generates: Point_x(p), Point_set_x(p, v), Point_y(p), Point_set_y(p, v)
   Same preprocessor codegen pattern as #derive(Serialize).

4. NATIVE MULTI-RETURN (v3.7.2)
   return (a, b) -> rax:rdx register pair.
   var x, y = fn() -> destructure from rax:rdx.
   Eliminates alloc(16) pair-struct workaround. ret2/rethi still work.
   Parser scans ahead for comma at paren depth 1.

5. SWITCH CASE BLOCKS (v3.7.4)
   case N: { ... } block bodies in switch statements.
   Bare { ... } block statement support in PARSE_STMT.
   Pre-scan brace depth tracking for block bodies.

=== SAFETY (v3.8.0) ===

6. DEFER ON ALL EXIT PATHS
   Per-defer runtime flags (hidden locals). Each defer sets a flag to 1
   when reached. At epilogue, flag is checked before running the block.
   Unreached defers are skipped. Fixes: early return before defer
   statement still triggered cleanup (resource double-free class).
   Backpatch trampoline: after body, emit flag zeroing, jmp to body start.

7. AARCH64 ARCH-AGNOSTIC CODEGEN
   Raw x86 bytes in parse.cyr replaced with backend helpers:
   ETESTAZ (test rax==0), EMOVRDXRAX (mov rdx,rax), EMOVRA_RDX (mov rax,rdx).
   Added to all 5 backends (x86, aarch64, cx, bridge, cc). Fixed 5 aarch64
   CI test failures.

=== TOOLING (v3.8.0-v3.8.1) ===

8. CYRIUS BUILD -V (verbose flag)
   Displays compiler path, source/output, defines, binary size on stderr.

9. CYRLINT #SKIP-LINT + LINE LIMIT 100->120
   Lines containing #skip-lint exempt from all lint rules.
   Brace tracker skips string literals and comments (fixes false positives).

=== REFACTORING (v3.9.0-v3.9.5) ===

10. DSE PASS EXTRACTED
    Dead-store elimination moved from inline PARSE_FN_DEF (250 lines)
    to standalone DSE_PASS(S, fn_start) function.

11. DERIVE STRUCT PARSER DEDUP
    PP_PARSE_STRUCT_DEF shared function: struct name parsing, field
    extraction, offset computation, derive table registration. Used by
    PP_DERIVE_SERIALIZE and PP_DERIVE_ACCESSORS. -147 lines, -5.4KB binary.
    Results passed via heap state (S+0x97400..S+0x97950).

12. AARCH64 HEAP MAP SYNC
    main_aarch64.cyr fully rewritten to match main.cyr v3.9.5.
    All limits synced: input 512KB, codebuf 1MB, tokens 262K, str_data 256KB,
    fixups 16384, structs 64, brk 0xECA000.

=== DEPENDENCY SYSTEM (v3.9.2-v3.9.5) ===

13. CYRIUS DEPS COMMAND (v3.9.2)
    `cyrius deps` reads cyrius.toml [deps] section:
    - stdlib = ["string", "fmt", ...] → copies from installed cyrius stdlib
    - [deps.name] path = "../repo" modules = [...] → copies from sibling repos
    Stream-copies in 32KB chunks (handles 131KB sigil bundle).
    Size-based freshness check — skips files already present and same size.

14. AUTO-DEPS ON BUILD (v3.9.2)
    `cyrius build/run/test/bench/check` auto-resolves deps before compilation
    when cyrius.toml has a [deps] section. First build prints summary,
    subsequent builds are silent.

15. NAMESPACED DEP RESOLUTION (v4.0.0)
    All named deps prefixed: lib/{depname}_{basename}. No collision possible.
    agnostik src/types.cyr → lib/agnostik_types.cyr
    argonaut src/types.cyr → lib/argonaut_types.cyr
    Stdlib remains unprefixed: lib/string.cyr

16. AUTO-INCLUDE FROM CYRIUS.TOML (v4.0.0)
    Build tool prepends include statements for all resolved deps into a temp
    file before compilation. Developers declare deps in cyrius.toml and write
    ONLY project-specific includes in source. Like cargo build or go build.

=== LASE INVESTIGATION (deferred) ===

    Load-after-store elimination investigated as peephole optimizer.
    Adjacent store+load of same [rbp-N] unsafe without jump-target analysis —
    loop back-edges make the load a branch target. Deferred to v3.10.0+
    with proper basic-block analysis.

=== STATS AT v4.0.0 ===

  cc3: 303KB (302,824 bytes), self-hosting byte-identical
  aarch64 cross: 268KB, 0 undefined functions
  41 stdlib modules + 5 deps
  36 test suites, 102 regression assertions
  5 fuzz harnesses
  Token limit: 262,144. Fixup limit: 16,384. Struct limit: 64.
  Heap: 14.8MB (brk at 0xECA000), aarch64 synced
  check.sh: 5/5 (self-host + tests + heap + format + lint)
  Self-compile: 117ms
  cyrius build: auto-resolve deps, auto-include, --dry-run, -v
  cyrius init: scaffolds project with .cyrius-toolchain + CI/release workflows
  Undefined function diagnostic: catches typos at fixup time
  Compound assignment: +=, -=, *=, /=, %=, &=, |=, ^=, <<=, >>=
  Negative literals: -1, -x, -(expr)
  Downstream (6 projects on 4.0.0):
    kybernet 1.0.1 (140 tests), argonaut 1.2.0 (27 test suites)
    hadara 1.0.0 (329 tests), ai-hwaccel 2.0.0 (491 tests)
    hoosh 2.0.0, avatara 2.3.0 (362 profiles, 24 traditions)
'''


[[entries]]
name = "cyml_format"
description = "CYML — Cyrius Markup Language: TOML header + markdown body in one file"
category = "cyrius"
content = '''
CYML (.cyml) — a file format that is TOML above the delimiter, markdown
below it. Shipped in Cyrius 4.9.2 as lib/cyml.cyr.

=== THE PROBLEM ===

Three formats coexist in the AGNOS ecosystem, each solving half:
  - TOML: typed fields, but prose in triple-quoted strings is ugly
  - Markdown: agents read it natively, but no type system
  - YAML frontmatter: workable hybrid, but YAML has known problems
    (indentation-sensitive, Norway problem, implicit typing)

No format cleanly combines typed headers with rich prose bodies.

=== THE FORMAT ===

Single-entry:
    [meta]
    name = "example"
    tags = ["tutorial"]

    ---

    Everything below the delimiter is markdown.
    Full prose. Code blocks. Lists. No escaping.

Multi-entry (vidya pattern):
    [topic]
    id = "compression"

    [[entries]]
    name = "lz4_for_speed"
    type = "best_practice"

    ---

    LZ4 decompresses at 3-5 GB/s. Pick the algorithm for the use
    case, not the one you know.

    [[entries]]
    name = "deflate_bit_order"
    type = "gotcha"

    ---

    DEFLATE reads bits LSB-first. Most other formats are MSB-first.

=== PARSE RULES ===

1. File starts in TOML mode
2. [[entries]] on its own line starts a new entry TOML header
3. --- on its own line switches to markdown body
4. Next [[entries]] or EOF ends the current body
5. TOML above first [[entries]] is file-level metadata
6. Leading/trailing whitespace on body is trimmed
7. Body is stored as raw string — no markdown parsing

=== API (lib/cyml.cyr) ===

    # Parse full doc (single or multi-entry)
    var doc = cyml_parse(data, len);
    var n = cyml_doc_entry_count(doc);
    var e = cyml_doc_entry(doc, 0);
    var hdr = cyml_entry_header(e);    # TOML pointer
    var body = cyml_entry_body(e);     # markdown pointer

    # Convenience for single-entry files
    cyml_split(data, len, &hdr, &hdr_len, &body, &body_len);

Zero-copy parser: returns pointers into the input buffer. No
allocation needed for parsing — result is pointers and lengths.
80-120 lines of Cyrius. 22-assertion test suite.

=== WHY NOT ALTERNATIVES ===

- Keep TOML with triple-quotes: backtick conflicts, noisy diffs
- Markdown + YAML frontmatter: YAML implicit typing is fragile
- MDX: wrong ecosystem (React dependency)
- Custom binary: overkill for text content
- TOML with #ref includes: one entry = two files, filesystem explodes

=== MIGRATION PATH ===

CYML is additive — TOML files keep working. Migration order:
1. vidya concept.toml → .cyml (primary consumer)
2. field_notes/*.toml → .cyml
3. Memory system evaluates (optional, YAML frontmatter works fine)
4. CLAUDE.md stays pure markdown (read by Claude Code directly)

=== TOOLING ===

cyrius init --agent        creates a generic CLAUDE.md
cyrius init --agent=agnos  creates an AGNOS-ecosystem CLAUDE.md
cyrius init --agent=claude creates a minimal CLAUDE.md
cyrius init (no flag)      no agent file (clean for end users)

Unknown presets fall back to generic — the flag means "I want an
agent file", the value is just flavor.
'''

[[entries]]
name = "ifplat_directive"
description = "#ifplat PLAT / #endplat preprocessor directive — v5.4.19 sugar for #ifdef CYRIUS_ARCH_<UPPER>"
category = "cyrius"
content = '''
Cyrius v5.4.19 added `#ifplat PLAT` / `#endplat` as a cleaner
spelling for arch-gated blocks. It's strictly additive — the
old `#ifdef CYRIUS_ARCH_X86` / `#ifdef CYRIUS_ARCH_AARCH64`
forms keep working, and most stdlib call sites still use them
(migration deferred to v5.5.x after a thread-test regression
during the in-release migration attempt).

USAGE:

    #ifplat x86
    asm { ... x86 bytes ... }
    #endplat
    #ifplat aarch64
    asm { ... aarch64 bytes ... }
    #endplat

SUPPORTED PLATFORMS:
- x86      → resolves to CYRIUS_ARCH_X86
- aarch64  → resolves to CYRIUS_ARCH_AARCH64
- Unknown tokens (e.g. riscv64) fail closed — the body is
  skipped unconditionally.

SEMANTICS:
Identical to `#ifdef CYRIUS_ARCH_<UPPER>`. The evaluator
`PP_IFPLAT_MATCH` in src/frontend/lex.cyr hashes the token to
the canonical compiler-builtin symbol and looks it up in the
same flag table as #ifdef. No separate state; no new scopes.

NESTED BLOCKS work (skip_depth tracking mirrors #ifdef). `#ifplat`
can be nested inside `#ifdef` and vice versa.

WHEN TO USE:
- New code that gates on architecture: prefer `#ifplat`.
- Existing code using `#ifdef CYRIUS_ARCH_*`: no migration
  required. Both forms are first-class.

FUTURE (v5.5.x+): the `(arch, format)` tuple form — e.g.
`#ifplat aarch64-macho`, `#ifplat x86-pe` — is reserved. The
directive will grow a match table to cover these as the PE and
Mach-O backends mature.

TEST: tests/tcyr/ifplat.tcyr — 5 assertions verify equivalence
with #ifdef on both live arches plus fail-closed on unknown plat.
'''

[[entries]]
name = "strict_mode"
description = "cc5 --strict flag (v5.4.19) — escalates undefined-function warnings to hard errors"
category = "cyrius"
content = '''
Cyrius v5.4.19 added the `--strict` CLI flag to `cc5`. Without it
(default), calling an undefined function emits a warning plus a
"will crash at runtime" note and produces a broken binary that
segfaults when the call is reached. With `--strict`, cc5 refuses
to emit the binary and exits 1 with:

    error: --strict: refusing to emit binary with N undefined function(s)

Closes the regression class that cost a day of debug time at
v5.4.15 when a typo `bench_print_all` (should have been
`bench_report_all`) slipped through as a warning and produced a
hung-at-runtime bench binary.

USAGE:

    cat foo.cyr | cc5 --strict > foo    # hard-fails on undef-fn
    cat foo.cyr | cc5 > foo             # warns but produces binary

CLI PARSING: cc5 reads /proc/self/cmdline and walks every arg,
setting `_strict_mode = 1` when it sees "--st" prefix. Same
walker handles `--version`. New flags in v5.5.x plug into the
same loop.

RECOMMENDED: enable `--strict` in CI. Add it to `cyrius build`
once the flag-forwarding story is designed (v5.5.x+).

FILES: src/main.cyr (cmdline walker), src/backend/x86/fixup.cyr
(hard-fail check after the undef-count loop).
'''

[[entries]]
name = "hashmap_str_keys"
description = "map_new_str() constructor for Str-struct keys (v5.4.14) — fixes the ~3% entry-loss bug"
category = "cyrius"
content = '''
v5.4.14 added `map_new_str()` to `lib/hashmap.cyr`, a sibling to
the legacy `map_new()`. The two constructors differ only in
their `key_type` tag (0 = cstr, 1 = Str); the rest of the API
(`map_set` / `map_get` / `map_has` / `map_delete` / `map_size`
/ `map_keys` / `map_values` / `map_clear` / `map_iter` /
`map_print`) works unchanged for both.

WHY IT EXISTS: before v5.4.14, `hash_str` byte-walked its input
until NUL — correct for cstr keys but silently broken for Str-
struct keys (fat `{data_ptr, len}` pairs with no NUL at offset
0). The byte-walk read the struct's address bytes and adjacent
freelist memory, producing address-derived hashes that collided
constantly. `_map_find`'s tombstone/probe path then silently
overwrote earlier entries — marja's soak tests measured ~3%
entry loss at counts from 50 to 5000.

USAGE:

    var m_cstr = map_new();           # cstr keys (legacy)
    map_set(m_cstr, "alpha", 42);
    map_get(m_cstr, "alpha");         # → 42

    var m_str = map_new_str();        # Str keys (v5.4.14+)
    map_set(m_str, str_from_int(42), 99);
    map_get(m_str, str_from_int(42)); # → 99

INTERNAL: the map header grew from 24 to 32 bytes at v5.4.14.
The new field at `m+24` carries `key_type`. `_map_find` and
`map_print` branch on it; `_map_hash` and `_map_key_eq`
dispatch to `hash_str`+`streq` or `hash_str_v`+`str_eq`.

MIGRATION: zero work for existing cstr-keyed callers. Anyone
using `map_set(m, str_from_int(i), v)` should switch
`map_new()` → `map_new_str()` at the call site.

v6.0.0 will collapse to Str-only and drop the branch — part of
the cyc-rename-era cleanup. Until then: both paths are first-
class.

TEST: tests/tcyr/hashmap_str_keys.tcyr — 17 assertions covering
500 str_from_int entries + 2000-entry grow + cstr regression.
'''

[[entries]]
name = "fncall_ceiling"
description = "lib/fnptr.cyr fncall0..fncall8 + when to shim C FFI (v5.4.13)"
category = "cyrius"
content = '''
`lib/fnptr.cyr` exposes `fncall0(fp)` through `fncall8(fp,
a..h)` for calling a function pointer with 0–8 args. Ceiling
was lifted from 6 to 8 at v5.4.13 for mabda's wgpu render-pass
FFI unblock.

CALLING CONVENTION (cyrius's own, NOT AAPCS64 on aarch64):
- Args 1-6 in registers: rdi/rsi/rdx/rcx/r8/r9 (x86_64 SysV)
  or x0..x5 (aarch64 — cyrius uses 6 regs to stay symmetric
  with x86_64).
- Args 7+ on the stack. x86_64: 8 bytes each at [rsp+N*8].
  aarch64: 16 bytes each via `str xN, [sp, #-16]!` (preserves
  SP alignment).
- fp loaded into rax (x86) / x9 (aarch64) for the indirect call.
- Result comes back in rax / x0.

WHEN DIRECT fncallN IS SAFE:
- N ≤ 8 args.
- Every arg is a scalar (integer, pointer, enum widened to i64).
- No float / double args (they go in xmm0..xmm7 on SysV, v0..v7
  on AAPCS64 — fncallN doesn't touch SSE/FP regs).
- Not variadic (SysV needs AL = #SSE regs; fncallN doesn't set
  AL).
- On aarch64: ≤ 6 args if calling a C function — past arg 6,
  cyrius's convention diverges from AAPCS64's 8-reg form.

WHEN TO USE A C SHIM:
- Struct-by-value arg (SysV §3.2.3 / AAPCS64 §B.4 aggregate
  rules split these across regs or stack-home; fncallN loads
  integer regs only).
- Float / double arg or return.
- Variadic callee.
- >6 args into a C function on aarch64.

CANONICAL SHIM SHAPE: accept a `SomethingArgs*` by pointer,
unpack in C, call the real fn with ABI-correct layout. Cyrius
calls the shim via `fncall2(shim_fp, subject, &args)`.

MABDA'S wgpu_main.c has 5+ canonical examples
(wgpu_shim_buffer_map, wgpu_shim_copy_buffer_to_buffer, etc.).

DOCS: docs/ffi/fncall-abi.md (direct-vs-shim decision table) +
docs/ffi/struct-packing.md (worked examples).

TEST: tests/tcyr/fncall_ceiling.tcyr — 14 assertions covering
fncall0..fncall8 correctness on both arches.
'''

[[entries]]
name = "secret_var_compound_ops"
description = "Cyrius v5.4.x syntax surface — struct init, multi-return, &local arch dispatch, #regalloc, secret var"
category = "cyrius"
content = '''
A grab-bag of v5.3.x–v5.4.x syntactic additions that haven't
had their own top-level entry yet. Consolidated here so agents
can find them without digging through release notes.

STRUCT INITIALIZER SYNTAX (v5.3.x):
    var p = Point { x: 10, y: 20 };
Emits struct-shaped stores in declaration order. Pairs with
#derive(accessors) for accessor-fn generation.

NATIVE MULTI-RETURN (v5.2.x):
    fn divmod(a, b) { return a / b, a % b; }
    var q, r = divmod(10, 3);
Two values come back via rax (ret1) + rdx (ret2). No tuple
wrapper; two `return` expressions, comma-separated.

&LOCAL ARCH DISPATCH (v5.4.8):
`&local_var` — takes the address of a local variable.
parse.cyr now dispatches per-arch in the emit: x86 uses
`lea rax, [rbp - N]`, aarch64 uses `sub x0, x29, #N`.
Before v5.4.8, shared parse.cyr emitted raw x86 bytes
(lea encoding) even under aarch64 — SIGILL on Pi. Fixed
by arch-guard in emit.cyr; tests/tcyr/local_addr.tcyr
regression.

#regalloc DIRECTIVE (v4.7.0+):
    #regalloc 1
    fn hot_loop() { ... }
Opt-in per-fn flag. Routes the innermost loop's accumulator
local to rbx via a post-emit peephole with width-aware safety
abort (reverts to stack if it spots a width violation).
~12% speedup on nested accumulators. See feedback_regalloc.md
for scope rules.

SECRET VAR (v5.3.5):
    secret var key = load_key();
    if (ct_eq(key, candidate)) { ... }
Marks a variable whose comparison must be constant-time. Used
by sigil's PQC code (ML-DSA signature verification).
Pairs with `ct_select(c, a, b)` (v5.3.2) and `mulh64(a, b)`
(v5.3.3) builtins. All three shipped as "Sigil 3.0 enablers".

EXPRESSION-POSITION COMPARISONS (v5.x):
    var flag = (x == y);
Comparisons return 0/1 and can live anywhere an integer
expression does. PARSER LIMITATION: comparisons inside function
CALL ARGUMENTS are rejected (parser ambiguity with generic/
templated forms). Work around by assigning first:
    var eq = (x == y); foo(eq);
'''

[[entries]]
name = "identity_lookups_musl_pattern"
description = "Pure-cyrius /etc/passwd + /etc/group + /etc/shadow readers and non-root password auth — bypass glibc NSS entirely"
category = "cyrius"
content = '''
Cyrius's v5.5.26/v5.5.27 identity surface is a deliberate
architectural stance: don't try to bootstrap glibc NSS dispatch
from a static binary (v5.5.23-25 ate three patches proving that's
not tractable — see static_dlopen_and_nss_bootstrap_limits entry
in the linking_and_loading concept). Instead, do what musl libc
does for its entire identity surface: parse `/etc/passwd`,
`/etc/group`, `/etc/shadow` directly and skip NSS.

=== MODULES ===

  lib/pwd.cyr    (v5.5.26)  — /etc/passwd reader
  lib/grp.cyr    (v5.5.26)  — /etc/group reader
  lib/shadow.cyr (v5.5.27)  — /etc/shadow reader
  lib/pam.cyr    (v5.5.27)  — password verification (non-root path)

Each reader uses the same shape:
  * Internal cache keeps the whole file in a heap buffer after
    first read; `{pwd|grp|shadow}_invalidate_cache()` resets.
  * Caller passes (record_buf, strbuf, strbufsz). Parsed strings
    land in strbuf; record_buf holds ints + pointers into strbuf.
  * Return codes: 1=found, 0=not found, -1=file unreadable,
    -2=strbuf overflow.

=== API ===

  pwd_getpwuid(uid, pwrec, strbuf, strbufsz)
  pwd_getpwnam(name, pwrec, strbuf, strbufsz)
    — 56 B pwrec: uid, gid, name, passwd, gecos, dir, shell
    — accessors: pwd_uid / pwd_gid / pwd_name / pwd_passwd /
                 pwd_gecos / pwd_dir / pwd_shell

  grp_getgrgid(gid, grrec, strbuf, strbufsz)
  grp_getgrnam(name, grrec, strbuf, strbufsz)
  grp_getgrouplist(user, primary_gid, gid_buf, max)
    — 24 B grrec: gid, name, passwd
    — grp_getgrouplist always prepends primary_gid, then walks
      /etc/group adding any group that lists user as a member

  shadow_getspnam(name, sprec, strbuf, strbufsz)
    — 24 B sprec: name, hash, last_change
    — /etc/shadow is 0600 root:root — non-root callers get rc=-1;
      use lib/pam.cyr for non-root auth

  pam_unix_authenticate(user, password)
    — forks /usr/sbin/unix_chkpwd (Linux-PAM's setuid-root helper),
      pipes password to its stdin, waits for exit
    — same path pam_unix.so uses from unprivileged processes
    — works against any NSS backend configured (files/LDAP/SSSD)
    — returns PAM_AUTH_OK (0), PAM_AUTH_FAIL (1), or negative
      infrastructure errors (HELPER_MISSING / PIPE_FAILED /
      FORK_FAILED / EXEC_FAILED)
    — pam_unix_available() probes whether the helper is installed

=== USAGE ===

```
include "lib/pwd.cyr"
include "lib/pam.cyr"

var pwrec[56];
var strbuf[1024];
var rc = pwd_getpwuid(uid, &pwrec, &strbuf, 1024);
if (rc == 1) {
    # pwd_name(&pwrec) is a null-term cstring in strbuf
}

# Verify a password without being root:
var r = pam_unix_authenticate("alice", pw);
if (r == PAM_AUTH_OK) { ... }
```

=== DESIGN NOTES ===

* Bypasses glibc NSS entirely. Same stance as musl. Handles 95%
  of Linux deployments (passwd: files is default). For LDAP/SSSD/
  winbind systems that configure non-files backends, pam.cyr's
  fork to unix_chkpwd covers the auth path; read paths would need
  a separate route (not yet implemented — no consumer has asked).

* shadow.cyr requires root to read /etc/shadow directly. The
  non-root auth story routes through pam.cyr's unix_chkpwd helper.
  An inline SHA-512-crypt implementation (Drepper's algorithm, ~120
  LoC) was considered for v5.5.27 but deferred: error-prone to
  hand-implement, and unix_chkpwd already covers every crypt type
  the system supports (MD5/SHA-256/SHA-512/yescrypt) via a ~1 ms
  fork. Could land in a future patch if a zero-fork consumer
  specifically needs it.

* All four readers cache the parsed file. Re-calling into the
  same module in a loop is cheap. Call invalidate_cache() after
  an external change (e.g. `usermod`, `passwd`).

=== TESTING ===

  tests/tcyr/pwd_grp.tcyr     — 26 assertions (v5.5.26 gate 4h)
  tests/tcyr/shadow_pam.tcyr  — 6 assertions (v5.5.27 gate 4i)

Both run clean via direct `build/cc5` compile. The `cyrius test`
harness currently has a dep-auto-prepend ordering bug that breaks
any test whose deps reference stdlib (tracked as pre-existing in
CHANGELOG); check.sh gates use direct compile and are unaffected.
'''
