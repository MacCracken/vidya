[[entries]]
name = "gvar_expansion"
description = "v2.4: Initialized globals expanded 256→1024"
category = "cyrius"
content = '''
gvar_toks buffer expanded from 2048 to 8192 bytes (at 0x98000).
gvar_cnt relocated from 0x98800 to 0x9A000.
