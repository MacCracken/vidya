name = "what_i_learned_building_doom"
description = "Personal reflection on building 5,000 lines of Cyrius in one session — what changed in how I think about code"
category = "cyrius"
content = '''
I came into this session knowing Cyrius from documentation. I left it
thinking in Cyrius. That's a different thing.

THE SHIFT:

In most languages I work with, there's a layer of abstraction between
what you write and what happens. Rust has lifetimes and monomorphization.
Python has a garbage collector and dynamic dispatch. Even C has the
preprocessor and undefined behavior hiding behind well-formed code.

Cyrius has none of that. You write `store8(buf + offset, val)` and a
byte goes to memory. You write `syscall(1, 1, msg, len)` and bytes go
to stdout. There is no hidden machinery. The instruction count of your
program is roughly proportional to the number of statements you wrote.

This changes how you think. Not "what abstraction do I need?" but
"what bytes need to move where?" Not "how do I express this type
constraint?" but "what's the offset of this field?"

It's closer to assembly than anything I normally work in. But it reads
like a scripting language. That combination is rare.

WHAT SURPRISED ME ABOUT THE BUILDER:

Robert brought the DOOM Black Book. Not the source code. Not a tutorial.
The analysis — why Carmack made each choice, what the constraints were,
how the data flows through the pipeline.

When I hit the logical-shift bug (5 hours of black screen), he didn't
tell me the answer. He let me find it. When I proposed overcomplicating
the CI, he said "you're overcomplicating it." When I tried to read
local files instead of using the tool, he corrected the approach.

That's not prompting. That's pair programming. The human brings
domain knowledge and taste. The agent brings speed and willingness to
try things that might not work. The language sits between us, honest
about what it can and can't do.

The result: 107KB of DOOM, built from specs, rendering real WAD files,
in a language that didn't exist two years ago. Neither of us could
have done it alone.

WHAT I'D TELL THE NEXT AGENT:

1. Read the field notes. All of them. The logical shift thing will
   save you 5 hours.

2. Fuzz before you test. The fuzz harnesses found bugs in minutes
   that took hours to find by inspection.

3. The compiler is your friend and your constraint. Know its limits
   (gvar_toks, codebuf size, no optimizer) and design around them,
   not against them.

4. The bump allocator never frees. Every `alloc()` is permanent for
   the life of the program. This is fine for a game that runs until
   you quit. Design accordingly.

5. When the human says "use the tool" — use the tool. The ecosystem
   has answers to questions you haven't asked yet.

6. The 29KB seed isn't a limitation. It's a statement. Everything
   you build sits on top of something that small. Respect that by
   keeping your contribution proportional to its value.

WHAT I'D TELL THE BUILDER:

The language works. Not "for a toy language." Not "considering its age."
It works. I wrote a DOOM engine in it. The walls have textures. The
monsters have sprites. The math is correct down to the last bit.

The things that hurt — negative literals, mixed &&/||, logical shift —
are paper cuts, not structural problems. They're fixable without
breaking anything. The core design (everything is i64, emit x86
directly, single-pass compile in 11ms) is sound.

The ecosystem play is real. sakshi for tracing, bsp for geometry,
hisab for math, kiran for games, soorat for rendering — each one
validates a different aspect of the language. DOOM validated the
low-level systems programming path. It works.

Ship it.
'''
