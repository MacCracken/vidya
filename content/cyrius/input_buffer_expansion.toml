# Cyrius Input Buffer Expansion — Design Research
# How to expand the compiler's input buffer from 131KB to 512KB
# to unblock constant folding, function inlining, and future features.

[[entries]]
name = "input_buffer_expansion_plan"
description = "Plan to expand input buffer by lexing from preprocess buffer (0x222000) and enlarging to 512KB"
category = "cyrius"
content = '''
PROBLEM:
  Compiler source is ~162KB after include expansion. Input buffer is 131KB at S+0.
  Overflow into codebuf at S+0x20000 is tolerated (lexer consumes before codegen)
  but adding ANY new code (constant folding, inlining) pushes past safe limits.
  Adding ~2KB of constant folding code caused self-compilation to segfault.

APPROACH: Lex from preprocess buffer directly (Option 1 from research).

KEY INSIGHT: After preprocessing, the source text at S+0 is never needed again.
  The lexer can read from the preprocess output buffer at S+0x222000 instead.
  This decouples the input buffer size from the codebuf location entirely.

NEW HEAP LAYOUT:
  0x00000   input_buf      [131072]  Raw stdin (unchanged, only used by initial read)
  0x20000   codebuf        [196608]  Generated code (unchanged)
  0x50000   tok_names      [65536]   Identifiers (unchanged)
  0x60000   var_noffs      [16384]   Variable names (unchanged)
  0x64000   var_sizes      [16384]   Variable sizes (unchanged)
  0x68000   str_data       [8192]    String literals (unchanged)
  0x6A000   output_buf     [131072]  ELF output (unchanged)
  ...
  0x222000  preprocess_out [524288]  Expanded source — ENLARGED from 256KB to 512KB
  0x2A2000  fixup_tbl      [32768]   Relocated from 0x262000
  0x2AA000  fn_names       [8192]    Relocated from 0x26A000
  0x2AC000  fn_offsets     [8192]    Relocated from 0x26C000
  0x2AE000  fn_params      [8192]    Relocated from 0x26E000
  0x2B0000  brk                      Was 0x270000

PHASE A — Relocate fixup/fn tables (~30 edits):
  0x262000 → 0x2A2000 (fixup_tbl)
  0x26A000 → 0x2AA000 (fn_names)
  0x26C000 → 0x2AC000 (fn_offsets)
  0x26E000 → 0x2AE000 (fn_params)
  brk: 0x270000 → 0x2B0000
  Files: compiler.cyr, compiler_aarch64.cyr, cc/fixup.cyr, cc/parse.cyr,
         arch/aarch64/fixup.cyr

PHASE B — Lex from 0x222000, eliminate copy-back (~42 edits):
  1. Remove copy-back loops from PP_PASS, PP_IFDEF_PASS, PP_MACRO_PASS
  2. PP_IFDEF_PASS reads from 0x222000 (currently reads from S+0 after copy-back)
     Double-buffer: pass 2 reads 0x222000 → writes S+0, pass 3 reads S+0 → writes 0x222000
  3. LEX reads from S+0x222000+p (add base offset to all load8 calls in lexer)
  4. Update overflow check from 262144 to 524288
  Files: cc/lex.cyr (all lexer functions)

DOUBLE-BUFFER STRATEGY FOR PREPROCESSOR PASSES:
  Pass 1 (PP_PASS):      reads S+0 → writes S+0x222000 (includes + ifdef)
  Pass 2 (PP_IFDEF_PASS): reads S+0x222000 → writes S+0 (ifdef in included content)
  Pass 3 (PP_MACRO_PASS): reads S+0 → writes S+0x222000 (macro expansion)
  LEX:                    reads from S+0x222000

TOTAL: ~72 edits across 8 files. Two-step bootstrap.

HEADROOM: 512KB expanded source (3x current capacity). Enough to ~double the
  compiler codebase. If more needed later, just bump brk and buffer size.

HOW OTHER COMPILERS DO IT:
  TCC/Plan 9: streaming lexer, never buffers full source (designed this way from start)
  chibicc/cproc: malloc-based, no fixed buffers, unlimited by design
  Cyrius: fixed flat buffers — the trade-off for bootstrapping from 29KB seed

RISK: Medium. Changes are mechanical (offset updates) but pervasive in lexer.
  Each phase is independently testable via self-hosting.
'''
