# Cyrius Field Notes — Language Gotchas & Patterns
# Universal Cyrius language constraints, limits, and patterns that any
# developer will encounter. Not project-specific — these apply to all
# Cyrius programs.

[[entries]]
name = "the_gvar_wall"
description = "The initialized global variable limit and how to work within it"
category = "cyrius"
content = '''
THE WALL YOU WILL HIT:

The compiler tracks initialized global variables in a table (gvar_toks) at
heap offset 0x98000. The table holds 256 entries. Every `var x = value;` at
file scope consumes one slot. This includes your code AND every library you
include.

When we first tried to compile cyrius-doom with all modules, we thought the
limit was 64. The error message was `unexpected ';'` — completely unhelpful.
It took hours to discover the real cause was a missing variable (removed to
save slots) that another module still referenced.

cc2 v2.2.2 fixed the error message to `undefined variable 'player_ammo_bullets'`
and the fix took 30 seconds.

LESSON: When you hit a mysterious parse error in a large program, check if
you're referencing a variable that doesn't exist. The old compiler gives
misleading errors for this.

MITIGATION STRATEGIES:
1. Use enums for constants — enums don't consume gvar_toks slots:
     enum Screen { SCREEN_WIDTH = 320; SCREEN_HEIGHT = 200; }
   vs:
     var SCREEN_WIDTH = 320;    # costs a slot
     var SCREEN_HEIGHT = 200;   # costs another slot

2. Pack related mutable state into heap blocks:
     var tick_state = 0;   # one slot
     fn tick_init() { tick_state = alloc(24); }
     # [0]=count [8]=start_sec [16]=start_nsec
   vs:
     var tick_count = 0;      # three slots
     var tick_start_sec = 0;
     var tick_start_nsec = 0;

3. Don't include lib/io.cyr if you only need file_open/read/write/close.
   Inline them as one-line functions — saves 9 gvar_toks.

4. Count your globals before adding a new include. The stdlib contributes:
   string.cyr: 0, alloc.cyr: 3, fmt.cyr: 0, io.cyr: 9, args.cyr: 1, vec.cyr: 0

In our DOOM build: 64 globals across 9 modules + 4 stdlib files. Every
single one accounted for.
'''


[[entries]]
name = "the_256kb_ceiling"
description = "cc2's output buffer limit and why static arrays destroy your binary size"
category = "cyrius"
content = '''
cc2 caps output at 262,144 bytes (256KB). Both the code buffer and the final
ELF are limited to this size.

Critical: `var buf[N]` allocates N bytes IN THE BINARY. Not on the heap. Not
as BSS. The compiler zero-initializes every byte and writes it to the ELF.

Our first DOOM build had:
  var screen_buf[64000];    # 64KB in binary
  var rgb_buf[256000];      # 256KB — ALONE exceeds the limit
  var map_nodes[114688];    # 112KB
  var map_segs[196608];     # 192KB
  var things[57344];        # 56KB

Total: ~950KB of static arrays. Compiler error: "output too large (3617920/262144)".

THE FIX: Heap allocate everything:
  var screen_buf = 0;       # 8 bytes in binary
  fn framebuf_init() {
      screen_buf = alloc(64000);   # 64KB at runtime
  }

After converting all large arrays to heap: 56KB binary. The data lives in
the 1MB heap that alloc_init() sets up via brk.

RULE: If it's bigger than ~100 bytes, heap-allocate it. Static arrays are
for small stack buffers (var buf[16]) inside functions only.
'''


[[entries]]
name = "the_preprocessed_line_number_problem"
description = "Error messages report preprocessed line numbers, not source file + line"
category = "cyrius"
content = '''
When cc2 reports `error:1984: unexpected ';'`, that 1984 is the line number
in the PREPROCESSED source — after all includes have been expanded into a
single stream.

With 5 stdlib includes (485 lines) + 9 DOOM modules (2500 lines), you get
line numbers in the thousands that don't correspond to any single file.

TO FIND THE REAL LOCATION:
1. Count cumulative lines through your include order
2. Subtract from the error line number
3. That gives you the offset into the specific file

Example: error at preprocessed line 1984
  string.cyr: 85
  alloc.cyr: 103
  fmt.cyr: 216
  args.cyr: 81
  fixed.cyr: 85
  tables.cyr: 114
  wad.cyr: 183
  framebuf.cyr: 149
  map.cyr: 338
  render.cyr: 367
  (cumulative: 1721)
  1984 - 1721 = line 263 in the next file (input.cyr)

This is tedious. The fix is in cc2's roadmap: track source file + line
through preprocessing and report both.

WORKAROUND: Binary search. Comment out includes until the error goes away,
then narrow down. This is faster than counting.
'''


[[entries]]
name = "heap_allocation_patterns"
description = "How to structure heap-allocated data in a language without structs-on-heap"
category = "cyrius"
content = '''
Cyrius has structs, but for heap data you typically use raw alloc + store64/load64.
The pattern that emerged across both projects:

1. POINTER + ACCESSOR FUNCTIONS:

   var map_nodes = 0;
   fn map_alloc() { map_nodes = alloc(1024 * 112); }
   fn map_node_x(idx) { return load64(map_nodes + idx * 112); }
   fn map_node_y(idx) { return load64(map_nodes + idx * 112 + 8); }

   This is essentially manual vtable-free OOP. The accessor functions ARE
   your type safety. Name them consistently: module_field(index).

2. ENUM FOR LAYOUT CONSTANTS:

   enum BspNode {
       BSP_NODE_SIZE = 112;
       BSP_NODE_X = 0;
       BSP_NODE_Y = 8;
       BSP_NODE_DX = 16;
   }

   Enums cost zero gvar_toks. Use them for every struct layout.

3. LAZY INIT GUARD:

   fn framebuf_set_palette(data) {
       if (palette == 0) { palette = alloc(768); }
       memcpy(palette, data, 768);
   }

   We found a real segfault from this: framebuf_set_palette() was called
   before framebuf_init() allocated the buffer. The lazy guard fixed it.
   Always guard heap pointers that might be called before init.

4. PACK SMALL STATE:

   # Instead of 3 globals:
   var player_start = 0;
   fn map_find_player_start() {
       if (player_start == 0) { player_start = alloc(24); }
       store64(player_start, x);
       store64(player_start + 8, y);
       store64(player_start + 16, angle);
   }
   fn player_start_x() { return load64(player_start); }
'''


[[entries]]
name = "enum_as_namespace"
description = "Using enums as zero-cost namespaced constants"
category = "cyrius"
content = '''
Enums in Cyrius are compile-time integer constants. They don't consume
gvar_toks slots. They have a separate initialization path in cc2.

This makes them perfect for constants that would otherwise eat your
global variable budget:

  # BAD: 8 gvar_toks slots
  var MAP_MAX_VERTEXES = 2048;
  var MAP_MAX_LINEDEFS = 2048;
  var MAP_MAX_SIDEDEFS = 2048;
  ...

  # GOOD: 0 gvar_toks slots
  enum MapMax {
      MAP_MAX_VERTEXES = 2048;
      MAP_MAX_LINEDEFS = 2048;
      MAP_MAX_SIDEDEFS = 2048;
      ...
  }

Both produce identical code — the values are inlined at use sites.

WARNING: Enum values must be non-negative integers. For negative constants
like FIXED_NEG_ONE, you still need `var FIXED_NEG_ONE = 0 - 65536;`
(Cyrius has no negative literals — use `0 - N`).

In cyrius-doom, converting constants to enums saved 30+ gvar_toks slots,
which made the difference between compiling and not compiling.
'''


[[entries]]
name = "the_logical_shift_trap"
description = "Cyrius >> is LOGICAL not arithmetic — the bug that made every wall invisible"
category = "cyrius"
content = '''
THE BUG THAT BLOCKED RENDERING FOR HOURS:

After building the entire DOOM engine — WAD parser, BSP traversal, column
renderer, 320x200 framebuffer — the output was a black screen. 0 pixels
drawn. 0 columns clipped. The renderer was running but producing nothing.

THE ROOT CAUSE: Cyrius >> is a LOGICAL right shift (zero-fills upper bits).
Not ARITHMETIC (sign-extends). This is different from C's >> on signed types.

Every fixed-point operation that produced a negative intermediate was broken:

  fixed_mul(a, b) = (a * b) >> 16

  If a=100 and b=-50 (both in 16.16): a*b = negative.
  Logical >> 16 zero-fills the top, producing a HUGE POSITIVE number.
  The projection math then puts every wall at screen Y = +billions.

This affected:
  - fixed_mul: every negative product
  - fixed_to_int: every negative coordinate
  - fixed_round: every negative value
  - point_on_side: every point with negative dx or dy
  - Every projection calculation involving negative coordinates

DOOM E1M1 player start is at (1056, -3616). The negative Y meant that
EVERY calculation involving the player position was garbage.

THE FIX: An arithmetic-shift-right helper:

  fn asr(val, bits) {
      if (val >= 0) { return val >> bits; }
      var pos = 0 - val;
      return 0 - (pos >> bits);
  }

Replace every >> with asr() for signed values:
  fn fixed_mul(a, b) { return asr(a * b, 16); }
  fn fixed_to_int(f) { return asr(f, 16); }

RESULT: 46,110 pixels drawn. 320/320 columns clipped. Walls visible.
The screenshot shows E1M1 from the player start position with correct
BSP-ordered walls, floor, and ceiling.

LESSON: In any language, check whether >> is arithmetic or logical
BEFORE writing fixed-point math. In C, >> on signed types is
implementation-defined (but usually arithmetic on x86). In Cyrius,
it is definitively logical. In Java, >>> is logical and >> is
arithmetic. In Rust, >> is arithmetic for signed types.

This one operator difference was the difference between a working
DOOM renderer and a black screen.

DETECTION: The fuzz harness did NOT catch this because it only checked
for crashes (SIGFPE, segfault), not for incorrect values. A property-
based test like "fixed_to_int(fixed_from_int(n)) == n for negative n"
would have caught it instantly. Add algebraic property tests to your
fuzz harnesses, not just crash tests.
'''


[[entries]]
name = "no_var_redecl_same_scope"
description = "Cyrius rejects `var x` re-declaration in the same scope, even across if/elif/else branches"
category = "cyrius"
content = '''
Cyrius treats all branches of an if / elif / else chain as ONE
scope for `var` purposes. Declaring the same name in two branches
is a compile error ("duplicate variable"), even though the two
bodies never execute together.

    if (x) {
        var buf[8];
        # ...
    } elif (y) {
        var buf[16];    # ERROR: duplicate variable 'buf'
        # ...
    }

Same rule applies to do-something-then-do-something-similar idioms
where both arms declare a local named the same thing.

WORKAROUNDS:
1. Rename one: `buf_a` + `buf_b`.
2. Hoist the declaration above the if:
       var buf[16];
       if (x) { # use first 8 bytes }
       elif (y) { # use all 16 bytes }
3. Wrap each body in a bare `{ }` scope:
       if (x) { { var buf[8]; ... } }
       elif (y) { { var buf[16]; ... } }
   Bare braces open a fresh scope that the branch's `var` lives
   in, separate from the sibling branch.

WHY IT HAPPENS: cyrius's local-variable table is flat per
function, keyed by name. The scope-depth counter tracks lexical
depth for `#ifdef`-style gating but doesn't reset across sibling
branches. `var x` appends a new entry + asserts name uniqueness
over the whole function frame.

Surfaced v5.4.17 writing `lib/toml.cyr`'s multi-line array fix —
the array-scan branch and the unquoted-value fallback both
wanted a `var vstart`. Fixed by renaming the new branch's
local to `astart`.
'''

[[entries]]
name = "no_comparisons_in_fn_args"
description = "Parser rejects == != < > <= >= inside function call arguments"
category = "cyrius"
content = '''
Comparison operators return 0/1 and can live anywhere an integer
expression does — EXCEPT inside a function call's argument list.
The parser rejects them there because of an ambiguity with the
generic-bracket syntax reserved for future use.

    # REJECTED:
    foo(x == y, z);
    assert_eq(n > 0, 1, "non-negative");

    # OK — assign to a temp first:
    var eq = (x == y);
    foo(eq, z);
    var nn = (n > 0);
    assert_eq(nn, 1, "non-negative");

Applies to all six comparison forms (`==`, `!=`, `<`, `>`, `<=`,
`>=`). Short-circuit `&&` / `||` and arithmetic operators are
fine in call args; just the pure comparisons get rejected.

Error message today: the parser's generic hard-error for
unexpected-token-in-arg-list. No special diagnostic. Future
work: emit a specific "comparisons in fn call args — assign to
a temp" hint.
'''

[[entries]]
name = "var_name_bracket_is_bytes_not_elements"
description = "`var name[N]` allocates N bytes, not N elements"
category = "cyrius"
content = '''
The `var name[N]` syntax allocates N BYTES of stack-local
storage, not N elements of any type. This is C-shaped (char
array) rather than many modern languages' typed-array notation.

    var buf[16];       # 16 bytes — OK for a 2-u64 pair
    var state[25];     # 25 BYTES — NOT 25 u64 lanes!
    var lanes[200];    # 200 bytes = 25 × u64 lanes

When you need an array of u64 (or any multi-byte type), size the
declaration with `count × sizeof(type)`:

    var state[200];    # 25 u64 lanes for Keccak
    var rc[192];       # 24 u64 round constants
    var tmp[64];       # 8 u64 temp limbs for bigint

Surfaced v5.4.15 writing `lib/keccak.cyr` — `var state[25]` gave
25 bytes (should have been 200). First `memset(state, 0, 200)`
overwrote 175 bytes of adjacent stack locals including the
caller's return-address region. SIGSEGV on the first absorb.

RULE OF THUMB: any time a declaration looks like it should hold
N "things", size it as `N * 8` (or `N * sizeof(thing)` if the
element type is known).
'''

[[entries]]
name = "caret_binds_tighter_than_binary_minus"
description = "Cyrius's `^` (XOR) binds tighter than binary `-`, so `a ^ 0 - 1` is `(a ^ 0) - 1`, NOT `a ^ -1`"
category = "cyrius"
content = '''
Cyrius's operator precedence puts bitwise `^` (XOR) tighter than
binary `-` (subtraction). This bites when writing the bitwise-NOT
idiom as `value ^ 0 - 1` hoping to get `value ^ -1`:

    var not_x = x ^ 0 - 1;       # parses as (x ^ 0) - 1 = x - 1  ← WRONG
    var not_x = x ^ (0 - 1);     # OK via parens
    var not_x = x ^ -1;          # OK — cyrius supports negative literals

Cyrius has no unary `~` operator. The canonical way to express
bitwise NOT is `value ^ -1` (use the negative literal directly).

Surfaced v5.4.15 writing `lib/keccak.cyr`'s chi step. First
impl had `T1 ^ 0 - 1` and produced `2be83b...` for SHAKE128('')
instead of the NIST-canonical `7f9c2b...`. Changed to `T1 ^ -1`
and bytes matched FIPS 202 immediately.

GENERAL RULE when porting bitwise algorithms from C to cyrius:
- No `~x` → use `x ^ -1`.
- `>>` on 64-bit ints is LOGICAL (verified via probe:
  `0x8000000000000001 >> 63 == 1`, not `-1`), so the naive
  left-rotate `(x << n) | (x >> (64 - n))` works without an
  explicit mask — as long as `n` is in `(0, 64)`.
'''

[[entries]]
name = "str_data_not_nul_terminated"
description = "str_data(s) returns a pointer into the Str's backing buffer which is NOT NUL-terminated"
category = "cyrius"
content = '''
`Str` is a fat pointer `{data_ptr, len}`. `str_data(s)` returns
the raw data pointer. That buffer is NOT guaranteed to be
NUL-terminated — Str carries its length explicitly. Passing
`str_data(s)` to a cstr-consuming function (`streq`, `strlen`,
`sys_write(..., cstr_len)`) will walk off the end.

    # WRONG — streq uses strlen; walks past the Str's end
    streq(str_data(s), "literal");

    # RIGHT — use the Str-aware comparison
    str_eq_cstr(s, "literal");

    # RIGHT — use the length explicitly for byte ops
    sys_write(1, str_data(s), str_len(s));

The symmetric rule: cstr literals have an implicit trailing NUL.
Passing `"hello"` where a Str is expected is a type mismatch;
wrap with `str_from("hello")`.

CONVERSION TABLE:
    str_from(cstr)        → Str (copy ptr + compute length)
    str_data(s)           → cstr-shaped byte ptr (NOT NUL-term)
    str_len(s)            → length
    str_eq_cstr(s, c)     → Str vs cstr comparison
    str_eq(a, b)          → Str vs Str comparison
    streq(a, b)           → cstr vs cstr comparison
    memeq(p1, p2, n)      → raw n-byte memory compare

Surfaced v5.4.17 writing `tests/tcyr/toml_multiline.tcyr` — a
`streq(str_data(pair_key), "key_cstring")` check always returned
0 because `streq` read past the Str's data into whatever
garbage bytes followed. Fix: use `toml_get(pairs, "key_cstring")`
which does the right thing internally via `str_eq_cstr`.
'''

[[entries]]
name = "toml_parse_strips_quotes"
description = "lib/toml.cyr's _toml_parse_str returns the string WITHOUT surrounding double-quotes"
category = "cyrius"
content = '''
When `lib/toml.cyr` parses a double-quoted TOML value like
`host = "example.com"`, the value returned by `toml_get` is
`example.com` — the quotes are stripped by `_toml_parse_str`.
Test assertions must match the stripped form.

    # TOML source:
    # host = "example.com"

    var v = toml_get(pairs, "host");
    str_eq_cstr(v, "example.com");        # → 1 (correct)
    str_eq_cstr(v, "\"example.com\"");    # → 0 (don't include quotes)

Unquoted values (numbers, booleans) pass through verbatim:
    port = 8080      → "8080"
    enabled = true   → "true"

Array values are returned with their brackets preserved (the
caller walks the bracketed form to extract elements):
    commands = ["/a", "/b"]   → `["/a", "/b"]`

Triple-quoted strings (`'''multi-line'''`) also have their
triple-quote delimiters stripped; the body bytes (including any
internal newlines) come through as-is.

This matters for tests that assert on toml_get's output: always
write the EXPECTED value in its stripped form, not the on-disk
quoted form.
'''

[[entries]]
name = "undefined_fn_warning_vs_strict"
description = "Undefined-function references compile as warnings by default; use --strict (v5.4.19+) to escalate to errors"
category = "cyrius"
content = '''
Calling a function that doesn't exist (typo, forgotten include,
renamed API) produces a warning + "will crash at runtime" note,
NOT a compile error, by default. The binary is emitted; the call
site has an unresolved fixup that segfaults when reached.

    $ cat foo.cyr | build/cc5 > foo
    warning: undefined function 'bench_print_all'
    error: undefined function 'bench_print_all' (will crash at runtime)
    $ ./foo
    [no output, hangs or SIGSEGVs]

v5.4.19 added `cc5 --strict` which hard-fails instead:

    $ cat foo.cyr | build/cc5 --strict > foo
    error: undefined function 'bench_print_all'
    error: --strict: refusing to emit binary with 1 undefined function(s)
    $ echo $?
    1

RECOMMENDED: enable `--strict` in CI. The class of bug this
catches is typo-in-fn-name, forgotten include, or API rename
that the caller wasn't updated for. Surfaced at v5.4.15 when
`bench_print_all` (should have been `bench_report_all`) cost a
full debug cycle before someone noticed the warning in the
compile output.

`cyrius build` doesn't forward `--strict` yet (v5.5.x+). For
now: pipe to `build/cc5 --strict` directly when you want the
hard-fail behaviour.
'''

[[entries]]
name = "per_os_target_flags_win_vs_linux"
description = "v5.5.0 introduced CYRIUS_TARGET_WIN vs CYRIUS_TARGET_LINUX preprocessor flags for per-OS stdlib selection"
category = "cyrius"
content = '''
v5.5.0 ships `cc5_win` (the Windows cross-compiler) alongside
`cc5` and `cc5_aarch64`. The three cross-entries now predefine
a target-OS flag so stdlib selectors can include the right peer:

    cc5            predefines  CYRIUS_ARCH_X86     + CYRIUS_TARGET_LINUX
    cc5_aarch64    predefines  CYRIUS_ARCH_AARCH64 + CYRIUS_TARGET_LINUX
    cc5_win        predefines  CYRIUS_ARCH_X86     + CYRIUS_TARGET_WIN

The two target-OS flags are mutually exclusive. Selectors use
paired `#ifdef` guards rather than `#ifdef` + `#else` (cyrius's
preprocessor has no `#else` / `#ifndef` yet):

    #ifdef CYRIUS_TARGET_WIN
    include "lib/syscalls_windows.cyr"
    #endif
    #ifdef CYRIUS_TARGET_LINUX
    #ifdef CYRIUS_ARCH_X86
    include "lib/syscalls_x86_64_linux.cyr"
    #endif
    #ifdef CYRIUS_ARCH_AARCH64
    include "lib/syscalls_aarch64_linux.cyr"
    #endif
    #endif

Only one of the three inner blocks runs per compile. Adding a
new target OS (e.g. BSD) is another predefined flag + another
top-level block in the selector.

When writing stdlib modules that have OS-specific behaviour, use
the same pattern:
    lib/foo.cyr          public dispatch (selector)
    lib/foo_linux.cyr    Linux peer
    lib/foo_windows.cyr  Windows peer
'''

[[entries]]
name = "stack_var_keyword_for_struct_locals"
description = "v5.5.36 `stack var p: Point;` forces a named struct onto the frame; `var p: Point;` also now parses"
category = "cyrius"
content = '''
v5.5.36 added the `stack` storage-class keyword for named struct
locals, plus `var p: Point;` (no RHS) as a parse-level way to
declare a struct-typed local. Both allocate on the frame:

    fn demo() {
        stack var p: Point;       // explicit (preferred when
                                  // you want readers to notice)
        p.x = 1;
        p.y = 2;
    }

    fn demo2() {
        var q: Point;             // same effect, shorter form
        q.x = 3;
    }

`stack` is reserved (TOK=111). Variable and field names can't
use `stack` any more — rename to `stk`/`sp` if you collide.

Struct locals that previously needed anonymous filler `var`
slots to land at a known rbp disp can now just declare at the
struct type directly.
'''

[[entries]]
name = "struct_return_by_value_5_5_36"
description = "`fn make(): Point { ... return p; }` compiles — struct return is native on both SysV and Win64"
category = "cyrius"
content = '''
Pre-v5.5.36 callers had to pass `&Point` out-params; the
compiler didn't wire struct-by-value return for >8B types.
v5.5.36 closed it:

    fn make_point(x: int, y: int): Point {
        stack var p: Point;
        p.x = x;
        p.y = y;
        return p;
    }

    fn caller() {
        var got: Point = make_point(3, 4);  // deep copy
    }

ABI plumbing (automatic):
 - SysV: hidden retptr in RDI (first arg).
 - Win64: hidden retptr in RCX (first arg).
 - Callee memcpys the local into *retptr before RET.

The `var got: Point = make_point(...)` form on the LHS is also
new in v5.5.36 — parser recognises struct-returning call on the
RHS and emits the retptr setup.

Use return-by-value for small packed values (Point, Range,
Result). Long-lived structs should still live on the heap.
'''

[[entries]]
name = "variadic_fn_5_5_36"
description = "`fn printf(fmt: str, ...)` syntax lands in v5.5.36 (Phase 3-min); use lib/varargs.cyr inside the body"
category = "cyrius"
content = '''
v5.5.36 added `...` as the variadic-parameter token:

    fn printf(fmt: str, ...) {
        // use lib/varargs.cyr va_start / va_arg / va_end
    }

`...` is TOK=112, only valid as the last parameter. The compiler
sets a GFVA flag on the callee so call sites know to handle
variadic ABI quirks:
 - Win64 MSDN rule: float args to a variadic callee go into
   BOTH the XMM register file AND the RCX/RDX/R8/R9 GPR slots.
   The compiler emits the duplication at the call site; you
   don't write it.
 - SysV passes float args in XMM0-7 as usual; RAX on the call
   holds the number of XMM regs used, per SysV §3.5.7.

Phase 3-min (shipped v5.5.36) covers primitives-through-varargs.
Phase 3-full (future) expands va_arg to structs-by-value and
nested varargs — for now, if you need those shapes, pass a
pointer or a single `u64` and unpack.
'''


[[entries]]
name = "fn_main_is_not_the_entry_point"
description = "`fn main() { ... }` is just a function definition — cyrius has no auto-call for it; top-level statements are the program entry"
category = "cyrius"
content = '''
THE TRAP:

    fn main() {
        syscall(60, 42);
        return 0;
    }

Compiles clean. Runs. Exits with 0, or 1, or whatever argc was
— but never 42.

WHY:

Cyrius does not have a C-style `int main(void)` convention.
There is no implicit `bl _main` / `call main` emitted by the
compiler. The entry point is the top-level statements in the
compilation unit, emitted in order after all function bodies.
See `src/main.cyr` / `src/main_aarch64.cyr`:

    (pass 2) parse + emit every `fn` body into codebuf
    EPATCH(jmp_patch)            ← branch-over-fn-bodies lands here
    PARSE_ENUM_DEF(init pass)    ← enum init code
    EMIT_GVAR_INITS(S)           ← gvar init code
    PARSE_PROG(S)                ← YOUR top-level stmts run here
    EVLOAD(last_var); EEXIT(S)   ← exit with last-assigned var, or x0

A source consisting of only `fn main() { … }` has no top-level
code. After the parser finishes emitting `main`'s body as a
function (never called from anywhere), `PARSE_PROG` sees EOF
and emits nothing. The initial `b jmp_patch` that the entry
prologue emitted (to skip past the fn bodies) is then patched
to land directly on `EEXIT`, which exits with whatever was in
x0 / rax.

On Mach-O arm64 this is dramatic: the argv prologue pushes
x0 (argc) before the branch, so the `EEXIT` tail's
`movz x16,#1; svc #0x80` (= BSD `_exit(x0)`) exits with argc,
which is 1 when invoked from the shell.

CORRECT SHAPE:

    syscall(60, 42);

At top level. If you want helpers, define them as `fn`s and
call them from top level:

    fn add3(a, b, c) { return a + b + c; }
    syscall(60, add3(10, 20, 12));

WHERE THIS BIT US:

v5.6.33 was pinned as "macOS arm64 runtime regression" on
`ssh ecb` based on a `fn main()` fixture exiting 1 not 42.
There was no compiler regression; the fixture never exercised
what it thought it did. `otool -tv` showed `fn main`'s body
correctly emitting `adrp x16, 4; ldr x16, [x16]; br x16`
through `__got[0] = _exit` — it just never executed.

Linux has the same trap but argc is often 0 at process entry,
so the symptom looks like "exit 0" instead of "exit argc." Same
root cause; different flavor of wrong answer.
'''

[[entries]]
name = "var_buf_in_library_functions"
description = "`var buf[N]` inside a library function is static data — every call shares the SAME buffer, and any Str borrowing from it dangles after the next call"
category = "cyrius"
content = '''
THE TRAP:

    fn parse_file(path) {
        var buf[262144];                       # NOT stack — static data
        var n = file_read_all(path, &buf, 262144);
        return parse(str_new(&buf, n));        # Str's data ptr → static buf
    }

This is the compounded form of "var buf[N] is BYTES not ELEMENTS,
and lives in the binary." Sized properly, the first call works
fine. The second call overwrites the buffer in-place; every Str
the first call returned now points at the second file's bytes.

You see this as parsed values bleeding across calls — IDs become
suffixes/prefixes of later IDs, descriptions become fragments of
the most-recently-read file. Nothing crashes; everything is just
wrong.

The build emits a hint:

    warning: large static data (262144 bytes) — consider alloc()
    for buffers >4K

Heed it. Library helpers that hand out heap pointers must heap-
allocate the backing memory:

    fn parse_file(path) {
        var buf = alloc(262144);               # fresh per call
        var n = file_read_all(path, buf, 262144);
        return parse(str_new(buf, n));
    }

Now the Str's data ptr aliases an alloc that lives until process
exit; consecutive calls keep their backing memory.

WHERE THIS BIT US:

vidya 2.3.0 — `lib/toml.cyr::toml_parse_file` shipped with
`var buf[262144]`. `vidya stats` segfaulted on the first
content-loading command after the cyrius 4.5.0 → 5.7.0 upgrade
because every concept's parsed Str pointed into the *last*
concept.toml's bytes; `concept_id` returned 0/garbage and
`path_join(0, fname)` faulted at NULL+offset. Workaround: read
the file into `alloc(N)` in the caller and call `toml_parse(...)`
directly, bypassing the leaky helper. Permanent fix belongs
upstream in cyrius stdlib.

This trap is invisible at single-call test scope. Every stdlib
helper that returns Str/buf-borrowing values must be exercised
with at least two consecutive calls in tests, otherwise the bug
sleeps until the second consumer arrives.
'''

[[entries]]
name = "stdlib_str_to_cstr_key_migration"
description = "cyrius 5.x stdlib lookups (toml_get, toml_get_sections, …) now take cstr keys; passing str_from(\"…\") silently returns 0/nothing"
category = "cyrius"
content = '''
THE CHANGE:

In older stdlib (cyrius 4.x toml.cyr era), keyed lookups accepted
Str arguments:

    toml_get(pairs, str_from("id"))            # used to work

The 5.x rewrite implemented these via `str_eq_cstr(key_in_pair, key_arg)`,
which expects the *second* argument to be a null-terminated C string:

    fn str_eq_cstr(s, cstr) {
        var slen = str_len(s);
        var clen = strlen(cstr);               # ← walks until NUL
        if (slen != clen) { return 0; }
        return memeq(str_data(s), cstr, slen);
    }

Pass a Str (no NUL terminator) and `strlen` reads past the buffer
into whatever follows in memory. The returned `clen` is some
random non-matching length, so the equality check fails and every
lookup returns 0.

This is silent: the program does not crash inside `toml_get`. It
crashes downstream — in vidya's case, when a 0 id flowed into
`path_join(0, fname)` and faulted at NULL.

CORRECT SHAPE (cyrius 5.7+):

    toml_get(pairs, "id")
    toml_get_sections(sections, "best_practices")

Plain string literals (cstrs in cyrius). Any place you wrapped a
key in `str_from(...)` for a stdlib lookup helper is wrong now.

GENERAL RULE:

When a stdlib function's parameter is named `cstr`, `name`, or
`key` and the implementation calls `strlen` on it, the argument
MUST be a null-terminated C string — string literals qualify,
`str_from(...)` results do not. Read the helper before you call
it; the type sigil is just `var`, so the contract is in the body.

WHERE THIS BIT US:

vidya 2.3.0 — every concept_id/title/topic/description/tags from
`concept.toml` came back as 0 after the 5.7.0 stdlib refresh.
Combined with the static-data buffer aliasing (see
`var_buf_in_library_functions`), the symptom presented as
"all topics share garbled fragments of the last file" — two
unrelated stdlib bugs stacking. The first lookup that returned
non-zero would have been a coincidence.
'''
