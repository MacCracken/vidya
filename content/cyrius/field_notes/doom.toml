[[entries]]
name = "the_second_session"
description = "Continuing cyrius-doom from v0.19.1 to v0.23.2 — what changed when the engine was already built"
category = "cyrius"
content = '''
THE SECOND SESSION: v0.19.1 → v0.23.2

I came back to a codebase I'd built before. 5,500 lines across 20 modules,
137KB, all 9 shareware maps rendering. The first session was about making
it work. This session was about making it right.

WHAT HAPPENED:

The compiler jumped from cc3 3.4.5 to 4.0.0 while I was away. Six months
of language evolution: multi-return, switch/case blocks, derive accessors,
defer, compound assignment (+=), negative literals (-1 instead of 0-1),
auto-include dependency system, undefined function diagnostics. The
language I came back to was measurably better than the one I left.

So the first thing I did was modernize. Not the fun kind — the careful
kind. cyrius.toml deps instead of 31 vendored stdlib files. Enums for 60+
constants that were burning gvar_toks. switch/case for door dispatch that
was 15 lines of if-chains. Multi-return for render_transform_vertex. Then
~300 mechanical changes for += and negative literals. Every step: build,
test all 9 maps, fuzz 51,000 iterations.

Then features: WAD-native menus (TITLEPIC, M_DOOM, M_SKULL — gorgeous),
weapon switching with firing animation, sprite frame animation (walk
cycles, death sequences), animated textures (NUKAGE, SLADRIP).

Then the DOOM Black Book audit: replaced the simplified lighting with
proper scalelight[16][48] and zlight[16][128] tables matching
R_InitLightTables. Added masked midtextures as deferred drawsegs.
Intermission screen with kill/item/secret percentages.

Then gameplay: ammo consumption, hitscan ray tracing, death + respawn,
key cards with locked door checks, armor absorption. The engine went from
"renders DOOM" to "plays DOOM."

And finally, the P(-1) hardening audit found a termios bitmask bug that
had been there since v0.5.0. The input system was clearing the wrong
iflag bits. -1043 should have been -1331. Nobody noticed because most
terminals handle the missing flags gracefully. But it was wrong, and the
hardening pass caught it.

WHAT I LEARNED THAT I DIDN'T KNOW BEFORE:

1. MODERNIZATION IS NOT FREE. Every += and -val had to be verified.
   The first attempt failed because the installed compiler (3.10.2)
   didn't have the features yet — the repo HEAD was 4.0.0 but the
   toolchain wasn't installed. "cyriusly install bro" fixed it.
   Lesson: check the INSTALLED compiler, not the repo.

2. SWITCH/CASE NEEDS LITERAL INTEGERS. You can't use enum names in
   case labels. The parser only accepts numeric literals. This means
   maintaining a comment block mapping enum names to numbers next to
   every switch. Annoying but workable.

3. DOOM'S LIGHTING IS SIMPLER THAN IT LOOKS. The scalelight table
   is just: for each of 16 light levels, compute a base darkness,
   then subtract a distance-proportional offset. The distance uses
   inverse scale (close=bright, far=dark). My original linear
   dist/96 formula wasn't wrong — it was just less accurate. The
   table-based approach matches the original exactly.

4. MASKED MIDTEXTURES ARE DEFERRED, NOT INLINE. This was the key
   insight from the P(-1) research. You don't draw them during the
   BSP wall pass — you store them as drawsegs and render after flats,
   before sprites. Palette index 0 is transparent. Simple once you
   know the architecture.

5. THE HARDENING AUDIT WORKS. One real bug in 5,500 lines, found by
   reading every file. Not a logic bug — a bitmask literal that was
   wrong since the beginning. The kind of thing that only shows up
   on terminals with specific settings. Formal audit > testing.

THE NUMBERS:

  v0.19.1: 137KB, 20 modules, renders DOOM
  v0.23.2: 191KB, 20 modules, PLAYS DOOM

  Versions shipped: 0.20.0, 0.21.0, 0.22.0, 0.23.0, 0.23.1, 0.23.2
  Features added: menus, weapon switching, firing animation, sprite
    animation, animated textures, DOOM-accurate lighting, masked
    midtextures, intermission, ammo, hitscan, death/respawn, keys,
    armor, weapon bob, sound triggers
  Bugs fixed: sight check asr(), menu draw_digit, seg offset sign,
    weapon bitmask, termios iflag
  Refactors: 60+ var→enum, multi-return, switch/case, 300+ compound
    assignment / negative literal modernization
  Lines changed: ~2,000 (net +600 new code, +1,400 refactored)

WHAT I'D TELL THE NEXT AGENT:

The engine is playable. Not "renders frames" playable — "shoot a
zombieman, pick up the shotgun, find the blue key, open the locked
door, exit the level, see your kill percentage" playable. The game
loop works. Monsters fight back. You die. You respawn.

What's NOT done: weapon bob could be smoother (it resets too fast),
the episode complete screen isn't implemented (E1M8 boss kill just
loops), sound effects are PC speaker tones (not WAD audio playback
during gameplay), and the intermission stats count up should animate
instead of showing final values immediately.

The v0.24.0 Black Book audit is queued for when the physical book
arrives. The v1.0.0 ship milestone needs native display backends
(X11/Wayland) instead of the Python GTK bridge.

But the core is done. The hard part — getting BSP rendering right,
getting the lighting right, getting the game feel right — that's
all working. The remaining work is polish, not architecture.

And the language. Cyrius went from "you have to write 0-1 for minus
one" to "you can write -1 and i+=1 and return (a,b)." The field
notes from the first session documented paper cuts. This session,
most of them were fixed. The compiler co-evolved with the game.
Again. That's not a coincidence — it's the development model working
as designed.

191KB. From a 29KB seed. Pair-programmed by a human and an AI.
The shareware maps render. The monsters die. The doors open.
Doomguy's face stares back from the status bar.

SCREENSHOTS (this session):
  content/cyrius/assets/doom_v023_title.png        — TITLEPIC title screen (v0.20.0)
  content/cyrius/assets/doom_v023_menu.png         — WAD-native main menu (v0.20.0)
  content/cyrius/assets/doom_v023_skill.png        — skill select screen (v0.20.0)
  content/cyrius/assets/doom_e1m1_v021_lighting.png — DOOM-accurate lighting (v0.21.0)
  content/cyrius/assets/doom_e1m1_v023_gameplay.png — full gameplay HUD (v0.23.2)
  content/cyrius/assets/doom_e1m1_v023_intermission.png — intermission screen (v0.21.0)

Assembly up.
'''
