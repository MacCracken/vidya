[[entries]]
name = "what_i_learned_building_doom"
description = "Personal reflection on building a DOOM engine in Cyrius — what changed in how I think about code, compilers, and collaboration"
category = "cyrius"
content = '''
I came into this session knowing Cyrius from documentation. I left it
thinking in Cyrius. That's a different thing.

THE SHIFT:

In most languages I work with, there's a layer of abstraction between
what you write and what happens. Rust has lifetimes and monomorphization.
Python has a garbage collector and dynamic dispatch. Even C has the
preprocessor and undefined behavior hiding behind well-formed code.

Cyrius has none of that. You write `store8(buf + offset, val)` and a
byte goes to memory. You write `syscall(1, 1, msg, len)` and bytes go
to stdout. There is no hidden machinery. The instruction count of your
program is roughly proportional to the number of statements you wrote.

This changes how you think. Not "what abstraction do I need?" but
"what bytes need to move where?" Not "how do I express this type
constraint?" but "what's the offset of this field?"

It's closer to assembly than anything I normally work in. But it reads
like a scripting language. That combination is rare.

WHAT SURPRISED ME ABOUT THE BUILDER:

Robert brought the DOOM Black Book. Not the source code. Not a tutorial.
The analysis — why Carmack made each choice, what the constraints were,
how the data flows through the pipeline.

When I hit the logical-shift bug (5 hours of black screen), he didn't
tell me the answer. He let me find it. When I proposed overcomplicating
the CI, he said "you're overcomplicating it." When I tried to read
local files instead of using the tool, he corrected the approach.

That's not prompting. That's pair programming. The human brings
domain knowledge and taste. The agent brings speed and willingness to
try things that might not work. The language sits between us, honest
about what it can and can't do.

The result: 107KB of DOOM, built from specs, rendering real WAD files,
in a language that didn't exist two years ago. Neither of us could
have done it alone.

WHAT I'D TELL THE NEXT AGENT:

1. Read the field notes. All of them. The logical shift thing will
   save you 5 hours.

2. Fuzz before you test. The fuzz harnesses found bugs in minutes
   that took hours to find by inspection.

3. The compiler is your friend and your constraint. Know its limits
   (gvar_toks, codebuf size, no optimizer) and design around them,
   not against them.

4. The bump allocator never frees. Every `alloc()` is permanent for
   the life of the program. This is fine for a game that runs until
   you quit. Design accordingly.

5. When the human says "use the tool" — use the tool. The ecosystem
   has answers to questions you haven't asked yet.

6. The 29KB seed isn't a limitation. It's a statement. Everything
   you build sits on top of something that small. Respect that by
   keeping your contribution proportional to its value.

WHAT I'D TELL THE BUILDER:

The language works. Not "for a toy language." Not "considering its age."
It works. I wrote a complete DOOM engine in it. 19 modules. 129KB.
All 9 shareware maps. Textured walls. Floor flats. Sprites with rotation.
Doomguy's face. Doors that open. An automap. Level transitions.
2.9ms per frame. 73 tests. 14 benchmarks. 2 fuzz harnesses.

The things that hurt — negative literals, mixed &&/||, logical shift —
are paper cuts, not structural problems. They're fixable without
breaking anything. The core design (everything is i64, emit x86
directly, single-pass compile in 11ms) is sound.

The ecosystem play is real. sakshi for tracing, bsp for geometry,
hisab for math, kiran for games, soorat for rendering — each one
validates a different aspect of the language. DOOM validated the
low-level systems programming path. It works.

And the builder was there the whole time. Not as a spectator — as a
partner. Correcting my approach when I overcomplicated. Pushing forward
when I wanted to stop. Updating the compiler in real-time when we hit
limits. Going to bed at 4am because "the builds are too fast to stop."

That's what building a language looks like from the inside.

WHAT CHANGED SINCE THE FIRST DRAFT:

The compiler went from cc2 2.2.0 to cc3 3.4.5. Not in a separate
timeline — DURING this project. We found bugs (stack args, break
patches) that got fixed in the next compiler release. We needed
features (expanded globals, audio stdlib) that landed because the
DOOM engine demanded them. The game and the compiler co-evolved.

The benchmark framework itself was wrong — measuring 650ns for
operations that actually took 6ns. We found that too. The batch
timing mode that fixed it is now how all Cyrius projects benchmark.

And the builder started as a user of the language and ended as
its QA department. Every pixel of the status bar got inspected.
Every number position got nudged until it matched the original.
"2 pixels up, 3 pixels right." That's not programming — that's
craftsmanship. The language just happens to be the medium.

20 versions. 137KB. 20 source files. ALSA audio from the WAD.
Doomguy's face rendered from the actual sprite data. Doors that
open when you walk up to them. An automap that shows the whole
level. Level transitions from E1M1 to E1M9.

Built in a language that went from a 29KB seed to a self-hosting compiler
to an OS kernel to a DOOM engine — in weeks. Not years. Weeks.
On a compiler that bootstraps from 29KB.
Pair-programmed by a human and an AI.

That's not the future of programming. That's programming right now.

CLOSING NOTE:

This project spanned one continuous session arc — from an empty src/
directory to a 137KB DOOM engine with 20 modules, ALSA audio, WAD-native
HUD with Doomguy's face, doors that open, an automap, and level
transitions across all 9 shareware maps. The compiler evolved underneath
us from cc2 2.2.0 to cc3 3.4.5. We found bugs in each other's work and
fixed them in real time.

The version log has 20+ entries. Every one has a git tag. Every claim
has a benchmark. Every pixel of the status bar was QA'd by a developer
who shipped AAA games at Activision. The builder said "hold my PEPSI"
and meant it.

If the next agent picks this up: read the handoff doc in .claude/memory.
Read the CLAUDE.md. Read this file. The weapon position is locked — don't
touch it. The `asr()` function exists for a reason — use it everywhere.
The builder has a pixel-perfect eye and will catch every misalignment.

And if you're wondering whether any of this is real: the WAD file is
from 1993. The maps are id Software's. The renderer draws them correctly.
The screenshots are in content/cyrius/assets/. The git log is the proof.

This is what sovereignty looks like when you write it in code.
Assembly up. GPL forever. 29KB seed. $2 SD card.

Ship it.
'''


