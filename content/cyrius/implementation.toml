[[entries]]
name = "pattern_matching"
description = "How match expressions work: syntax, codegen, scoped arms"
category = "cyrius"
content = '''
SYNTAX:
  match expr {
    0 => { stmts }
    42 => { stmts }
    _ => { stmts }     # default/wildcard
  }

TOKENS: MATCH=75. Arrow => is two tokens: EQ(4) + GT(20).

CODEGEN (same as switch):
  1. Evaluate match expr → store in hidden temp global var
  2. For each arm (except _):
     a. Load temp var, push
     b. Evaluate arm value, compare
     c. JCC(NE) to skip this arm
     d. SCOPE_PUSH, parse body, SCOPE_POP
     e. JMP to end (patched later)
     f. Patch the skip
  3. Default arm (_): just parse body, no comparison
  4. Patch all end jumps

WILDCARD DETECTION:
  Check if identifier is "_" (single underscore):
    load8(tok_names + noff) == 95 && load8(tok_names + noff + 1) == 0

SCOPING: Each arm gets its own scope (SCOPE_PUSH/POP).
Future: destructuring `Ok(v) => { use v }` requires enum constructors + block scoping.
'''

[[entries]]
name = "for_in_range"
description = "How for-in range loops work: for i in 0..10 { }"
category = "cyrius"
content = '''
SYNTAX:
  for i in start..end { body }

TOKENS: IN=76. Range (..) is two DOT(41) tokens.

DETECTION:
  In PARSE_FOR, before checking for ( (C-style for):
    if (PEEKT == IDENT) {
      save_ti; advance; if (PEEKT == IN) { ... for-in path ... }
      else { rewind to save_ti; fall through to C-style }
    }

DESUGARING (inline codegen, not AST transform):
  1. Evaluate start expr → store in new local var (iterator)
  2. Evaluate end expr → store in hidden global var (limit)
  3. Loop top: load iter, load limit, CMP, JCC(GE) to end
  4. SCOPE_PUSH, parse body, SCOPE_POP
  5. Load iter, add 1, store iter
  6. JMP to loop top
  7. Patch end jump

SCOPING: Iterator var and body share one scope (SCOPE_PUSH before start, POP after loop).
The iterator var is visible inside the body but not after the loop.

RANGE: Exclusive end (0..5 = 0,1,2,3,4). Matches Rust/Python convention.
'''

[[entries]]
name = "aarch64_syscall_portability"
description = "How portable syscall numbers work across x86 and aarch64"
category = "cyrius"
content = '''
PROBLEM:
  x86_64 and aarch64 have COMPLETELY DIFFERENT syscall numbers:
    read:  x86=0,  aarch64=63
    write: x86=1,  aarch64=64
    open:  x86=2,  aarch64=56
    close: x86=3,  aarch64=57
    brk:   x86=12, aarch64=214
    exit:  x86=60, aarch64=93

  Shared source files (src/frontend/*.cyr + src/backend/*.cyr) use raw syscall numbers.
  Cross-compiler runs on x86 but generates aarch64 code.

SOLUTION: SYS_* enum constants defined per-architecture.

  main.cyr (x86):
    enum Sys { SYS_READ=0; SYS_WRITE=1; SYS_OPEN=2; SYS_CLOSE=3; SYS_BRK=12; SYS_EXIT=60; }

  compiler_aarch64.cyr (cross-compiler, runs on x86):
    enum Sys { SYS_READ=0; SYS_WRITE=1; ... }  # x86 numbers (runs on x86!)

  For native aarch64 self-hosting (patched on ARM machine):
    enum Sys { SYS_READ=63; SYS_WRITE=64; SYS_BRK=214; SYS_EXIT=93; }

CROSS-COMPILER GOTCHA:
  The cross-compiler is an x86 binary. Its SYS_* values must be x86 numbers
  because THAT binary runs on x86. The code it GENERATES for aarch64 uses
  the raw numbers from the source being compiled.

  When self-hosting on aarch64, the SOURCE must have aarch64 numbers because
  the compiled binary runs on aarch64.

SYSCALL TRANSLATION LAYER (in aarch64 emitter):
  ESYSXLAT: chain of CMP X8,#N / B.NE +8 / MOVZ X8,#M
  Translates common x86 numbers to aarch64 at codegen time.
  Used by ESCPOPS for user-written syscall() calls.

ENCODING GOTCHA:
  MOVZ X8, #63 = 0xD28007E8 (not 0xD2800FE8!)
  Formula: 0xD2800000 | (imm16 << 5) | Rd
  63 << 5 = 0x7E0, NOT 0xFE0. Getting this wrong silently maps to wrong syscall.
'''

[[entries]]
name = "aarch64_escpops_fix"
description = "How the aarch64 syscall arg popping was fixed (pop-through-x0 approach)"
category = "cyrius"
content = '''
THE BUG:
  Original ESCPOPS popped args directly into target registers:
    EPOPRDI → x0 (arg1)
    EPOPRSI → x1 (arg2)
    ...
    EPOPR → x0 (syscall num, OVERWRITES arg1!)
  Then: mov x8, x0; shift x0←x1, x1←x2, etc. Lossy register shuffle.

THE FIX — pop-through-x0:
  Pop ALL values into x0, then MOV to target register:
    if (n >= 4) { EPOPR(S); EW(S, mov_x2_x0); }  # pop → x0, mov x2, x0
    if (n >= 3) { EPOPR(S); EW(S, mov_x1_x0); }  # pop → x0, mov x1, x0
    if (n >= 2) {
      EPOPR(S); EW(S, mov_x9_x0);  # pop arg1 → x0, save to x9
      EPOPR(S); EW(S, mov_x8_x0);  # pop syscall → x0, save to x8
      EW(S, mov_x0_x9);             # restore arg1 from x9
    }

WHY POP-THROUGH-x0 WORKS:
  - Only one register (x0) is used for all pops → no ordering ambiguity
  - Each pop immediately moves to the final target register
  - The syscall num/arg1 swap at the end uses x9 as a temporary
  - No shift chain, no lost values

LIFO ORDER:
  Push order: syscall_num, arg1, arg2, ..., argN
  Stack: [argN_top, ..., arg1, syscall_num_bottom]
  Pop order: argN first (top), syscall_num last (bottom)
  So the n>=N conditions fire from highest to lowest.

ARM64 ABI:
  Syscall: x8=number, x0-x5=args. svc #0.
  This matches the final register state after our pop sequence.
'''

[[entries]]
name = "module_system"
description = "How mod/use/pub work: namespace mangling, use aliases"
category = "cyrius"
content = '''
SYNTAX:
  mod math;                    # set current module to "math"
  pub fn add(a, b) { ... }    # public function in math module
  fn helper(x) { ... }        # private (no pub)

  mod main;                    # switch to main module
  use math.add;                # alias: add → math_add

IMPLEMENTATION:
  mod name; → sets GMOD(S) to the name offset in tok_names.
  When PARSE_FN_DEF sees GMOD != 0:
    Builds mangled name "module_function" in tok_names (at NPOS, permanent).
    Registers function under the mangled name.

  use modname.funcname; → builds "modname_funcname" in tok_names (at NPOS).
    Stores alias: use_from[uc] = funcname_offset, use_to[uc] = mangled_offset.

  FINDFN: After checking fn_names, checks use_aliases.
    If short name matches use_from[i], recursively calls FINDFN with use_to[i].

HEAP:
  current_module at 0x8FEC8 (8 bytes)
  pub_flags[256] at 0x8FED0 (256 bytes)
  use_from[64] at 0x8FFD0 (512 bytes)
  use_to[64] at 0x901D0 (512 bytes)
  use_count at 0x903D0 (8 bytes)

MANGLED NAME STORAGE GOTCHA:
  The mangled name must be stored PERMANENTLY in tok_names (at NPOS).
  Using a scratch area (offset 30000) causes names to be overwritten
  when multiple functions are defined — only the last one survives.
  Fix: append to tok_names at NPOS, same as the lexer does.

CROSS-MODULE CALLS:
  mod math; fn add(a, b) { ... }
  mod main; use math.add; var r = add(1, 2);
  → FINDFN("add") fails → checks aliases → finds "math_add" → calls it.
'''

[[entries]]
name = "operator_overloading"
description = "How operator overloading dispatches +,-,*,/ to Type_add/sub/mul/div"
category = "cyrius"
content = '''
DESIGN:
  When PARSE_EXPR sees + and the left operand has a struct type (GESTYPE > 0),
  dispatch to Type_add(lhs, rhs) instead of integer addition.

TRACKING:
  expr_stype (at S+0x903D8) — set in PARSE_FACTOR when loading a struct-typed var.
  Cleared to 0 for all other expressions (literals, function calls, etc.).
  Set from GVTYPE for globals, GLTYPE for locals (negative = struct ID).

DISPATCH (EMIT_OP_DISPATCH):
  1. Push lhs (already in rax from PARSE_TERM)
  2. Call PARSE_TERM to parse rhs, push result
  3. BUILD_OP_NAME: construct "TypeName_add" in tok_names (permanent, at NPOS)
  4. ECALLPOPS(2) + ECALLTO/ECALLFIX + ECALLCLEAN(2)
  5. Clear expr_stype to 0

BUILD_OP_NAME GOTCHA:
  Must use inline byte copy, NOT memcpy — the compiler source does not include
  lib/string.cyr. Using memcpy crashes the compiler during compilation.
  Fix: while loop with load8/store8.

TYPE ANNOTATION:
  var x: Str = str_from("hello");  → sets GLTYPE to Str struct ID (negative)
  Enables: x.len(), x + y (operator dispatch), x.contains("abc")
  Works for both global (GVTYPE/SVTYPE) and local (GLTYPE/SLTYPE) vars.
'''

[[entries]]
name = "block_body_closures"
description = "How block body closures work (and the global scope limitation)"
category = "cyrius"
content = '''
SYNTAX:
  var f = |x| { var y = x * 2; return y; };    # block body
  var g = |x| x * 2;                            # expression body (simpler)

BLOCK BODY:
  Parsed via PARSE_PROG inside the closure function.
  return statements emit JMP patches → patched to EFNEPI.
  Single EFNEPI at end handles both return paths and fall-through.

WORKS: Inside functions.
  fn make() {
    var f = |x| { if (x > 10) { return 42; } return 0; };
    return fncall1(f, 20);  // 42
  }

LIMITATION: Block body closures at GLOBAL scope produce wrong results.
  The closure compiles correctly but the interaction between the global
  context and the closure epilogue causes double-return issues.
  Fix: always use closures inside functions. This matches Rust convention.

IMPLEMENTATION:
  |params| { body } detected in PARSE_FACTOR when PEEKT == 13 (LBRACE).
  Same anonymous function generation as expression closures.
  PARSE_PROG parses body. Return patches collected via GRPC/SRPC.
  All patches resolved to single EFNEPI after body.
'''

[[entries]]
name = "fixup_table_expansion"
description = "Fixup table history: 0x8A000 (528) → 0x262000 (2048) → 0x2A2000 (8192)"
category = "cyrius"
content = '''
HISTORY:
  v1.4.0: Relocated from 0x8A000 (528 usable) to 0x262000 (2048 entries)
  v1.7.2: Relocated to 0x2A2000 to accommodate 512KB preprocessor buffer
  v1.7.5: Expanded to 4096 entries. fn_names/offsets/params relocated.
  v1.10.2: Expanded to 8192 entries (131072 bytes). fn_names/offsets/params
           relocated to 0x2C2000/0x2C4000/0x2C6000. brk at 0x2CE000.

CURRENT LAYOUT (v1.11.5):
  0x2A2000  fixup_tbl     [131072] 8192 entries × 16 bytes
  0x2C2000  fn_names      [8192]   1024 function name offsets
  0x2C4000  fn_offsets    [8192]   1024 function code offsets
  0x2C6000  fn_params     [8192]   1024 function param counts
  0x2C8000  fn_body_start [8192]   1024 inline body start token indices
  0x2CA000  fn_body_end   [8192]   1024 inline body end token indices
  0x2CC000  fn_inline     [8192]   1024 inline eligibility flags
  0x2CE000  brk

FIXUP ENTRY FORMAT (16 bytes each):
  [0..7]  code offset — position in codebuf where the address goes
  [8..15] type (high byte) | index (low 7 bytes)
    type 0 = variable address (dbase + cumulative var offsets)
    type 1 = string address (dbase + totvar + string_offset)
    type 2 = function call (relative offset for CALL instruction)
    type 3 = absolute function address (for function pointers)
    type 4 = tail call (aarch64 B instruction, not BL)

OVERFLOW CHECK:
  All fixup writers check fc >= 8192: RECFIX, ESADDR, ECALLFIX,
  ETAILJMP, &fn handler, closure handler.

SIZING GUIDE:
  Each function call, string literal, global var reference, and function
  pointer generates one fixup entry. argonaut (358 functions, 6257 lines)
  uses ~1100 entries. 8192 limit supports programs well past 20K lines.
'''

[[entries]]
name = "str_data_buffer_expansion"
description = "String literal buffer relocated from 0x69000 to 0x61000 for 32KB capacity"
category = "cyrius"
content = '''
PROBLEM:
  String literals are stored at compile time in str_data buffer.
  Originally at 0x69000 with str_pos at 0x69800 — only 2048 bytes
  of usable space before str_pos was overwritten.

  Programs with >2KB of string literals (common with multiple includes
  and println calls) would overflow into str_pos and data_size,
  corrupting the ELF data section layout.

DIAGNOSIS:
  Counted total string literal bytes across all includes + program:
    grep -oP '"[^"]*"' | awk '{ total += length($0) - 1 }'
  Result: 4196 bytes vs 2048 limit.

FIX (v1.4.0):
  1. Relocated str_data from 0x69000 to 0x61000 (32KB free space between
     var_sizes at 0x60800 and old str_data at 0x69000)
  2. str_pos stays at 0x69800, data_size at 0x69808 (unchanged)
  3. Updated all 0x69000 references in: lex.cyr, fixup.cyr, aarch64/fixup.cyr
  4. Two-step bootstrap required

HEAP LAYOUT (data region):
  0x60000  var_noffs  [2048]   256 variable name offsets
  0x60800  var_sizes  [2048]   256 variable sizes
  0x61000  str_data   [32768]  String literal bytes (was 0x69000, 2KB)
  0x69800  str_pos    [8]      Current write position in str_data
  0x69808  data_size  [8]      Total variable data bytes for ELF
'''

[[entries]]
name = "shared_library_output"
description = "shared; directive emits ET_DYN ELF instead of ET_EXEC for .so output"
category = "cyrius"
content = '''
FEATURE (v1.1.0):
  The `shared;` keyword at top-level sets kernel_mode=2, which causes
  the ELF emitter to produce an ET_DYN (type 3) binary instead of
  ET_EXEC (type 2). This makes the output recognizable as a shared
  library by tools like `file`, `nm`, and `readelf`.

USAGE:
  shared;
  pub fn add(a, b) { return a + b; }
  pub fn mul(a, b) { return a * b; }

  Compile: cat mylib.cyr | cc2 > mylib.so

IMPLEMENTATION:
  1. Lexer: `shared` keyword (token 78) recognized in LEXID
  2. Parser: top-level `shared;` sets kernel_mode at 0x8FCA0 to 2
  3. Fixup: EMITELF checks kernel_mode:
     - 0 = ET_EXEC (normal binary, base 0x400000)
     - 1 = kernel (ELF32 multiboot, base 0x100000)
     - 2 = ET_DYN (shared library)
  4. EMITELF_USER(S, etype) handles both ET_EXEC and ET_DYN —
     only the e_type field in the ELF header differs

LIMITATIONS:
  - No PIC (position-independent code) — addresses are absolute
  - No symbol table or dynamic section — nm can't resolve names
  - No PLT/GOT — dlsym won't find functions
  - Useful as proof-of-concept; full .so requires PIC codegen (future)
'''

[[entries]]
name = "address_based_operator_overloading"
description = "Multi-field structs pass addresses (not values) to operator functions"
category = "cyrius"
content = '''
FEATURE (v1.2.0):
  Operator overloading (`a + b` → `Type_add(a, b)`) needs to pass struct
  data to the operator function. For single-field structs (8 bytes), the
  value fits in a register. For multi-field structs, only the address fits.

DISPATCH RULE:
  The compiler checks var_sizes[var_index]:
  - size == 8  → pass VALUE (load64 from variable, put in register)
  - size > 8   → pass ADDRESS (&var, pointer to first field)

  This means operator functions for multi-field structs receive pointers:

  struct Vec3 { x; y; z; }  # 24 bytes → pass by address

  fn Vec3_add(a, b) {
    var rx = load64(a) + load64(b);
    var ry = load64(a + 8) + load64(b + 8);
    var rz = load64(a + 16) + load64(b + 16);
    # Must return a new struct (allocate or use result var)
    store64(a, rx); store64(a + 8, ry); store64(a + 16, rz);
    return a;
  }

  var a = Vec3 { 1, 2, 3 };
  var b = Vec3 { 10, 20, 30 };
  var c = a + b;  # calls Vec3_add(&a, &b)

IMPLEMENTATION:
  In EMIT_OP_DISPATCH (parse.cyr):
  1. GESVAR(S) retrieves the variable index of the left operand
  2. var_sizes[idx] checked: if >8, emit LEA (load effective address)
     instead of MOV (load value)
  3. Same check for right operand
  4. Call Type_op(left, right) with addresses or values accordingly

BACKWARD COMPATIBLE:
  Single-field structs and type-annotated scalars continue to pass values.
  Only structs with 2+ fields (>8 bytes) switch to address passing.
'''

[[entries]]
name = "emitelf_dedup"
description = "EMITELF and EMITELF_SHARED merged into EMITELF_USER(S, etype) — 2KB saved"
category = "cyrius"
content = '''
REFACTOR (v1.5.0):
  EMITELF and EMITELF_SHARED were 95% identical — both emit an x86_64
  ELF binary with the same header layout, program header, code section,
  variable data, and string data. The only difference: e_type field
  (byte 16 of ELF header) is 2 (ET_EXEC) vs 3 (ET_DYN).

BEFORE:
  fn EMITELF(S) { ... 60 lines ... }      # e_type = 0x0002
  fn EMITELF_SHARED(S) { ... 40 lines ... } # e_type = 0x0003

AFTER:
  fn EMITELF_USER(S, etype) {
    ...
    # e_type from parameter:
    S64(O + op, 0x00000001003E0000 | etype);
    ...
  }

  fn EMITELF(S) {
    if (kernel_mode == 1) { EMITELF_KERNEL(S); return 0; }
    if (kernel_mode == 2) { EMITELF_USER(S, 3); return 0; }
    EMITELF_USER(S, 2);
    return 0;
  }

RESULT: Compiler shrunk 138KB → 136KB (2KB saved). Self-hosting verified.

KEY INSIGHT:
  The ELF e_type field is at the lowest 16 bits of the third qword
  (offset 16). Using `0x00000001003E0000 | etype` constructs:
    e_type = etype (2 or 3)
    e_machine = 0x3E (x86_64)
    e_version = 1
  All in one 64-bit store.
'''

[[entries]]
name = "multi_pass_preprocessor"
description = "Multi-pass preprocessor: include inside #ifdef in included files (v1.6.5)"
category = "cyrius"
content = '''
PROBLEM:
  Preprocessor made a single pass. When expanding include "file.cyr",
  the file content was read into the output buffer but never preprocessed.
  So #ifdef and nested include inside included files were ignored.

FIX:
  Split PREPROCESS into PP_PASS (one pass) and PREPROCESS (loop).
  PP_PASS returns 1 if any include was expanded, 0 if none.
  PREPROCESS runs PP_PASS in a loop until no includes found, max 16 passes.

  fn PP_PASS(S) {
    ... (same as old PREPROCESS but tracks had_include flag)
    return had_include;
  }

  fn PREPROCESS(S) {
    var pass = 0;
    var go = 1;
    while (go == 1) {
      var had = PP_PASS(S);
      pass = pass + 1;
      if (had == 0) { go = 0; }
      if (pass >= 16) { go = 0; }
    }
    return 0;
  }

  Pass 1: expands top-level includes, evaluates top-level #define/#ifdef
  Pass 2: newly-included content gets its #ifdef/include processed
  Pass 3+: handles deeper nesting (rare, usually 2 passes suffice)

WHY 16: Arbitrary safety limit. Real-world code rarely nests beyond 3 levels.
The compiler itself (7 includes, no nesting) completes in 2 passes.

PERFORMANCE: Each pass copies the full source. For the compiler (136KB source
after expansion), each pass takes <1ms. 2 passes = no measurable impact.
'''

[[entries]]
name = "arch_specific_asm_mnemonics"
description = "Moving ASM_MNEMONIC from shared parse.cyr to arch-specific emit files (v1.6.5)"
category = "cyrius"
content = '''
PROBLEM:
  ASM_MNEMONIC was defined in parse.cyr (shared code). It contained x86 encodings
  (cli=0xFA, sti=0xFB, etc). The aarch64 compiler included the same parse.cyr,
  so x86 asm { cli; } silently emitted 0xFA (invalid aarch64 instruction).
  No error, just wrong code.

FIX:
  Moved ASM_MNEMONIC and all ASM_* helpers from parse.cyr to emit files:
  - src/backend/x86/emit.cyr: x86 mnemonics (cli, sti, hlt, nop, iretq, wrmsr, rdmsr, ...)
  - src/arch/aarch64/emit.cyr: aarch64 mnemonics (svc, wfi, wfe, dmb, dsb, isb, nop, ret)

  parse.cyr still calls ASM_MNEMONIC(S) — the function is resolved from whichever
  emit.cyr was included. Since emit.cyr is included BEFORE parse.cyr, the function
  is registered in pass 1 and available when parse.cyr calls it in pass 2.

  Unknown mnemonics now error: "error:N: unknown aarch64 asm mnemonic"

KEY INSIGHT: Function override does NOT work for indirect calls in Cyrius.
  If fn A() calls fn B(), and B() is redefined later, A still calls the original B
  (because the BL fixup was already resolved). So overriding ASM_MNEMONIC in
  fixup.cyr (after parse.cyr) does NOT work. The function must be in a file
  included BEFORE parse.cyr (emit.cyr).
'''

[[entries]]
name = "aarch64_kernel_elf"
description = "aarch64 kernel ELF emission: base address, SP preamble, fixup (v1.6.5)"
category = "cyrius"
content = '''
AARCH64 KERNEL ELF:
  Base: 0x40000000 (standard ARM kernel load address for QEMU -kernel)
  Entry: 0x40000078 (base + 64 byte ELF header + 56 byte program header)
  Format: ELF64, e_machine=0xB7 (AArch64), statically linked
  No multiboot (ARM uses device tree, not BIOS/multiboot)

SP PREAMBLE (16 bytes, 4 instructions):
  Emitted between ELF headers and compiler-generated code.
  Sets stack pointer to top of memsz region (base + filesz + 64KB).

  MOVZ x9, #stack_lo
  MOVK x9, #stack_mid, LSL#16
  MOVK x9, #stack_hi, LSL#32
  MOV SP, x9   (encoded as ADD SP, x9, #0 = 0x9100013F)

  Without this, first function prologue (stp x29,x30,[sp,#-16]!) faults
  because SP=0 at kernel entry.

FIXUP ADJUSTMENT:
  entry = 0x40000078  (was 0x100060 from x86 — wrong)
  dbase = entry + preamble(16) + aligned_code_size
  String addresses: dbase + total_var_bytes + string_offset
  Function calls: BL relative (codebuf-internal, no preamble adjustment needed)

BOOT COMMAND:
  qemu-system-aarch64 -M virt -cpu cortex-a57 -kernel build/agnos_aarch64 -serial stdio -display none
'''

[[entries]]
name = "packed_result_implementation"
description = "Packed Result type: zero-alloc Ok/Err using bit 63 (v1.5.3, agnosys)"
category = "cyrius"
content = '''
ENCODING:
  Ok(value):  return value directly (bit 63 = 0 for all valid pointers and positive ints)
  Err(ptr):   return ptr | 0x8000000000000000 (bit 63 = 1)
  is_ok(r):   r >= 0 (signed comparison — bit 63 test)
  is_err(r):  r < 0
  payload(r): r & 0x7FFFFFFFFFFFFFFF (mask off sign bit)

WHY IT WORKS:
  x86_64 user pointers are canonical: always < 2^47 (bit 63 = 0).
  Heap pointers from alloc() are always positive.
  Syscall return values (pids, fds) are always positive on success.
  So bit 63 is always 0 for valid Ok values.

PACKED ERRORS (dual encoding):
  For errors that don't need a message string:
    syserr_pack(kind, errno) = kind << 16 | errno
  For errors with messages:
    syserr_new(kind, errno, message) = alloc(24) → heap pointer

  Dispatch in syserr_kind/errno/message:
    if (e < 0x100000) → packed (kind = e >> 16, errno = e & 0xFFFF)
    else → heap pointer (kind = load64(e), errno = load64(e+8))

PERFORMANCE (agnosys benchmarks):
  Ok(42):         15ns → 2ns (7.5x faster — no alloc)
  err_from_errno: 38ns → 21ns (45% faster — packed, no alloc on hot path)
  query_sysinfo:  1110ns → 664ns (40% faster — caller buffer, no memset)
  getpid/getuid:  parity with Rust

BACKWARD COMPATIBILITY:
  The API (Ok, Err, is_ok, is_err_result, payload) is identical.
  Old heap-based tagged.cyr still works. Projects choose which to use
  by vendoring the appropriate lib/tagged.cyr.
'''

[[entries]]
name = "emovi_optimization"
description = "EMOVI code size optimization: xor eax,eax for 0, mov eax,imm32 for small values (v1.6.7)"
category = "cyrius"
content = '''
BEFORE: EMOVI always emitted movabs rax, imm64 (10 bytes: 48 B8 + 8 bytes).
AFTER:
  v == 0:              xor eax, eax (2 bytes: 31 C0) — clears rax, faster
  0 < v < 0x80000000:  mov eax, imm32 (5 bytes: B8 + 4 bytes) — zero-extends to rax
  else:                movabs rax, imm64 (10 bytes) — unchanged

  fn EMOVI(S, v) {
    if (v == 0) { EB(S, 0x31); EB(S, 0xC0); return 0; }
    if (v > 0) { if (v < 0x80000000) {
      EB(S, 0xB8);
      EB(S, v & 0xFF); EB(S, (v >> 8) & 0xFF);
      EB(S, (v >> 16) & 0xFF); EB(S, (v >> 24) & 0xFF);
      return 0;
    } }
    E2(S, 0xB848); E8(S, v); return 0;
  }

IMPACT: Compiler 136KB → 131KB (5KB saved). All generated binaries shrink.
Requires two-step bootstrap: old cc2 → cc3 (larger), cc3 → cc4 (optimized), cc4 == cc5.
'''

[[entries]]
name = "preprocessor_macros_implementation"
description = "Preprocessor macros with args: define, store, expand (v1.6.7)"
category = "cyrius"
content = '''
SYNTAX: #define NAME(p1, p2) body text
INVOKE: NAME(arg1, arg2)

STORAGE (in PP_PASS):
  When #define with ( is detected:
  - Hash name (stopping at paren) → S+0x92000 (16 name hashes)
  - Copy entire line after #define to S+0x93000 (16KB text storage)
  - Store text offset at S+0x92080 and length at S+0x92100
  - Increment _pp_macro_count, advance ip via PP_SKIPLINE

EXPANSION (in PP_MACRO_PASS, separate pass after all includes resolved):
  - Scan input for uppercase identifiers matching a macro name hash
  - Verify ( follows the identifier
  - Parse params from stored definition text
  - Parse args from input (comma-separated, handles nested parens)
  - Walk body text, replace param names with arg text (word-boundary check)
  - Write expanded text + newline to output

KEY DESIGN: macros are stored during the include/ifdef pass but expanded in a
SEPARATE pass afterward. This avoids the bug where PP_STORE_MACRO consumed
too much input (function call boundary issue with the Cyrius compiler).

LIMITATIONS:
  - Macro names must start uppercase (A-Z) to avoid false matches
  - Up to 16 macros
  - Single-line body only (no multi-line macros)
  - No nested macro expansion
'''

[[entries]]
name = "return_comparison_fix"
description = "return expr == expr now works: PARSE_RETURN uses PARSE_CMP_EXPR (v1.7.0)"
category = "cyrius"
content = '''
BUG: return a == b; failed with "expected ';', got '=='"
ROOT CAUSE: PARSE_RETURN called PARSE_EXPR which stops at comparison operators.
FIX: PARSE_RETURN now calls PARSE_CMP_EXPR which handles ==, !=, <, >, <=, >=.

  fn PARSE_RETURN(S) {
    STI(S, GTI(S) + 1);
    PARSE_CMP_EXPR(S);   # was PARSE_EXPR(S)
    ...
  }

Comparisons already worked in if() conditions (via ECONDCMP) and in function
arguments (via PARSE_CMP_EXPR). Only return statements were missing.
'''

[[entries]]
name = "input_buffer_256kb"
description = "Input buffer expanded to 256KB for large programs with many includes (v1.7.0)"
category = "cyrius"
content = '''
PROBLEM: Preprocessor expands includes into output buffer (S+0x222000, 262144 bytes),
then copies back to input buffer (S+0, 131072 bytes). Large programs with many
includes (e.g., compiler itself at 152KB after expansion) overflowed silently,
producing confusing parse errors or segfaults.

FIX: Allow copy-back up to 262144 bytes. The overflow into codebuf (S+0x20000) is
safe because the lexer consumes the entire source into token arrays BEFORE code
generation starts. By the time codegen writes to codebuf, the source text is no
longer needed at S+0.

LIMITS:
  Input (before preprocessing): 131072 bytes (read from stdin)
  Expanded source (after preprocessing): up to 262144 bytes
  Codebuf: 262144 bytes (256KB) (with overflow check in EB)
  Preprocess output buffer: 262144 bytes

CODEBUF OVERFLOW: EB() now checks cp >= 262144 and errors:
  "error: codebuf overflow (N/262144 bytes) — program too large"
'''

[[entries]]
name = "dead_code_elimination"
description = "Dead code elimination: token scan + 3-byte stubs for unreachable functions (v1.7.0)"
category = "cyrius"
content = '''
APPROACH: After pass 1 (all names registered), before pass 2 (emit bodies):
  - Scan all tokens for IDENT references (skip those preceded by FN keyword)
  - Compare each IDENT against function name using STREQ (string comparison)
  - Skip DCE for module-scoped functions (GMOD != 0)
  - Skip DCE for names containing underscore (likely mangled: Type_method)

PASS 2 CHECK: For each top-level fn definition:
  if (not in module AND no underscore AND name not found in token scan):
    emit stub instead of full body

STUB (3 bytes):
  S64(S + 0x26C000 + fi * 8, GCP(S));  # set fn_offsets to stub location
  EB(S, 0x31); EB(S, 0xC0);            # xor eax, eax
  EB(S, 0xC3);                          # ret
  # Skip function body tokens (brace counting)

WHY STUBS NOT SKIP: Skipping entirely leaves fn_offsets[idx] = -1.
  Fixup type 2 computes: target(-1) - coff - 4 → wild jump → segfault.
  Fixup type 3 computes: entry + (-1) → invalid address → segfault.
  Stubs give fixups a valid 3-byte target that safely returns 0.

KEY BUG FIXED: Initial implementation compared TOKVAL offsets (tok_names buffer
  positions). Different tokens for the same identifier have different offsets
  because the lexer stores each occurrence separately. Fix: use STREQ to compare
  the actual string content at each offset.

PERFORMANCE: O(F * T) where F = functions, T = tokens. For the compiler
  (248 functions, ~20K tokens), the scan adds ~1ms. Negligible.

SAVINGS: ~1.5KB on hello-world with 8 stdlib includes (unused stdlib functions
  replaced with 3-byte stubs). Larger programs with more unused library code
  see proportionally more savings.
'''

[[entries]]
name = "vcnt_expansion_and_overlap_fix"
description = "VCNT expanded to 2048, fixed var_noffs/var_sizes overlap bug (v1.7.0)"
category = "cyrius"
content = '''
BUG: var_noffs at 0x60000 [4096 bytes = 512 entries] and var_sizes at 0x60800
  [4096 bytes = 512 entries] overlapped when VCNT > 256:
    var_noffs[256] writes to 0x60000 + 256*8 = 0x60800 → overwrites var_sizes[0]
  This was introduced in v1.5.2 when expanding from 256 to 512 entries.
  Worked by luck because most programs had < 256 variables.

FIX: Relocated to non-overlapping regions with 2048 entries each:
    0x60000  var_noffs [16384]  2048 entries (16KB)
    0x64000  var_sizes [16384]  2048 entries (16KB)
    0x68000  str_data  [8192]   string literals (8KB)

IMPACT: agnostik port (12 modules, ~500 variables + ~200 enum variants)
  now fits comfortably. Previous 512 limit hit at ~60% through modules.

VCNT STILL NEVER RESETS: Each function's locals, params, and arrays permanently
  consume slots. With 2048 slots, practical programs can have ~1500 variables
  + ~500 enum variants. Full fix (stack-local allocation, enum constants without
  VCNT) deferred.
'''

[[entries]]
name = "constant_folding"
description = "Constant folding: codegen-level NUM OP NUM → single EMOVI (v1.7.3)"
category = "cyrius"
content = '''
MECHANISM:
  PARSE_FACTOR sets _cfp (codebuf position before EMOVI) and _cfo (flag) for
  small positive literals (0 < v < 0x80000000 → 5-byte mov eax, imm32).

  PARSE_TERM checks: if _cfo == 1 AND next token is NUM AND result is also
  small positive, rewind SCP to _cfp and emit EMOVI(folded_result).
  The rewind replaces exactly 5 bytes with 5 bytes — no code corruption.

OPERATORS: * / << >> (high-precedence, in PARSE_TERM while loop).
  Low-precedence (+, -, &, |, ^) NOT folded (would require PARSE_EXPR changes).

CRITICAL BUG (found during 4 failed attempts):
  _cfo flag leaked from inside parenthesized subexpressions.
  (n - 6) * 8 would fold 6 * 8 = 48 instead of (n-6) * 8.
  The 6 inside (n - 6) set _cfo = 1, which persisted past the closing ).
  FIX: clear _cfo after evaluating parenthesized expressions in PARSE_FACTOR.

SAFETY CONSTRAINTS:
  - Both operands must be small positive (0 < v < 0x80000000)
  - Result must also be small positive (fits in 5-byte EMOVI)
  - Larger constants (like 1 << 56 = 10-byte movabs) are correctly skipped
  - This prevents SCP rewind from overwriting subsequent code

SELF-HOSTING: cc3 == cc4 == cc5 == cc6 (all 140KB, identical binaries).
  The compiler source has no NUM * NUM patterns, so no folding occurs during
  self-compilation. User programs benefit from the optimization.
'''

[[entries]]
name = "tail_call_optimization"
description = "Tail call optimization: return fn(args) → epilogue + jmp (v1.7.2)"
category = "cyrius"
content = '''
DETECTION (in PARSE_RETURN):
  1. Check GINFN(S) == 1 (inside a function)
  2. Check PEEKT(S) == IDENT and next token is LPAREN
  3. Scan forward to matching RPAREN, verify next token is SEMI
  4. If all checks pass: this is a tail call

EMIT:
  1. Parse args normally (PARSE_CMP_EXPR for each, push to stack)
  2. ECALLPOPS — pop args into registers (rdi, rsi, rdx, rcx, r8, r9)
  3. ETAILJMP — emit epilogue (mov rsp, rbp; pop rbp) + jmp rel32 with fixup

  fn ETAILJMP(S, fnidx) {
    EB(S, 0xC9);       # leave (mov rsp,rbp; pop rbp)
    # pop r12 (41 5C)
    EB(S, 0x41); EB(S, 0x5C);
    EB(S, 0x5B);       # pop rbx
    EB(S, 0xE9);       # jmp rel32
    ... fixup entry (type 2) ...
  }

KEY VALIDATION: step 3 checks ) is followed by ; to avoid folding
  return fn() + expr; (which is NOT a tail call).

PERFORMANCE: 1 million recursive calls without stack overflow.
  fn count(n) { if (n == 0) { return 42; } return count(n - 1); }
  count(1000000) returns 42 (would segfault without TCO).
'''

[[entries]]
name = "f64_transcendentals"
description = "x87 FPU transcendental builtins: sin, cos, exp, ln, log2, exp2 (v1.7.8)"
category = "cyrius"
content = '''
BUILTINS (20 total):
  SSE2:  f64_add, f64_sub, f64_mul, f64_div (addsd/subsd/mulsd/divsd)
         f64_from (cvtsi2sd), f64_to (cvttsd2si)
         f64_eq/f64_lt/f64_gt (ucomisd + setcc)
         f64_neg (xorpd 0; subsd), f64_sqrt (sqrtsd)
  SSE4.1: f64_floor (roundsd mode 1), f64_ceil (roundsd mode 2)
  Integer: f64_abs (AND 0x7FFFFFFFFFFFFFFF — clear sign bit)
  x87 FPU: f64_sin (fsin), f64_cos (fcos)
           f64_ln (fldln2; fxch; fyl2x)
           f64_log2 (fld1; fxch; fyl2x)
           f64_exp (fldl2e; fmulp; fld st0; frndint; fsub; fxch; f2xm1; fld1; faddp; fscale; fstp st1)
           f64_exp2 (same as exp without fldl2e multiply)

x87 BRIDGE:
  SSE2 value is in rax (f64 bit pattern). x87 uses its own FPU stack.
  Transfer: sub rsp,16; mov [rsp],rax; fld qword [rsp] → compute → fstp qword [rsp]; mov rax,[rsp]; add rsp,16
  Emit helpers: EX87PUSH(S) and EX87POP(S) in emit.cyr.

USAGE:
  All f64 builtins take and return i64 (f64 bit pattern). Values are NOT floats
  in the Cyrius type system — they are integers that happen to hold IEEE 754 bits.
  var pi = 0x400921FB54442D18;   # pi as f64 bits
  var s = f64_sin(pi);           # sin(pi) ≈ 0
  var n = f64_to(s);             # convert to integer: 0
  var x = f64_from(42);          # 42.0 as f64 bits
  var r = f64_sqrt(x);           # sqrt(42.0)

TOKEN ASSIGNMENTS:
  62=f64_add 63=f64_sub 64=f64_mul 65=f64_div 66=f64_from 67=f64_to
  68=f64_eq 69=f64_lt 70=f64_gt 71=f64_neg
  79=f64_sqrt 80=f64_abs 81=f64_floor 82=f64_ceil
  83=f64_sin 84=f64_cos 85=f64_exp 86=f64_ln 87=f64_log2 88=f64_exp2
  89=f64v_add 90=f64v_sub 91=f64v_mul (SIMD batch, SSE2 packed)
  92=f64_round (SSE4.1 round to nearest)
  93=f64v_div (divpd) 94=f64v_sqrt (sqrtpd)
  95=f64v_abs (andpd+mask) 96=f64v_fmadd (mulpd+addpd)
  97=ret2 (return two values rax:rdx) 98=rethi (read rdx from last call)

STDLIB ADDITIONS (v1.9.4):
  fmt_float(val, decimals) — format f64 as "3.141593". Uses f64_floor + f64_round.
  fmt_float_buf(val, buf, decimals) — write to buffer, return length.
  getenv(name) — read env var from /proc/self/environ, heap-allocated result.
'''

[[entries]]
name = "identifier_deduplication"
description = "LEXID deduplicates identifiers in tok_names to reduce buffer usage ~50% (v1.7.8)"
category = "cyrius"
content = '''
PROBLEM:
  Every identifier occurrence stored a NEW copy in tok_names (0x50000, 64KB).
  The compiler source itself used ~65500 bytes — at the buffer limit.
  Adding any new feature (functions, variables) would overflow.

FIX:
  After writing a new identifier to tok_names, LEXID scans backwards through
  all previously stored identifiers. If an identical string is found, the new
  entry is discarded (NPOS rewound) and the token value reuses the existing offset.

  Key: reuses existing LEXID local variables (bl, go, c) to avoid adding new
  unique identifiers to tok_names (chicken-and-egg: the dedup code itself must
  fit within the old limit to compile).

BUGS FOUND DURING IMPLEMENTATION:
  1. Variable scope: 'c' declared inside while{if{}} was at scope depth 3,
     invisible to dedup code at scope depth 1. Fix: declare 'c' at function level.
  2. Return value clobber: reusing 'p' (LEXID's position parameter) as a loop
     counter set p=0, causing the main LEX loop to restart from position 0
     (infinite token generation). Fix: use 'dc' (declared inside dedup).
  3. klen mismatch: after dedup changes 'ws' to a distant offset, klen = npos - ws
     was a huge number (e.g., 60000). All keywords misidentified as IDENT.
     Fix: compute klen BEFORE dedup modifies ws.

BOOTSTRAP:
  Required two-step bootstrap because the dedup code added ~30 bytes of identifier
  occurrences, pushing past the 65500 limit:
  1. Rename PARSE_CMP_EXPR → PCMPE (saves 90 bytes) → compiles with old cc2
  2. Build dedup-enabled compiler → now has ~30000 bytes headroom
  3. Future changes have plenty of room

RESULT: tok_names usage dropped from ~65500 to ~30000 bytes for the compiler source.
'''

[[entries]]
name = "jump_table_switch"
description = "Dense switch statements use O(1) jump table instead of O(n) compare chain (v1.7.7)"
category = "cyrius"
content = '''
HEURISTIC: Pre-scan case values. If case_count >= 4 AND (max - min + 1) <= 2 * count
  AND range < 256 → use jump table. Otherwise use compare-and-branch chain.

CODEGEN (x86_64):
  # Setup: bounds check
  push rax; mov rax, min; mov rcx, rax; pop rax   # rcx = min
  sub rax, rcx                                      # rax = value - min (0-based)
  push rax; mov rax, range; mov rcx, rax; pop rax  # rcx = range
  cmp rax, rcx                                      # bounds check
  ja default                                        # out of range

  # Table lookup
  lea rcx, [rip + table_offset]   # table base
  movsxd rax, [rcx + rax*4]       # load 4-byte signed offset
  add rax, rcx                     # absolute target
  jmp rax                          # dispatch

  # Table: (range+1) entries × 4 bytes, offsets from table base
  # Patched as case bodies are parsed. Unmatched slots → default/end.

TWO-PASS WITHIN SWITCH:
  Pass 1: scan tokens to collect case values (min/max/count). No code emitted.
  Pass 2: emit jump table or chain based on heuristic.
  Token index saved/restored between passes.

CASE BODY PATCHING:
  Table entries start as 0. As each case body is parsed, its code offset is
  written to table[val - min] as a 4-byte offset from table base. After all
  cases, unpatched (0) entries are filled with the end/default offset.
'''

[[entries]]
name = "inline_small_functions_design"
description = "HISTORICAL: Token replay inlining design — disabled v1.11.3 due to I-cache regression"
category = "cyrius"
content = '''
STATUS: DISABLED (v1.11.3, _INLINE_OK = 0). Design preserved for future re-enablement.

DESIGN:
  Small functions (1 parameter, <= 6 body tokens) are inlined at the call site
  by replaying their body tokens in the caller's parsing context, with the
  parameter name mapped to the actual argument expression.

METADATA TABLES (heap 0x2C8000-0x2D2000):
  fn_body_start[1024] at 0x2C8000 — token index of body start per function
  fn_body_end[1024] at 0x2CA000   — token index of body end per function
  fn_inline[1024] at 0x2CC000     — 1 if function is eligible for inlining
  fn_pnames[1024] at 0x2CE000     — param name offset per function (1-param only)
  brk moved from 0x2C8000 to 0x2D2000.

ELIGIBILITY:
  During pass 2 (PARSE_FN_DEF), after parsing a function body:
  - Check param count == 1
  - Check body token count <= 6
  - If eligible: set SFINL(fi, 1), record body start/end/pname

INLINING (PARSE_FNCALL):
  When calling a function where GFINL(fi) == 1:
  1. Evaluate the single argument expression (already in rax)
  2. Save current token index
  3. Set TI to fn_body_start[fi]
  4. Replay body tokens with parameter name remapping:
     when the parser encounters the param name, it reads from the argument
     location instead of a local variable slot
  5. Restore TI after replay

DEPTH LIMIT:
  Max inline depth 3. The GIDEP(S) counter tracks current nesting.
  If depth >= 3, fall back to normal function call.
  Tail call optimization is disabled inside inline replay (checked via GIDEP > 0).

AARCH64:
  Same token replay mechanism — inlining is arch-independent (frontend only).
  The replayed tokens go through normal parse/emit which uses the active backend.
'''

[[entries]]
name = "r12_spill_register_allocation_reverted"
description = "HISTORICAL: R12 spill added v1.10.0, REVERTED v1.11.2 — 19-125% benchmark regressions"
category = "cyrius"
content = '''
STATUS: REVERTED (v1.11.2). Push rbx + push r12 added 7 bytes and 4 stack ops
per function. Benchmarks showed 19-125% regressions on heap alloc, syscalls, I/O.
ESPILL/EUNSPILL are now aliases for push rax / pop rax. Prologue reverted to
push rbp; mov rbp, rsp. Stack param offset back to +16.

PROBLEM (that motivated this, still unsolved):
  Expression evaluation uses push/pop to save intermediate values:
    a + b * c → eval a, push rax, eval b*c, pop rcx, add
  Each push/pop is 1+1 bytes but requires memory round-trip (stack store/load).

FIX — R12 SPILL:
  ESPILL/EUNSPILL replace EPUSHR/EPOPR in PARSE_TERM and PEXPR.
  First nesting level uses callee-saved R12 (register-register, zero latency).
  Deeper levels fall back to push/pop (unchanged behavior).

IMPLEMENTATION:
  Counter: _rsl (register spill level) tracks current nesting depth.

  fn ESPILL(S) {
    var rsl = GRSL(S);
    if (rsl == 0) {
      # mov r12, rax (49 89 C4)
      EB(S, 0x49); EB(S, 0x89); EB(S, 0xC4);
    } else {
      EPUSHR(S);  # push rax (fallback)
    }
    SRSL(S, rsl + 1);
  }

  fn EUNSPILL(S) {
    var rsl = GRSL(S) - 1;
    SRSL(S, rsl);
    if (rsl == 0) {
      # First: mov rcx, r12 so result stays in rax, saved value goes to rcx
      # Actually: mov rax, r12 (4C 89 E0) then caller uses rax
      EB(S, 0x4C); EB(S, 0x89); EB(S, 0xE0);
    } else {
      EPOPR(S);   # pop rcx (fallback)
    }
  }

PROLOGUE/EPILOGUE CHANGES:
  Old: push rbp; mov rbp, rsp
  New: push rbx; push r12; push rbp; mov rbp, rsp
  Old epilogue: leave; ret
  New epilogue: leave; pop r12; pop rbx; ret

  ETAILJMP updated to match: leave; pop r12; pop rbx; jmp rel32.

STACK PARAM OFFSET:
  Was: [rbp+16] for 7th param (above saved rbp + return addr)
  Now: [rbp+32] for 7th param (above saved rbx + r12 + rbp + return addr)
  ESTOREPARM updated accordingly.

AARCH64:
  ESPILL/EUNSPILL are stubs that always use stack (push/pop fallback).
  ARM has plenty of callee-saved registers (x19-x28) but the optimization
  is deferred — stack spill works correctly for now.
'''

[[entries]]
name = "ret2_rethi_implementation"
description = "Return-by-value small structs: ret2(a,b) returns rax:rdx, rethi() reads rdx (v1.10.0)"
category = "cyrius"
content = '''
TOKENS: ret2 = 97, rethi = 98.

ret2(a, b) STATEMENT:
  Returns two values in rax (first) and rdx (second).
  Codegen:
    1. Evaluate b → rax
    2. mov rdx, rax (save b in rdx)
    3. Evaluate a → rax
    4. Epilogue (leave; pop r12; pop rbx; ret)
  After return: caller has a in rax, b in rdx.

rethi() EXPRESSION:
  Reads rdx from the most recent function call.
  Codegen: mov rax, rdx (48 89 D0)
  Returns the "high" value from the last ret2 call.

USAGE PATTERN:
  fn divmod(a, b) {
    var q = a / b;
    var r = a % b;
    ret2(q, r);
  }
  var result = divmod(17, 5);   # rax = 3 (quotient)
  var remainder = rethi();       # rax = 2 (remainder, was in rdx)

DISPATCH:
  Both tokens handled in PARSE_SIMD_EXT (dispatch function for tokens 93-98).
  ret2 is also recognized in PARSE_STMT expression range 62-98.

LIMITATION:
  rethi() must be called immediately after the function that used ret2.
  Any intervening function call or expression evaluation may clobber rdx.
  No compiler enforcement — programmer discipline required.
'''

[[entries]]
name = "simd_expand_v1100"
description = "4 new packed f64 SIMD ops: div, sqrt, abs, fmadd (v1.10.0)"
category = "cyrius"
content = '''
NEW OPS:
  f64v_div(dst, a, b, n)      — divpd xmm0, xmm1 (token 93)
  f64v_sqrt(dst, src, n)      — sqrtpd xmm0, xmm0 (token 94)
  f64v_abs(dst, src, n)       — andpd xmm0, [mask] (token 95)
  f64v_fmadd(dst, a, b, c, n) — mulpd + addpd (token 96)

EMIT HELPERS:
  EMIT_F64V_UNARY(S, opcode):
    Used for sqrt (0x51) and abs (custom). Emits loop:
      movupd xmm0, [src + i*16]
      <op> xmm0, xmm0
      movupd [dst + i*16], xmm0
    Loop increment by 2 (packed f64 = 2 elements per 128-bit register).

  EMIT_F64V_FMADD(S):
    Fused multiply-add without FMA3 hardware (software emulation):
      movupd xmm0, [a + i*16]
      movupd xmm1, [b + i*16]
      mulpd xmm0, xmm1
      movupd xmm1, [c + i*16]
      addpd xmm0, xmm1
      movupd [dst + i*16], xmm0
    Uses mulpd+addpd pair. True FMA3 (vfmadd231pd) deferred to future.

  f64v_abs MASK:
    andpd with 0x7FFFFFFFFFFFFFFF repeated in both lanes.
    Clears sign bit of both packed f64 values simultaneously.

DISPATCH:
  All 4 ops dispatched via PARSE_SIMD_EXT, called from PARSE_TERM
  when ptyp >= 93 && ptyp <= 98.

TOTAL SIMD OPS: 7 (add, sub, mul from v1.9.0 + div, sqrt, abs, fmadd from v1.10.0).
'''

[[entries]]
name = "parse_simd_ext"
description = "PARSE_SIMD_EXT dispatch function for tokens 93-98 (v1.10.0)"
category = "cyrius"
content = '''
PURPOSE:
  Tokens 93-98 (f64v_div, f64v_sqrt, f64v_abs, f64v_fmadd, ret2, rethi) are
  dispatched from a single function to avoid cluttering PARSE_TERM and PARSE_STMT
  with 6 separate branches.

DISPATCH:
  fn PARSE_SIMD_EXT(S, ptyp) {
    if (ptyp == 93) { ... f64v_div ... }
    elif (ptyp == 94) { ... f64v_sqrt ... }
    elif (ptyp == 95) { ... f64v_abs ... }
    elif (ptyp == 96) { ... f64v_fmadd ... }
    elif (ptyp == 97) { ... ret2 ... }
    elif (ptyp == 98) { ... rethi ... }
    return 0;
  }

CALL SITE (PARSE_TERM):
  Early check before the main token dispatch:
    if (ptyp >= 93) {
      if (ptyp <= 98) {
        return PARSE_SIMD_EXT(S, ptyp);
      }
    }
  This avoids adding 6 elif branches to the already-large PARSE_TERM.

PARSE_STMT INTEGRATION:
  Expression range expanded from 62-92 to 62-98.
  When PARSE_STMT sees a token in this range, it dispatches to expression
  parsing (which includes PARSE_SIMD_EXT for 93-98).
'''

[[entries]]
name = "lexkw_ext"
description = "LEXKW_EXT helper: extended keyword checks for tokens 93-98 (v1.10.0)"
category = "cyrius"
content = '''
PROBLEM:
  LEXID identifies keywords by comparing identifier strings against known names.
  Adding 6 more keywords (f64v_div through rethi) caused LEXID to exceed the
  compiler's code size budget for a single function — too many string comparisons
  in sequence.

FIX:
  Extracted extended keyword checks (tokens 93-98) into LEXKW_EXT(kw, klen, S, ws).
  Called from LEXID after the main keyword check returns 0 (not a base keyword).

  fn LEXKW_EXT(kw, klen, S, ws) {
    # Check for f64v_div, f64v_sqrt, f64v_abs, f64v_fmadd, ret2, rethi
    # Returns token number (93-98) or 0 if not a keyword
    if (klen == 7) {
      if (... matches "f64v_div" ...) { return 93; }
      if (... matches "rethi" ...) { ... }
    }
    ...
    return 0;
  }

INTEGRATION:
  In LEXID, after the main keyword chain:
    var ext = LEXKW_EXT(kw, klen, S, ws);
    if (ext > 0) { ADDTOK(S, ext, ws); return ...; }
  Falls through to normal IDENT token if ext == 0.

PATTERN:
  This is the same factoring approach used for ASM_MNEMONIC — when a single
  function grows too large, extract a subset into a helper. The compiler has
  no function size limit per se, but large functions push against token count
  and identifier buffer limits during self-compilation.
'''

[[entries]]
name = "ref_directive"
description = "#ref preprocessor directive: load TOML key-value pairs at compile time (v1.10.0)"
category = "cyrius"
content = '''
SYNTAX:
  #ref "config.toml"

EFFECT:
  Reads the TOML file and emits var key = value; for each key-value line.
  Skips comment lines (#), section headers ([section]), and blank lines.
  String values are emitted as string literals. Integer values as numbers.

EXAMPLE:
  # config.toml
  version = 42
  name = "myapp"

  # After #ref expansion, source contains:
  var version = 42;
  var name = "myapp";

IMPLEMENTATION:
  PP_REF_PASS runs BEFORE PP_PASS (before include expansion).
  Scans input for lines matching #ref "...".
  ISREF(S, ip, bl) detects the directive (similar to ISINCLUDE).

  For each #ref line:
    1. Extract filename from quotes
    2. Read file contents via syscall(2, open) + syscall(0, read)
    3. Parse line by line:
       - Skip if line starts with # or [
       - Skip blank lines
       - Find = separator
       - Emit: var <key> = <value>;
    4. Write generated var declarations to output buffer

PASS ORDER:
  PP_REF_PASS → PP_PASS (includes) → PP_IFDEF_PASS → PP_MACRO_PASS → LEX

USE CASE:
  Configuration files that define constants for a program.
  Avoids hand-maintaining duplicate var declarations.
  Phase 1: simple key=value only. No nested tables, no arrays.
'''

[[entries]]
name = "hashmap_simplification"
description = "Hashmap code simplified: removed enum, extracted lookup helper, used elif (v1.10.0)"
category = "cyrius"
content = '''
CHANGES:
  1. Removed enum constants for entry states. Now uses literal values:
     0 = empty, 1 = occupied, 2 = tombstone (was: EMPTY, OCCUPIED, TOMBSTONE).
     Reduces identifier count and avoids enum init dependency.

  2. Extracted _map_lookup(m, key) helper function:
     Shared probe logic used by map_get, map_has, map_delete.
     Returns slot index if found (state==1 and key matches), or -1.
     Eliminates 3 copies of the same linear probe loop.

  3. Used elif in probe loop:
     if (state == 0) { break; }
     elif (state == 1) { if (key matches) { return slot; } }
     elif (state == 2) { /* skip tombstone */ }
     Cleaner than nested if/else chains.

RESULT:
  Fewer lines, same behavior. All existing hashmap tests pass.
  Tombstone semantics preserved (see hashmap_tombstone entry).
'''

[[entries]]
name = "inline_small_functions_reverted"
description = "HISTORICAL: Token replay inlining added v1.10.0, disabled v1.11.3 — I-cache pressure made code slower"
category = "cyrius"
content = '''
STATUS: DISABLED (v1.11.3, _INLINE_OK = 0). Metadata tables still allocated but unused.

Token replay inlined 1-param functions with <= 6 body tokens by replaying
their body tokens at the call site. Generated larger code per site than
the 5-byte `call` it replaced, hurting I-cache on real workloads.

CRITICAL BUG during development:
  PARSE_STMT had a token range check (tokens 62-92) that silently skipped
  new tokens. Initial debugging focused on lexer (wrong lead) — the real
  bug was PARSE_STMT's range check not including new tokens.

KEY LESSON:
  When adding new tokens/keywords, check ALL range checks: PARSE_STMT,
  PARSE_TERM, PARSE_FACTOR all have hardcoded token ranges.
'''

[[entries]]
name = "function_code_size_limits"
description = "Compiler silently truncates large functions — extraction pattern (v1.10.0-v1.11.0)"
category = "cyrius"
content = '''
PROBLEM:
  The compiler has implicit code size limits per function. When a function
  generates more machine code than the internal buffer/region allows,
  the excess is silently dropped. No error message, no warning — the
  function just produces wrong code or missing handlers.

AFFECTED FUNCTIONS:
  LEXID       — keyword recognition. Too many keywords overflowed the
                if/elif chain. Extracted to LEXKW_EXT for extended keywords.
  PP_PASS     — preprocessor. Too many directives. Extracted PP_REF_PASS
                as a separate pre-pass.
  PARSE_TERM  — term-level expression parsing. New builtins exceeded
                capacity. Extracted to PARSE_SIMD_EXT for SIMD/math tokens.
  PARSE_STMT  — statement parsing. Similar overflow. Range checks needed
                expansion AND handler extraction.

SOLUTION PATTERN:
  When a function approaches its code generation limit:
  1. Identify a logical subset of functionality (e.g., "extended keywords")
  2. Extract to a new helper function (e.g., LEXKW_EXT)
  3. Add a single call/branch from the original function to the helper
  4. The helper handles the extracted cases and returns to the caller

  This is the compiler equivalent of "extract method" refactoring, but
  the motivation is code generation limits rather than readability.

DETECTION:
  Symptoms are always silent wrong behavior:
  - New keywords not recognized (LEXID overflow)
  - New preprocessor directives ignored (PP_PASS overflow)
  - New builtins parse as identifiers (PARSE_TERM overflow)
  - New statement forms silently skipped (PARSE_STMT overflow)

  If a newly added feature "doesn't work" but the token is lexed correctly,
  check whether the handling function has hit its size limit.

KEY LESSON:
  This is a fundamental constraint of the self-hosting architecture.
  The compiler compiles itself, so the code generation limits apply to
  the compiler's own code. There is no easy way to raise the limits
  without a multi-step bootstrap (compile with old limits, then recompile
  with new limits). The extraction pattern is the sustainable approach.
'''


[[entries]]
name = "aarch64_native_self_host"
description = "aarch64 native self-hosting — inline metadata segfault and _INLINE_OK fix (v1.11.0)"
category = "cyrius"
content = '''
PROBLEM:
  The aarch64 native compiler (not cross-compiler, but compiler running
  natively on ARM hardware) segfaulted when inline function support was
  enabled. The inline metadata tables live at fixed addresses (0x2C8000+)
  that are within the brk region on x86_64 but generated incorrect
  addresses when the compiler ran on ARM.

SYMPTOM:
  Segfault during compilation when the compiler tried to write inline
  metadata (fn_body_start, fn_body_end, fn_inline) at addresses that
  were not mapped on the ARM system.

ROOT CAUSE:
  The inline metadata code generated x86-specific absolute addresses.
  On ARM, the memory layout differs (different brk behavior, different
  page sizes in some cases). The addresses that worked under qemu
  (which emulates x86 memory layout) failed on real ARM hardware.

FIX:
  Added _INLINE_OK flag. When _INLINE_OK == 0:
  - Skip all inline metadata writes during function definition
  - Never take the inline path in PARSE_FNCALL
  - All functions use normal call/ret convention

  The aarch64 compiler sets _INLINE_OK = 0. The x86_64 compiler
  sets _INLINE_OK = 1 (or leaves it default-enabled).

  This means aarch64 binaries are slightly larger (no inlining) but
  correct. Inlining support for aarch64 would require porting the
  metadata tables to ARM-appropriate addresses.

KEY LESSON:
  Always test native ARM builds on real hardware. qemu user-mode
  emulation does not faithfully reproduce memory mapping behavior.
  A program that works under qemu may segfault on real ARM due to
  different brk/mmap address ranges. The _INLINE_OK pattern (feature
  flag to disable platform-specific optimizations) is reusable for
  any future x86-only feature.
'''

[[entries]]
name = "derive_codegen_fixes"
description = "Derive codegen bugs: field buffer, arg count, directive skipping (v1.10.0-v1.11.0)"
category = "cyrius"
content = '''
OVERVIEW:
  #derive(Serialize) generates _to_json() and _from_json() methods for
  structs. Several bugs were found and fixed across v1.10.0-v1.11.0.

BUG 1: Field name buffer overflow (16→32 bytes)
  Field names longer than 16 characters overflowed the name buffer in
  the derive code generator, corrupting adjacent data. Increased buffer
  to 32 bytes to handle longer field names like "background_color".

BUG 2: Single-arg _to_json (was 2-arg)
  The generated _to_json function signature had 2 parameters (struct
  pointer + output buffer), but callers only passed 1 argument (the
  struct pointer). This caused a segfault because the second parameter
  contained garbage from whatever was in the register.
  Fix: changed _to_json to single-arg (struct pointer only), with the
  output buffer allocated internally.

BUG 3: PP_DERIVE_SERIALIZE must skip intervening #derive lines
  When multiple #derive directives appear before a struct:
    #derive(Serialize)
    #derive(Debug)
    struct Foo { x; y; }
  PP_DERIVE_SERIALIZE would try to parse the second #derive as the
  struct definition and fail. Fix: skip any #derive lines between the
  triggering #derive(Serialize) and the actual struct keyword.

BUG 4: PP_DERIVE_DESER is now no-op
  Originally, Serialize and Deserialize were separate derive passes.
  But PP_DERIVE_SERIALIZE already emits both _to_json and _from_json.
  Making PP_DERIVE_DESER a no-op avoids duplicate generation.

KEY LESSON:
  Code generation (generating source code from directives) is fragile
  because errors manifest in the GENERATED code, not where the bug
  actually is. Debug by printing the generated source (before compilation)
  to see what the derive pass actually produced.
'''

[[entries]]
name = "freelist_allocator"
description = "Segregated free-list allocator with mmap-backed arena (v1.11.0)"
category = "cyrius"
content = '''
OVERVIEW:
  A segregated free-list allocator providing fl_alloc/fl_free/fl_calloc
  for dynamic memory management. Replaces raw mmap/munmap for small
  allocations, reducing system call overhead.

DESIGN:
  9 size classes: 16, 32, 48, 64, 96, 128, 256, 512, 4096 bytes.
  Each size class has its own free list (singly-linked list of blocks).

  Small allocations (<=4096):
    1. Round up requested size to the next size class
    2. Check the free list for that class
    3. If free list non-empty: pop head, return it
    4. If free list empty: carve from the arena (mmap-backed region)

  Large allocations (>4096):
    Direct mmap with size rounded up to page boundary.
    fl_free for large blocks calls munmap directly.

ARENA:
  A single large mmap region serves as the backing store for small blocks.
  A bump pointer tracks the next free position. When the arena is exhausted,
  a new arena is mmap'd. Old arenas are not freed (they contain live blocks
  that will eventually be returned to free lists).

fl_free:
  1. Determine size class from block header (stored in 8 bytes before
     the returned pointer, or passed explicitly)
  2. Push block onto the free list head for that size class
  3. No coalescing — freed blocks stay at their size class permanently

fl_calloc:
  fl_alloc + memset to zero. Used for arrays and structs that need
  zero-initialization.

KEY LESSON:
  The segregated free-list avoids fragmentation within size classes
  and makes alloc/free O(1) for the common case (free list hit).
  The trade-off is internal fragmentation (a 17-byte request uses
  a 32-byte block) and no coalescing (memory is not returned to the
  OS for small blocks). For a compiler/systems context where
  allocation patterns are predictable, this is a good trade-off.
'''

[[entries]]
name = "thread_async_primitives"
description = "Threads via clone+mmap, futex mutex, MPSC channels, async runtime (v1.11.0-v1.11.1)"
category = "cyrius"
content = '''
OVERVIEW:
  Low-level concurrency primitives built directly on Linux syscalls.
  No pthreads, no libc. Everything goes through syscall instruction.

THREADS:
  Thread creation uses clone() syscall with a mmap'd stack region.
  Each thread gets its own stack (typically 8MB mmap with MAP_STACK).
  clone flags: CLONE_VM | CLONE_FS | CLONE_FILES | CLONE_SIGHAND |
  CLONE_THREAD | CLONE_SYSVSEM.

FUTEX MUTEX:
  Mutex built on futex(FUTEX_WAIT, FUTEX_WAKE) syscalls.
  Three states: 0=unlocked, 1=locked-no-waiters, 2=locked-with-waiters.
  Lock: cmpxchg 0→1 (fast path), else set to 2 and FUTEX_WAIT.
  Unlock: xchg to 0, if old state was 2 then FUTEX_WAKE(1).
  This is the standard futex-based mutex algorithm.

MPSC CHANNELS:
  Multi-producer single-consumer channels using:
  - Ring buffer for message storage
  - Futex for consumer blocking
  - Mutex for producer synchronization
  Send: lock, write to ring buffer, unlock, futex_wake.
  Recv: futex_wait until data available, read from ring buffer.

ASYNC RUNTIME:
  Event loop built on epoll + timerfd:
  - epoll_create1 for the event loop
  - timerfd_create + timerfd_settime for async sleep
  - Fork-based timeout: fork(), child sleeps then exits, parent
    continues — if parent doesn't complete, child's exit signals timeout

CRITICAL BUG — pipe() stack corruption:
  pipe(pipefd) writes two 32-bit file descriptors (8 bytes total).
  var pipefd[2] allocates a 2-BYTE array (Cyrius arrays are byte-sized).
  The pipe() syscall writes 8 bytes into a 2-byte buffer, corrupting
  6 bytes of adjacent stack data.
  Fix: var pipefd[8] (or var pipefd[16] for safety).

KEY LESSON:
  When calling Linux syscalls that write structs to user buffers, always
  check the ACTUAL size of the struct, not the element count. pipe()
  returns two int32s = 8 bytes. This is a class of bug that affects any
  syscall with output parameters: stat (144 bytes), sigaction (152 bytes),
  etc. Always allocate based on byte size, not logical element count.
'''

[[entries]]
name = "lexhex_buffer_bug"
description = "LEXHEX reads from raw input instead of preprocessed buffer — documented known issue (v1.11.0)"
category = "cyrius"
content = '''
PROBLEM:
  LEXHEX (hex constant lexer, handles 0x... literals) reads from S+p
  (the raw input buffer) instead of S+0x222000+p (the preprocessed buffer).
  All other lexer functions read from the preprocessed buffer.

WHY IT WORKS TODAY:
  PP_IFDEF_PASS copies the preprocessed content back to S+0 (the raw input
  position) after preprocessing is complete. So by the time LEXHEX runs,
  S+p and S+0x222000+p contain identical content.

WHEN IT WOULD BREAK:
  If any preprocessor pass removed or relocated content that contains hex
  constants, and that pass did NOT copy results back to S+0, LEXHEX would
  read stale/wrong data from the raw input buffer.

  Example scenario: if #ifdef removed a block containing `var x = 0xFF;`
  and the pass wrote results only to the preprocessed buffer (S+0x222000),
  LEXHEX would still see the 0xFF in the raw buffer and try to lex it,
  even though it was #ifdef'd out.

WHY NOT FIXED:
  Changing LEXHEX to read from S+0x222000+p requires updating every
  address calculation in the hex lexer. There are too many references
  to the raw buffer offset pattern, and the risk of introducing a
  regression outweighs the benefit (since the current behavior is
  correct for all existing preprocessor passes).

STATUS:
  Documented known issue. Not fixed. If a future preprocessor pass
  breaks the "copy back to S+0" invariant, this will need to be
  addressed. The fix is mechanical (add 0x222000 to all buffer offsets
  in LEXHEX) but tedious and high-risk.

KEY LESSON:
  Sometimes the correct engineering decision is to document a latent bug
  rather than fix it. The fix is straightforward but touches many places,
  and the bug only triggers under conditions that don't currently exist.
  Document the invariant that must hold (PP passes copy back to S+0)
  and revisit if that invariant is ever broken.
'''

[[entries]]
name = "multi_file_compilation_design"
description = "v2.0 target: .o object files + linking — design research"
category = "cyrius"
content = '''
STATUS: Design research. Implementation depends on v1.12 hardened heap.

GOAL:
  Compile individual .cyr files to ELF .o relocatable object files, then
  link them together. Enables: separate compilation, faster rebuilds,
  library distribution as .o/.a files.

CURRENT MODEL:
  Single compilation unit. `include "file.cyr"` textually inserts the file
  into the input stream. The compiler sees one giant source. All symbols
  are resolved internally via the fixup table.

WHAT .o FILES NEED:

  1. SYMBOL TABLE
     Each .o needs a list of defined symbols (functions, globals) and
     undefined symbols (external references). Currently the compiler has
     fn_names/fn_offsets but these are internal indices, not ELF symbols.

     New: emit ELF .symtab section with STT_FUNC / STT_OBJECT entries.
     Each function gets a symbol. Each global var gets a symbol.

  2. RELOCATION ENTRIES
     Currently fixup entries are resolved internally (all addresses known).
     With .o files, some addresses are unknown (defined in other .o files).
     These become ELF relocation entries (R_X86_64_PC32 for calls,
     R_X86_64_64 for absolute addresses).

     The fixup table already stores the needed info (code offset + type +
     target). Converting fixup entries to ELF relocations is mechanical.

  3. SECTION HEADERS
     Current ELF output has no sections (just a single LOAD segment).
     .o files need: .text (code), .data (globals), .rodata (strings),
     .symtab, .strtab, .rela.text.

  4. LINKER
     Need a minimal linker that: reads multiple .o files, resolves symbols,
     patches relocations, emits final executable. Could be written in Cyrius.

IMPLEMENTATION PLAN:

  Phase 1 — ELF .o emission:
    - Add `-c` flag to compiler: emit .o instead of executable
    - EMITELF_OBJ function: emit proper ELF with sections
    - Convert fixup entries to relocation entries for undefined symbols
    - Self-test: compile one .cyr to .o, link with simple stub

  Phase 2 — Minimal linker:
    - Read ELF .o files (parse headers, sections, symbols, relocations)
    - Symbol resolution: match undefined refs to definitions
    - Patch relocations with final addresses
    - Emit executable ELF (same format as current EMITELF_USER)

  Phase 3 — Incremental compilation:
    - cyrb tracks which .cyr files changed
    - Only recompile changed files to .o
    - Relink all .o files
    - Faster rebuilds for large projects

KEY INSIGHT:
  The fixup table IS a relocation table. Converting it to ELF relocations
  is straightforward:
    fixup type 0 (var addr) → R_X86_64_64
    fixup type 1 (string addr) → R_X86_64_64
    fixup type 2 (fn call) → R_X86_64_PC32
    fixup type 3 (fn pointer) → R_X86_64_64
  The main new work is: section headers, symbol table, and the linker.

SCOPE FOR v2.0:
  Phase 1 only — emit .o files. Linker can be a separate v2.0 milestone
  or use the system ld as an interim solution.
'''

[[entries]]
name = "cyrius_x_bytecode_design"
description = "v2.1 target: cyrius-x portable bytecode format — design research"
category = "cyrius"
content = '''
STATUS: Design research for v2.0 scaffold, full implementation in v2.1.

GOAL:
  A portable bytecode format that compiles once, runs anywhere.
  Not WASM — owned by Cyrius, optimized for Cyrius semantics.
  The VM interprets or JIT-compiles cyrius-x bytecode.

DESIGN DECISIONS:

  1. REGISTER-BASED (not stack-based)
     Cyrius already uses a register-first model (rax, rcx, stack spill).
     A register VM maps 1:1 from the existing codegen. Stack-based VMs
     (like WASM/JVM) require an extra compilation step from register IR.
     Register VMs are also faster to interpret (fewer ops per operation).

     Reference: Lua 5.0 switched from stack to register VM for 20-30% speedup.
     Reference: Dalvik (Android) was register-based for the same reason.

  2. FIXED-WIDTH INSTRUCTIONS (32-bit)
     Each instruction is 4 bytes: opcode (8 bits) + operands (24 bits).
     Simple to decode, cache-friendly, easy to validate.
     Operand encoding: 8-bit register IDs (256 virtual registers),
     16-bit signed immediates, or 24-bit branch offsets.

  3. TYPE TAGS IN BYTECODE
     Each operation specifies width: add.i8, add.i16, add.i32, add.i64.
     The VM can validate type safety without a separate type system.
     Maps directly to the multi-width types added in v2.0.

  4. SYSCALL ABSTRACTION
     Native syscalls are platform-specific. cyrius-x replaces them with
     a host function table. The VM provides: read, write, open, close,
     brk, exit, mmap, etc. Portable across Linux/macOS/Windows.

INSTRUCTION SET (draft):

  Arithmetic:  add, sub, mul, div, mod (with .i8/.i16/.i32/.i64 suffix)
  Bitwise:     and, or, xor, not, shl, shr
  Compare:     eq, ne, lt, gt, le, ge → sets register to 0/1
  Memory:      load.N, store.N (N = 8/16/32/64)
  Control:     jmp, jz, jnz, call, ret
  Stack:       push, pop (for spill/restore)
  System:      syscall N (index into host function table)
  Immediate:   movi (load immediate into register)
  Address:     lea (load effective address)

  ~30 opcodes × 4 width variants = ~120 instruction encodings.

FILE FORMAT (.cyx):

  Header: magic (4 bytes "CYX\0") + version + entry_point offset
  Code section: instruction stream
  Data section: global variables + string literals
  Symbol table: function names + offsets (for debugging)
  No relocations needed — all addresses are bytecode offsets.

IMPLEMENTATION PLAN:

  v2.0 — Scaffold:
    - Define instruction encoding in docs
    - Add cyrius-x backend stub (emit.cyr for bytecode)
    - Emit simple programs to .cyx files
    - Write minimal interpreter in Cyrius (self-referential!)

  v2.1 — Full implementation:
    - Complete instruction set
    - VM with full syscall abstraction
    - All stdlib tests pass under VM
    - Performance: target 10-50x slower than native (acceptable for portability)

  v2.2 — cyrius-ts:
    - TypeScript parser → cyrius-x bytecode
    - JS runtime hosts cyrius-x VM (via wasm or native addon)

KEY INSIGHT:
  The existing compiler already has a clean frontend/backend split.
  Adding a cyrius-x backend means implementing emit_cx.cyr that emits
  bytecode instead of x86/aarch64 machine code. The frontend (lex, parse)
  is completely reused. The fixup table handles bytecode offsets the same
  way it handles native offsets.

SELF-HOSTING POTENTIAL:
  If the VM is fast enough, the compiler itself could run under cyrius-x.
  This means: compile on any platform, bootstrap on any platform.
  The 29KB seed binary becomes a cyrius-x binary + a small native VM.
'''

[[entries]]
name = "bug14_heap_collision"
description = "Bug #14: SIGSEGV on 6000+ line programs — heap offset collision between && patches and continue patches (v1.11.4)"
category = "cyrius"
content = '''
SYMPTOM:
  cc2 crashes with SIGSEGV (exit 139), 0-byte output, no error on stderr.
  Only on programs > ~6000 lines after include expansion. Compiler's own
  source (~6000 lines) compiled fine. Argonaut (6257 lines) crashed.

DIAGNOSIS:
  1. Built diagnostic compiler with stderr prints before each PARSE_FN_DEF
  2. Identified crash inside init_current_stage function
  3. Narrowed to line 110 (for-loop closing brace)
  4. Found the function uses `status != A && status != B && status != C`
     inside a for-in collection loop
  5. Triple && works in small programs — crash is size-dependent

ROOT CAUSE:
  Heap offset collision between two arrays:
    extra_patches (&&/|| chaining): 0x8F848, 8 entries × 8 bytes → 0x8F888
    continue counter:               0x8F850 (INSIDE extra_patches[1])
    continue patches:               0x8F858 (INSIDE extra_patches[2..9])

  With `a && b && c`, ADDXP writes second patch to 0x8F848+1*8 = 0x8F850,
  overwriting the continue counter with a code position (~36000).

  At for-loop close: `var cfwn = L64(S + 0x8F850) - 1` reads ~36000.
  Loop iterates 36000 times: `EPATCH(S, L64(S + 0x8F858 + i * 8))`.
  EPATCH writes to `S + 0x20000 + off` where off is garbage from heap.
  When garbage value exceeds brk boundary → unmapped address → SIGSEGV.

WHY SIZE-DEPENDENT:
  In small programs, code positions are small (~100-5000). The corrupted
  continue count is small, and the EPATCH loop stays within allocated
  heap — writes garbage to garbage but doesn't crash. In large programs,
  code positions are ~36000+, and the loop reads past brk.

FIX (v1.11.4):
  Relocated continue data to non-overlapping region:
    continue counter:  0x8F850 → 0x8F8A0
    continue patches:  0x8F858 → 0x8F8A8

  Verified with two-step bootstrap. All 267 tests pass. Argonaut
  (300 tests + 39 serde + 18 benchmarks) compiles and runs.

  v1.11.5 added overflow guards: ADDXP checks c >= 8, continue patches
  check ci >= 8. Both error cleanly instead of silent overflow.

KEY LESSON:
  The compiler's flat heap layout makes offset collisions invisible.
  Two features can independently test clean but collide when combined.
  Bug #14 required BOTH triple && AND for-loop AND large program size.
  A heap offset audit tool that flags overlaps would catch this class
  of bug at commit time.

  Diagnosis approach: build a diagnostic compiler variant with stderr
  prints at key phases (preprocess, lex, pass 1, pass 2 per-function).
  This avoids needing strace/gdb on a minimal binary with no debug info.
'''

[[entries]]
name = "dce_bitmap_optimization"
description = "DCE optimization from O(N×T) to O(T+N) using referenced-name bitmap (v1.11.5)"
category = "cyrius"
content = '''
PROBLEM:
  Dead code elimination in pass 2 scanned ALL tokens for every function
  definition — O(N×T) where N=functions, T=tokens. For argonaut
  (358 functions, 36K tokens), this was ~13M iterations per compilation.
  For bhava (500+ functions, 100K+ tokens), it would be 50M+.

OLD APPROACH (O(N×T)):
  For each `fn name()`:
    if name has no underscore (not mangled):
      scan all tokens: if any IDENT == name (not after FN token): reachable
      if not found: emit stub (xor eax,eax; ret), skip body

NEW APPROACH (O(T+N)):
  Before pass 2, build a referenced-name bitmap in one pass:
    1. Zero 8KB bitmap in output_buf (S+0x6A000) — safe scratch, EMITELF runs later
    2. For each token: if IDENT and not preceded by FN, set bit at name_offset
    3. Bitmap: 65536 bits = 8192 bytes, indexed by tok_names offset

  In pass 2, for each `fn name()`:
    if name has no underscore:
      check bitmap bit at name_offset — O(1) lookup
      if not set: emit stub, skip body

  Total: O(T) for bitmap build + O(N) for function checks = O(T+N)

WHY IT WORKS:
  Lexer deduplication guarantees identical identifier strings share the
  same tok_names offset. So if `foo` appears as both a definition (after
  FN) and a call (not after FN), both tokens have the same TOKVAL. The
  bitmap marks the call's offset, and the definition checks the same offset.

SCRATCH SPACE:
  Uses output_buf (S+0x6A000, 128KB) for the 8KB bitmap. This buffer is
  unused until EMITELF runs after all compilation is complete. No heap
  layout change or brk extension needed.

TWO-STEP BOOTSTRAP:
  Required — the new compiler generates different code (bitmap init loop
  before pass 2). Old cc2 → new cc2_a → cc2_b → cc2_c. cc2_b == cc2_c.
'''

[[entries]]
name = "overflow_guards_pattern"
description = "Pattern: adding bounds checks to flat heap arrays — v1.11.5 hardening"
category = "cyrius"
content = '''
PROBLEM:
  The compiler uses fixed-size arrays at hardcoded heap offsets. Most had
  no bounds checking — overflow silently corrupted adjacent state. Bug #14
  was caused by exactly this: ADDXP writing past extra_patches into
  continue patches.

PATTERN — adding a guard:
  Before:
    fn ADDXP(S, p) {
        var c = GXPC(S);
        S64(S + 0x8F848 + c * 8, p);
        SXPC(S, c + 1);
        return 0;
    }

  After:
    fn ADDXP(S, p) {
        var c = GXPC(S);
        if (c >= 8) {
            syscall(SYS_WRITE, 2, "error: too many && conditions (max 8)\n", 38);
            syscall(SYS_EXIT, 1);
        }
        S64(S + 0x8F848 + c * 8, p);
        SXPC(S, c + 1);
        return 0;
    }

ARRAYS GUARDED (v1.11.5):
  ADDXP — extra_patches for && chaining (max 8)
  continue patches — for-loop continue (max 8)
  ret_patches — return statements per function (max 64)
  REGSTRUCT — struct definitions (max 32)

STILL UNGUARDED (v1.12 target):
  struct fields (16 per struct) — overflows silently into struct_count/loop state
    Currently benign because loop state is reinitialized in pass 2.
    Needs heap relocation to expand safely.
  var_noffs, fn_names, fn_offsets — large arrays, unlikely to overflow

KEY LESSON:
  Every flat array needs a bounds check. The check costs 2 instructions
  and adds ~20 bytes of code per guard. The alternative is silent heap
  corruption that may not crash until unrelated code runs — the worst
  kind of bug to diagnose in a system with no debugger or symbol table.
'''

[[entries]]
name = "struct_field_overflow"
description = "Struct field limit (16) silently overflows into loop state — needs v1.12 heap relocation"
category = "cyrius"
content = '''
CURRENT LAYOUT:
  struct_fnames at 0x8E830: 32 structs × 16 fields × 8 bytes = 4096 bytes
  Ends at 0x8F830 (struct_count).
  struct_ftypes at 0x8A000: same layout, 4096 bytes, ends at 0x8B000.

  Indexing: si * 128 + fi * 8 (stride 128 = 16 fields × 8 bytes)

THE OVERFLOW:
  argonaut has ServiceDefinition with 21 fields. At field 17+, writes go to:
    0x8E830 + si*128 + 16*8 = 0x8E830 + si*128 + 128 = next struct's slot
  For the last struct (si=31): 0x8E830 + 31*128 + 128 = 0x8F830 = struct_count
  Fields 17-21 overwrite struct_count, loop_top, break_patch, extra_patches.

WHY IT DOESN'T CRASH:
  Struct parsing happens in pass 1. Loop state (loop_top, break_patch) is
  initialized fresh for each loop in pass 2. The overwritten values are
  replaced before they're used. The extra_patches overwrite is benign
  because no && conditions are being evaluated during struct parsing.

FIX (v1.12):
  Expand stride from 128 to 256 (32 fields per struct).
  This requires moving struct_fnames to a new location — the current
  region (0x8E830-0x8F830) only has 4096 bytes.
  Options:
    1. Move struct_fnames after fn_inline (0x2CE000+) and extend brk
    2. Move loop state/extra_patches forward to make room
  Either requires a two-step bootstrap.

KEY LESSON:
  "Benign overflow" is a time bomb. It works today because of incidental
  ordering (pass 1 overwrites, pass 2 reinitializes). Any change to
  compilation phases could turn this into a silent miscompilation.
'''

