LESSON: Renames propagate slowly through an ecosystem. Each repo needs:
  1. CI workflow files updated (install pattern + tool names)
  2. Manifest file renamed
  3. CLAUDE.md references updated
  4. Version pinned to release that HAS the renamed binary

The toolchain tarball must include the new name — downstream repos that
pin to an old release will still get cyrb (which no longer exists).
'''

[[entries]]
name = "stdlib_distribution_pattern"
description = "v3.2: Stdlib distribution pattern — single-file snapshots of modular repos"
category = "cyrius"
content = '''
PATTERN: Modular repos distribute as single-file stdlib snapshots.

  sakshi repo (7 modules, 769 lines)
    → lib/sakshi.cyr (202 lines, slim profile)
    → lib/sakshi_full.cyr (489 lines, full profile)

  patra repo (9 modules, 2496 lines)
    → lib/patra.cyr (2496 lines, single file)

WORKFLOW:
  1. Develop in the repo (tests, benchmarks, CI)
  2. Tag a release (e.g., sakshi 0.8.0, patra 0.8.0)
  3. Copy distribution file to cyrius lib/
  4. Run cyrius lint/fmt/doc to verify
  5. Bump cyrius version, commit

CONSUMERS: just `include "lib/patra.cyr"` — no dep management, no network.
Installed with the toolchain. Available everywhere.

TRADEOFF: Distribution files lag behind repo HEAD. Consumers get
stable snapshots, not bleeding edge. Manual sync required.
'''

