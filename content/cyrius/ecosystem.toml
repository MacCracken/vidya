[[entries]]
name = "agnos_kernel_architecture"
description = "AGNOS kernel: 33KB, boots on qemu, architecture and what's needed for shell"
category = "cyrius"
content = '''
AGNOS KERNEL — 33KB, boots on qemu-system-x86_64

DONE:
  Serial I/O, GDT, IDT (256 vectors), PIC, PIT timer, PS/2 keyboard
  Page tables (16MB, 2MB pages), PMM (bitmap, 4096 pages), VMM
  Process table (16 slots), ELF loader, round-robin scheduler
  Syscalls: exit(0), write(1), getpid(2)

NEEDED FOR SHELL:
  1. ramfs (CPIO initrd) — in-memory filesystem
  2. Context switch — save/restore registers on timer IRQ
  3. User/kernel mode — Ring 3 + TSS
  4. Shell — readline, fork+exec, wait
  5. Init (kybernet) — PID 1

SIZE: 17.5KB code + 13KB data (IDT 4KB, PMM 4KB, KB buf 2KB)
  Optimized from 62KB → 33KB by right-sizing IDT (4096→512) and proc_table (512→128).

BOOT: qemu-system-x86_64 -kernel build/agnos -serial stdio -display none
REPO: github.com/MacCracken/agnos (source of truth)
'''

[[entries]]
name = "porting_tool"
description = "cyrb port: one-command Rust→Cyrius project scaffolding"
category = "cyrius"
content = '''
USAGE: cyrb port /path/to/rust-project

WHAT IT DOES:
  1. Moves Rust code to rust-old/ (preserves everything)
  2. Records LINES_OF_RUST.txt
  3. Creates src/, lib/, programs/, tests/ directories
  4. Vendors stdlib from installed Cyrius (~/.cyrius/versions/X/lib/)
  5. Generates src/main.cyr skeleton with common includes
  6. Generates cyrb.toml project manifest
  7. Generates tests/test.sh

PATTERN MAPPING (Rust → Cyrius):
  fn foo(x: i64) -> i64    →  fn foo(x) { return ...; }
  struct Point { x: f64 }  →  struct Point { x; y; }
  impl Point { fn sum() }  →  impl Math for Point { fn sum(self) { } }
  point.sum()               →  point.sum() (same!)
  match result { Ok(v) }   →  if (is_ok(result) == 1) { var v = payload(result); }
  for i in 0..10            →  for i in 0..10 (same!)
  for item in vec           →  for item in vec (same!)
  let f = |x| x * 2        →  var f = |x| x * 2;
  Vec::new()                →  vec_new()
  String::from("x")        →  str_from("x")
  HashMap::new()            →  map_new()
  #[cfg(feature = "x")]     →  #ifdef X

TESTED ON: vidhana (228 lines Rust → compiles and runs as Cyrius skeleton)
'''

