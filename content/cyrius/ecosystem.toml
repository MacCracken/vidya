# Cyrius Ecosystem — Crate Ports, Tools, Patterns
# Documents lessons from rewriting AGNOS Rust crates in Cyrius.
# Covers: agnostik, agnosys, kybernet, nous, ark, cyrb.

[[entries]]
name = "ecosystem_overview"
description = "The AGNOS ecosystem rewritten in Cyrius: 5 crates, 23 library modules, 3 tools"
category = "cyrius"
content = '''
Five AGNOS Rust crates have been rewritten in Cyrius:

1. agnostik (6 modules) — shared types: error codes, agent lifecycle, security, audit, config
2. agnosys (20 modules) — Linux kernel interface: syscalls, error, security, udev, netns, luks,
   dmverity, ima, tpm, certpin, secureboot, fuse, audit, pam, mac, journald, bootloader, drm, update
3. kybernet (7 modules) — PID 1 init: console, signals, reaper, privdrop, mount, cgroup, eventloop
4. nous (1 module) — dependency resolver: marketplace + system package resolution
5. ark (1 program) — package manager CLI: install/remove/search/list/info/status/verify

Plus cyrb (build tool, 61KB): compile, test, self-host, 25+ subcommands.
New in v1.6: cyrb build -D NAME (preprocessor defines), cyrb check (module-aware).

Cyrius stdlib at: lib/ (21 modules, 200+ functions)
Tools at: programs/{ark,cyrb}.cyr
agnosys port: separate repo (github.com/MacCracken/agnosys), 20 modules from 29K lines of Rust

Total: 267 tests (216 compiler + 51 programs), 0 failures.
Self-hosting byte-identical. Compiler: 140KB x86_64. Version: 1.7.3.

v1.7.2: tail call optimization, 512KB input buffer, aarch64 fixup bug fix.
v1.7.3: constant folding (* / << >>) at codegen level. Safe same-size EMOVI rewrite.
  Root cause: _cfo flag leaked from inside parenthesized subexpressions.

aarch64 kernel mode: ELF64 at 0x40000000, SP preamble, arch-specific asm mnemonics.
Conditional builds: cyrb build -D ARCH_X86_64 / -D ARCH_AARCH64 for multi-arch kernels.

agnosys performance (v1.5.3): packed Result type (zero-alloc Ok), caller-provided
buffers, packed errno errors. getpid/getuid/is_root at parity with Rust.
query_sysinfo 1.4x Rust (was 2.4x). err_from_errno 1.9x Rust (was 3.4x).
'''

[[entries]]
name = "rewrite_methodology"
description = "How to port a Rust crate to Cyrius: idiom translation, not 1:1 porting"
category = "cyrius"
content = '''
Porting Rust to Cyrius is RE-IMPLEMENTATION, not direct translation.

KEY PRINCIPLE: Strip the type system to what consumers actually need.
Rust agnostik is 7090 lines. Cyrius agnostik is 629 lines (11x less).
Same functionality for the kernel/init/tools that use it.

TRANSLATION PATTERNS:

Rust enum with data → Cyrius integer enum + separate error string functions
  Rust:   AgnostikError::AgentNotFound(String)
  Cyrius: ERR_AGENT_NOT_FOUND = 1001; fn err_print(code) { ... }

Rust struct with derives → Cyrius heap-allocated struct with accessors
  Rust:   #[derive(Clone, Debug, Serialize)] struct Config { name: String, ... }
  Cyrius: fn config_new() { var c = alloc(SIZE); ... } fn config_name(c) { return load64(c); }

Rust HashMap → Cyrius vec of key-value pairs (or sorted vec for lookup)

Rust Result<T> → Cyrius packed Result: Ok(val) returns val, Err(ptr) sets bit 63.
  is_ok(r) = r >= 0. payload(r) = r & 0x7FFFFFFFFFFFFFFF. Zero alloc on success.
  Error structs (kind+errno+msg) heap-allocated only on error path (cold).

Rust Option<T> → Cyrius heap-allocated tagged union: Some(val)/None() via tagged_new.
  Or simpler: pointer (0 = None, nonzero = Some) for lightweight cases.

Rust traits → Cyrius concrete functions (no vtable, no dynamic dispatch)

Rust generics → Cyrius monomorphized (Vec is always Vec<i64>)

Rust String → Cyrius null-terminated C strings (pointers)

Rust serde JSON → Manual parsing (find key, extract value between quotes)

WORKFLOW: Survey Rust source → identify consumed API surface → implement only what's used.
'''

[[entries]]
name = "enum_init_ordering"
description = "CRITICAL: Enum init code must run before global var inits in cc2.cyr"
category = "cyrius"
content = '''
BUG: Enum values were always 0 inside functions.

ROOT CAUSE: In cc2.cyr, the init ordering was:
  1. EMIT_GVAR_INITS (global var initializers — may call functions)
  2. Enum scan (emit enum init code)

A global var like `var r = main()` would call main() during step 1,
but enum values weren't initialized until step 2. So any enum
referenced inside a function returned 0.

FIX: Swap the order in cc2.cyr (around line 241):
  1. Enum scan FIRST (initialize all enum constants)
  2. EMIT_GVAR_INITS SECOND (now functions can see enum values)
  3. STI(S, gvar_save_ti) to restore token index for PARSE_PROG

VERIFICATION: Self-hosting still byte-identical. All 94 tests pass.
Enum values now work correctly inside functions.
'''

[[entries]]
name = "comparison_in_args"
description = "FIXED (v0.9.0): comparisons in function call arguments now work"
category = "cyrius"
content = '''
FIXED in v0.9.0: f(x == 1, y > 2) now works.

The fix: PARSE_FNCALL calls PARSE_CMP_EXPR (not PARSE_EXPR) for each argument.
PARSE_CMP_EXPR handles ==, !=, <, >, <=, >= and produces 0/1 via x86 setCC + movzx.

assert(x == 42, "test") works. All comparison operators supported in args.
'''

[[entries]]
name = "gvar_overflow"
description = "Global var initializer table limited to 64 entries — use enums for constants"
category = "cyrius"
content = '''
LIMITATION: The gvar_toks array at 0x8FA98 stores saved token indices for
deferred global var initialization. It has 512 bytes = 64 slots.

If a program has >64 global vars with initializers (var x = value),
the array overflows into gvar_cnt at 0x8FC98, causing corruption.

SOLUTION: Use enums instead of vars for constant groups.
Enums have their own init path (PARSE_ENUM_DEF) that doesn't use gvar_toks.

  # BAD — 50 vars = 50 gvar_toks entries:
  var SYS_READ = 0;
  var SYS_WRITE = 1;
  ...50 more...

  # GOOD — 0 gvar_toks entries:
  enum SysNr { SYS_READ = 0; SYS_WRITE = 1; ... }

COUNTING: stdlib uses ~3 globals (alloc), io.cyr uses ~9 (flags),
so programs have ~52 slots remaining. With agnosys using enums,
even large programs stay well under the limit.

PERMANENT FIX: Expand gvar_toks to 256 or 512 entries (change heap map offsets).
'''

[[entries]]
name = "fork_exec_pattern"
description = "How to run subprocesses in Cyrius using fork + execve + waitpid"
category = "cyrius"
content = '''
Cyrius subprocess execution using agnosys syscall wrappers:

BASIC PATTERN (run command, get exit code):
  var pid = sys_fork();
  if (pid == 0) {
      # Child process
      var argv[3];
      store64(&argv, "/usr/bin/cmd");
      store64(&argv + 8, "arg1");
      store64(&argv + 16, 0);  # NULL terminator
      var envp[1];
      store64(&envp, 0);       # NULL envp
      sys_execve("/usr/bin/cmd", &argv, &envp);
      sys_exit(127);            # If exec fails
  }
  # Parent: wait for child
  var status_buf[1];
  sys_waitpid(pid, &status_buf, 0);
  var exit_code = WEXITSTATUS(load32(&status_buf));

CAPTURE OUTPUT PATTERN (run command, read stdout):
  var pipefd[2];
  sys_pipe(&pipefd);
  var read_fd = load64(&pipefd);
  var write_fd = load64(&pipefd + 8);
  var pid = sys_fork();
  if (pid == 0) {
      sys_close(read_fd);
      sys_dup2(write_fd, 1);   # Redirect stdout to pipe
      sys_close(write_fd);
      # ... exec ...
  }
  sys_close(write_fd);
  var n = sys_read(read_fd, buf, buflen);  # Read child output
  sys_close(read_fd);
  sys_waitpid(pid, &status_buf, 0);

COMPILE PATTERN (cyrb uses this):
  # Child: open source as stdin, output as stdout, exec cc2
  sys_dup2(sys_open(source, O_RDONLY, 0), 0);
  sys_dup2(sys_open(output, O_WRONLY|O_CREAT|O_TRUNC, 0x1ED), 1);
  sys_execve("./build/cc2", argv, envp);

KEY GOTCHAS:
- argv must be NULL-terminated array of pointers
- envp can be [NULL] for empty environment
- Child inherits all parent fds — close unused pipe ends
- sys_waitpid(-1, ..., WNOHANG) for non-blocking reap
- WIFEXITED/WEXITSTATUS macros decode the status word
'''

[[entries]]
name = "agnostik_patterns"
description = "Patterns used in agnostik rewrite: error codes, bitmask permissions, heap structs"
category = "cyrius"
content = '''
AGNOSTIK LIBRARY PATTERNS (lib/agnostik/):

ERROR CODES (error.cyr):
  enum AgnostikError { ERR_NONE = 0; ERR_AGENT_NOT_FOUND = 1001; ... }
  fn err_is_retriable(code) { if (code == ERR_TIMEOUT) { return 1; } ... }
  fn err_print(code) { if (code == ERR_NONE) { print("OK"); } ... }
  fn err_fatal(code) { err_eprint(code); syscall(60, 1); }

BITMASK PERMISSIONS (security.cyr):
  enum Permission { PERM_FILE_READ = 1; PERM_NETWORK = 4; PERM_SPAWN = 8; }
  fn sec_has_perm(ctx, perm) { if ((load64(ctx+8) & perm) != 0) { return 1; } }
  fn sec_grant_perm(ctx, perm) { store64(ctx+8, load64(ctx+8) | perm); }
  fn sec_revoke_perm(ctx, perm) { store64(ctx+8, load64(ctx+8) & (0-1-perm)); }

HEAP-ALLOCATED STRUCT (agent.cyr):
  var AGENT_CONFIG_SIZE = 80;
  fn agent_config_new(name) {
      var cfg = alloc(AGENT_CONFIG_SIZE);
      store64(cfg, name);        # offset 0: name pointer
      store64(cfg + 8, AGENT_USER);  # offset 8: type
      store64(cfg + 16, RESTART_NEVER);  # offset 16: restart policy
      ... return cfg;
  }
  fn agent_config_name(cfg) { return load64(cfg); }
  fn agent_config_type(cfg) { return load64(cfg + 8); }
  fn agent_config_set_type(cfg, t) { store64(cfg + 8, t); return 0; }

AUDIT LOGGING (audit.cyr):
  fn audit_print(e) {
      print("["); severity_print(load64(e+24)); print("] agent=");
      fmt_int(load64(e+8)); print(" "); ... print("\n");
  }

PATTERN: Every struct has new/get/set functions. Offsets are manual (8 bytes per field).
PATTERN: Print functions per enum/struct for debugging.
PATTERN: Include order matters — stdlib first, then agnostik modules.
'''

[[entries]]
name = "agnosys_patterns"
description = "Patterns for agnosys syscall bindings: enum constants, sigset, epoll, timerfd"
category = "cyrius"
content = '''
AGNOSYS LIBRARY PATTERNS (lib/agnosys/syscalls.cyr):

SYSCALL CONSTANTS AS ENUMS (avoids gvar_toks overflow):
  enum SysNr { SYS_READ = 0; SYS_WRITE = 1; SYS_OPEN = 2; ... SYS_EPOLL_CREATE1 = 291; }
  enum Signal { SIGHUP = 1; SIGINT = 2; ... SIGPWR = 30; }
  enum MsFlag { MS_RDONLY = 1; MS_NOSUID = 2; MS_NODEV = 4; MS_NOEXEC = 8; }

SYSCALL WRAPPERS:
  fn sys_open(path, flags, mode) { return syscall(SYS_OPEN, path, flags, mode); }
  fn sys_fork() { return syscall(SYS_FORK); }
  fn sys_execve(path, argv, envp) { return syscall(SYS_EXECVE, path, argv, envp); }
  fn sys_mount(source, target, fstype, flags, data) {
      return syscall(SYS_MOUNT, source, target, fstype, flags, data);
  }

SIGNAL SET (64-bit bitmask):
  fn sigset_new() { var set = alloc(8); store64(set, 0); return set; }
  fn sigset_add(set, signum) { store64(set, load64(set) | (1 << (signum-1))); }
  fn sigset_has(set, signum) { return (load64(set) & (1 << (signum-1))) != 0; }

EPOLL EVENT (12-byte struct: u32 events + u64 data):
  fn epoll_event_new(events, data) {
      var ev = alloc(16);
      store32(ev, events);
      store64(ev + 4, data);  # Note: 4-byte offset, not 8
      return ev;
  }

TIMERSPEC (32-byte struct: interval + initial):
  fn timerspec_new(interval_sec, initial_sec) {
      var ts = alloc(32);
      store64(ts, interval_sec); store64(ts+8, 0);   # interval
      store64(ts+16, initial_sec); store64(ts+24, 0); # initial value
      return ts;
  }

WAIT STATUS DECODING:
  fn WIFEXITED(s) { return (s & 0x7F) == 0; }
  fn WEXITSTATUS(s) { return (s >> 8) & 0xFF; }
  fn WIFSIGNALED(s) { var sig = s & 0x7F; return sig > 0 && sig != 0x7F; }
  fn WTERMSIG(s) { return s & 0x7F; }

ERROR CHECKING:
  fn is_err(ret) { return ret < 0; }
  fn err_code(ret) { return 0 - ret; }
'''

[[entries]]
name = "kybernet_patterns"
description = "PID 1 init patterns: console redirect, signal fd, zombie reaping, mount, cgroup"
category = "cyrius"
content = '''
KYBERNET LIBRARY PATTERNS (lib/kybernet/):

CONSOLE REDIRECT (console.cyr):
  Close inherited fds 0/1/2.
  Open /dev/null as stdin (fd 0).
  Open /dev/console as stdout (fd 1), fallback /dev/null.
  dup2(1, 2) for stderr.

SIGNAL HANDLING (signals.cyr):
  Block SIGCHLD/SIGTERM/SIGINT/SIGHUP/SIGPWR via sigprocmask.
  Create signalfd for epoll-based dispatch.
  Read 128-byte signalfd_siginfo struct, signal number at offset 0 (u32).

ZOMBIE REAPING (reaper.cyr):
  Loop: sys_waitpid(-1, &status, WNOHANG) until pid <= 0.
  Decode exit status. Store (pid, code) pairs in vec.
  PID 1 MUST reap all orphans or they become zombies.

PRIVILEGE DROP (privdrop.cyr):
  ORDER MATTERS: setgroups(0, NULL) → setgid(gid) → setuid(uid).
  Can't change groups after setuid drops root.
  Call in child process after fork, before exec.

ESSENTIAL MOUNTS (mount.cyr):
  Check /proc/self/mounts before mounting (avoid EBUSY).
  Mount order: /proc → /sys → /dev/pts → /dev/shm → /run → /sys/fs/cgroup.
  Flags: MS_NOSUID|MS_NODEV|MS_NOEXEC for virtual filesystems.
  Create mount point with sys_mkdir before mount.

CGROUP v2 (cgroup.cyr):
  Path: /sys/fs/cgroup/kybernet.slice/{service}/
  move_to_cgroup: write PID to cgroup.procs file.
  kill_cgroup: write "1" to cgroup.kill (kernel 5.14+), or read PIDs and SIGKILL each.
  All operations are pure filesystem (no special syscalls).

EPOLL EVENT LOOP (eventloop.cyr):
  Create epoll + timerfd for health/watchdog.
  Register signal fd + timers with epoll_add_read.
  Event tokens: TOKEN_SIGNAL=1, TOKEN_HEALTH=2, TOKEN_WATCHDOG=3.
  epoll_wait with EINTR retry.
'''

[[entries]]
name = "nous_ark_patterns"
description = "Resolver and package manager patterns: marketplace resolution, CLI tools, file DB"
category = "cyrius"
content = '''
NOUS RESOLVER (lib/nous/nous.cyr):

SOURCE DETECTION: name contains '/' → marketplace, ends '.flutter' → flutter, else unknown.

MARKETPLACE RESOLUTION:
  Build path: marketplace_dir/name/manifest.json
  Read file, parse JSON manually (find "version": "..." between quotes).
  Return ResolvedPackage with name, version, source, description.

SYSTEM RESOLUTION (apt-based):
  run_capture("/usr/bin/apt-cache", "show", name, buf, 4096)
  Parse "Version: " and "Description:" lines from output.
  Uses fork+exec+pipe pattern from agnosys.

STRATEGY DISPATCH:
  STRAT_MARKETPLACE_FIRST: try marketplace → system
  STRAT_SYSTEM_FIRST: try system → marketplace
  STRAT_ONLY_*: single source

SIMPLE JSON PARSING (no serde, no parser library):
  Scan for "\"key\"" in buffer.
  Find next quote pair after colon.
  Extract bytes between quotes, null-terminate.
  Works for flat JSON objects. Not recursive.

ARK PACKAGE MANAGER (programs/ark.cyr):

CLI DISPATCH:
  args_init() + argc()/argv() for argument parsing.
  streq(cmd, "install") for command matching.
  Each command is a separate function.

FILE-BASED PACKAGE DATABASE:
  Format: name|version|source\n (one entry per line)
  db_load(): read file, split into vec of line strings.
  db_has(): scan vec for "name|" prefix match.
  db_register(): append entry to file (O_APPEND).
  cmd_remove(): rewrite file without matching entry.

TRANSACTION LOG:
  Append-only text file: "action package\n"
  log_transaction("install", name) on every operation.

VERIFICATION:
  Read all entries, check each has ≥2 pipe separators.
  Report corrupt entries.

BINARY SIZE: ark is 44KB, comparable to individual coreutils.
'''

[[entries]]
name = "build_tool_pattern"
description = "cyrb: how to build a Cyrius program that compiles other Cyrius programs"
category = "cyrius"
content = '''
CYRB BUILD TOOL (programs/cyrb.cyr):

COMPILE PATTERN:
  Fork child.
  Child: open source as stdin (dup2), open output as stdout (dup2), exec cc2.
  Parent: waitpid, check exit code, chmod +x output.

  fn compile(source, output) {
      var pid = sys_fork();
      if (pid == 0) {
          sys_dup2(sys_open(source, O_RDONLY, 0), 0);
          sys_dup2(sys_open(output, O_WRONLY|O_CREAT|O_TRUNC, 0x1ED), 1);
          sys_execve(CC2_PATH, argv, envp);
          sys_exit(127);
      }
      sys_waitpid(pid, &status, 0);
      sys_chmod(output, 0x1ED);  # rwxr-xr-x
  }

SELF-HOSTING CHECK:
  cc2 compiles cc2.cyr → cc3. cc3 compiles cc2.cyr → cc4.
  Compare cc3 and cc4 byte-by-byte using heap buffers + memeq.
  NOTE: Use heap (alloc) not stack arrays for compare buffers.
  Large stack arrays (var buf[8192] = 64KB) caused binary data leak.

TEST RUNNER:
  compile(test_source, "/tmp/cyrb_test")
  run_cmd("/tmp/cyrb_test", 0, 0)
  Check exit code 0 = pass.

GOTCHA: When doing byte comparison of binaries, use alloc() for buffers,
not stack-allocated arrays. Stack arrays >8KB can cause issues.
'''

[[entries]]
name = "language_gaps_for_parity"
description = "Language features needed for 1:1 Rust parity, identified during crate rewrites"
category = "cyrius"
content = '''
Features needed for 1:1 Rust ports, identified from agnostik/nous/ark rewrites.
Grouped by blocking priority.

STATUS (as of v1.7.3):
  DONE:
    Enums with data:   enum Result { Ok(val) = 0; Err(code) = 1; } — v1.1.0
    Module system:     mod/pub/use with name mangling — v0.9.7
    HashMap:           lib/hashmap.cyr (string→i64) — v0.9.12
    Pattern matching:  match expr { val => { } _ => { } } — v0.9.8
    Closures:          |x| expr, |a, b| a + b — v0.9.10
    Conditional comp:  #ifdef/#define/#endif, cyrb -D flag — v0.9.6/v1.6.2
    Traits:            impl Type for Trait { fn method(self) {} } — v0.9.9

  REMAINING:
    Generics:          Syntax parsed (fn f<T>()) but not enforced. Monomorphize manually.
    String formatting: sprintf from lib/fmt.cyr, not format!() macro
    Serde:             Manual JSON via lib/json.cyr. No derive macros.
    Derive macros:     Not implemented. Manual accessor functions.
    Lifetimes:         Not implemented. No borrow checker.

CURRENT PATTERNS:
  Rust Result<T>     → packed Result: Ok(v) returns v, Err(v) sets bit 63. Zero alloc.
  Rust Option<T>     → heap tagged union: Some(v)/None() via lib/tagged.cyr
  Rust String        → Str struct (data+len) via lib/str.cyr, or C strings
  Rust HashMap       → lib/hashmap.cyr (string keys, i64 values)
  Rust traits        → impl blocks with name mangling (Type_method)
  Rust generics      → everything is i64 (Vec is always Vec<i64>)
  Rust serde JSON    → lib/json.cyr (flat key-value, manual nested parse)

These workarounds work for system code but don't scale for application code.
Phase 13 (enums-with-data, generics, traits, modules) is the path to 1:1 parity.
'''

[[entries]]
name = "hashmap"
description = "hashmap.cyr: FNV-1a hash table with string keys and i64 values"
category = "cyrius"
content = '''
HASHMAP (lib/hashmap.cyr):

Open addressing with linear probing. Auto-grows at 70% load.
Keys are null-terminated strings. Values are i64.

  var m = map_new();
  map_set(m, "name", 42);
  var v = map_get(m, "name");       # 42
  map_has(m, "name");               # 1
  map_delete(m, "name");
  var keys = map_keys(m);           # vec of string pointers
  map_count(m);                     # number of entries
  map_print(m);                     # {key: val, ...}

IMPLEMENTATION:
  Entry = { key_ptr, value, occupied } = 24 bytes
  Header = { entries_ptr, capacity, count } = 24 bytes
  Hash: FNV-1a (0xCBF29CE484222325 seed, 0x100000001B3 prime)
  Growth: double capacity when count * 10 >= capacity * 7
  Capacity must be power of 2 (for & mask instead of %)

GOTCHA: Values are always i64. String pointers are i64.
If you store a string pointer, map_print shows the raw number.
'''

[[entries]]
name = "string_enhancements"
description = "str.cyr extended: contains, split, join, trim, builder, from_int, to_int"
category = "cyrius"
content = '''
STRING ENHANCEMENTS (lib/str.cyr):

New functions added to the Str (fat pointer) type:

  str_contains(s, "needle")    — substring search, returns 0/1
  str_starts_with(s, "pre")    — prefix check
  str_ends_with(s, "suf")      — suffix check
  str_index_of(s, byte)        — find byte, returns index or -1
  str_from_int(42)              — integer to Str ("42")
  str_to_int(s)                 — parse Str to integer
  str_trim(s)                   — strip leading/trailing whitespace
  str_split(s, byte_sep)        — split into vec of Str
  str_join(parts_vec, ",")      — join vec of Str with separator
  str_clone(s)                  — deep copy (new buffer)

STRING BUILDER:
  var sb = str_builder_new();
  str_builder_add_cstr(sb, "hello ");
  str_builder_add_int(sb, 42);
  var result = str_builder_build(sb);  # "hello 42"

PATTERN: Use str_builder for concatenating many parts.
Direct str_cat is O(n) per call. Builder is O(total) once.
'''

[[entries]]
name = "traits"
description = "trait.cyr: vtable-based trait objects for polymorphic dispatch (Display, Eq, From)"
category = "cyrius"
content = '''
TRAITS (lib/trait.cyr):

Traits are vtables — heap-allocated arrays of function pointers.
A "trait object" is a fat pointer: { vtable_ptr, data_ptr } = 16 bytes.

DEFINING A TRAIT (Display example):
  Slot 0: print(data)       — print to stdout
  Slot 1: to_string(data)   — return Str representation

  var vt = display_vtable(&my_print, &my_to_string);
  var obj = trait_obj_new(vt, my_data);
  display(obj);              — calls my_print(my_data)
  var s = to_string(obj);    — calls my_to_string(my_data)

IMPLEMENTING FOR A TYPE:
  fn _point_print(p) { fmt_int(load64(p)); ... }
  fn _point_to_string(p) { ... return str; }
  var _point_vt = 0;
  fn point_as_display(p) {
      if (_point_vt == 0) { _point_vt = display_vtable(&_point_print, &_point_to_string); }
      return trait_obj_new(_point_vt, p);
  }

POLYMORPHISM:
  var items = vec_new();
  vec_push(items, int_as_display(1));
  vec_push(items, str_as_display(str_from("two")));
  vec_push(items, point_as_display(&p));
  # All callable via display(item) — dispatches through vtable

BUILT-IN IMPLEMENTATIONS:
  int_as_display(n)   — wraps i64 as Display
  str_as_display(s)   — wraps Str as Display

AVAILABLE TRAITS:
  Display (print + to_string), Eq (equality), From (conversion), Default

PATTERN: Lazy vtable init — create vtable on first use, cache in global var.
'''

[[entries]]
name = "generics_syntax"
description = "Generic syntax fn foo<T>() and struct Bar<T> parsed — no codegen change (everything is i64)"
category = "cyrius"
content = '''
GENERICS (Phase 1 — syntax only):

The compiler now accepts generic parameter syntax:
  fn identity<T>(x: T) { return x; }
  fn map<K, V>(key: K, val: V) { ... }
  struct Pair<T> { first; second; }
  struct Result<T, E> { ok; err; }
  var x: Vec<i64> = vec_new();
  fn f<T>(v: Vec<T>) { ... }

WHAT HAPPENS: The compiler parses <...> after function/struct names
and in type annotations, then IGNORES them. Everything is still i64.
No monomorphization. No type checking. No code duplication.

WHY THIS WORKS: In Cyrius, all values are 8 bytes (i64). There is no
runtime difference between Vec<i64> and Vec<String> — both are the
same code, same layout, same machine instructions. Generics are purely
documentation and future-proofing.

COMPILER CHANGES:
  1. SKIP_GENERICS(S) — helper in parse.cyr: if token is <, skip to >
  2. Called after fn name, struct name, and in type annotation positions
  3. Also added to cc2.cyr pass 1 fn-skip and pass 2 struct-skip
  4. Synced to cc2_aarch64.cyr

PHASE 2 (future): Type parameter tracking, mismatch warnings.
'''

[[entries]]
name = "preprocessor_include_bug"
description = "CRITICAL: preprocessor eats string literals containing 'include quote' pattern"
category = "cyrius"
content = '''
BUG: The preprocessor (PREPROCESS in lex.cyr) scans raw source bytes for the
pattern: i-n-c-l-u-d-e-space-quote. It does NOT distinguish between code and
string literals.

If a string literal contains this pattern, the preprocessor will try to
process it as a file inclusion, corrupting the source.

EXAMPLE (BREAKS):
  if (memeq(buf, "include \"", 9) == 1) { ... }
  # Preprocessor sees 'include "' and tries to open file '", 9) == 1) {...}'

WORKAROUND: Build the pattern at runtime using byte stores:
  var _pat[2];
  fn _init_pat() {
      store8(&_pat, 105);   # i
      store8(&_pat + 1, 110); # n
      ... etc ...
      store8(&_pat + 8, 34);  # "
      return 0;
  }
  # Then use: memeq(buf, &_pat, 9)

PROPER FIX (not yet implemented): Modify PREPROCESS to track whether it is
inside a string literal (between unescaped quotes). Only trigger include
processing when NOT inside a string.

This affects any program that needs to scan source files for include
directives (e.g., cyrc vet/deny). Also affects comments containing
the word "include" followed by a quote — be careful in documentation.
'''

[[entries]]
name = "cyrc_tool"
description = "cyrc: dependency auditing (vet) and policy enforcement (deny) for Cyrius projects"
category = "cyrius"
content = '''
CYRC — CYRIUS CHECK (programs/cyrc.cyr, 22KB binary):

cyrc vet <file>:
  Scans source file for include directives.
  Reports each dependency as OK, UNTRUST, or MISSING.
  Trusted paths: lib/, src/cc/, src/arch/, kernel/
  Returns 0 if all trusted and present, 1 otherwise.

cyrc deny <file>:
  Enforces project policies:
  - No absolute path includes (/foo/bar.cyr)
  - No parent directory traversal (../something.cyr)
  - Source file must exist
  Returns 0 if no violations, count of violations otherwise.

SEPARATE FROM CYRB: cyrc is a separate binary, not part of cyrb.
Reason: combining too many functions in one program hits compiler
limits (large programs with many includes exceed fixup table or
code buffer capacity). Keeping tools focused and small is better.

GOTCHA: Cannot use "include \"" as a string literal in the source
due to the preprocessor bug. Pattern must be built at runtime.
'''

[[entries]]
name = "tagged_unions"
description = "tagged.cyr: Option, Result, Either types via heap-allocated tag+value pairs"
category = "cyrius"
content = '''
TAGGED UNIONS (lib/tagged.cyr):

A tagged union is a heap-allocated pair: { tag: i64, value: i64 } = 16 bytes.
tag(t) returns the discriminant. payload(t) returns the value.

OPTION TYPE:
  var x = Some(42);      # tag=1, value=42
  var y = None();         # tag=0, value=0
  if (is_some(x) == 1) { var v = unwrap(x); }
  var v = unwrap_or(y, 99);  # returns 99 (fallback)
  # unwrap() aborts on None with error message

RESULT TYPE:
  fn divide(a, b) {
      if (b == 0) { return Err(1); }
      return Ok(a / b);
  }
  var r = divide(42, 2);
  if (is_ok(r) == 1) { var v = result_unwrap(r); }  # v = 21
  # result_unwrap() aborts on Err with "result_unwrap on Err(N)"

EITHER TYPE:
  var l = Left(10);
  var r = Right(20);
  if (is_left(l) == 1) { ... }

PRINT HELPERS:
  option_print(x) → "Some(42)" or "None"
  result_print(r) → "Ok(21)" or "Err(1)"

GOTCHA: Do not use "default" as a parameter name — it is a reserved keyword.
Use "fallback" instead (e.g., unwrap_or(opt, fallback)).

IMPLEMENTATION: No compiler changes. Pure library using alloc(16) + store64.
Compiler syntax (enum Foo { None; Some(val); }) deferred — library works well.

REAL-WORLD PATTERNS:
  # Safe file read
  fn safe_read(path, buf, len) {
      var fd = file_open(path, 0, 0);
      if (fd < 0) { return Err(0 - fd); }
      var n = file_read(fd, buf, len);
      file_close(fd);
      return Ok(n);
  }
'''

[[entries]]
name = "aarch64_codegen_fixes"
description = "All aarch64 codegen bugs found and fixed — instruction encoding, register ordering, ABI"
category = "cyrius"
content = '''
AARCH64 CODEGEN FIXES (cumulative):

1. INITIAL BRANCH: cc2_aarch64.cyr emitted x86 JMP (0xE9) instead of aarch64 B.
   Fix: Replace EB(S, 0xE9)+4 placeholders with EJMP0(S) from jump.cyr.

2. RECFIX ORDERING: RECFIX recorded CP after MOVZ, but FIXUP_MOV expected CP of MOVZ.
   Fix: Call RECFIX BEFORE the first EW in EVSTORE/EVLOAD/EVADDR.

3. POP ENCODING: EPOPR/EPOPC used pre-indexed load (0xF8410FE0 = [sp, #16]!)
   instead of post-indexed (0xF84107E0 = [sp], #16). Loaded from wrong address.
   Fix: Change bit [11] from 1→0: 0xF8410FE0 → 0xF84107E0.

4. MODULO: ECQO was no-op, EIDIV overwrote dividend, EMOVDR returned unset x2.
   Fix: ECQO saves dividend (mov x2, x0), EIDIV divides saved value (sdiv x0, x2, x1),
   EMOVDR computes remainder (msub x0, x0, x1, x2). Note: msub encoding 0x9B018800
   not 0x9B018840 (Rn must be x0, not x2).

5. ARCH-SPECIFIC FUNCTIONS IN PARSE.CYR: 14 functions (EFNPRO, ESUBRSP, EFNEPI,
   ECALLTO, ECALLFIX, EPOPARG, ECALLPOPS, ECALLCLEAN, EDISP32, ESTOREREGPARM,
   ESTORESTACKPARM, ESTOREPARM, EFLLOAD, EFLSTORE) were hardcoded x86 in parse.cyr.
   Fix: Moved to cc/emit.cyr (x86) and arch/aarch64/emit.cyr (aarch64).

6. STRUCT FIELD ACCESS: EMIT_STRUCT_FIELD, PARSE_FIELD_LOAD, PARSE_FIELD_STORE
   used inline x86 (mov rcx + add rcx). Fix: Refactored to EVADDR_X1 + EADDIMM_X1
   (arch-independent helpers defined in each emit file).

7. FUNCTION ABI: aarch64 uses STP x29,x30,[sp,#-16]! for prologue,
   LDP x29,x30,[sp],#16 for epilogue. Locals via STUR/LDUR [x29, #-offset].
   Calls via BL. Parameters in x0-x7 (vs x86 rdi,rsi,rdx,rcx,r8,r9).

8. ENUM INIT + SCANNING: cc2_aarch64.cyr was missing enum handling in pass 1/2
   and the init ordering fix. Synced from cc2.cyr.

RESULT: 29/29 aarch64 tests passing (arithmetic, control flow, functions,
structs, enums, strings, syscalls, load/store).
'''

[[entries]]
name = "string_formatting"
description = "fmt_sprintf: printf-like string formatting with %d, %x, %s, %% into a buffer"
category = "cyrius"
content = '''
STRING FORMATTING (lib/fmt.cyr):

fmt_sprintf(buf, format, args) — write formatted string into buf, return length.
args is a vec of i64 values consumed in order.

  Format specifiers:
    %d — decimal integer (fmt_int_buf)
    %x — hex integer (fmt_hex_buf)
    %s — null-terminated string (memcpy)
    %% — literal % character

  Usage:
    var buf[128];
    var args = vec_new();
    vec_push(args, "Cyrius");
    vec_push(args, 168);
    vec_push(args, 0);
    fmt_sprintf(&buf, "%s: %d tests, %d failures", args);
    println(&buf);
    # Output: Cyrius: 168 tests, 0 failures

  fmt_printf(format, args) — format + print to stdout.

GOTCHA: Use unique var names in each specifier branch (dval/dtmp/dlen for %d,
xval/xtmp/xlen for %x) because Cyrius has no block scoping.

Also added: fmt_hex_buf(n, buf) — hex number to buffer, returns length.
'''

[[entries]]
name = "bounds_checking"
description = "bounds.cyr: opt-in runtime bounds checking for arrays and buffers"
category = "cyrius"
content = '''
BOUNDS CHECKING (lib/bounds.cyr):

Opt-in checked memory access. Aborts with error message on violation.

  checked_load64(buf, len, idx)   — load 64-bit slot, abort if idx >= len or < 0
  checked_store64(buf, len, idx, val) — store, same bounds check
  checked_load8(buf, len, idx)    — byte load with bounds check
  checked_store8(buf, len, idx, val) — byte store with bounds check
  checked_memcpy(dst, dst_len, src, src_len, count) — abort if count exceeds either

Error output goes to stderr with index and length info:
  "bounds: index 10 >= len 4"

Uses fmt_int_buf + syscall(1, 2, ...) to write to stderr without touching stdout.
Process exits with code 1 on violation.

PATTERN: Use checked_ functions during development, switch to raw load/store
for hot paths after correctness is proven.

NOTE: vec.cyr already has bounds checking in vec_get/vec_set (exits on violation).
bounds.cyr adds the same for raw array buffers.
'''

[[entries]]
name = "nested_calls_work"
description = "Nested function calls f(g(x)) already work — no fix needed"
category = "cyrius"
content = '''
NESTED FUNCTION CALLS — NOT BROKEN (verified 2026-04-05):

Tested cases that all pass:
  double(add1(20)) = 42          # nested as argument
  f(g(10), g(11)) = 42           # nested in multi-arg
  f(f(f(42))) = 42               # triple nesting
  f(20) + f(22) = 42             # calls in arithmetic
  1 + f(41) = 42                 # call in right operand
  f(20) * 2 = 42                 # call in left operand

WHY IT WORKS: PARSE_FNCALL pushes each argument via EPUSHR after evaluation.
Inner function calls happen during argument evaluation, but their result
goes into rax, which then gets pushed. The call/return convention preserves
the stack correctly because each call saves rbp and has its own frame.

This was listed as a Phase 13 item but turns out to already work.
No compiler change needed.
'''

[[entries]]
name = "cyrb_dispatcher"
description = "cyrb is a shell dispatcher routing subcommands to individual tools — like git"
category = "cyrius"
content = '''
CYRB DISPATCHER (scripts/cyrb):

cyrb is a shell script that dispatches subcommands to individual tools.
This avoids the fixup table limit (~1024 entries) that prevents a single
large Cyrius binary from having all commands.

COMMANDS:
  Build:    cyrb build, test, bench, self
  Project:  cyrb init, package, publish, install
  Quality:  cyrb vet, deny (→ delegates to cyrc binary)
  Info:     cyrb version, which, help

TOOL RESOLUTION ORDER:
  1. $CYRIUS_HOME/bin/cc2 (installed version)
  2. ../build/cc2 (dev mode, relative to script)

COMPILE HELPER:
  compile() pipes source through cc2: cat $src | $CC > $out && chmod +x $out
  --aarch64 flag switches to cc2_aarch64

RUN HELPER:
  run_binary() executes directly on x86, via qemu-aarch64 on ARM

SELF-HOSTING:
  cyrb self finds src/compiler.cyr, compiles twice, compares with cmp.
  Works from either the cyrius repo or a sibling project.

PATTERN: Like git — one entry point, individual tools underneath.
Keeps each tool small, avoids compiler limits, easy to extend.
'''

[[entries]]
name = "package_format"
description = "Three-layer package system: cyrb.toml (manifest), .ark (distributable), zugot (recipe)"
category = "cyrius"
content = '''
CYRIUS PACKAGE SYSTEM:

Three layers, matching how Rust has Cargo.toml / crates.io / system packages:

LAYER 1 — cyrb.toml (project manifest, lives in project repo):
  [package]
  name = "kybernet"
  version = "0.9.0"
  description = "PID 1 init system"
  license = "GPL-3.0-only"
  language = "cyrius"

  [build]
  entry = "src/main.cyr"
  test = "src/test.cyr"
  output = "kybernet"

LAYER 2 — .ark package (created by cyrb package):
  kybernet-0.9.0.ark (gzipped tar):
    manifest.json — {"name", "version", "description", "license", "type"}
    kybernet      — compiled binary

  cyrb package reads cyrb.toml, compiles entry, creates .ark
  cyrb publish uploads .ark to Ark marketplace (future)

LAYER 3 — zugot recipe (lives in zugot repo, for system builds):
  zugot/base/kybernet.toml — TOML recipe with:
    [package] metadata
    [source] github_release + sha256
    [depends] runtime=[], build=["cyrius"]
    [build] make = "cat src/main.cyr | cc2 > build/kybernet"
    [security] hardening flags

  Used by takumi (build system) for AGNOS system images.
  Users install via: ark install kybernet

WORKFLOW:
  Developer: cyrb package → .ark → cyrb publish → Ark registry
  System:    zugot recipe → takumi build → AGNOS ISO
  User:      ark install kybernet → prebuilt binary from registry
'''

[[entries]]
name = "installer"
description = "install.sh + cyrius version manager — like rustup for Cyrius"
category = "cyrius"
content = '''
INSTALLER (scripts/install.sh):

  curl -sSf https://raw.githubusercontent.com/.../install.sh | sh

Installs to ~/.cyrius/:
  bin/         cc2, cyrb, ark, cyrc, cyrius (version mgr) — on PATH
  versions/    0.9.0/, 0.10.0/ etc — one dir per version
  current      file containing active version string

INSTALL FLOW:
  1. Detect arch (x86_64 / aarch64)
  2. Try downloading prebuilt binaries from GitHub Releases
  3. Fallback: clone repo + bootstrap from source (40ms)
  4. Symlink active version to bin/
  5. Add ~/.cyrius/bin to PATH (zshrc/bashrc/profile)

VERSION MANAGER (cyrius command):
  cyrius version      — show active (reads ~/.cyrius/current)
  cyrius list         — show all installed
  cyrius use 0.10.0   — switch active (repoints symlinks)
  cyrius install 0.10.0 — install a new version
  cyrius which        — show path to active cc2

PATTERN: Like rustup — installer bootstraps, version manager switches.
Multiple versions coexist. Symlinks point active version to bin/.
'''

[[entries]]
name = "standalone_project"
description = "Pattern for standalone Cyrius projects: vendored stdlib in lib/, no path deps"
category = "cyrius"
content = '''
STANDALONE PROJECT PATTERN:

Cyrius projects vendor their stdlib in lib/ so they build without
a relative path to the cyrius repo. Only the cc2 binary is needed.

PROJECT STRUCTURE (created by cyrb init):
  myproject/
  ├── cyrb.toml          project manifest
  ├── VERSION
  ├── lib/               vendored Cyrius stdlib
  │   ├── string.cyr
  │   ├── alloc.cyr
  │   ├── agnosys/syscalls.cyr
  │   └── ... (14 modules)
  ├── src/
  │   ├── main.cyr       entry (includes from lib/)
  │   ├── test.cyr
  │   └── lib/            project-specific modules
  ├── scripts/
  │   ├── build.sh
  │   └── test.sh
  └── build/              gitignored

INCLUDE PATHS: All relative to project root:
  include "lib/string.cyr"      ← vendored stdlib
  include "src/lib/module.cyr"  ← project modules

BUILD: cd $ROOT && cat src/main.cyr | cc2 > build/$NAME

VENDORING: cyrb init copies stdlib from the cyrius install.
To update: re-run cyrb init or manually copy from cyrius repo.

WHY VENDOR: Avoids ../cyrius/ path dependency. Project is
self-contained. CI just needs the cc2 binary, not the full repo.
'''

[[entries]]
name = "bench_library"
description = "bench.cyr: nanosecond-precision benchmarking with min/max/avg and human-readable output"
category = "cyrius"
content = '''
BENCHMARKING (lib/bench.cyr):

  var b = bench_new("my_operation");
  bench_run(b, &work_fn, 10000);  # run 10000 iterations
  bench_report(b);
  # Output: my_operation: 407ns avg (min=390ns max=8us) [10000 iters]

API:
  bench_new(name)              — create benchmark
  bench_start(b) / bench_stop(b) — manual timing
  bench_run(b, fp, n)         — auto-run function pointer N times
  bench_report(b)             — print one benchmark
  bench_report_all(benches)   — print vec of benchmarks

  bench_avg_ns(b), bench_min_ns(b), bench_max_ns(b), bench_iterations(b)

TIMING: Uses clock_gettime(CLOCK_MONOTONIC_RAW) via syscall 228.
Resolution is nanoseconds. Output auto-scales: ns → us → ms → s.

PATTERN: Define work functions, create bench, run, report:
  fn work_loop() { var s = 0; for (var i = 0; i < 1000; i = i + 1) { s = s + i; } return 0; }
  var b = bench_new("loop_1000");
  bench_run(b, &work_loop, 1000);

GOTCHA: _fmt_time uses shared var names (major, minor, tlen) — no
block scoping means all vars must be declared at function top.
'''

[[entries]]
name = "callback_library"
description = "callback.cyr: closure-like patterns via function pointers (map, filter, fold, pre_exec)"
category = "cyrius"
content = '''
CALLBACK LIBRARY (lib/callback.cyr):

Replaces closures with function pointer patterns:

  for_each(vec, &fn)         — apply fn(item) to each element
  vec_filter(vec, &fn)       — return new vec where fn(item)==1
  vec_map(vec, &fn)          — return new vec with fn(item) applied
  vec_fold(vec, init, &fn)   — accumulate with fn(acc, item)
  vec_any(vec, &fn)          — return 1 if any fn(item)==1
  vec_all(vec, &fn)          — return 1 if all fn(item)==1
  vec_find_by(vec, &fn)      — return first item where fn(item)==1

  fork_with_pre_exec(cmd, argv, envp, &cb, cb_data)
    — fork, run callback in child before exec (replaces Rust closures in Command::pre_exec)

USAGE:
  fn double(x) { return x * 2; }
  var mapped = vec_map(my_vec, &double);

  fn is_even(x) { if (x % 2 == 0) { return 1; } return 0; }
  var evens = vec_filter(my_vec, &is_even);

LIMITATION: Functions used as callbacks must be named top-level functions.
No anonymous closures. No captured variables (use globals or pass via data pointer).
'''

[[entries]]
name = "fixup_table_expansion"
description = "Fixup table expanded from 512 to 1024 entries by relocating fixup_cnt/last_var"
category = "cyrius"
content = '''
FIXUP TABLE EXPANSION (512 → 1024):

Large programs (kybernet test with 17 includes, 200+ functions) exceeded
the 512-entry fixup table limit. Each variable load/store creates a fixup.

FIX: Relocated fixup_cnt and last_var to free heap offsets.
  Old: fixup_cnt at 0x8C000, last_var at 0x8C008
  New: fixup_cnt at 0x8FCA8, last_var at 0x8FCB0

This lets the fixup table at 0x8A000 grow from 8192 to 16384 bytes
(1024 entries × 16 bytes) without conflicting with compiler state
at 0x8C100+.

CHANGES:
  - cc/util.cyr: GFCNT/SFCNT/GLVAR/SLVAR use new offsets
  - cc2.cyr + cc2_aarch64.cyr: zero-init at new offsets
  - cc/emit.cyr: guard changed from 512 to 1024
  - Heap map comments updated in both compiler entry files

SELF-HOSTING: byte-identical after change. All 168 tests pass.
'''

