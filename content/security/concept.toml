id = "security"
title = "Security Practices"
topic = "Security"
description = "Defending code against adversarial input — validation, injection prevention, constant-time comparison, secrets management, and safe defaults."
tags = ["security", "validation", "injection", "xss", "sqli", "crypto", "secrets", "sanitization", "constant-time", "path-traversal"]

[[best_practices]]
title = "Validate input at the boundary"
explanation = "Never trust data from users, files, or networks. Validate type, length, range, and format at the point of entry — before it reaches business logic."

[[best_practices]]
title = "Use parameterized queries, not string concatenation"
explanation = "SQL injection remains the #1 web vulnerability. Parameterized queries separate code from data — the DB engine never parses user input as SQL."

[[best_practices]]
title = "Use constant-time comparison for secrets"
explanation = "String equality short-circuits on the first differing byte, leaking length via timing. Constant-time comparison always examines every byte."

[[best_practices]]
title = "Zero secrets from memory after use"
explanation = "Passwords and keys linger in memory until overwritten. Explicitly zero them after use to shrink the window for memory dumps and core-file leaks."

[[best_practices]]
title = "Deny by default, allow explicitly"
explanation = "Allowlists beat denylists. It's easier to enumerate what's safe than to anticipate every attack. Apply this to input chars, file paths, network origins, and permissions."

[[gotchas]]
title = "Trusting client-side validation"
explanation = "Attackers bypass the browser. Any check done only in JavaScript can be skipped with curl. Always re-validate on the server."
bad_example = "<!-- only checked in JS --> <input maxlength='50'>"
good_example = "Server re-validates: if len(input) > 50 { reject }"

[[gotchas]]
title = "Using blocklists instead of allowlists"
explanation = "Blocklists miss novel attacks. Blocking <script> doesn't stop <SCRIPT>, <scr\nipt>, or event handlers. Allowlists define what IS permitted."
bad_example = "reject if input contains '<script>'"
good_example = "accept only if input matches ^[a-zA-Z0-9 .,!?]{1,200}$"

[[gotchas]]
title = "Comparing secrets with == (timing side-channel)"
explanation = "Regular string comparison returns early on mismatch. An attacker can measure response times to guess a secret byte-by-byte."
bad_example = "if user_token == stored_token { grant() }"
good_example = "if constant_time_eq(user_token, stored_token) { grant() }"

[[gotchas]]
title = "Path traversal via unsanitized filenames"
explanation = "User input like ../../etc/passwd escapes the intended directory. Always canonicalize and verify the resolved path starts with the expected root."
bad_example = "open(base_dir + '/' + user_filename)"
good_example = "resolved = canonicalize(base_dir + '/' + user_filename); assert resolved.starts_with(base_dir)"

[[gotchas]]
title = "Logging secrets or PII"
explanation = "Secrets in logs survive long after rotation. Log the event ('auth attempt'), not the credential ('password=hunter2')."
bad_example = "log.info('Login with password: {password}')"
good_example = "log.info('Login attempt for user: {username}')"

[[performance_notes]]
title = "Constant-time comparison is marginally slower"
explanation = "Constant-time comparison always processes every byte, while short-circuiting skips early. The difference is nanoseconds — negligible for security-critical paths."
evidence = "64-byte compare: short-circuit ~2ns best case, constant-time ~8ns — 4x slower but still <10ns"

[[performance_notes]]
title = "Input validation is cheap compared to exploitation"
explanation = "A regex check or length validation costs microseconds. An SQL injection can cost the entire database. The ROI on validation is astronomical."
evidence = "Regex validation: ~1us per input. Data breach average cost: $4.45M (IBM 2023)"

[[performance_notes]]
title = "Memory zeroing may be optimized away"
explanation = "Compilers see that zeroed memory is never read again and remove the store. Use volatile writes or platform-specific secure-zero functions."
evidence = "GCC/Clang -O2 eliminates plain memset of dead buffers; explicit_bzero/SecureZeroMemory survive optimization"

[[performance_notes]]
title = "Allowlist regex should be anchored and bounded"
explanation = "Unanchored or unbounded regex on user input invites ReDoS (catastrophic backtracking). Anchor with ^ and $, limit quantifiers, or use non-backtracking engines."
evidence = "Pathological input on (a+)+ regex: exponential time — 30 chars can hang a server for minutes"
