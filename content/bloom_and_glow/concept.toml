id = "bloom_and_glow"
title = "Bloom and Glow Effects"
topic = "BloomAndGlow"
description = "Software post-processing to simulate light bleed — additive blending on adjacent pixels to create the neon glow aesthetic without GPU shaders."
tags = ["bloom", "glow", "neon", "post-processing", "additive-blend", "blur", "threshold", "wireframe", "aesthetic", "games", "rendering"]
related_topics = ["framebuffer_rendering", "line_rasterization", "performance"]

[[best_practices]]
title = "Threshold before blurring"
explanation = "Only pixels above a brightness threshold should contribute to the bloom. This skips dim grid lines and noise so they don't soften the whole image. Run the threshold pass first; the blur only sees pixels that should glow."

[[best_practices]]
title = "Separable blur — two 1D passes, not one 2D pass"
explanation = "A k×k box or gaussian blur done as one 2D pass costs O(n·k²) per pixel. Done as a horizontal 1D pass followed by a vertical 1D pass it costs O(n·k). For k=5 that's a 5x speedup with identical output. Always separate when the kernel is separable."

[[best_practices]]
title = "Composite with additive blending, then clamp per channel"
explanation = "Bloom layer over base layer is additive: result = min(base + bloom, 255) per channel. Saturation clamps each channel independently — never let them overflow into each other (e.g., red overflowing into green via wraparound)."

[[best_practices]]
title = "Use a small radius for retro neon"
explanation = "1–2 pixel radius is enough for the 1982 TRON aesthetic. Larger radii (4+) push toward modern HDR bloom and cost noticeably more per frame. Tune for the look, not the algorithm's full generality."

[[gotchas]]
title = "Bloom on a black background is just the blur itself"
explanation = "If the base image is mostly black, the additive composite is dominated by the bloom contribution. The 'glow' is what's visible; the original pixels are barely changed. Test with both bright and dim base images."
bad_example = "// Tune bloom on a fully-bright test pattern; ship; users render dark scenes; bloom invisible"
good_example = "// Tune on the actual scene's brightness distribution. The dark-scene case is the harder one."

[[gotchas]]
title = "Saturation must clamp per-channel, never wrap"
explanation = "Adding two BGRA values byte-by-byte without clamping produces wraparound: 200 + 100 = 44 (mod 256). That makes bright pixels suddenly dark. Always clamp each channel: dst = min(src + addend, 255)."
bad_example = "dst[i] = src[i] + addend  // wraps at 256"
good_example = "var s = src[i] + addend; if (s > 255) { s = 255; } dst[i] = s;"

[[gotchas]]
title = "Threshold cutoff is sharp; subtle pixels may need feathering"
explanation = "A hard threshold (T or above contributes, T-1 or below doesn't) creates visible bands when neighboring pixels straddle the cutoff. For smoother results, use a soft threshold: contribution scales linearly between T_min and T_max."
bad_example = "if (intensity >= 128) { contribute_glow(intensity); } else { /* nothing */ }"
good_example = "var t = (intensity - 64) / 128; if (t < 0) { t = 0; } if (t > 1) { t = 1; } contribute_glow(intensity * t);"

[[performance_notes]]
title = "Bloom is bandwidth-limited, not compute-limited"
explanation = "A 320×240 BGRA framebuffer is 307KB. Bloom reads the source, writes a bright-pixel mask, blurs that mask in two passes, then composites — moving 1.5–2MB per frame. At 60fps that's 90–120MB/s. CPU is idle most of the cycle waiting on memory."
evidence = "encom-hits 320×240 bloom budget: ~2ms/frame total. Of that, ~80% is memory traffic, ~20% is the actual additive math."

[[performance_notes]]
title = "Radius=1 box bloom is essentially free"
explanation = "A 1-pixel radius means each bright pixel touches 4 neighbors (up, down, left, right). That's 4 reads + 4 clamped-adds per bright pixel, and bright pixels are typically <20% of the image for line-art. The whole pass is ~megacycle-class on modern x86_64."
evidence = "encom-hits glow.cyr: 320×240 with ~5% bright pixels measured at <200µs/frame on a Ryzen 5800X."

[[languages.rust]]
source = "kiran"
note = "kiran's rendering pipeline supports post-processing passes. Bloom would be implemented as a post-pass on the framebuffer. The HeadlessRenderer trait allows software-only pipelines without GPU."
pattern = "Post-processing pass reads framebuffer, applies blur to bright pixels, composites result back with additive blending."

[[languages.cyrius]]
source = "encom-hits"
note = "encom-hits glow.cyr will implement a simple 1-2 pixel bloom. Bright neon lines (cyan, orange, white) get additive glow on adjacent pixels. The aesthetic is the 1982 TRON cabinet look — bright lines bleeding light onto black."
pattern = """
// Per-pixel additive glow with saturation clamp:
// For each bright pixel (above threshold):
//   Read adjacent pixels (up/down/left/right)
//   Add 50% of bright pixel's intensity to each neighbor
//   Clamp each channel to 255
// Result: bright lines appear to emit light
"""
