id = "concurrency"
title = "Concurrency"
topic = "Concurrency"
description = "Running multiple computations simultaneously — threads, async, channels, and the synchronization primitives that keep them correct."
tags = ["concurrency", "threads", "async", "channels", "mutex", "parallelism", "sync"]

[[best_practices]]
title = "Prefer message passing over shared state"
explanation = "Channels (mpsc in Rust, channels in Go) eliminate data races by design. Shared mutable state requires careful locking and is error-prone."

[[best_practices]]
title = "Use scoped threads for borrowed data"
explanation = "std::thread::scope lets spawned threads borrow from the parent stack frame. No need for Arc or 'static bounds."
language = "Rust"

[[best_practices]]
title = "Use async for I/O-bound work, threads for CPU-bound work"
explanation = "Async excels at waiting on many I/O operations. CPU-bound work needs real OS threads (or rayon) to utilize multiple cores."

[[best_practices]]
title = "Hold locks for the shortest time possible"
explanation = "Long-held locks cause contention. Lock, copy the data you need, unlock. Don't do I/O or computation while holding a lock."

[[gotchas]]
title = "Mutex poisoning on panic"
explanation = "If a thread panics while holding a Mutex, it becomes poisoned. Subsequent lock() calls return Err. Handle this or use lock().unwrap()."
bad_example = "let data = mutex.lock().unwrap(); // panics if poisoned"
good_example = "let data = mutex.lock().unwrap_or_else(|e| e.into_inner()); // recover from poisoning"
language = "Rust"

[[gotchas]]
title = "Deadlock from lock ordering"
explanation = "Two threads locking A then B and B then A will deadlock. Always acquire locks in a consistent global order."
bad_example = "Thread 1: lock(a), lock(b); Thread 2: lock(b), lock(a) // deadlock"
good_example = "Both threads: lock(a), lock(b) // consistent order"

[[gotchas]]
title = "Send and Sync bound errors"
explanation = "Types that aren't Send can't be moved to another thread. Rc, raw pointers, and some cell types are not Send. Use Arc instead of Rc."
bad_example = "let rc = Rc::new(42); thread::spawn(move || use_rc(rc)); // error: Rc is not Send"
good_example = "let arc = Arc::new(42); thread::spawn(move || use_arc(arc));"
language = "Rust"

[[gotchas]]
title = "Async functions are lazy"
explanation = "Calling an async fn returns a Future that does nothing until awaited or spawned. Forgetting to .await is a silent bug."
bad_example = "async_operation(); // returns Future, does nothing!"
good_example = "async_operation().await; // actually runs"
language = "Rust"

[[performance_notes]]
title = "Channel throughput vs mutex throughput"
explanation = "mpsc channels have higher overhead per message than mutex-guarded state for simple updates, but scale better under contention."
evidence = "Mutex: ~20ns uncontended lock/unlock; mpsc: ~50-100ns per send/recv, but no contention scaling issues"
language = "Rust"

[[performance_notes]]
title = "Scoped threads avoid Arc overhead"
explanation = "std::thread::scope lets threads borrow stack data directly, avoiding the atomic reference counting overhead of Arc."
evidence = "No atomic increment/decrement per access — direct pointer access like single-threaded code"
language = "Rust"

[[performance_notes]]
title = "Rayon for data parallelism"
explanation = "Rayon's par_iter() automatically distributes work across threads with work-stealing. Near-linear speedup for embarrassingly parallel operations."
evidence = "par_iter().sum() on 1M elements: ~3.8x speedup on 4 cores vs sequential"
language = "Rust"
