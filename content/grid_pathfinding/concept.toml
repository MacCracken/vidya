id = "grid_pathfinding"
title = "Grid Pathfinding"
topic = "GridPathfinding"
description = "A* and related algorithms for finding shortest paths on 2D grids — the foundation of enemy AI in tile-based and grid-based games."
tags = ["pathfinding", "a-star", "bfs", "grid", "manhattan", "heuristic", "chase", "flee", "enemy-ai", "games", "navigation"]
related_topics = ["algorithms", "game_ai_decisions", "collision_detection_2d", "maze_generation"]

[[best_practices]]
title = "Use Manhattan distance heuristic for 4-connected grids"
explanation = "On a grid with only up/down/left/right movement, Manhattan distance (|dx| + |dy|) is the exact minimum cost. It's admissible (never overestimates) and consistent, so A* is guaranteed to find the optimal path."

[[best_practices]]
title = "Use BFS when all edge costs are equal"
explanation = "On uniform-cost grids (no terrain weights), BFS finds shortest paths without the overhead of a priority queue. Simpler to implement, lower constant factor. A* only wins when the heuristic prunes significant search space."

[[best_practices]]
title = "Cache distances with BFS flood-fill for fixed grids"
explanation = "For Pac-Man-style games on fixed grids, pre-compute distance from key positions (ghost home, power pellets) at level load using BFS flood-fill. Then look up shortest-path direction in O(1) per tick instead of running A* every frame."

[[best_practices]]
title = "Recalculate paths periodically, not every frame"
explanation = "For enemy chase AI, recalculate the path every N frames (e.g., every 10-15 ticks) rather than every frame. The player doesn't move far in 10 frames, and the computational savings are significant with many enemies."

[[gotchas]]
title = "Inadmissible heuristic breaks optimality"
explanation = "If the heuristic overestimates the true cost, A* may return a suboptimal path. Manhattan distance on a 4-connected grid is safe. Euclidean distance on a 4-connected grid underestimates (safe but slower). Custom heuristics need careful validation."
bad_example = "h = 2 * (abs(dx) + abs(dy));  // overestimates by 2x, may find suboptimal paths"
good_example = "h = abs(dx) + abs(dy);  // Manhattan: exact for 4-connected, always admissible"

[[gotchas]]
title = "Tie-breaking affects performance dramatically"
explanation = "On uniform-cost grids, many nodes share the same f-value. Without tie-breaking, A* expands large bands of equal-f nodes. Break ties by preferring higher g (closer to goal) to focus the search."
bad_example = "open_set.push(f, node);  // no tie-breaking: expands wide bands"
good_example = "open_set.push((f, -g), node);  // prefer higher g: focuses toward goal"

[[gotchas]]
title = "Grid staircase paths look unnatural"
explanation = "A* on a 4-connected grid produces staircase paths instead of diagonals. For display, apply path smoothing: check line-of-sight between non-adjacent waypoints and skip intermediate ones. For movement, the staircase is functionally correct."
bad_example = "// Path: (0,0)→(1,0)→(1,1)→(2,1)→(2,2) — staircase"
good_example = "// After smoothing: (0,0)→(2,2) — direct if line-of-sight is clear"

[[performance_notes]]
title = "A* on small grids is effectively instant"
explanation = "For a 16x12 grid (192 cells), A* explores at most 192 nodes. Even a naive implementation completes in microseconds. Priority queue optimization only matters for large grids (100x100+)."
evidence = "raasta benchmarks: A* on 512x512 grid is the tracked baseline. On 16x12 (encom-hits grid bugs), the cost is negligible."

[[performance_notes]]
title = "Boolean grid for closed set beats hash set"
explanation = "On a grid, use a 2D boolean array for the closed set instead of a hash set. Array access is O(1) with no hashing overhead and perfect cache locality. Index by (y * width + x)."
evidence = "raasta uses bitset walkability (1 bit per cell) for 8x memory reduction vs Vec<bool>. For small grids, even Vec<bool> is fine."

[[languages.rust]]
source = "raasta"
note = "raasta provides production-grade grid pathfinding: A*, JPS (35x faster on uniform grids), Theta*/Lazy Theta* (any-angle), bidirectional A*, flow fields, and connected components. Walkability stored as bitset. GridPathQuery pre-allocates scratch buffers for zero per-path allocation."
pattern = """
// raasta example: basic.rs
let mut grid = NavGrid::new(20, 20, 1.0);
grid.set_walkable(5, 3, false);  // add wall
let path = grid.find_path((1, 1), (18, 18))?;
for (x, y) in &path { println!("({}, {})", x, y); }
"""

