id = "code_generation"
title = "Code Generation"
topic = "CodeGeneration"
description = "Turning intermediate or high-level representations into executable machine code. The compiler backend: instruction selection (choosing which machine instructions implement each operation), register allocation (mapping virtual registers to physical ones), and calling convention compliance (so generated code interoperates with other code). This is where the abstract becomes concrete."
tags = ["codegen", "instruction-selection", "register-allocation", "calling-convention", "backend", "machine-code", "stack-frame", "spilling", "tile", "pattern-matching", "maximal-munch", "linear-scan", "graph-coloring"]
related_topics = ["instruction_encoding", "intermediate_representations", "optimization_passes", "linking_and_loading"]

[[best_practices]]
title = "Start with a naive stack-based codegen, optimize later"
explanation = "The simplest correct codegen pushes every intermediate result to the stack and pops operands before each operation. This is 'stack machine' codegen — no register allocation needed. It produces terrible code but is trivially correct. Once it works, add register allocation as a separate pass. Every compiler should be able to fall back to stack codegen for debugging."

[[best_practices]]
title = "Use maximal munch for instruction selection"
explanation = "Maximal munch (greedy tiling) walks the IR tree bottom-up, matching the largest possible subtree to a single machine instruction. Example: 'add(load(addr), reg)' can be a single x86 ADD with a memory operand instead of separate LOAD + ADD. Larger tiles produce fewer instructions. Start with single-node tiles (one IR node = one instruction), then add multi-node tiles for common patterns."

[[best_practices]]
title = "Separate virtual registers from physical registers"
explanation = "During code generation, use unlimited virtual registers (v0, v1, v2, ...). A separate register allocation pass maps virtuals to physical registers (rax, rcx, ...). This separation lets codegen ignore register pressure and lets reg alloc work as a standalone pass. Spill code (storing registers to stack when you run out) is inserted during reg alloc, not during codegen."

[[best_practices]]
title = "Emit a proper stack frame prologue/epilogue"
explanation = "Every function needs: push rbp; mov rbp, rsp; sub rsp, N (prologue) and leave; ret (epilogue). N is the stack frame size — space for locals, spilled registers, and callee arguments. RSP must be 16-byte aligned before any CALL instruction (System V AMD64 ABI). In a single-pass compiler, N isn't known when the prologue is emitted (locals are discovered during body parsing), so emit 'sub rsp, 0' as a placeholder, record its offset, and patch the imm32 after the body is complete. Round N up to a multiple of 16 for alignment. The 'leave' instruction (1 byte) replaces 'mov rsp, rbp; pop rbp' (4 bytes) — always use it."

[[best_practices]]
title = "Handle calling conventions explicitly"
explanation = "System V AMD64: args in rdi, rsi, rdx, rcx, r8, r9 (integers), xmm0-xmm7 (floats). Return value in rax. Caller-saved: rax, rcx, rdx, rsi, rdi, r8-r11. Callee-saved: rbx, rbp, r12-r15. Windows x64 is different: rcx, rdx, r8, r9 for args, 32-byte shadow space required. Getting this wrong produces code that corrupts registers across function calls."

[[best_practices]]
title = "Use a fixup table for forward references"
explanation = "When emitting code linearly, forward jumps (if/else, loops) reference addresses not yet known. Emit a placeholder (zero), record it in a fixup table (patch_offset, target_label), and resolve all fixups after the function is complete. This is the same technique linkers use for relocations, applied within a single compilation unit. If/else requires two patches: one for the condition-false jump (to else-start) and one for the skip-else jump (to end). While loops need one forward patch (condition-false to exit) plus a backward jump (which doesn't need patching since the target is already known)."

[[best_practices]]
title = "Emit call arguments via push/pop for clean register mapping"
explanation = "When generating code for function calls or syscalls with multiple arguments, evaluate each argument left-to-right and push onto the stack. Then pop into the correct registers in reverse order. This avoids register conflicts — each parse_expr freely uses rax without clobbering previous arguments. The same pattern works for both syscalls (rax, rdi, rsi, rdx, r10, r8, r9) and function calls (rdi, rsi, rdx, rcx, r8, r9). The pop sequence is fixed per argument count, so the compiler dispatches on count and emits a known byte sequence. This pattern was validated across two calling conventions in the same compiler (syscall vs System V function call) — identical structure, just different register mappings."

[[gotchas]]
title = "Forgetting caller-saved register preservation across calls"
explanation = "If you have a value in rax and emit a CALL instruction, rax is destroyed (it's caller-saved). The codegen must save caller-saved registers that are live across calls — either by moving them to callee-saved registers or spilling to the stack. Register allocation should model CALL instructions as clobbering all caller-saved registers."
bad_example = "mov rax, [var_x]; call print_int; add rax, 1  // rax was destroyed by call"
good_example = "mov rax, [var_x]; push rax; call print_int; pop rax; add rax, 1"

[[gotchas]]
title = "Stack alignment violations cause silent crashes"
explanation = "System V AMD64 requires RSP to be 16-byte aligned at the point of a CALL instruction. After CALL pushes the 8-byte return address, RSP is 16-byte aligned inside the callee (which pushes RBP for another 8 bytes, making it 16-aligned again). If the caller's RSP isn't aligned before CALL, SSE instructions in the callee will segfault."
bad_example = "push rax; call func  // RSP was 16-aligned, push made it 8-aligned, CALL breaks"
good_example = "sub rsp, 8; push rax; call func  // extra 8 bytes restores alignment"

[[gotchas]]
title = "Signed vs unsigned division are different instructions"
explanation = "x86_64 has IDIV (signed) and DIV (unsigned). They use the same operand encoding but produce different results for negative numbers. The dividend is in RDX:RAX — you must sign-extend RAX into RDX with CQO before IDIV, or zero-extend with XOR RDX,RDX before DIV. Using the wrong extension produces garbage results. Real-world example: a bootstrap compiler used XOR RDX,RDX + IDIV for all division. Positive dividends worked, but -10/3 produced 82 instead of -3 — the zero-extended RDX made the CPU divide 0x0000000000000000:0xFFFFFFFFFFFFFFF6 (a huge positive number) instead of the intended -10. The fix was replacing XOR RDX,RDX with CQO (48 99, 2 bytes — smaller AND correct)."
bad_example = "xor rdx, rdx; idiv rcx  // zero-extended instead of sign-extended, -10/3 gives 82 not -3"
good_example = "cqo; idiv rcx  // sign-extends rax into rdx:rax, correct for signed division, 2 bytes vs 3"

[[gotchas]]
title = "Register allocation graph coloring is NP-complete"
explanation = "Optimal register allocation (minimizing spills) is NP-complete. Production compilers use heuristics: linear scan (fast, used by JITs like V8 and HotSpot), iterated register coalescing (better quality, used by GCC/LLVM), or simple graph coloring with heuristic simplification. For a bootstrap compiler, linear scan or even 'spill everything' is fine."
bad_example = "Trying to implement optimal register allocation for a bootstrap compiler"
good_example = "Linear scan: sort live intervals by start point, assign registers greedily, spill the interval with the furthest next use"

[[gotchas]]
title = "imul clobbers RDX"
explanation = "The x86_64 one-operand IMUL (imul reg) multiplies RAX by the operand and stores the 128-bit result in RDX:RAX. If you had a value in RDX, it's gone. The two-operand form (imul dst, src) and three-operand form (imul dst, src, imm) only store the low 64 bits in dst and don't touch RDX. Use the multi-operand forms when you don't need the high bits."
bad_example = "mov rdx, [important_value]; imul rcx  // rdx destroyed"
good_example = "imul rax, rcx  // only writes rax, rdx preserved"

[[gotchas]]
title = "LEA is not a memory access"
explanation = "LEA (load effective address) computes an address but does NOT read memory. It's the compiler's Swiss army knife for arithmetic: lea rax, [rbx + rcx*4 + 8] computes rbx + rcx*4 + 8 in one instruction without touching memory. Confusing LEA with MOV (which actually reads memory) causes segfaults or wrong values."
bad_example = "Using MOV to compute address arithmetic — triggers actual memory read"
good_example = "lea rax, [rbx + rcx*8]  // computes address, no memory access"

[[performance_notes]]
title = "Stack-based codegen is 2-5x slower than register-allocated code"
explanation = "Stack codegen pushes/pops for every operation, causing many memory accesses. Register-allocated code keeps hot values in registers. The speedup depends on register pressure — tight loops with few variables see the biggest improvement."
evidence = "A tight loop incrementing a counter: stack codegen ~2.1 ns/iter (push/pop on every iteration), linear scan reg alloc ~0.7 ns/iter (counter stays in register), ~3x improvement."

[[performance_notes]]
title = "Linear scan register allocation is O(n) and good enough"
explanation = "Linear scan sorts live intervals by start point and greedily assigns registers. It's one pass over the intervals, O(n log n) with sorting. Graph coloring is O(n²) or worse. For JIT compilers where compilation time matters, linear scan is the standard choice. Code quality is within 5-10% of graph coloring for most programs."
evidence = "V8 TurboFan uses linear scan. HotSpot C1 uses linear scan. LLVM uses a variant of linear scan for -O1. Graph coloring (LLVM -O2) improves runtime by ~5% but takes 2-3x longer to compile."

[[best_practices]]
title = "Compile struct field access as base+constant offset — zero runtime lookup"
explanation = "Struct field access should compile to a single memory operation with a constant displacement: `mov rax, [rbp - 16 + 8]` for a local struct's second field. The compiler resolves field names to byte offsets at compile time from the struct definition table. No hash table, no string comparison, no indirection at runtime. For stack-allocated structs, the total offset is (stack_slot + field_offset). For heap-allocated structs accessed through a pointer, it's two operations: load pointer then access field (`mov rax, [rbp-8]; mov rbx, [rax+8]`). The struct definition table in the compiler stores: (struct_name, [(field_name, field_offset, field_size), ...], total_size)."

[[best_practices]]
title = "Pass structs by pointer when they exceed 16 bytes"
explanation = "The System V x86_64 ABI splits struct arguments: structs up to 8 bytes pass in one register (RDI/RSI/etc), 9-16 bytes split across two registers, and anything larger passes by hidden pointer. For a bootstrap compiler, the simplest correct approach is: ALWAYS pass structs by pointer. The caller allocates stack space, the callee receives a pointer in a register. This avoids the complexity of splitting structs across registers and works for all sizes. The cost is one extra indirection per access — negligible compared to the implementation complexity of register splitting."

[[gotchas]]
title = "Struct stack allocation must account for alignment and total size"
explanation = "When allocating a struct on the stack, `sub rsp, N` must use the struct's TOTAL size (sum of all field sizes, aligned). If a struct has fields {i64, i32, i8}, the total is 8+4+1=13, aligned to 16 = 16 bytes. Forgetting alignment corrupts the stack for subsequent calls. Forgetting to account for total size (using field count * 8 instead of actual layout) overlaps adjacent variables. The struct definition must store both individual field sizes AND the aligned total."
bad_example = "struct {i64, i32, i8} → sub rsp, 13 — misaligned stack, next call crashes"
good_example = "struct {i64, i32, i8} → sub rsp, 16 — aligned to 16, safe for calls"

[[best_practices]]
title = "Pass arguments 7+ on the stack in right-to-left order"
explanation = "System V AMD64 puts args 1-6 in registers (rdi, rsi, rdx, rcx, r8, r9). Args 7+ go on the stack, pushed right-to-left so arg 7 is at [rsp] when the callee starts. After the callee's prologue (push rbp; mov rbp, rsp), stack args are at [rbp+16] (arg 7), [rbp+24] (arg 8), etc. — past the saved rbp (8 bytes) and return address (8 bytes). The caller must clean up the stack after the call (add rsp, N). In a bootstrap compiler, the simplest approach: if arg count > 6, push extras before pushing the register args, then pop register args into rdi-r9, call, then add rsp to clean stack args."

[[best_practices]]
title = "Inline assembly as raw byte emission — reuse the existing assembler"
explanation = "For a bootstrap compiler that already has a self-hosting assembler (asm.cyr), inline assembly doesn't need a separate instruction encoder. The simplest design: `asm { }` blocks contain raw assembly lines that are passed to the assembler's instruction encoder. The compiler emits the bytes directly into the code stream. No register constraint solving needed in V1 — the programmer manages registers explicitly. The compiler just needs to: (1) recognize the `asm` keyword, (2) pass each line to the instruction encoder, (3) resume normal codegen after the closing brace. This gives full x86_64 access with zero new encoding logic."

[[gotchas]]
title = "Inline assembly clobbers the compiler's register conventions"
explanation = "A bootstrap compiler uses fixed register assignments: rax for expression results, rcx for temporaries, stack for intermediate values. Inline assembly can use ANY register, potentially destroying the compiler's live values. The simplest safe approach: save all caller-saved registers before an asm block, restore after. Or document that asm blocks clobber everything and the programmer must not use asm in the middle of an expression. The practical rule for V1: asm blocks are statements, never expressions — they execute between assignments, not within them."
bad_example = "var x = *ptr + asm { mov rax, 42 }; — asm clobbers rax mid-expression, ptr load is lost"
good_example = "asm { mov rax, 42; mov [rbp-8], rax }; var x = load64(&result); — asm as standalone statement, result read separately"

[[performance_notes]]
title = "Instruction selection quality matters more than register allocation"
explanation = "Choosing the right x86 instructions (using LEA for address math, CMOV for branchless conditionals, memory operands to fuse load+op) reduces instruction count. Fewer instructions means less register pressure, which makes register allocation easier. Good instruction selection can eliminate the need for spilling entirely in many functions."
evidence = "A simple array sum: naive selection (separate load + add) = 3 instructions/element. Fused (add with memory operand) = 1 instruction/element. 3x fewer instructions, 2x faster, zero spills vs 2 spills."
