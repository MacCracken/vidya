id = "design_patterns"
title = "Design Patterns"
topic = "Patterns"
description = "Reusable solutions to recurring design problems — builder, strategy, observer, RAII/cleanup, dependency injection, and factory. Expressed idiomatically per language, not as forced OOP class hierarchies."
tags = ["design-patterns", "builder", "strategy", "observer", "factory", "raii", "cleanup", "dependency-injection", "state-machine", "newtype", "visitor"]
related_topics = ["type_systems", "trait_and_typeclass_systems", "pattern_matching"]

[[best_practices]]
title = "Use the language's idioms, not textbook Java patterns"
explanation = "A strategy pattern in Rust is a closure or trait object. In Go it's an interface. In C it's a function pointer. Don't force class hierarchies where simpler idioms exist."

[[best_practices]]
title = "Prefer composition over inheritance"
explanation = "Embed behavior via fields (has-a), not subclasses (is-a). Composition is more flexible, easier to test, and avoids fragile base class problems."

[[best_practices]]
title = "Use builder pattern for complex construction"
explanation = "When a constructor has more than 3-4 parameters, or optional fields, a builder provides a readable, self-documenting API that catches mistakes at compile time."

[[best_practices]]
title = "Encode states in the type system"
explanation = "Use distinct types for distinct states (e.g., UnvalidatedEmail vs ValidatedEmail). Invalid transitions become compile errors, not runtime bugs."

[[best_practices]]
title = "RAII: tie resource lifetime to scope"
explanation = "Acquire resources in constructors, release in destructors/defer/with. This makes cleanup automatic and exception-safe — no forgotten close() calls."

[[gotchas]]
title = "Overusing design patterns"
explanation = "Patterns add indirection. If a direct function call works, don't wrap it in Strategy+Factory+Observer. Patterns solve complexity — they shouldn't create it."
bad_example = "AbstractFactoryFactoryBean for a simple lookup table"
good_example = "A HashMap<String, fn()> when you just need string-to-function dispatch"

[[gotchas]]
title = "Singleton causes hidden global state"
explanation = "Singletons are global variables in disguise. They make testing hard, create implicit dependencies, and prevent parallelism. Pass dependencies explicitly."
bad_example = "Database::instance().query() — hidden global, untestable"
good_example = "fn query(db: &Database) — explicit dependency, mockable"

[[gotchas]]
title = "Observer memory leaks from forgotten unsubscribe"
explanation = "Observers that register but never unregister keep references alive forever. In GC languages this leaks memory; in Rust it's caught by the borrow checker."
bad_example = "button.on_click(handler); // never unsubscribed"
good_example = "let sub = button.on_click(handler); drop(sub); // RAII unsubscribe"

[[gotchas]]
title = "Builder without validation"
explanation = "A builder that allows .build() in any state defeats the purpose. Validate required fields at build time — return Result, not panic."
bad_example = "Server::builder().build() // missing required port — panics at runtime"
good_example = "Server::builder().port(8080).build()? // returns Err if port missing"

[[performance_notes]]
title = "Virtual dispatch (trait objects, interfaces) has measurable but small cost"
explanation = "Dynamic dispatch adds an indirect function call (~2-5ns). For hot loops this adds up; for configuration-time decisions it's negligible."
evidence = "Direct call: ~1ns. Trait object: ~3ns. Closure: ~2ns. 10M iterations: 30ms vs 10ms."

[[performance_notes]]
title = "Builder pattern has zero runtime cost with move semantics"
explanation = "In Rust/C++, builder chains move the struct through each method — no heap allocation, no copies. The optimizer inlines everything."
evidence = "Builder with 5 fields: same assembly as direct struct literal after optimization."

[[performance_notes]]
title = "State machines as enums outperform dynamic dispatch"
explanation = "An enum with match is a direct jump table. Dynamic dispatch goes through a vtable pointer. For tight state machines, enums are 2-3x faster."
evidence = "State machine (1M transitions): enum match ~15ms, trait object ~40ms."

[[performance_notes]]
title = "Dependency injection at construction vs per-call"
explanation = "Inject dependencies once at construction, not on every method call. Storing a reference/pointer avoids repeated lookup or allocation."
evidence = "Per-call injection: HashMap lookup each time ~25ns. Stored reference: 0ns."
