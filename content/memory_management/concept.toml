id = "memory_management"
title = "Memory Management"
topic = "MemoryManagement"
description = "How programs allocate, use, and free memory — the difference between systems that crash and systems that run forever."
tags = ["memory", "ownership", "borrowing", "allocation", "gc", "stack", "heap", "lifetimes"]
related_topics = ["allocators", "ownership_and_borrowing", "performance"]

[[best_practices]]
title = "Prefer stack allocation over heap allocation"
explanation = "Stack allocation is essentially free (just moving a pointer). Heap allocation requires a system call and bookkeeping. Use stack-sized types when possible."

[[best_practices]]
title = "Minimize allocation in hot paths"
explanation = "Pre-allocate buffers, reuse allocations, use arenas. Every allocation is a potential performance cliff in latency-sensitive code."

[[best_practices]]
title = "Borrow instead of clone"
explanation = "Passing references (&T) avoids copying data. Clone only when you need independent ownership. Unnecessary clones hide performance problems."

[[best_practices]]
title = "Let RAII handle cleanup"
explanation = "Tie resource lifetimes to scope. Drop in Rust, destructors in C++, defer in Go. Manual cleanup is a bug waiting to happen."

[[gotchas]]
title = "Use-after-free is impossible in safe Rust"
explanation = "The borrow checker prevents dangling references at compile time. But unsafe blocks can still cause them — audit all unsafe carefully."
bad_example = "unsafe { let p = &*raw_ptr; drop(owner); use(p); }"
good_example = "let owner = data; let r = &owner; use(r); // borrow checker enforces lifetime"
language = "Rust"

[[gotchas]]
title = "Leaking memory with reference cycles"
explanation = "Rc<T> with interior RefCell can create cycles that never get freed. Use Weak<T> to break cycles."
bad_example = "let a = Rc::new(RefCell::new(None)); let b = Rc::clone(&a); *a.borrow_mut() = Some(b); // cycle!"
good_example = "Use Weak<T> for back-references: Rc::downgrade(&parent)"
language = "Rust"

[[gotchas]]
title = "Double free in C"
explanation = "Freeing the same pointer twice is undefined behavior. Set pointers to NULL after free, or use ownership conventions."
bad_example = "free(ptr); /* ... later ... */ free(ptr);"
good_example = "free(ptr); ptr = NULL;"
language = "C"

[[gotchas]]
title = "Hidden allocations from innocent-looking operations"
explanation = "String concatenation, format!(), vec![], to_string() — all allocate. In hot loops, these add up fast."
bad_example = "for item in items { result.push(format!(\"{item}\")); }"
good_example = "let mut buf = String::new(); for item in items { write!(buf, \"{item}\").unwrap(); results.push(buf.clone()); buf.clear(); }"
language = "Rust"

[[performance_notes]]
title = "Stack vs heap: orders of magnitude difference"
explanation = "Stack allocation is a single instruction (sub rsp, N). Heap allocation involves malloc, bookkeeping, and potential system calls."
evidence = "Stack: ~1ns, Heap: ~25-100ns per allocation (platform dependent)"

[[performance_notes]]
title = "Vec::with_capacity prevents reallocations"
explanation = "Growing a Vec doubles its capacity each time, copying all elements. Pre-allocating with with_capacity(n) avoids this entirely."
evidence = "Building a Vec<i32> of 1000 elements: with_capacity is ~2x faster than default"
language = "Rust"

[[performance_notes]]
title = "Arena allocation for batch lifetimes"
explanation = "When many objects share the same lifetime, allocate them from an arena. One deallocation frees everything — no per-object overhead."
evidence = "Arena dealloc is O(1) regardless of object count vs O(n) for individual frees"

[[performance_notes]]
title = "Small string optimization"
explanation = "Many string types store short strings inline (on the stack) to avoid heap allocation. Rust's String doesn't do this by default — use SmallString crates if needed."
evidence = "Strings under ~22 bytes can be stack-allocated with compact_str or smol_str"
language = "Rust"
