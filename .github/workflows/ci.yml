name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # 5.11.x consumer pattern (sit / sigil / sandhi): pipe the
        # upstream install.sh which lays out $HOME/.cyrius/versions/$VER/
        # {bin,lib}, the flat $HOME/.cyrius/{bin,lib} symlinks, and the
        # $HOME/.cyrius/current pointer. Replaces the pre-5.11 hand-rolled
        # extract that landed stdlib at the wrong path.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${CYRIUS_VERSION}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          echo "CYRIUS_HOME=$HOME/.cyrius" >> "$GITHUB_ENV"

      - name: Resolve dependencies
        # Two-step under cyrius 5.11.x:
        #   1. Stdlib — install.sh laid these out at $HOME/.cyrius/lib;
        #      cc5 reads from ./lib/ specifically, so cp -rL into the
        #      project. `cyrius update` would also do this but is fragile
        #      across CI $HOME shapes; direct cp is exactly what's needed.
        #   2. `cyrius deps` resolves [deps.X] git crates (sakshi /
        #      vyakarana) alongside the staged stdlib.
        # cyrius.lock is empty under 5.11.x and gitignored; no verify step.
        run: |
          mkdir -p lib
          cp -rL "$HOME/.cyrius/lib/"* lib/
          cyrius deps

      - name: Lint
        # Per-file in 5.7+. The cosmetic 'exceeds 120 characters' warning
        # is tolerated; everything else hard-fails. Mirrors sit's pattern.
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            bad=$(echo "$out" | grep -E '^\s*warn ' | grep -v 'exceeds 120 characters' || true)
            if [ -n "$bad" ]; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: non-cosmetic warnings present"; exit 1; }

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/vidya
          echo "vidya: $(wc -c < build/vidya) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/vidya | grep -q "7f45 4c46"

      - name: Smoke test
        run: |
          ./build/vidya stats
          ./build/vidya search string
          ./build/vidya info strings | head -5
          ./build/vidya languages
          ./build/vidya gaps

      - name: Test (.tcyr)
        run: cyrius test
        continue-on-error: true

      - name: Bench (.bcyr)
        run: cyrius bench
        continue-on-error: true

  content:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify concept.toml in topic directories
        run: |
          MISSING=0
          for d in content/*/; do
            [ -d "$d" ] || continue
            name=$(basename "$d")
            # Skip non-topic directories (language reference, shared files)
            case "$name" in cyrius) continue ;; esac
            if [ ! -f "$d/concept.toml" ]; then
              echo "MISSING: $d/concept.toml"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Check required fields
        run: |
          FAIL=0
          for f in content/*/concept.toml; do
            topic=$(dirname "$f" | xargs basename)
            for field in id title topic description tags; do
              if ! grep -q "^$field " "$f" 2>/dev/null; then
                echo "MISSING: $topic concept.toml: $field"
                FAIL=1
              fi
            done
          done
          exit $FAIL

      # ── Install per-language toolchains for validate-content.sh ───────
      # rustc / python3 / gcc / go / node are preinstalled on
      # ubuntu-latest. zig, aarch64 binutils, qemu-user-static, tsx,
      # qiskit, and cyrius need explicit setup. validate-content.sh
      # gracefully skips any language whose toolchain is absent, but CI
      # is the place to gate every example — install all of them.
      - name: Install zig
        run: |
          ZIG_VER="0.13.0"
          curl -sSL -o /tmp/zig.tar.xz \
            "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz"
          mkdir -p /opt/zig && tar -xf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" >> "$GITHUB_PATH"

      - name: Install aarch64 cross-tools + qemu-user-static
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu \
            qemu-user-static

      - name: Install tsx (TypeScript runner)
        run: npm install -g tsx

      - name: Install qiskit (OpenQASM validator)
        run: pip install --no-cache-dir qiskit

      - name: Install Cyrius toolchain
        # Same pattern as the build-and-test job — content validation
        # needs `cyrius run` for cyrius.cyr examples.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${CYRIUS_VERSION}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          echo "CYRIUS_HOME=$HOME/.cyrius" >> "$GITHUB_ENV"

      - name: Validate all examples compile/run
        # The gate per CLAUDE.md "Content Standards" — every concept.toml
        # example must compile and run successfully in its language.
        # ~10 min wallclock for 814 examples × 11 languages.
        run: bash scripts/validate-content.sh

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in src/"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
