name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/vidya
          echo "vidya: $(wc -c < build/vidya) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/vidya | grep -q "7f45 4c46"

      - name: Smoke test
        run: |
          ./build/vidya stats
          ./build/vidya search string
          ./build/vidya info strings | head -5
          ./build/vidya languages
          ./build/vidya gaps

      - name: Test (.tcyr)
        run: cyrius test
        continue-on-error: true

      - name: Bench (.bcyr)
        run: cyrius bench
        continue-on-error: true

  content:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify concept.toml in topic directories
        run: |
          MISSING=0
          for d in content/*/; do
            [ -d "$d" ] || continue
            name=$(basename "$d")
            # Skip non-topic directories (language reference, shared files)
            case "$name" in cyrius) continue ;; esac
            if [ ! -f "$d/concept.toml" ]; then
              echo "MISSING: $d/concept.toml"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Check required fields
        run: |
          FAIL=0
          for f in content/*/concept.toml; do
            topic=$(dirname "$f" | xargs basename)
            for field in id title topic description tags; do
              if ! grep -q "^$field " "$f" 2>/dev/null; then
                echo "MISSING: $topic concept.toml: $field"
                FAIL=1
              fi
            done
          done
          exit $FAIL

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in src/"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
