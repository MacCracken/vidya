name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "2.7.1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/vidya
          echo "vidya: $(wc -c < build/vidya) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/vidya | grep -q "7f45 4c46"

      - name: Smoke test
        run: |
          ./build/vidya stats
          ./build/vidya search string
          ./build/vidya info strings | head -5
          ./build/vidya languages
          ./build/vidya gaps

      - name: Test (.tcyr)
        run: cyrius test

      - name: Bench (.bcyr)
        run: cyrius bench
        continue-on-error: true

  content:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify concept.toml in every topic
        run: |
          MISSING=0
          for d in content/*/; do
            [ -d "$d" ] || continue
            name=$(basename "$d")
            if [ ! -f "$d/concept.toml" ]; then
              echo "MISSING: $d/concept.toml"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Check required fields
        run: |
          FAIL=0
          for f in content/*/concept.toml; do
            topic=$(dirname "$f" | xargs basename)
            for field in id title topic description tags; do
              if ! grep -q "^$field " "$f" 2>/dev/null; then
                echo "MISSING: $topic concept.toml: $field"
                FAIL=1
              fi
            done
          done
          exit $FAIL

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in src/"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          grep -q "$VERSION" cyrius.toml || { echo "FAIL: version not in cyrius.toml"; exit 1; }
          echo "Version consistent"
