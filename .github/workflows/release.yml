name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v2.3.0 == 2.3.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        # 5.11.x consumer pattern — see ci.yml for full rationale.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="${CYRIUS_VERSION}" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          echo "CYRIUS_HOME=$HOME/.cyrius" >> "$GITHUB_ENV"

      - name: Resolve deps
        # Two-step: cp stdlib from install.sh's $HOME/.cyrius/lib into the
        # project ./lib/, then add [deps.X] git crates via `cyrius deps`.
        # See ci.yml for rationale.
        run: |
          mkdir -p lib
          cp -rL "$HOME/.cyrius/lib/"* lib/
          cyrius deps

      - name: Build x86_64
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/vidya
          echo "vidya x86_64: $(wc -c < build/vidya) bytes"

      - name: Cross-build aarch64 (best-effort)
        # Best-effort: ship x86_64 even if aarch64 fails. Mirrors sit's
        # pattern; aarch64 cross-build occasionally fails on stdlib
        # syscall-table gaps (e.g. SYS_OPEN under cyrius 5.8.x — aarch64
        # has openat only). When it fails we drop the artifact and
        # surface a CI warning; when cc5_aarch64 isn't shipped with the
        # pinned cyrius release, we skip with a warning.
        run: |
          if [ -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            if cyrius build --aarch64 src/main.cyr build/vidya-aarch64; then
              echo "vidya aarch64: $(wc -c < build/vidya-aarch64) bytes"
            else
              echo "::warning::aarch64 cross-build failed; shipping x86_64 only"
              rm -f build/vidya-aarch64
            fi
          else
            echo "::warning::cc5_aarch64 not shipped with this Cyrius — aarch64 binary skipped"
          fi

      - name: Archive
        # Binary is statically linked (~1.1 MB) — consumers don't need
        # lib/ at runtime, so the tarball ships only the binary and the
        # content corpus. lib/ is a build artifact, rehydrated on demand.
        # aarch64 artifacts shipped only when cross-build succeeded.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          tar czf "vidya-${TAG}-x86_64-linux.tar.gz" build/vidya content/
          git archive --format=tar.gz --prefix="vidya-${TAG}/" -o "vidya-${TAG}-src.tar.gz" HEAD
          cp build/vidya "vidya-${TAG}-x86_64-linux"
          if [ -f build/vidya-aarch64 ]; then
            tar czf "vidya-${TAG}-aarch64-linux.tar.gz" build/vidya-aarch64 content/
            cp build/vidya-aarch64 "vidya-${TAG}-aarch64-linux"
          fi
          sha256sum vidya-*.tar.gz vidya-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            vidya-*.tar.gz
            vidya-*-linux
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "vidya ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            vidya-*.tar.gz
            vidya-*-linux
            SHA256SUMS
